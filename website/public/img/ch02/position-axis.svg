<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="sans-serif">
  <!-- Axis -->
  <defs>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000000"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
  </defs>

  <!-- x-axis -->
  <line x1="40" y1="100" x2="660" y2="100" stroke="#000000" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="670" y="105" font-size="16" fill="#000000" font-style="italic">x</text>

  <!-- Origin -->
  <line x1="200" y1="90" x2="200" y2="110" stroke="#000000" stroke-width="2"/>
  <text x="200" y="130" font-size="14" fill="#6B7280" text-anchor="middle">O (원점)</text>
  <text x="200" y="148" font-size="13" fill="#6B7280" text-anchor="middle">x = 0</text>

  <!-- Negative marks -->
  <line x1="100" y1="95" x2="100" y2="105" stroke="#6B7280" stroke-width="1"/>
  <text x="100" y="125" font-size="13" fill="#6B7280" text-anchor="middle">-2</text>
  <line x1="150" y1="95" x2="150" y2="105" stroke="#6B7280" stroke-width="1"/>
  <text x="150" y="125" font-size="13" fill="#6B7280" text-anchor="middle">-1</text>

  <!-- Positive marks -->
  <line x1="250" y1="95" x2="250" y2="105" stroke="#6B7280" stroke-width="1"/>
  <text x="250" y="125" font-size="13" fill="#6B7280" text-anchor="middle">1</text>
  <line x1="300" y1="95" x2="300" y2="105" stroke="#6B7280" stroke-width="1"/>
  <text x="300" y="125" font-size="13" fill="#6B7280" text-anchor="middle">2</text>
  <line x1="350" y1="95" x2="350" y2="105" stroke="#6B7280" stroke-width="1"/>
  <text x="350" y="125" font-size="13" fill="#6B7280" text-anchor="middle">3</text>

  <!-- Particle at position x -->
  <circle cx="350" cy="100" r="10" fill="#8B0029" stroke="#8B0029" stroke-width="2"/>

  <!-- Position arrow -->
  <line x1="200" y1="60" x2="345" y2="60" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="272" y="50" font-size="15" fill="#8B0029" text-anchor="middle" font-style="italic">x</text>
  <text x="272" y="36" font-size="13" fill="#8B0029" text-anchor="middle">(위치)</text>

  <!-- Direction labels -->
  <text x="80" y="80" font-size="13" fill="#6B7280">음의 방향</text>
  <text x="500" y="80" font-size="13" fill="#6B7280">양의 방향</text>
  <text x="350" y="170" font-size="14" fill="#8B0029" text-anchor="middle" font-weight="bold">단위: m (미터)</text>

  <!-- Negative direction arrow -->
  <line x1="140" y1="70" x2="90" y2="70" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Positive direction arrow -->
  <line x1="530" y1="70" x2="580" y2="70" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
</svg>