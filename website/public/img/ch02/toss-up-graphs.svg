<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="sans-serif">
  <defs>
    <marker id="axA3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000000"/>
    </marker>
  </defs>

  <!-- Left graph: y(t) -->
  <g transform="translate(0,0)">
    <!-- Axes -->
    <line x1="80" y1="340" x2="370" y2="340" stroke="#000000" stroke-width="2" marker-end="url(#axA3)"/>
    <line x1="80" y1="340" x2="80" y2="30" stroke="#000000" stroke-width="2" marker-end="url(#axA3)"/>
    <text x="375" y="355" font-size="14" fill="#000000" font-style="italic">t</text>
    <text x="70" y="25" font-size="14" fill="#000000" font-style="italic">y</text>

    <!-- Title -->
    <text x="225" y="20" font-size="15" fill="#8B0029" text-anchor="middle" font-weight="bold">위치-시간 그래프</text>

    <!-- Parabola: y = y0 + v0*t - (1/2)g*t^2 — inverted parabola -->
    <path d="M 100,280 Q 130,240 160,190 Q 200,120 230,90 Q 250,75 260,80 Q 290,100 310,160 Q 330,220 350,300"
          fill="none" stroke="#8B0029" stroke-width="2"/>

    <!-- Peak point -->
    <circle cx="255" cy="76" r="5" fill="#8B0029"/>
    <line x1="255" y1="76" x2="255" y2="340" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="80" y1="76" x2="255" y2="76" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="255" y="360" font-size="12" fill="#6B7280" text-anchor="middle" font-style="italic">t_peak</text>
    <text x="68" y="80" font-size="12" fill="#6B7280" text-anchor="end" font-style="italic">y_max</text>

    <!-- v=0 label at peak -->
    <text x="275" y="66" font-size="13" fill="#2563EB" font-weight="bold">v = 0</text>

    <!-- Initial point -->
    <circle cx="100" cy="280" r="4" fill="#6B7280"/>
    <text x="100" y="300" font-size="12" fill="#6B7280" text-anchor="middle">출발</text>

    <!-- Landing point -->
    <circle cx="350" cy="280" r="4" fill="#6B7280"/>

    <!-- y0 label -->
    <line x1="80" y1="280" x2="100" y2="280" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="68" y="284" font-size="12" fill="#6B7280" text-anchor="end" font-style="italic">y₀</text>
  </g>

  <!-- Right graph: v(t) -->
  <g transform="translate(400,0)">
    <!-- Axes -->
    <line x1="80" y1="190" x2="370" y2="190" stroke="#000000" stroke-width="2" marker-end="url(#axA3)"/>
    <line x1="80" y1="370" x2="80" y2="30" stroke="#000000" stroke-width="2" marker-end="url(#axA3)"/>
    <text x="375" y="205" font-size="14" fill="#000000" font-style="italic">t</text>
    <text x="70" y="25" font-size="14" fill="#000000" font-style="italic">v</text>
    <text x="90" y="205" font-size="12" fill="#6B7280">0</text>

    <!-- Title -->
    <text x="225" y="20" font-size="15" fill="#2563EB" text-anchor="middle" font-weight="bold">속도-시간 그래프</text>

    <!-- Linear v(t) = v0 - g*t -->
    <line x1="100" y1="70" x2="350" y2="330" stroke="#2563EB" stroke-width="2"/>

    <!-- v0 label -->
    <line x1="80" y1="70" x2="100" y2="70" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="68" y="74" font-size="13" fill="#2563EB" text-anchor="end" font-style="italic">v₀</text>
    <text x="68" y="88" font-size="11" fill="#2563EB" text-anchor="end">(양수)</text>

    <!-- v=0 point (where line crosses axis) -->
    <circle cx="210" cy="190" r="5" fill="#8B0029"/>
    <text x="210" y="215" font-size="12" fill="#8B0029" text-anchor="middle" font-style="italic">t_peak</text>

    <!-- Slope label -->
    <text x="280" y="270" font-size="13" fill="#6B7280" font-style="italic">기울기 = −g</text>

    <!-- Negative velocity region -->
    <text x="310" y="310" font-size="12" fill="#8B0029">하강</text>
    <text x="140" y="110" font-size="12" fill="#2563EB">상승</text>

    <!-- Impact velocity -->
    <line x1="80" y1="330" x2="350" y2="330" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="68" y="334" font-size="12" fill="#8B0029" text-anchor="end" font-style="italic">−v_f</text>
  </g>
</svg>