<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="sans-serif">
  <defs>
    <marker id="axA2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000000"/>
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="80" y1="340" x2="650" y2="340" stroke="#000000" stroke-width="2" marker-end="url(#axA2)"/>
  <line x1="80" y1="340" x2="80" y2="30" stroke="#000000" stroke-width="2" marker-end="url(#axA2)"/>
  <text x="660" y="345" font-size="15" fill="#000000" font-style="italic">t</text>
  <text x="70" y="25" font-size="15" fill="#000000" font-style="italic">x</text>

  <!-- Curve: x(t) -->
  <path d="M 100,310 C 160,300 230,260 300,180 C 370,100 460,70 600,60"
        fill="none" stroke="#2563EB" stroke-width="2"/>

  <!-- Point of tangency -->
  <circle cx="300" cy="180" r="6" fill="#8B0029"/>
  <line x1="300" y1="180" x2="300" y2="340" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="300" y="360" font-size="13" fill="#6B7280" text-anchor="middle" font-style="italic">t</text>

  <!-- Tangent line (red) — slope at x=300 -->
  <line x1="150" y1="290" x2="480" y2="48" stroke="#8B0029" stroke-width="2"/>

  <!-- Secant lines (gray, fading) showing convergence -->
  <line x1="130" y1="310" x2="480" y2="82" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="140" y1="305" x2="470" y2="68" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Second points on secant lines -->
  <circle cx="420" cy="85" r="4" fill="#6B7280"/>
  <circle cx="380" cy="112" r="4" fill="#6B7280"/>

  <!-- Arrow showing Δt → 0 -->
  <text x="430" y="130" font-size="13" fill="#6B7280" font-style="italic">Δt → 0</text>
  <line x1="420" y1="110" x2="380" y2="130" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Labels -->
  <text x="490" y="42" font-size="15" fill="#8B0029" font-weight="bold">접선</text>
  <text x="490" y="60" font-size="13" fill="#8B0029">(tangent line)</text>

  <text x="350" y="40" font-size="15" fill="#8B0029" text-anchor="middle" font-weight="bold">접선의 기울기 = 순간 속도</text>

  <!-- Formula -->
  <rect x="380" y="300" width="260" height="50" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
  <text x="510" y="322" font-size="14" fill="#8B0029" text-anchor="middle" font-style="italic" font-weight="bold">v = dx/dt = lim(Δx/Δt)</text>
  <text x="510" y="342" font-size="12" fill="#6B7280" text-anchor="middle">Δt → 0</text>

  <!-- Curve label -->
  <text x="610" y="52" font-size="14" fill="#2563EB" font-style="italic">x(t)</text>
</svg>