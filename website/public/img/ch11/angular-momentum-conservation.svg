<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400" font-family="sans-serif">
  <defs>
    <marker id="acR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="375" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">각운동량 보존: 피겨 스케이팅</text>

  <!-- Left: Arms out (large I, small omega) -->
  <g transform="translate(190, 210)">
    <!-- Body (torso) -->
    <ellipse cx="0" cy="0" rx="20" ry="55" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Head -->
    <circle cx="0" cy="-70" r="16" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Left arm extended -->
    <line x1="-20" y1="-30" x2="-90" y2="-20" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <!-- Right arm extended -->
    <line x1="20" y1="-30" x2="90" y2="-20" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <!-- Left leg -->
    <line x1="-8" y1="55" x2="-15" y2="110" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <!-- Right leg -->
    <line x1="8" y1="55" x2="15" y2="110" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <!-- Skate blade -->
    <line x1="-25" y1="112" x2="-5" y2="112" stroke="#6B7280" stroke-width="2"/>
    <line x1="5" y1="112" x2="25" y2="112" stroke="#6B7280" stroke-width="2"/>

    <!-- Slow rotation arrow -->
    <path d="M -35,-100 A 50,50 0 0,1 35,-100" fill="none" stroke="#8B0029" stroke-width="2" marker-end="url(#acR)"/>
    <text x="0" y="-108" text-anchor="middle" font-size="14" font-style="italic" fill="#8B0029">ω 작음</text>

    <!-- Radius indicator -->
    <line x1="0" y1="-20" x2="-90" y2="-20" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="-50" y="-28" text-anchor="middle" font-size="12" fill="#6B7280">큰 I</text>
  </g>

  <!-- Arrow between figures -->
  <line x1="320" y1="200" x2="400" y2="200" stroke="#8B0029" stroke-width="2.5" marker-end="url(#acR)"/>
  <text x="360" y="185" text-anchor="middle" font-size="14" fill="#8B0029">팔 모음</text>

  <!-- Right: Arms in (small I, large omega) -->
  <g transform="translate(520, 210)">
    <!-- Body (torso, narrower) -->
    <ellipse cx="0" cy="0" rx="15" ry="55" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Head -->
    <circle cx="0" cy="-70" r="16" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Left arm close to body -->
    <line x1="-15" y1="-30" x2="-22" y2="-5" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <!-- Right arm close to body -->
    <line x1="15" y1="-30" x2="22" y2="-5" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <!-- Left leg -->
    <line x1="-5" y1="55" x2="-8" y2="110" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <!-- Right leg -->
    <line x1="5" y1="55" x2="8" y2="110" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <!-- Skate blade -->
    <line x1="-18" y1="112" x2="2" y2="112" stroke="#6B7280" stroke-width="2"/>
    <line x1="-2" y1="112" x2="18" y2="112" stroke="#6B7280" stroke-width="2"/>

    <!-- Fast rotation arrow (multiple turns shown) -->
    <path d="M -35,-100 A 50,50 0 0,1 35,-100" fill="none" stroke="#8B0029" stroke-width="2.5" marker-end="url(#acR)"/>
    <path d="M -30,-95 A 45,45 0 0,1 30,-95" fill="none" stroke="#8B0029" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="-108" text-anchor="middle" font-size="14" font-weight="bold" font-style="italic" fill="#8B0029">ω 큼!</text>

    <!-- Radius indicator -->
    <text x="0" y="145" text-anchor="middle" font-size="12" fill="#6B7280">작은 I</text>
  </g>

  <!-- Conservation equation -->
  <rect x="100" y="350" width="550" height="40" rx="8" fill="#8B0029"/>
  <text x="375" y="376" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">L = Iω = 일정   →   I 감소하면 ω 증가!</text>
</svg>