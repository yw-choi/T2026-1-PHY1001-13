<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="sans-serif">
  <defs>
    <marker id="amR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="amG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6B7280">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- =========== State 1: arms extended =========== -->
  <g transform="translate(170, 180)">
    <!-- Body (center) -->
    <circle cx="0" cy="0" r="26" fill="#F3F4F6" stroke="#6B7280" stroke-width="2.5"/>
    <!-- Arms (rods) extended -->
    <line x1="-26" y1="0" x2="-100" y2="0" stroke="#6B7280" stroke-width="4" stroke-linecap="round"/>
    <line x1="26" y1="0" x2="100" y2="0" stroke="#6B7280" stroke-width="4" stroke-linecap="round"/>
    <!-- Dumbbell masses at ends -->
    <circle cx="-110" cy="0" r="14" fill="#8B0029" stroke="#6a0020" stroke-width="2"/>
    <circle cx="110" cy="0" r="14" fill="#8B0029" stroke="#6a0020" stroke-width="2"/>
    <text x="-110" y="5" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">m</text>
    <text x="110" y="5" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">m</text>

    <!-- Slow rotation arrow (small) -->
    <path d="M -50,-50 A 65,65 0 0,1 50,-50" fill="none" stroke="#8B0029" stroke-width="2.5" marker-end="url(#amR)"/>
    <text x="0" y="-62" text-anchor="middle" font-size="20" font-weight="bold" fill="#8B0029">
      <tspan font-style="italic">&#x3C9;</tspan><tspan font-size="14" baseline-shift="sub">i</tspan>
    </text>

    <!-- State label -->
    <text x="0" y="100" text-anchor="middle" font-size="18" fill="#1a1a1a">큰 <tspan font-style="italic" font-weight="bold" fill="#8B0029">I</tspan><tspan font-size="14" baseline-shift="sub">i</tspan>, &#xA0; 작은 <tspan font-style="italic" font-weight="bold" fill="#8B0029">&#x3C9;</tspan><tspan font-size="14" baseline-shift="sub">i</tspan></text>
  </g>

  <!-- Transition arrow -->
  <line x1="320" y1="180" x2="430" y2="180" stroke="#6B7280" stroke-width="3" marker-end="url(#amG)"/>
  <text x="375" y="167" text-anchor="middle" font-size="16" fill="#6B7280" font-weight="bold">팔을 모음</text>
  <text x="375" y="200" text-anchor="middle" font-size="13" fill="#6B7280">(외부 토크 = 0)</text>

  <!-- =========== State 2: arms tucked in =========== -->
  <g transform="translate(575, 180)">
    <!-- Body -->
    <circle cx="0" cy="0" r="26" fill="#F3F4F6" stroke="#6B7280" stroke-width="2.5"/>
    <!-- Arms tucked -->
    <line x1="-26" y1="0" x2="-32" y2="0" stroke="#6B7280" stroke-width="4" stroke-linecap="round"/>
    <line x1="26" y1="0" x2="32" y2="0" stroke="#6B7280" stroke-width="4" stroke-linecap="round"/>
    <!-- Dumbbell masses close -->
    <circle cx="-42" cy="0" r="14" fill="#8B0029" stroke="#6a0020" stroke-width="2"/>
    <circle cx="42" cy="0" r="14" fill="#8B0029" stroke="#6a0020" stroke-width="2"/>
    <text x="-42" y="5" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">m</text>
    <text x="42" y="5" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">m</text>

    <!-- Fast rotation arrow (larger) -->
    <path d="M -55,-55 A 75,75 0 0,1 55,-55" fill="none" stroke="#8B0029" stroke-width="3.5" marker-end="url(#amR)"/>
    <path d="M -42,-65 A 60,60 0 0,1 42,-65" fill="none" stroke="#8B0029" stroke-width="2"/>
    <text x="0" y="-78" text-anchor="middle" font-size="22" font-weight="bold" fill="#8B0029">
      <tspan font-style="italic">&#x3C9;</tspan><tspan font-size="15" baseline-shift="sub">f</tspan>
    </text>

    <!-- State label -->
    <text x="0" y="100" text-anchor="middle" font-size="18" fill="#1a1a1a">작은 <tspan font-style="italic" font-weight="bold" fill="#8B0029">I</tspan><tspan font-size="14" baseline-shift="sub">f</tspan>, &#xA0; 큰 <tspan font-style="italic" font-weight="bold" fill="#8B0029">&#x3C9;</tspan><tspan font-size="14" baseline-shift="sub">f</tspan></text>
  </g>

  <!-- Conservation note -->
  <text x="360" y="345" text-anchor="middle" font-size="20" font-weight="bold" fill="#8B0029">
    <tspan font-style="italic">I</tspan><tspan font-size="14" baseline-shift="sub">i</tspan> <tspan font-style="italic">&#x3C9;</tspan><tspan font-size="14" baseline-shift="sub">i</tspan> = <tspan font-style="italic">I</tspan><tspan font-size="14" baseline-shift="sub">f</tspan> <tspan font-style="italic">&#x3C9;</tspan><tspan font-size="14" baseline-shift="sub">f</tspan>
  </text>
</svg>
