<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" font-family="sans-serif">
  <defs>
    <marker id="aR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="aB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="aG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6B7280">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Support bar at top -->
  <rect x="160" y="42" width="80" height="10" rx="3" fill="#6B7280"/>

  <!-- String from support to axle top -->
  <line x1="200" y1="52" x2="200" y2="247" stroke="#6B7280" stroke-width="1.5"/>

  <!-- Outer disk (yo-yo body) -->
  <circle cx="200" cy="268" r="75" fill="#F3F4F6" stroke="#6B7280" stroke-width="2.5"/>

  <!-- Inner axle -->
  <circle cx="200" cy="268" r="20" fill="white" stroke="#6B7280" stroke-width="1.5"/>

  <!-- Center of mass dot -->
  <circle cx="200" cy="268" r="3" fill="#6B7280"/>

  <!-- T force arrow (upward from axle top) -->
  <line x1="200" y1="248" x2="200" y2="108" stroke="#8B0029" stroke-width="2.5" marker-end="url(#aR)"/>
  <text x="215" y="168" font-size="18" font-weight="bold" font-style="italic" fill="#8B0029">T</text>

  <!-- Mg force arrow (downward from below disk) -->
  <line x1="200" y1="348" x2="200" y2="468" stroke="#2563EB" stroke-width="2.5" marker-end="url(#aB)"/>
  <text x="215" y="448" font-size="18" font-weight="bold" font-style="italic" fill="#2563EB">Mg</text>

  <!-- R dimension line (right side, below center) -->
  <line x1="200" y1="298" x2="200" y2="310" stroke="#6B7280" stroke-width="0.8"/>
  <line x1="275" y1="298" x2="275" y2="310" stroke="#6B7280" stroke-width="0.8"/>
  <line x1="200" y1="304" x2="275" y2="304" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="237" y="322" font-size="15" font-style="italic" fill="#6B7280" text-anchor="middle">R</text>

  <!-- R₀ dimension: leader line from axle edge to label -->
  <line x1="220" y1="268" x2="280" y2="238" stroke="#6B7280" stroke-width="0.8" stroke-dasharray="3 2"/>
  <circle cx="220" cy="268" r="2" fill="#6B7280"/>
  <text x="284" y="242" font-size="14" font-style="italic" fill="#6B7280">R₀</text>

  <!-- α rotation indicator (curved arrow, top of disk) -->
  <path d="M 168,200 A 38,38 0 0,1 232,200" fill="none" stroke="#2563EB" stroke-width="2" marker-end="url(#aB)"/>
  <text x="240" y="202" font-size="16" font-style="italic" fill="#2563EB">α</text>

  <!-- a_com arrow (dashed, left side, downward) -->
  <line x1="95" y1="250" x2="95" y2="348" stroke="#6B7280" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#aG)"/>
  <text x="42" y="310" font-size="15" fill="#6B7280" font-weight="bold">
    <tspan font-style="italic">a</tspan><tspan font-size="11" baseline-shift="sub">com</tspan>
  </text>
</svg>
