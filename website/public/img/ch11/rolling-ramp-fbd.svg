<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="sans-serif">
  <defs>
    <marker id="aR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="aB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="aG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6B7280">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Incline surface -->
  <polygon points="80,370 620,370 620,120" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <!-- Hatching -->
  <g stroke="#6B7280" stroke-width="1">
    <line x1="120" y1="370" x2="100" y2="380"/>
    <line x1="160" y1="370" x2="140" y2="380"/>
    <line x1="200" y1="370" x2="180" y2="380"/>
    <line x1="240" y1="370" x2="220" y2="380"/>
    <line x1="280" y1="370" x2="260" y2="380"/>
    <line x1="320" y1="370" x2="300" y2="380"/>
    <line x1="360" y1="370" x2="340" y2="380"/>
    <line x1="400" y1="370" x2="380" y2="380"/>
    <line x1="440" y1="370" x2="420" y2="380"/>
    <line x1="480" y1="370" x2="460" y2="380"/>
    <line x1="520" y1="370" x2="500" y2="380"/>
    <line x1="560" y1="370" x2="540" y2="380"/>
    <line x1="600" y1="370" x2="580" y2="380"/>
  </g>

  <!-- Angle arc -->
  <path d="M 560,370 A 60,60 0 0,0 575,346" fill="none" stroke="#6B7280" stroke-width="1"/>
  <text x="545" y="356" font-size="16" font-style="italic" fill="#6B7280">&#x3B8;</text>

  <!-- Ball on incline -->
  <g transform="translate(380, 232)">
    <circle cx="0" cy="0" r="35" fill="#F3F4F6" stroke="#000000" stroke-width="2"/>
    <circle cx="0" cy="0" r="3" fill="#000000"/>
    <text x="0" y="5" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000" font-style="italic">M</text>

    <!-- Weight: Mg downward -->
    <line x1="0" y1="8" x2="0" y2="95" stroke="#8B0029" stroke-width="2.5" marker-end="url(#aR)"/>
    <text x="18" y="92" font-size="14" font-weight="bold" fill="#8B0029" font-style="italic">Mg</text>

    <!-- Normal force -->
    <line x1="0" y1="-38" x2="-33" y2="-109" stroke="#2563EB" stroke-width="2.5" marker-end="url(#aB)"/>
    <text x="-55" y="-95" font-size="14" font-weight="bold" fill="#2563EB" font-style="italic">N</text>

    <!-- Friction force: up the incline -->
    <line x1="-18" y1="30" x2="42" y2="2" stroke="#8B0029" stroke-width="2.5" marker-end="url(#aR)"/>
    <text x="50" y="0" font-size="14" font-weight="bold" fill="#8B0029">
      <tspan font-style="italic">f</tspan><tspan font-size="10" baseline-shift="sub">s</tspan>
    </text>

    <!-- Acceleration arrow: down the incline -->
    <line x1="22" y1="-30" x2="-28" y2="-7" stroke="#6B7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#aG)"/>
    <text x="-65" y="0" font-size="14" fill="#6B7280">
      <tspan font-style="italic">a</tspan><tspan font-size="10" baseline-shift="sub">com</tspan>
    </text>

    <!-- Rotation arrow -->
    <path d="M 20,28 A 34,34 0 0,1 -10,35" fill="none" stroke="#2563EB" stroke-width="1" marker-end="url(#aB)"/>
    <text x="-8" y="52" font-size="14" font-style="italic" fill="#2563EB">&#x3C9;</text>
  </g>

  <!-- Coordinate system -->
  <g transform="translate(160, 340)">
    <line x1="0" y1="0" x2="50" y2="-23" stroke="#6B7280" stroke-width="1" marker-end="url(#aG)"/>
    <text x="55" y="-18" font-size="14" font-style="italic" fill="#6B7280">x</text>
    <line x1="0" y1="0" x2="-23" y2="-50" stroke="#6B7280" stroke-width="1" marker-end="url(#aG)"/>
    <text x="-30" y="-48" font-size="14" font-style="italic" fill="#6B7280">y</text>
  </g>

  <!-- Force equations -->
  <text x="40" y="30" font-size="14" fill="#8B0029" font-weight="bold">빗면 위의 구름 운동 자유 물체 다이어그램</text>
  <text x="40" y="55" font-size="14" fill="#6B7280">
    <tspan font-style="italic">Mg</tspan> sin <tspan font-style="italic">&#x3B8;</tspan> &#x2212; <tspan font-style="italic">f</tspan><tspan font-size="10" baseline-shift="sub">s</tspan> = <tspan font-style="italic">Ma</tspan><tspan font-size="10" baseline-shift="sub">com</tspan>
  </text>
  <text x="40" y="75" font-size="14" fill="#6B7280">
    <tspan font-style="italic">Rf</tspan><tspan font-size="10" baseline-shift="sub">s</tspan> = <tspan font-style="italic">I</tspan><tspan font-size="10" baseline-shift="sub">com</tspan><tspan font-style="italic">&#x3B1;</tspan>
  </text>

  <!-- Contact point label -->
  <text x="360" y="280" font-size="14" fill="#6B7280">접촉점 P</text>
</svg>
