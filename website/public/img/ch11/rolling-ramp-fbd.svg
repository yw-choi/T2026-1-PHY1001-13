<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="sans-serif">
  <defs>
    <marker id="aR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="aB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="aG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6B7280">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="380" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">빗면 위의 구름 운동: 자유 물체 다이어그램</text>

  <!-- Incline (angle ≈ 23.3°: 580 wide, 250 tall) -->
  <!-- Bottom-left corner: (60, 380), bottom-right: (640, 380), top: (640, 130) -->
  <polygon points="60,380 640,380 640,130" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>

  <!-- Ground hatching below incline base -->
  <line x1="60" y1="380" x2="640" y2="380" stroke="#6B7280" stroke-width="2"/>
  <g stroke="#6B7280" stroke-width="1">
    <line x1="80" y1="380" x2="68" y2="395"/>
    <line x1="115" y1="380" x2="103" y2="395"/>
    <line x1="150" y1="380" x2="138" y2="395"/>
    <line x1="185" y1="380" x2="173" y2="395"/>
    <line x1="220" y1="380" x2="208" y2="395"/>
    <line x1="255" y1="380" x2="243" y2="395"/>
    <line x1="290" y1="380" x2="278" y2="395"/>
    <line x1="325" y1="380" x2="313" y2="395"/>
    <line x1="360" y1="380" x2="348" y2="395"/>
    <line x1="395" y1="380" x2="383" y2="395"/>
    <line x1="430" y1="380" x2="418" y2="395"/>
    <line x1="465" y1="380" x2="453" y2="395"/>
    <line x1="500" y1="380" x2="488" y2="395"/>
    <line x1="535" y1="380" x2="523" y2="395"/>
    <line x1="570" y1="380" x2="558" y2="395"/>
    <line x1="605" y1="380" x2="593" y2="395"/>
  </g>

  <!-- Angle θ at the bottom-right corner of incline -->
  <path d="M 580,380 A 60,60 0 0,0 595,355" fill="none" stroke="#6B7280" stroke-width="1.2"/>
  <text x="565" y="367" font-size="16" font-style="italic" fill="#6B7280">&#x3B8;</text>

  <!-- Ball at midpoint of incline. Center: (336, 223). Radius 35. -->
  <!-- Inward normal (toward surface): (sin θ, cos θ) ≈ (0.395, 0.919). Contact: (350, 255). -->
  <circle cx="336" cy="223" r="35" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <circle cx="336" cy="223" r="2.5" fill="#6B7280"/>
  <text x="336" y="208" text-anchor="middle" font-size="14" font-weight="bold" font-style="italic" fill="#6B7280">M</text>

  <!-- Rotation indicator inside ball: small arc -->
  <path d="M 322,205 A 22,22 0 0,1 322,241" fill="none" stroke="#2563EB" stroke-width="1.5" marker-end="url(#aB)"/>
  <text x="305" y="227" font-size="13" font-style="italic" fill="#2563EB">&#x3C9;</text>

  <!-- Mg force at ball center, straight down -->
  <line x1="336" y1="223" x2="336" y2="318" stroke="#8B0029" stroke-width="2.5" marker-end="url(#aR)"/>
  <text x="346" y="312" font-size="15" font-weight="bold" fill="#8B0029" font-style="italic">Mg</text>

  <!-- Normal force N at contact point (350, 255), pointing along outward normal (-sin θ, -cos θ) ≈ (-0.395, -0.919) -->
  <line x1="350" y1="255" x2="320" y2="185" stroke="#2563EB" stroke-width="2.5" marker-end="url(#aB)"/>
  <text x="294" y="178" font-size="15" font-weight="bold" fill="#2563EB" font-style="italic">N</text>

  <!-- Friction f_s at contact point, pointing up the incline (cos θ, -sin θ) ≈ (0.919, -0.395) -->
  <line x1="350" y1="255" x2="405" y2="232" stroke="#8B0029" stroke-width="2.5" marker-end="url(#aR)"/>
  <text x="412" y="227" font-size="15" font-weight="bold" fill="#8B0029">
    <tspan font-style="italic">f</tspan><tspan font-size="11" baseline-shift="sub">s</tspan>
  </text>

  <!-- Contact point dot and label -->
  <circle cx="350" cy="255" r="3" fill="#6B7280"/>
  <text x="362" y="270" font-size="12" fill="#6B7280">접촉점 P</text>

  <!-- Acceleration a_com (dashed) from ball center, pointing down the incline (-cos θ, sin θ) ≈ (-0.919, 0.395) -->
  <line x1="336" y1="223" x2="266" y2="253" stroke="#6B7280" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#aG)"/>
  <text x="220" y="265" font-size="14" fill="#6B7280">
    <tspan font-style="italic">a</tspan><tspan font-size="10" baseline-shift="sub">com</tspan>
  </text>

  <!-- Coordinate axes inset (incline-aligned, x = down-incline +, y = outward +) -->
  <g transform="translate(115, 145)">
    <text x="-5" y="-26" font-size="11" fill="#6B7280" font-weight="bold">좌표축 (빗면 기준)</text>
    <!-- x: down-incline (-0.919, 0.395), length 45 -->
    <line x1="0" y1="0" x2="-41.4" y2="17.8" stroke="#6B7280" stroke-width="1.5" marker-end="url(#aG)"/>
    <text x="-55" y="22" font-size="13" font-style="italic" fill="#6B7280">x</text>
    <!-- y: outward normal (-0.395, -0.919), length 45 -->
    <line x1="0" y1="0" x2="-17.8" y2="-41.4" stroke="#6B7280" stroke-width="1.5" marker-end="url(#aG)"/>
    <text x="-28" y="-43" font-size="13" font-style="italic" fill="#6B7280">y</text>
    <circle cx="0" cy="0" r="2" fill="#6B7280"/>
  </g>

  <!-- Formula box (right side) -->
  <rect x="430" y="370" width="310" height="100" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
  <text x="585" y="392" text-anchor="middle" font-size="13" font-weight="bold" fill="#8B0029">운동 방정식</text>
  <text x="445" y="416" font-size="14" fill="#1a1a1a">
    빗면 방향: <tspan font-style="italic">Mg</tspan> sin <tspan font-style="italic">&#x3B8;</tspan> &#x2212; <tspan font-style="italic">f</tspan><tspan font-size="10" baseline-shift="sub">s</tspan> = <tspan font-style="italic">Ma</tspan><tspan font-size="10" baseline-shift="sub">com</tspan>
  </text>
  <text x="445" y="438" font-size="14" fill="#1a1a1a">
    회전: <tspan font-style="italic">Rf</tspan><tspan font-size="10" baseline-shift="sub">s</tspan> = <tspan font-style="italic">I</tspan><tspan font-size="10" baseline-shift="sub">com</tspan> <tspan font-style="italic">&#x3B1;</tspan>
  </text>
  <text x="445" y="460" font-size="14" fill="#6B7280">
    구름 조건: <tspan font-style="italic">a</tspan><tspan font-size="10" baseline-shift="sub">com</tspan> = <tspan font-style="italic">&#x3B1;R</tspan>
  </text>
</svg>
