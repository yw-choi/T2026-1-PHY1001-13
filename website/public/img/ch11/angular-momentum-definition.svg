<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" font-family="sans-serif">
  <defs>
    <marker id="lmR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="lmB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="lmG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6B7280">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">
    각운동량: <tspan font-style="italic">&#x2113;</tspan> = <tspan font-style="italic">r</tspan> &#xD7; <tspan font-style="italic">p</tspan>
  </text>

  <!-- Line of action of p (vertical at x=400) -->
  <line x1="400" y1="20" x2="400" y2="420" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="408" y="412" font-size="11" fill="#6B7280">힘/속도의 작용선</text>

  <!-- Moment arm: horizontal perpendicular from O to foot -->
  <line x1="160" y1="300" x2="395" y2="300" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="5 3"/>
  <!-- Right angle marker at foot (400, 300) -->
  <rect x="388" y="288" width="10" height="10" fill="none" stroke="#2563EB" stroke-width="1"/>
  <text x="280" y="318" text-anchor="middle" font-size="13" fill="#2563EB" font-weight="bold">
    <tspan font-style="italic">r</tspan> sin <tspan font-style="italic">&#x3C6;</tspan> &#xA0;(수직 거리)
  </text>

  <!-- r vector: from O to particle (blue, matching torque convention) -->
  <line x1="160" y1="300" x2="392" y2="166" stroke="#2563EB" stroke-width="2.5" marker-end="url(#lmB)"/>
  <text x="252" y="246" font-size="17" font-weight="bold" font-style="italic" fill="#2563EB">r</text>

  <!-- Origin O -->
  <circle cx="160" cy="300" r="5" fill="#1a1a1a"/>
  <text x="148" y="320" font-size="15" font-weight="bold" fill="#1a1a1a">O</text>

  <!-- ℓ vector indicator at O (out of page since r×p in physics is +z; with r up-right and p straight up, going r→p is CCW math = out of page) -->
  <g transform="translate(120, 250)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#8B0029" stroke-width="2"/>
    <circle cx="0" cy="0" r="3.5" fill="#8B0029"/>
    <text x="-22" y="5" text-anchor="end" font-size="17" font-weight="bold" font-style="italic" fill="#8B0029">&#x2113;</text>
    <text x="-22" y="22" text-anchor="end" font-size="11" fill="#6B7280">(지면 밖)</text>
  </g>

  <!-- Particle (small filled circle) -->
  <circle cx="400" cy="160" r="9" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="416" y="156" font-size="14" font-style="italic" fill="#1a1a1a">m</text>

  <!-- p vector at particle: pointing straight up (mv) -->
  <line x1="400" y1="155" x2="400" y2="40" stroke="#8B0029" stroke-width="2.5" marker-end="url(#lmR)"/>
  <text x="412" y="55" font-size="16" font-weight="bold" fill="#8B0029">
    <tspan font-style="italic">p</tspan> = <tspan font-style="italic">m</tspan><tspan font-style="italic">v</tspan>
  </text>

  <!-- Angle phi at particle: between r-extension and p direction -->
  <path d="M 421.6 147.4 A 25 25 0 0 0 400 135" fill="none" stroke="#6B7280" stroke-width="1.2"/>
  <text x="425" y="135" font-size="14" font-style="italic" fill="#6B7280">&#x3C6;</text>

  <!-- Formula box -->
  <rect x="60" y="370" width="580" height="80" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
  <text x="350" y="395" text-anchor="middle" font-size="14" font-weight="bold" fill="#8B0029">
    <tspan font-style="italic">&#x2113;</tspan> = <tspan font-style="italic">r</tspan> &#xD7; <tspan font-style="italic">p</tspan> = <tspan font-style="italic">r</tspan> &#xD7; <tspan font-style="italic">m</tspan><tspan font-style="italic">v</tspan>
  </text>
  <text x="350" y="418" text-anchor="middle" font-size="14" fill="#1a1a1a">
    |<tspan font-style="italic">&#x2113;</tspan>| = <tspan font-style="italic">rmv</tspan> sin <tspan font-style="italic">&#x3C6;</tspan> = <tspan font-style="italic">r</tspan><tspan font-size="10" baseline-shift="sub">&#x22A5;</tspan> <tspan font-style="italic">mv</tspan> = <tspan font-style="italic">r</tspan> <tspan font-style="italic">m</tspan><tspan font-style="italic">v</tspan><tspan font-size="10" baseline-shift="sub">&#x22A5;</tspan>
  </text>
  <text x="350" y="438" text-anchor="middle" font-size="12" fill="#6B7280">
    단위: kg&#xB7;m&#xB2;/s &#xA0;&#xA0; 방향: 오른손 법칙으로 결정
  </text>
</svg>
