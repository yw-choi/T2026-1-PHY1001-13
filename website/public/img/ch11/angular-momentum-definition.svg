<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" font-family="sans-serif">
  <defs>
    <marker id="lmR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="lmB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Line of action of p (vertical at x=400) -->
  <line x1="400" y1="40" x2="400" y2="400" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- Moment arm: horizontal perpendicular from O to foot -->
  <line x1="160" y1="300" x2="395" y2="300" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 3"/>
  <!-- Right angle marker at foot (400, 300) -->
  <rect x="388" y="288" width="12" height="12" fill="none" stroke="#2563EB" stroke-width="1.5"/>
  <text x="280" y="325" text-anchor="middle" font-size="18" fill="#2563EB" font-weight="bold">
    <tspan font-style="italic">r</tspan> sin <tspan font-style="italic">&#x3C6;</tspan>
  </text>

  <!-- r vector: from O to particle (blue) -->
  <line x1="160" y1="300" x2="392" y2="166" stroke="#2563EB" stroke-width="3" marker-end="url(#lmB)"/>
  <text x="262" y="252" font-size="26" font-weight="bold" font-style="italic" fill="#2563EB">r</text>

  <!-- Origin O -->
  <circle cx="160" cy="300" r="6" fill="#1a1a1a"/>
  <text x="145" y="325" font-size="22" font-weight="bold" fill="#1a1a1a">O</text>

  <!-- ℓ vector indicator (out of page) at upper-left -->
  <g transform="translate(95, 220)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#8B0029" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="5" fill="#8B0029"/>
    <text x="-26" y="6" text-anchor="end" font-size="24" font-weight="bold" font-style="italic" fill="#8B0029">&#x2113;</text>
    <text x="-26" y="28" text-anchor="end" font-size="13" fill="#6B7280">지면 밖</text>
  </g>

  <!-- Particle (small filled circle) -->
  <circle cx="400" cy="160" r="11" fill="#F3F4F6" stroke="#6B7280" stroke-width="2.5"/>
  <text x="420" y="156" font-size="20" font-style="italic" fill="#1a1a1a">m</text>

  <!-- p vector at particle: pointing straight up (mv) -->
  <line x1="400" y1="153" x2="400" y2="40" stroke="#8B0029" stroke-width="3" marker-end="url(#lmR)"/>
  <text x="416" y="65" font-size="24" font-weight="bold" fill="#8B0029">
    <tspan font-style="italic">p</tspan> = <tspan font-style="italic">mv</tspan>
  </text>

  <!-- Angle phi at particle: between r-extension and p direction -->
  <path d="M 421.6 147.4 A 28 28 0 0 0 400 132" fill="none" stroke="#6B7280" stroke-width="1.5"/>
  <text x="430" y="138" font-size="20" font-style="italic" fill="#6B7280">&#x3C6;</text>
</svg>
