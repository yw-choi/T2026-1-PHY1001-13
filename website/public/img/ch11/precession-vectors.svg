  <path d="M 275,195 A 55,55 0 0,0 269.8,171.8" fill="none" stroke="#6B7280" stroke-width="1.5" data-angle-origin="220,195" data-angle-radius="55" data-angle-start="0" data-angle-end="25"/>
  <text x="289.3" y="184.6" font-size="17" fill="#6B7280" text-anchor="middle" font-weight="bold" font-style="italic">dφ</text>
  <path d="M 316.4,80.1 A 150,150 0 0,0 123.6,80.1" fill="none" stroke="#6B7280" stroke-width="2" data-angle-origin="220,195" data-angle-radius="150" data-angle-start="50" data-angle-end="130"/>
  <text x="225" y="60" font-size="14" fill="#6B7280" text-anchor="middle">세차 방향</text>
  <text x="250" y="355" font-size="16" fill="#6B7280" text-anchor="middle">|dL| = L · dφ = τ · dt = Mgr · dt</text>
