  <text x="340" y="225" font-size="17" fill="#8B0029" font-weight="bold" font-style="italic">L(t)</text>
  <line x1="220" y1="195" x2="351.4" y2="133.7" stroke="#8B0029" stroke-width="2" fill="none" marker-end="url(#pvR)" stroke-dasharray="5 3"/>
  <text x="360" y="122" font-size="17" fill="#8B0029" font-weight="bold" font-style="italic">L(t+dt)</text>
  <line x1="370" y1="195" x2="351.4" y2="133.7" stroke="#2563EB" stroke-width="2.5" fill="none" marker-end="url(#pvB)"/>
