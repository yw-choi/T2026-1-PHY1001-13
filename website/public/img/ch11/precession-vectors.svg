<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" font-family="sans-serif">
  <defs>
    <marker id="pvR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/></marker>
    <marker id="pvB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/></marker>
    <marker id="pvG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/></marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <text x="220" y="28" font-size="15" fill="#6B7280" text-anchor="middle">위에서 본 모습 (top view)</text>
  <circle cx="220" cy="195" r="150" fill="none" stroke="#6B7280" stroke-width="1.5"/>
  <circle cx="220" cy="195" r="4" fill="#6B7280" stroke="#6B7280" stroke-width="0"/>
  <text x="205" y="218" font-size="14" fill="#6B7280">O</text>
