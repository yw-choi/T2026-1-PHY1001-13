<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="sans-serif">
  <defs>
    <marker id="tcrR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="tcrB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Origin O -->
  <circle cx="140" cy="320" r="6" fill="#1a1a1a"/>
  <text x="125" y="345" font-size="22" font-weight="bold" fill="#1a1a1a">O</text>

  <!-- Line of action of F (extended in both directions, dashed) -->
  <line x1="220" y1="86" x2="560" y2="237" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="568" y="245" font-size="14" fill="#6B7280">힘의 작용선</text>

  <!-- Moment arm: perpendicular from O to foot=(256, 105) -->
  <line x1="140" y1="320" x2="256" y2="105" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 3"/>
  <!-- Right angle marker at the foot -->
  <rect x="251" y="100" width="11" height="11" fill="none" stroke="#2563EB" stroke-width="1.5" transform="rotate(24, 256.5, 105.5)"/>
  <text x="158" y="208" font-size="18" fill="#2563EB" font-weight="bold">
    <tspan font-style="italic">r</tspan> sin <tspan font-style="italic">&#x3C6;</tspan>
  </text>

  <!-- r vector: from O to P (blue) -->
  <line x1="140" y1="320" x2="375" y2="161" stroke="#2563EB" stroke-width="3" marker-end="url(#tcrB)"/>
  <text x="240" y="252" font-size="26" font-weight="bold" font-style="italic" fill="#2563EB">r</text>

  <!-- Point P -->
  <circle cx="380" cy="160" r="5" fill="#1a1a1a"/>
  <text x="372" y="148" text-anchor="end" font-size="18" fill="#1a1a1a">P</text>

  <!-- F vector at P (red), pointing down-right at 60° from r -->
  <line x1="380" y1="160" x2="495" y2="211" stroke="#8B0029" stroke-width="3" marker-end="url(#tcrR)"/>
  <text x="510" y="220" font-size="26" font-weight="bold" font-style="italic" fill="#8B0029">F</text>

  <!-- Angle phi between r and F at P -->
  <path d="M 360,176 A 30,30 0 0,0 410,168" fill="none" stroke="#6B7280" stroke-width="1.5"/>
  <text x="395" y="200" font-size="20" font-style="italic" fill="#6B7280">&#x3C6;</text>

  <!-- Torque vector indicator at upper-left -->
  <g transform="translate(80, 130)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#8B0029" stroke-width="2.5"/>
    <line x1="-13" y1="-13" x2="13" y2="13" stroke="#8B0029" stroke-width="2.5"/>
    <line x1="13" y1="-13" x2="-13" y2="13" stroke="#8B0029" stroke-width="2.5"/>
    <text x="26" y="8" font-size="24" font-weight="bold" font-style="italic" fill="#8B0029">&#x3C4;</text>
    <text x="-23" y="42" font-size="13" fill="#6B7280">지면 안쪽</text>
  </g>
</svg>
