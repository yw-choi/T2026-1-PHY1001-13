<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 400" font-family="sans-serif">
  <defs>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrK" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#1a1a1a">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="325" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">돌림힘 벡터: τ = r × F</text>

  <!-- Origin point O -->
  <circle cx="180" cy="280" r="5" fill="#1a1a1a"/>
  <text x="165" y="300" font-size="16" font-weight="bold" fill="#1a1a1a">O</text>

  <!-- r vector: from O to point P -->
  <line x1="180" y1="280" x2="400" y2="180" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrB)"/>
  <text x="280" y="215" font-size="18" font-weight="bold" font-style="italic" fill="#2563EB">r</text>

  <!-- Force point P -->
  <circle cx="410" cy="175" r="4" fill="#1a1a1a"/>
  <text x="418" y="168" font-size="14" fill="#6B7280">P</text>

  <!-- F vector at point P -->
  <line x1="410" y1="175" x2="540" y2="100" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arrR)"/>
  <text x="548" y="100" font-size="18" font-weight="bold" font-style="italic" fill="#8B0029">F</text>

  <!-- Angle phi between r and F -->
  <path d="M 385,190 A 40,40 0 0,0 430,158" fill="none" stroke="#6B7280" stroke-width="1.5"/>
  <text x="418" y="200" font-size="16" font-style="italic" fill="#6B7280">φ</text>

  <!-- Torque vector (out of page - shown as circle with dot) -->
  <g transform="translate(180, 140)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#8B0029" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#8B0029"/>
    <text x="20" y="5" font-size="18" font-weight="bold" font-style="italic" fill="#8B0029">τ</text>
    <text x="20" y="22" font-size="12" fill="#6B7280">(지면 밖으로)</text>
  </g>

  <!-- r sin φ (moment arm) -->
  <!-- Perpendicular from O to extended F line -->
  <line x1="180" y1="280" x2="310" y2="130" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Extended F line backward -->
  <line x1="310" y1="130" x2="410" y2="175" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Right angle mark -->
  <rect x="305" y="135" width="8" height="8" fill="none" stroke="#6B7280" stroke-width="1" transform="rotate(-28, 310, 130)"/>
  <text x="225" y="195" font-size="14" font-style="italic" fill="#6B7280">r sin φ</text>

  <!-- Formulas -->
  <rect x="30" y="330" width="590" height="55" rx="8" fill="#f8f0f2" stroke="#e0c0c8" stroke-width="1"/>
  <text x="325" y="353" text-anchor="middle" font-size="15" fill="#8B0029" font-weight="bold">τ = r × F,   |τ| = rF sin φ</text>
  <text x="325" y="373" text-anchor="middle" font-size="13" fill="#6B7280">방향: 오른손 법칙 (r에서 F로 감아쥐는 방향)</text>
</svg>