<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 430" font-family="sans-serif">
  <defs>
    <marker id="tcrR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="tcrB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="tcrG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6B7280">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">
    돌림힘 벡터: <tspan font-style="italic">&#x3C4;</tspan> = <tspan font-style="italic">r</tspan> &#xD7; <tspan font-style="italic">F</tspan>
  </text>

  <!-- Origin O -->
  <circle cx="160" cy="320" r="5" fill="#1a1a1a"/>
  <text x="148" y="340" font-size="15" font-weight="bold" fill="#1a1a1a">O</text>

  <!-- Line of action of F (extended in both directions, dashed) -->
  <!-- Line passes through P=(380,160) and F end=(499,213), direction (0.914, 0.407) -->
  <line x1="220" y1="86" x2="560" y2="237" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="563" y="243" font-size="12" fill="#6B7280">힘의 작용선</text>

  <!-- Moment arm: perpendicular from O to foot=(256, 105) -->
  <line x1="160" y1="320" x2="256" y2="105" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="5 3"/>
  <!-- Right angle marker at the foot -->
  <rect x="252" y="101" width="9" height="9" fill="none" stroke="#2563EB" stroke-width="1" transform="rotate(24, 256.5, 105.5)"/>
  <text x="180" y="200" font-size="13" font-weight="bold" fill="#2563EB">
    모멘트 팔
  </text>
  <text x="180" y="218" font-size="13" fill="#2563EB">
    <tspan font-style="italic">r</tspan> sin <tspan font-style="italic">&#x3C6;</tspan>
  </text>

  <!-- r vector: from O to P (blue) -->
  <line x1="160" y1="320" x2="375" y2="161" stroke="#2563EB" stroke-width="2.5" marker-end="url(#tcrB)"/>
  <text x="252" y="232" font-size="17" font-weight="bold" font-style="italic" fill="#2563EB">r</text>

  <!-- Point P -->
  <circle cx="380" cy="160" r="4" fill="#1a1a1a"/>
  <text x="372" y="148" text-anchor="end" font-size="13" fill="#1a1a1a">P</text>

  <!-- F vector at P (red), pointing down-right at 60° from r -->
  <line x1="380" y1="160" x2="495" y2="211" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tcrR)"/>
  <text x="505" y="222" font-size="17" font-weight="bold" font-style="italic" fill="#8B0029">F</text>

  <!-- Angle phi between r and F at P -->
  <path d="M 360,176 A 28,28 0 0,0 408,168" fill="none" stroke="#6B7280" stroke-width="1.2"/>
  <text x="395" y="195" font-size="14" font-style="italic" fill="#6B7280">&#x3C6;</text>

  <!-- Torque vector indicator: with r up-right and F down-right, curling r→F is CW
       (visually). CW in screen → into the page → ⊗ symbol. -->
  <g transform="translate(120, 130)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#8B0029" stroke-width="2"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#8B0029" stroke-width="2"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#8B0029" stroke-width="2"/>
    <text x="20" y="5" font-size="17" font-weight="bold" font-style="italic" fill="#8B0029">&#x3C4;</text>
    <text x="20" y="22" font-size="11" fill="#6B7280">(지면 안쪽)</text>
  </g>

  <!-- Formula box -->
  <rect x="60" y="355" width="580" height="60" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
  <text x="350" y="378" text-anchor="middle" font-size="14" font-weight="bold" fill="#8B0029">
    <tspan font-style="italic">&#x3C4;</tspan> = <tspan font-style="italic">r</tspan> &#xD7; <tspan font-style="italic">F</tspan>, &#xA0;&#xA0; |<tspan font-style="italic">&#x3C4;</tspan>| = <tspan font-style="italic">rF</tspan> sin <tspan font-style="italic">&#x3C6;</tspan> = (모멘트 팔) &#xD7; <tspan font-style="italic">F</tspan>
  </text>
  <text x="350" y="400" text-anchor="middle" font-size="12" fill="#6B7280">
    방향: 오른손 법칙 — <tspan font-style="italic">r</tspan> 에서 <tspan font-style="italic">F</tspan> 쪽으로 감아쥐면 엄지 방향
  </text>
</svg>
