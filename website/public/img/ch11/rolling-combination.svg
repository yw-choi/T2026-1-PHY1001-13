<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 350" font-family="sans-serif">
  <!-- Title row -->
  <text x="130" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">순수 회전</text>
  <text x="390" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">순수 병진</text>
  <text x="650" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">구름 운동</text>

  <!-- Plus and Equals signs -->
  <text x="260" y="185" text-anchor="middle" font-size="36" font-weight="bold" fill="#6B7280">+</text>
  <text x="520" y="185" text-anchor="middle" font-size="36" font-weight="bold" fill="#6B7280">=</text>

  <!-- Defs: arrowhead -->
  <defs>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6B7280">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Pure Rotation -->
  <g transform="translate(130,175)">
    <circle cx="0" cy="0" r="70" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#1a1a1a"/>
    <!-- Rotation arrows at top, bottom, left, right -->
    <line x1="0" y1="-70" x2="30" y2="-70" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arrowR)"/>
    <text x="40" y="-60" font-size="14" font-style="italic" fill="#8B0029">+ωR</text>
    <line x1="0" y1="70" x2="-30" y2="70" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arrowR)"/>
    <text x="-55" y="85" font-size="14" font-style="italic" fill="#8B0029">−ωR</text>
    <!-- Center dot label -->
    <text x="8" y="-5" font-size="13" fill="#6B7280">0</text>
    <!-- Curved arrow for omega -->
    <path d="M 25,-15 A 30,30 0 0,1 15,25" stroke="#8B0029" stroke-width="1.5" fill="none" marker-end="url(#arrowR)"/>
    <text x="35" y="10" font-size="14" font-style="italic" fill="#8B0029">ω</text>
  </g>

  <!-- Pure Translation -->
  <g transform="translate(390,175)">
    <circle cx="0" cy="0" r="70" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#1a1a1a"/>
    <!-- All velocity arrows point right with same magnitude -->
    <line x1="0" y1="-70" x2="40" y2="-70" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrowB)"/>
    <text x="50" y="-60" font-size="14" font-style="italic" fill="#2563EB">v<tspan baseline-shift="sub" font-size="10">com</tspan></text>
    <line x1="0" y1="0" x2="40" y2="0" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrowB)"/>
    <text x="50" y="5" font-size="14" font-style="italic" fill="#2563EB">v<tspan baseline-shift="sub" font-size="10">com</tspan></text>
    <line x1="0" y1="70" x2="40" y2="70" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrowB)"/>
    <text x="50" y="75" font-size="14" font-style="italic" fill="#2563EB">v<tspan baseline-shift="sub" font-size="10">com</tspan></text>
  </g>

  <!-- Rolling = combination -->
  <g transform="translate(650,175)">
    <circle cx="0" cy="0" r="70" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#1a1a1a"/>
    <!-- Top: vcom + ωR = 2vcom -->
    <line x1="0" y1="-70" x2="60" y2="-70" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arrowR)"/>
    <text x="68" y="-58" font-size="14" font-weight="bold" fill="#8B0029">2v<tspan baseline-shift="sub" font-size="10">com</tspan></text>
    <!-- Center: vcom -->
    <line x1="0" y1="0" x2="40" y2="0" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrowB)"/>
    <text x="50" y="5" font-size="14" font-style="italic" fill="#2563EB">v<tspan baseline-shift="sub" font-size="10">com</tspan></text>
    <!-- Bottom: vcom - ωR = 0 -->
    <circle cx="0" cy="70" r="5" fill="none" stroke="#6B7280" stroke-width="2"/>
    <text x="12" y="85" font-size="14" fill="#6B7280">0</text>
    <!-- Ground line -->
    <line x1="-90" y1="72" x2="90" y2="72" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  </g>

  <!-- Bottom label -->
  <text x="390" y="330" text-anchor="middle" font-size="15" fill="#6B7280">구름 조건: v<tspan font-style="italic" baseline-shift="sub" font-size="11">com</tspan> = ωR (접촉점 속도 = 0)</text>
</svg>