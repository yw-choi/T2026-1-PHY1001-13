<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" font-family="sans-serif">
  <defs>
    <marker id="apR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="apB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="apG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6B7280">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">자이로스코프 세차운동 (Precession)</text>

  <!-- Support point -->
  <rect x="225" y="260" width="10" height="60" fill="#6B7280"/>
  <polygon points="210,320 250,320 230,260" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <line x1="190" y1="322" x2="270" y2="322" stroke="#6B7280" stroke-width="2"/>
  <!-- Hatching -->
  <g stroke="#ddd" stroke-width="1">
    <line x1="200" y1="322" x2="190" y2="332"/>
    <line x1="215" y1="322" x2="205" y2="332"/>
    <line x1="230" y1="322" x2="220" y2="332"/>
    <line x1="245" y1="322" x2="235" y2="332"/>
    <line x1="260" y1="322" x2="250" y2="332"/>
  </g>

  <!-- Gyroscope axle (tilted slightly) -->
  <line x1="230" y1="258" x2="480" y2="180" stroke="#1a1a1a" stroke-width="3"/>

  <!-- Spinning wheel/disk at the end -->
  <ellipse cx="480" cy="180" rx="12" ry="50" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Spin arrow on disk -->
  <path d="M 468,155 A 16,35 0 0,1 468,205" fill="none" stroke="#2563EB" stroke-width="2" marker-end="url(#apB)"/>

  <!-- ω (spin) arrow along axle -->
  <line x1="485" y1="178" x2="545" y2="158" stroke="#2563EB" stroke-width="2.5" marker-end="url(#apB)"/>
  <text x="555" y="158" font-size="16" font-weight="bold" font-style="italic" fill="#2563EB">ω</text>

  <!-- L vector along axle (same direction as omega) -->
  <line x1="480" y1="175" x2="560" y2="148" stroke="#8B0029" stroke-width="2.5" marker-end="url(#apR)"/>
  <text x="568" y="145" font-size="18" font-weight="bold" font-style="italic" fill="#8B0029">L</text>

  <!-- r vector from support to CM -->
  <line x1="230" y1="258" x2="360" y2="218" stroke="#6B7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#apG)"/>
  <text x="295" y="228" font-size="14" font-style="italic" fill="#6B7280">r</text>

  <!-- Mg force (downward at CM of wheel) -->
  <line x1="480" y1="182" x2="480" y2="270" stroke="#8B0029" stroke-width="2.5" marker-end="url(#apR)"/>
  <text x="492" y="265" font-size="15" font-weight="bold" fill="#8B0029">Mg</text>

  <!-- Torque vector (τ) - into the page for this orientation, shown as perpendicular -->
  <!-- τ = r × Mg, perpendicular to r and Mg -->

  <!-- Precession circle (top view - dashed ellipse) -->
  <ellipse cx="350" cy="110" rx="160" ry="40" fill="none" stroke="#8B0029" stroke-width="1.5" stroke-dasharray="6 4"/>
  <!-- Precession arrow -->
  <path d="M 200,125 A 160,40 0 0,1 240,98" fill="none" stroke="#8B0029" stroke-width="2.5" marker-end="url(#apR)"/>
  <text x="180" y="90" font-size="16" font-weight="bold" font-style="italic" fill="#8B0029">Ω</text>
  <text x="350" y="75" text-anchor="middle" font-size="13" fill="#6B7280">세차운동 경로 (위에서 본 모습)</text>

  <!-- dL vector -->
  <g transform="translate(480, 168)">
    <line x1="0" y1="0" x2="-30" y2="-25" stroke="#8B0029" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#apR)"/>
    <text x="-45" y="-22" font-size="13" font-style="italic" fill="#8B0029">dL</text>
  </g>

  <!-- Formulas -->
  <rect x="60" y="365" width="580" height="70" rx="8" fill="#f8f0f2" stroke="#e0c0c8" stroke-width="1"/>
  <text x="350" y="390" text-anchor="middle" font-size="15" fill="#8B0029" font-weight="bold">τ = dL/dt → L이 방향을 바꿈 (크기는 유지)</text>
  <text x="350" y="415" text-anchor="middle" font-size="14" fill="#6B7280">세차 각속도: Ω = Mgr / (Iω)</text>
</svg>