<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="sans-serif">
  <defs>
    <marker id="apR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="apB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Ground line (hatched) -->
  <line x1="60" y1="400" x2="540" y2="400" stroke="#6B7280" stroke-width="2"/>
  <g stroke="#6B7280" stroke-width="1.2">
    <line x1="80" y1="400" x2="65" y2="418"/>
    <line x1="120" y1="400" x2="105" y2="418"/>
    <line x1="160" y1="400" x2="145" y2="418"/>
    <line x1="200" y1="400" x2="185" y2="418"/>
    <line x1="240" y1="400" x2="225" y2="418"/>
    <line x1="280" y1="400" x2="265" y2="418"/>
    <line x1="320" y1="400" x2="305" y2="418"/>
    <line x1="360" y1="400" x2="345" y2="418"/>
    <line x1="400" y1="400" x2="385" y2="418"/>
    <line x1="440" y1="400" x2="425" y2="418"/>
    <line x1="480" y1="400" x2="465" y2="418"/>
    <line x1="520" y1="400" x2="505" y2="418"/>
  </g>

  <!-- Vertical support post -->
  <rect x="282" y="240" width="16" height="160" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>

  <!-- Precession ellipse: horizontal circle (in 3D) traced by wheel center.
       Centered at pivot top (290, 240), with horizontal radius 230, foreshortened vertical radius 55. -->
  <ellipse cx="290" cy="240" rx="230" ry="55" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="65" y="220" font-size="16" fill="#6B7280">세차 경로</text>

  <!-- Precession direction arrow Ω on the FRONT (bottom) of the ellipse -->
  <path d="M 460,288 A 230,55 0 0,1 380,295" fill="none" stroke="#8B0029" stroke-width="3" marker-end="url(#apR)"/>
  <text x="425" y="320" text-anchor="middle" font-size="24" font-weight="bold" font-style="italic" fill="#8B0029">&#x3A9;</text>

  <!-- Pivot dot -->
  <circle cx="290" cy="240" r="5" fill="#1a1a1a"/>

  <!-- Axle (physical rod) from pivot to wheel center -->
  <line x1="290" y1="240" x2="510" y2="240" stroke="#1a1a1a" stroke-width="3"/>

  <!-- L vector: along the axle, offset slightly above so it doesn't overlap -->
  <line x1="310" y1="218" x2="500" y2="218" stroke="#8B0029" stroke-width="3" marker-end="url(#apR)"/>
  <text x="455" y="208" font-size="24" font-weight="bold" font-style="italic" fill="#8B0029">L</text>

  <!-- ω vector: extends beyond the wheel along the axle direction -->
  <line x1="528" y1="240" x2="615" y2="240" stroke="#2563EB" stroke-width="3" marker-end="url(#apB)"/>
  <text x="625" y="248" font-size="24" font-weight="bold" font-style="italic" fill="#2563EB">&#x3C9;</text>

  <!-- Wheel: vertical disk at the end of the axle -->
  <ellipse cx="510" cy="240" rx="14" ry="60" fill="#F3F4F6" stroke="#6B7280" stroke-width="2.5"/>
  <!-- Spin direction inside the wheel -->
  <path d="M 498,210 A 16,30 0 0,1 498,270" fill="none" stroke="#2563EB" stroke-width="2" marker-end="url(#apB)"/>

  <!-- Mg gravity: from wheel bottom downward -->
  <line x1="510" y1="304" x2="510" y2="380" stroke="#8B0029" stroke-width="3" marker-end="url(#apR)"/>
  <text x="525" y="370" font-size="22" font-weight="bold" font-style="italic" fill="#8B0029">Mg</text>

  <!-- r label on the axle -->
  <text x="400" y="262" text-anchor="middle" font-size="20" font-style="italic" fill="#6B7280">r</text>

  <!-- Torque indicator: τ = r × Mg points INTO the page (⊗ symbol) -->
  <g transform="translate(625, 175)">
    <circle cx="0" cy="0" r="16" fill="none" stroke="#8B0029" stroke-width="2.5"/>
    <line x1="-11" y1="-11" x2="11" y2="11" stroke="#8B0029" stroke-width="2.5"/>
    <line x1="11" y1="-11" x2="-11" y2="11" stroke="#8B0029" stroke-width="2.5"/>
    <text x="22" y="6" font-size="22" font-weight="bold" font-style="italic" fill="#8B0029">&#x3C4;</text>
  </g>
  <text x="625" y="140" text-anchor="middle" font-size="14" fill="#6B7280">(지면 안쪽)</text>
</svg>
