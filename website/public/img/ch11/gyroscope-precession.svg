<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="sans-serif">
  <defs>
    <marker id="apR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="apB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="apG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6B7280">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="380" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">자이로스코프의 세차운동 (Precession)</text>

  <!-- Ground line (hatched) -->
  <line x1="60" y1="380" x2="540" y2="380" stroke="#6B7280" stroke-width="2"/>
  <g stroke="#6B7280" stroke-width="1">
    <line x1="80" y1="380" x2="68" y2="395"/>
    <line x1="115" y1="380" x2="103" y2="395"/>
    <line x1="150" y1="380" x2="138" y2="395"/>
    <line x1="185" y1="380" x2="173" y2="395"/>
    <line x1="220" y1="380" x2="208" y2="395"/>
    <line x1="255" y1="380" x2="243" y2="395"/>
    <line x1="290" y1="380" x2="278" y2="395"/>
    <line x1="325" y1="380" x2="313" y2="395"/>
    <line x1="360" y1="380" x2="348" y2="395"/>
    <line x1="395" y1="380" x2="383" y2="395"/>
    <line x1="430" y1="380" x2="418" y2="395"/>
    <line x1="465" y1="380" x2="453" y2="395"/>
    <line x1="500" y1="380" x2="488" y2="395"/>
  </g>

  <!-- Vertical support post -->
  <rect x="282" y="245" width="16" height="135" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>

  <!-- Precession ellipse: horizontal circle traced by the wheel center,
       projected as ellipse centered at pivot top (290, 245). Drawn first so other elements overlay. -->
  <ellipse cx="290" cy="245" rx="240" ry="55" fill="none" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="65" y="225" font-size="12" fill="#6B7280">세차 경로 (수평면)</text>

  <!-- Precession direction arrow Ω: short arc on the FRONT (bottom) of the ellipse -->
  <path d="M 480,290 A 240,55 0 0,1 380,298" fill="none" stroke="#8B0029" stroke-width="2.5" marker-end="url(#apR)"/>
  <text x="425" y="318" text-anchor="middle" font-size="16" font-weight="bold" font-style="italic" fill="#8B0029">&#x3A9;</text>

  <!-- Pivot dot -->
  <circle cx="290" cy="245" r="4" fill="#1a1a1a"/>
  <text x="270" y="240" text-anchor="end" font-size="12" fill="#6B7280">받침점 O</text>

  <!-- Axle (physical rod): solid thin line from pivot to wheel center -->
  <line x1="290" y1="245" x2="530" y2="245" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- r dimension: label on the axle, with subtle ticks -->
  <text x="410" y="262" text-anchor="middle" font-size="13" font-style="italic" fill="#6B7280">r</text>

  <!-- L vector: along the axle, offset ABOVE so it doesn't overlap the rod -->
  <line x1="310" y1="220" x2="520" y2="220" stroke="#8B0029" stroke-width="2.5" marker-end="url(#apR)"/>
  <text x="465" y="213" font-size="16" font-weight="bold" font-style="italic" fill="#8B0029">L</text>

  <!-- ω vector: extends beyond the wheel along the axle direction -->
  <line x1="548" y1="245" x2="625" y2="245" stroke="#2563EB" stroke-width="2.5" marker-end="url(#apB)"/>
  <text x="635" y="250" font-size="16" font-weight="bold" font-style="italic" fill="#2563EB">&#x3C9;</text>

  <!-- Wheel: vertical disk at the end of the axle. Drawn as ellipse. -->
  <ellipse cx="530" cy="245" rx="13" ry="55" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <!-- Spin direction inside the wheel (small curved arrow) -->
  <path d="M 520,215 A 14,28 0 0,1 520,275" fill="none" stroke="#2563EB" stroke-width="1.5" marker-end="url(#apB)"/>

  <!-- Mg gravity at wheel center: from wheel bottom downward -->
  <line x1="530" y1="305" x2="530" y2="370" stroke="#8B0029" stroke-width="2.5" marker-end="url(#apR)"/>
  <text x="540" y="365" font-size="15" font-weight="bold" fill="#8B0029" font-style="italic">Mg</text>

  <!-- Torque direction indicator: τ = r × Mg points INTO the page (⊗ symbol) -->
  <g transform="translate(615, 195)">
    <circle cx="0" cy="0" r="13" fill="none" stroke="#8B0029" stroke-width="2"/>
    <line x1="-9" y1="-9" x2="9" y2="9" stroke="#8B0029" stroke-width="2"/>
    <line x1="9" y1="-9" x2="-9" y2="9" stroke="#8B0029" stroke-width="2"/>
    <text x="20" y="2" font-size="14" font-weight="bold" font-style="italic" fill="#8B0029">&#x3C4;</text>
    <text x="20" y="20" font-size="11" fill="#6B7280">(지면 안쪽)</text>
  </g>
  <text x="615" y="160" text-anchor="middle" font-size="12" fill="#6B7280">
    <tspan font-style="italic">&#x3C4;</tspan> = <tspan font-style="italic">r</tspan> &#xD7; <tspan font-style="italic">M</tspan><tspan font-style="italic">g</tspan>
  </text>

  <!-- Formula box -->
  <rect x="60" y="405" width="640" height="65" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
  <text x="380" y="428" text-anchor="middle" font-size="14" font-weight="bold" fill="#8B0029">
    <tspan font-style="italic">&#x3C4;</tspan> = <tspan font-style="italic">d</tspan><tspan font-style="italic">L</tspan>/<tspan font-style="italic">dt</tspan> &#x2192; <tspan font-style="italic">L</tspan> 의 방향만 변함 (크기는 일정)
  </text>
  <text x="380" y="454" text-anchor="middle" font-size="14" fill="#1a1a1a">
    세차 각속도: <tspan font-style="italic">&#x3A9;</tspan> = <tspan font-style="italic">Mgr</tspan> / (<tspan font-style="italic">I&#x3C9;</tspan>) &#xA0;&#xA0;&#x2014; 자전이 빠를수록 세차는 느리다
  </text>
</svg>
