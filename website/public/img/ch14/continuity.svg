<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 390" font-family="sans-serif">
  <defs>
    <marker id="av" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563EB"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Tube outline (tapered) -->
  <path d="M60,80 Q200,80 350,140 Q500,170 680,170" fill="none" stroke="#6B7280" stroke-width="2"/>
  <path d="M60,280 Q200,280 350,220 Q500,200 680,200" fill="none" stroke="#6B7280" stroke-width="2"/>

  <!-- Fluid fill -->
  <path d="M60,80 Q200,80 350,140 Q500,170 680,170 L680,200 Q500,200 350,220 Q200,280 60,280 Z" fill="#2563EB" fill-opacity="0.15"/>

  <!-- Left cross-section A1 -->
  <line x1="100" y1="80" x2="100" y2="280" stroke="#8B0029" stroke-width="2"/>
  <text x="50" y="185" text-anchor="middle" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">A₁</text>

  <!-- Right cross-section A2 -->
  <line x1="640" y1="170" x2="640" y2="200" stroke="#8B0029" stroke-width="2"/>
  <text x="665" y="189" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">A₂</text>

  <!-- v1 arrow (left, slow) -->
  <line x1="120" y1="180" x2="180" y2="180" stroke="#2563EB" stroke-width="2.5" marker-end="url(#av)"/>
  <text x="150" y="170" text-anchor="middle" font-size="14" fill="#2563EB" font-weight="bold" font-style="italic">v₁</text>

  <!-- v2 arrow (right, fast, longer) -->
  <line x1="560" y1="185" x2="630" y2="185" stroke="#2563EB" stroke-width="2.5" marker-end="url(#av)"/>
  <text x="595" y="175" text-anchor="middle" font-size="14" fill="#2563EB" font-weight="bold" font-style="italic">v₂</text>

  <!-- Streamlines -->
  <path d="M100,120 Q250,120 380,155 Q520,178 640,178" fill="none" stroke="#2563EB" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <path d="M100,180 Q250,180 380,185 Q520,188 640,188" fill="none" stroke="#2563EB" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <path d="M100,240 Q250,240 380,210 Q520,195 640,195" fill="none" stroke="#2563EB" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Dimension brackets -->
  <line x1="100" y1="300" x2="100" y2="310" stroke="#6B7280" stroke-width="1"/>
  <line x1="640" y1="220" x2="640" y2="310" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Flow direction -->
  <text x="375" y="330" text-anchor="middle" font-size="14" fill="#6B7280" font-weight="bold">유선 (streamlines)</text>

  <!-- Equation -->
  <text x="375" y="365" text-anchor="middle" font-size="16" fill="#8B0029" font-weight="bold">A₁v₁ = A₂v₂ = 일정</text>

  <!-- Wide/narrow labels -->
  <text x="100" y="55" text-anchor="middle" font-size="13" fill="#6B7280">넓은 단면</text>
  <text x="100" y="70" text-anchor="middle" font-size="12" fill="#6B7280">(느린 속도)</text>
  <text x="640" y="145" text-anchor="middle" font-size="13" fill="#6B7280">좁은 단면</text>
  <text x="640" y="160" text-anchor="middle" font-size="12" fill="#6B7280">(빠른 속도)</text>
</svg>
