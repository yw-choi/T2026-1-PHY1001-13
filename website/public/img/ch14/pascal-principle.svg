<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 430" font-family="sans-serif">
  <defs>
    <marker id="pArrR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="pArrB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="pArrG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6B7280">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Fluid container (U-shape with different widths) -->
  <!-- Bottom horizontal tube -->
  <rect x="120" y="280" width="500" height="60" rx="4" fill="#D1E8FF" stroke="#6B7280" stroke-width="2"/>
  <!-- Left narrow cylinder -->
  <rect x="140" y="100" width="60" height="180" rx="2" fill="#D1E8FF" stroke="#6B7280" stroke-width="2"/>
  <!-- Right wide cylinder -->
  <rect x="480" y="140" width="120" height="140" rx="2" fill="#D1E8FF" stroke="#6B7280" stroke-width="2"/>

  <!-- Left piston -->
  <rect x="135" y="90" width="70" height="20" rx="3" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <!-- Right piston -->
  <rect x="475" y="130" width="130" height="20" rx="3" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>

  <!-- Force arrows -->
  <!-- F_i (small, down) on left piston -->
  <line x1="170" y1="40" x2="170" y2="82" stroke="#8B0029" stroke-width="2.5" marker-end="url(#pArrR)"/>
  <text x="170" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">
    <tspan font-style="italic">F</tspan><tspan font-size="12" dy="4">i</tspan>
  </text>

  <!-- F_o (large, up) on right piston -->
  <line x1="540" y1="190" x2="540" y2="158" stroke="#2563EB" stroke-width="2.5" marker-end="url(#pArrB)"/>
  <text x="540" y="205" text-anchor="middle" font-size="16" font-weight="bold" fill="#2563EB">
    <tspan font-style="italic">F</tspan><tspan font-size="12" dy="4">o</tspan>
  </text>

  <!-- Area labels -->
  <!-- A_i -->
  <line x1="135" y1="115" x2="205" y2="115" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="230" y="100" font-size="14" fill="#6B7280">
    <tspan font-style="italic">A</tspan><tspan font-size="11" dy="3">i</tspan><tspan dy="-3"> (&#xC791;&#xC74C;)</tspan>
  </text>

  <!-- A_o -->
  <line x1="475" y1="160" x2="605" y2="160" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="620" y="165" font-size="14" fill="#6B7280">
    <tspan font-style="italic">A</tspan><tspan font-size="11" dy="3">o</tspan><tspan dy="-3"> (&#xD07C;)</tspan>
  </text>

  <!-- Displacement arrows -->
  <!-- d_i (down, left side) -->
  <line x1="120" y1="92" x2="120" y2="140" stroke="#6B7280" stroke-width="1" marker-end="url(#pArrG)"/>
  <text x="108" y="120" text-anchor="end" font-size="13" font-style="italic" fill="#6B7280">d<tspan font-size="10" dy="3">i</tspan></text>

  <!-- d_o (up, right side) -->
  <line x1="615" y1="148" x2="615" y2="132" stroke="#6B7280" stroke-width="1" marker-end="url(#pArrG)"/>
  <text x="630" y="144" font-size="13" font-style="italic" fill="#6B7280">d<tspan font-size="10" dy="3">o</tspan></text>

  <!-- Pressure transmission arrows inside fluid -->
  <line x1="210" y1="310" x2="470" y2="310" stroke="#8B0029" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#pArrR)"/>
  <text x="340" y="305" text-anchor="middle" font-size="13" fill="#8B0029">&#x394;p &#xC804;&#xB2EC;</text>

  <!-- Key equation box -->
  <rect x="100" y="365" width="550" height="40" rx="6" fill="#F3F4F6" stroke="#8B0029" stroke-width="1.5"/>
  <text x="375" y="391" text-anchor="middle" font-size="15" fill="#8B0029" font-weight="bold">
    &#x394;p = F&#x1D62;/A&#x1D62; = F&#x2092;/A&#x2092;  &#x2192;  F&#x2092; = F&#x1D62; &#xD7; (A&#x2092;/A&#x1D62;)
  </text>

  <!-- Title -->
  <text x="375" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#8B0029">&#xD30C;&#xC2A4;&#xCE7C; &#xC6D0;&#xB9AC;: &#xC720;&#xC555; &#xB9AC;&#xD504;&#xD2B8;</text>

  <!-- Car on right piston -->
  <rect x="495" y="108" width="90" height="22" rx="4" fill="#6B7280" stroke="#444" stroke-width="1.5"/>
  <circle cx="510" cy="130" r="6" fill="#444"/>
  <circle cx="570" cy="130" r="6" fill="#444"/>
</svg>
