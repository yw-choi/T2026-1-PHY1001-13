<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 415" font-family="sans-serif">
  <defs>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8B0029"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Fluid body -->
  <path d="M100,200 L100,340 Q100,350 110,350 L620,350 Q630,350 630,340 L630,200 L530,200 L530,160 L480,160 L480,200 L250,200 L250,120 L200,120 L200,200 Z" fill="#93c5fd" fill-opacity="0.25" stroke="#2563EB" stroke-width="2"/>

  <!-- Left piston -->
  <rect x="200" y="95" width="50" height="30" fill="#F3F4F6" stroke="#6B7280" stroke-width="2" rx="2"/>
  <text x="225" y="115" text-anchor="middle" font-size="11" fill="#1a1a1a">피스톤</text>

  <!-- Right piston -->
  <rect x="480" y="130" width="50" height="35" fill="#F3F4F6" stroke="#6B7280" stroke-width="2" rx="2"/>
  <text x="505" y="153" text-anchor="middle" font-size="11" fill="#1a1a1a">피스톤</text>

  <!-- Input force Fi -->
  <line x1="225" y1="50" x2="225" y2="90" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arr-r)"/>
  <text x="245" y="65" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">F_i</text>

  <!-- Output force Fo (upward, load) -->
  <line x1="505" y1="120" x2="505" y2="80" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arr-r)"/>
  <text x="530" y="85" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">F_o</text>

  <!-- Load block on output -->
  <rect x="480" y="40" width="50" height="40" fill="#F3F4F6" stroke="#6B7280" stroke-width="2" rx="2"/>
  <text x="505" y="65" text-anchor="middle" font-size="12" fill="#1a1a1a" font-weight="bold">M</text>

  <!-- Area labels -->
  <line x1="200" y1="140" x2="250" y2="140" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="225" y="155" text-anchor="middle" font-size="13" fill="#6B7280" font-style="italic">A_i</text>
  <!-- small width indicator -->
  <line x1="200" y1="135" x2="200" y2="145" stroke="#6B7280" stroke-width="1"/>
  <line x1="250" y1="135" x2="250" y2="145" stroke="#6B7280" stroke-width="1"/>

  <line x1="480" y1="180" x2="530" y2="180" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="505" y="195" text-anchor="middle" font-size="13" fill="#6B7280" font-style="italic">A_o</text>
  <line x1="480" y1="175" x2="480" y2="185" stroke="#6B7280" stroke-width="1"/>
  <line x1="530" y1="175" x2="530" y2="185" stroke="#6B7280" stroke-width="1"/>

  <!-- di arrow -->
  <line x1="180" y1="95" x2="180" y2="60" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="180" y1="125" x2="180" y2="95" stroke="#6B7280" stroke-width="1.5"/>
  <text x="165" y="85" text-anchor="middle" font-size="12" fill="#6B7280" font-style="italic">d_i</text>

  <!-- do arrow -->
  <line x1="550" y1="165" x2="550" y2="145" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="550" y1="175" x2="550" y2="165" stroke="#6B7280" stroke-width="1.5"/>
  <text x="570" y="162" font-size="12" fill="#6B7280" font-style="italic">d_o</text>

  <!-- Fluid label -->
  <text x="365" y="290" text-anchor="middle" font-size="14" fill="#2563EB">비압축성 유체</text>
  <text x="365" y="308" text-anchor="middle" font-size="12" fill="#2563EB">(incompressible fluid)</text>

  <!-- Equations -->
  <text x="365" y="388" text-anchor="middle" font-size="15" fill="#8B0029" font-weight="bold">Δp = F_i / A_i = F_o / A_o</text>
</svg>
