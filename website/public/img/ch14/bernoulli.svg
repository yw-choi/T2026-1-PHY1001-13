<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 470" font-family="sans-serif">
  <defs>
    <marker id="arv" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563EB"/>
    </marker>
    <marker id="arg" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Ground reference -->
  <line x1="30" y1="400" x2="720" y2="400" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="40" y="415" font-size="12" fill="#6B7280">기준면 (y = 0)</text>

  <!-- Pipe (rising and narrowing) -->
  <path d="M50,280 Q150,280 250,250 Q350,200 450,170 Q550,160 650,160" fill="none" stroke="#6B7280" stroke-width="2"/>
  <path d="M50,350 Q150,350 250,320 Q350,290 450,250 Q550,230 650,230" fill="none" stroke="#6B7280" stroke-width="2"/>

  <!-- Fluid fill -->
  <path d="M50,280 Q150,280 250,250 Q350,200 450,170 Q550,160 650,160 L650,230 Q550,230 450,250 Q350,290 250,320 Q150,350 50,350 Z" fill="#93c5fd" fill-opacity="0.2"/>

  <!-- Left section (point 1) -->
  <line x1="100" y1="280" x2="100" y2="350" stroke="#8B0029" stroke-width="2"/>
  <text x="75" y="320" text-anchor="middle" font-size="13" fill="#8B0029" font-weight="bold" font-style="italic">A₁</text>

  <!-- Right section (point 2) -->
  <line x1="600" y1="165" x2="600" y2="228" stroke="#8B0029" stroke-width="2"/>
  <text x="625" y="200" font-size="13" fill="#8B0029" font-weight="bold" font-style="italic">A₂</text>

  <!-- v1 arrow -->
  <line x1="115" y1="315" x2="175" y2="315" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arv)"/>
  <text x="145" y="308" text-anchor="middle" font-size="13" fill="#2563EB" font-weight="bold" font-style="italic">v₁</text>

  <!-- v2 arrow (longer) -->
  <line x1="530" y1="195" x2="595" y2="195" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arv)"/>
  <text x="565" y="188" text-anchor="middle" font-size="13" fill="#2563EB" font-weight="bold" font-style="italic">v₂</text>

  <!-- y1 height -->
  <line x1="100" y1="315" x2="100" y2="400" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="95" y1="400" x2="105" y2="400" stroke="#6B7280" stroke-width="1"/>
  <text x="82" y="365" text-anchor="middle" font-size="12" fill="#6B7280" font-style="italic">y₁</text>

  <!-- y2 height -->
  <line x1="600" y1="195" x2="600" y2="400" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="595" y1="400" x2="605" y2="400" stroke="#6B7280" stroke-width="1"/>
  <text x="615" y="320" font-size="12" fill="#6B7280" font-style="italic">y₂</text>

  <!-- Pressure labels -->
  <text x="100" y="268" text-anchor="middle" font-size="13" fill="#1a1a1a" font-style="italic">p₁</text>
  <text x="600" y="155" text-anchor="middle" font-size="13" fill="#1a1a1a" font-style="italic">p₂</text>

  <!-- Point labels -->
  <circle cx="100" cy="315" r="4" fill="#8B0029"/>
  <text x="115" y="340" font-size="12" fill="#8B0029" font-weight="bold">점 1</text>
  <circle cx="600" cy="195" r="4" fill="#8B0029"/>
  <text x="615" y="215" font-size="12" fill="#8B0029" font-weight="bold">점 2</text>

  <!-- Bernoulli equation -->
  <rect x="140" y="425" width="470" height="25" rx="4" fill="#F3F4F6" stroke="#8B0029" stroke-width="1"/>
  <text x="375" y="442" text-anchor="middle" font-size="14" fill="#8B0029" font-weight="bold">p₁ + ½ρv₁² + ρgy₁ = p₂ + ½ρv₂² + ρgy₂</text>
</svg>
