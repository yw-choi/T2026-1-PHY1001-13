<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 460" font-family="sans-serif">
  <defs>
    <marker id="bArrR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="bArrB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- ===== Left: Object in fluid ===== -->
  <!-- Container -->
  <rect x="40" y="60" width="250" height="320" rx="4" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <!-- Fluid -->
  <linearGradient id="bFluid" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2563EB" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#2563EB" stop-opacity="0.5"/>
  </linearGradient>
  <rect x="42" y="110" width="246" height="268" fill="url(#bFluid)"/>
  <!-- Surface -->
  <line x1="40" y1="110" x2="290" y2="110" stroke="#2563EB" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Object (partially submerged block) -->
  <rect x="115" y="85" width="100" height="120" rx="4" fill="#F3F4F6" stroke="#8B0029" stroke-width="2"/>
  <!-- Water line on object -->
  <line x1="115" y1="110" x2="215" y2="110" stroke="#2563EB" stroke-width="1.5"/>

  <!-- Submerged portion label -->
  <line x1="220" y1="110" x2="250" y2="110" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="220" y1="205" x2="250" y2="205" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="250" y1="115" x2="250" y2="200" stroke="#6B7280" stroke-width="1"/>
  <line x1="245" y1="115" x2="255" y2="115" stroke="#6B7280" stroke-width="1"/>
  <line x1="245" y1="200" x2="255" y2="200" stroke="#6B7280" stroke-width="1"/>
  <text x="268" y="162" font-size="12" fill="#6B7280" font-style="italic">V<tspan font-size="9" dy="3">sub</tspan></text>

  <!-- Pressure arrows from fluid (larger at bottom) -->
  <line x1="90" y1="160" x2="110" y2="160" stroke="#2563EB" stroke-width="1.5" marker-end="url(#bArrB)"/>
  <line x1="85" y1="190" x2="110" y2="190" stroke="#2563EB" stroke-width="1.5" marker-end="url(#bArrB)"/>
  <line x1="240" y1="160" x2="220" y2="160" stroke="#2563EB" stroke-width="1.5" marker-end="url(#bArrB)"/>
  <line x1="245" y1="190" x2="220" y2="190" stroke="#2563EB" stroke-width="1.5" marker-end="url(#bArrB)"/>
  <!-- Bottom pressure (upward, largest) -->
  <line x1="145" y1="230" x2="145" y2="210" stroke="#2563EB" stroke-width="2" marker-end="url(#bArrB)"/>
  <line x1="165" y1="235" x2="165" y2="210" stroke="#2563EB" stroke-width="2" marker-end="url(#bArrB)"/>
  <line x1="185" y1="230" x2="185" y2="210" stroke="#2563EB" stroke-width="2" marker-end="url(#bArrB)"/>
  <!-- Top pressure (downward, smaller) -->
  <line x1="145" y1="70" x2="145" y2="80" stroke="#2563EB" stroke-width="1" marker-end="url(#bArrB)"/>
  <line x1="165" y1="68" x2="165" y2="80" stroke="#2563EB" stroke-width="1" marker-end="url(#bArrB)"/>
  <line x1="185" y1="70" x2="185" y2="80" stroke="#2563EB" stroke-width="1" marker-end="url(#bArrB)"/>

  <text x="165" y="50" text-anchor="middle" font-size="15" font-weight="bold" fill="#8B0029">&#xC720;&#xCCB4; &#xC18D;&#xC758; &#xBB3C;&#xCCB4;</text>

  <!-- ===== Right: FBD ===== -->
  <text x="540" y="50" text-anchor="middle" font-size="15" font-weight="bold" fill="#8B0029">&#xC790;&#xC720; &#xBB3C;&#xCCB4; &#xB2E4;&#xC774;&#xC5B4;&#xADF8;&#xB7A8;</text>

  <!-- Object block (FBD) -->
  <rect x="490" y="170" width="100" height="100" rx="4" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="540" y="225" text-anchor="middle" font-size="14" fill="#6B7280" font-weight="bold">m</text>

  <!-- Weight arrow (down) -->
  <line x1="540" y1="275" x2="540" y2="350" stroke="#8B0029" stroke-width="2.5" marker-end="url(#bArrR)"/>
  <text x="540" y="372" text-anchor="middle" font-size="15" font-weight="bold" fill="#8B0029">
    <tspan font-style="italic">F</tspan><tspan font-size="11" dy="3">g</tspan><tspan dy="-3"> = mg</tspan>
  </text>

  <!-- Buoyancy arrow (up) -->
  <line x1="540" y1="165" x2="540" y2="85" stroke="#2563EB" stroke-width="2.5" marker-end="url(#bArrB)"/>
  <text x="540" y="75" text-anchor="middle" font-size="15" font-weight="bold" fill="#2563EB">
    <tspan font-style="italic">F</tspan><tspan font-size="11" dy="3">b</tspan><tspan dy="-3"> = &#x3C1;</tspan><tspan font-size="11" dy="3">f</tspan><tspan dy="-3">gV</tspan><tspan font-size="11" dy="3">sub</tspan>
  </text>

  <!-- Center dot -->
  <circle cx="540" cy="220" r="3" fill="#6B7280"/>

  <!-- Equation box -->
  <rect x="50" y="400" width="650" height="35" rx="6" fill="#F3F4F6" stroke="#8B0029" stroke-width="1.5"/>
  <text x="375" y="423" text-anchor="middle" font-size="15" fill="#1a1a1a" font-weight="bold">
    부력: <tspan font-style="italic">F</tspan><tspan font-size="12" dy="3">b</tspan><tspan dy="-3"> = </tspan><tspan font-style="italic">&#x3C1;</tspan><tspan font-size="12" dy="3">f</tspan><tspan dy="-3"> </tspan><tspan font-style="italic">gV</tspan><tspan font-size="12" dy="3">disp</tspan><tspan dy="-3"> = </tspan><tspan font-style="italic">m</tspan><tspan font-size="12" dy="3">f</tspan><tspan dy="-3" font-style="italic">g</tspan><tspan dy="0"> &#x2003;(배제된 유체의 무게)</tspan>
  </text>
</svg>
