<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 440" font-family="sans-serif">
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8B0029"/>
    </marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563EB"/>
    </marker>
  </defs>

  <!-- === Case (a): Sinking (stone) === -->
  <!-- Container -->
  <rect x="30" y="60" width="200" height="280" fill="#2563EB" fill-opacity="0.05" stroke="#2563EB" stroke-width="2" rx="2"/>
  <rect x="32" y="100" width="196" height="238" fill="#2563EB" fill-opacity="0.15"/>
  <path d="M32,100 Q80,93 130,100 Q180,107 228,100" fill="none" stroke="#2563EB" stroke-width="1.2"/>

  <!-- Stone (box) -->
  <rect x="95" y="200" width="70" height="60" fill="#6B7280" stroke="#6B7280" stroke-width="2" rx="3"/>
  <text x="130" y="235" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">돌</text>

  <!-- Fg down -->
  <line x1="130" y1="262" x2="130" y2="320" stroke="#8B0029" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="150" y="305" font-size="13" fill="#8B0029" font-weight="bold" font-style="italic">F_g</text>

  <!-- Fb up (shorter) -->
  <line x1="130" y1="198" x2="130" y2="160" stroke="#2563EB" stroke-width="2.5" marker-end="url(#ab)"/>
  <text x="150" y="170" font-size="13" fill="#2563EB" font-weight="bold" font-style="italic">F_b</text>

  <!-- Label -->
  <text x="130" y="370" text-anchor="middle" font-size="13" fill="#6B7280" font-weight="bold">(a) 가라앉음</text>
  <text x="130" y="388" text-anchor="middle" font-size="12" fill="#8B0029">F_g &gt; F_b</text>

  <!-- === Case (b): Floating === -->
  <rect x="270" y="60" width="200" height="280" fill="#2563EB" fill-opacity="0.05" stroke="#2563EB" stroke-width="2" rx="2"/>
  <rect x="272" y="100" width="196" height="238" fill="#2563EB" fill-opacity="0.15"/>
  <path d="M272,100 Q320,93 370,100 Q420,107 468,100" fill="none" stroke="#2563EB" stroke-width="1.2"/>

  <!-- Wood block (partially submerged) -->
  <rect x="335" y="80" width="70" height="60" fill="#F3F4F6" stroke="#6B7280" stroke-width="2" rx="3"/>
  <text x="370" y="115" text-anchor="middle" font-size="12" fill="#6B7280" font-weight="bold">나무</text>

  <!-- Fg down -->
  <line x1="370" y1="142" x2="370" y2="190" stroke="#8B0029" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="390" y="175" font-size="13" fill="#8B0029" font-weight="bold" font-style="italic">F_g</text>

  <!-- Fb up (equal length) -->
  <line x1="370" y1="78" x2="370" y2="32" stroke="#2563EB" stroke-width="2.5" marker-end="url(#ab)"/>
  <text x="390" y="45" font-size="13" fill="#2563EB" font-weight="bold" font-style="italic">F_b</text>

  <!-- Submerged portion indicator -->
  <line x1="340" y1="100" x2="330" y2="100" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="340" y1="140" x2="330" y2="140" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="330" y1="100" x2="330" y2="140" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="318" y="124" text-anchor="middle" font-size="10" fill="#6B7280" font-style="italic">h</text>

  <text x="370" y="370" text-anchor="middle" font-size="13" fill="#6B7280" font-weight="bold">(b) 뜸 (floating)</text>
  <text x="370" y="388" text-anchor="middle" font-size="12" fill="#2563EB">F_b = F_g</text>

  <!-- === Case (c): Submerged equilibrium === -->
  <rect x="510" y="60" width="200" height="280" fill="#2563EB" fill-opacity="0.05" stroke="#2563EB" stroke-width="2" rx="2"/>
  <rect x="512" y="100" width="196" height="238" fill="#2563EB" fill-opacity="0.15"/>
  <path d="M512,100 Q560,93 610,100 Q660,107 708,100" fill="none" stroke="#2563EB" stroke-width="1.2"/>

  <!-- Neutrally buoyant object -->
  <circle cx="610" cy="210" r="30" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="610" y="214" text-anchor="middle" font-size="11" fill="#6B7280">ρ = ρ_f</text>

  <!-- Fg down -->
  <line x1="610" y1="242" x2="610" y2="290" stroke="#8B0029" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="630" y="275" font-size="13" fill="#8B0029" font-weight="bold" font-style="italic">F_g</text>

  <!-- Fb up (equal) -->
  <line x1="610" y1="178" x2="610" y2="132" stroke="#2563EB" stroke-width="2.5" marker-end="url(#ab)"/>
  <text x="630" y="148" font-size="13" fill="#2563EB" font-weight="bold" font-style="italic">F_b</text>

  <text x="610" y="370" text-anchor="middle" font-size="13" fill="#6B7280" font-weight="bold">(c) 중립 부력</text>
  <text x="610" y="388" text-anchor="middle" font-size="12" fill="#6B7280">F_b = F_g (잠긴 상태)</text>

  <!-- Title -->
  <text x="375" y="415" text-anchor="middle" font-size="14" fill="#8B0029" font-weight="bold">아르키메데스 원리: F_b = ρ_f V_sub g</text>
</svg>
