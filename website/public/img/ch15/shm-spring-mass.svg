<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 410" font-family="sans-serif">
  <defs>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6B7280">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Row labels -->
  <text x="30" y="90" font-size="15" fill="#6B7280" font-weight="bold" text-anchor="middle" transform="rotate(-90,30,90)">x = +A</text>
  <text x="30" y="220" font-size="15" fill="#6B7280" font-weight="bold" text-anchor="middle" transform="rotate(-90,30,220)">x = 0</text>
  <text x="30" y="340" font-size="15" fill="#6B7280" font-weight="bold" text-anchor="middle" transform="rotate(-90,30,340)">x = -A</text>

  <!-- ===== Row 1: x = +A (stretched) ===== -->
  <g transform="translate(60, 50)">
    <!-- Wall -->
    <rect x="0" y="10" width="10" height="60" fill="#6B7280"/>
    <line x1="0" y1="10" x2="10" y2="20" stroke="#6B7280" stroke-width="1"/>
    <line x1="0" y1="25" x2="10" y2="35" stroke="#6B7280" stroke-width="1"/>
    <line x1="0" y1="40" x2="10" y2="50" stroke="#6B7280" stroke-width="1"/>
    <line x1="0" y1="55" x2="10" y2="65" stroke="#6B7280" stroke-width="1"/>
    <!-- Spring (stretched) -->
    <polyline points="10,40 30,25 50,55 70,25 90,55 110,25 130,55 150,25 170,55 190,25 210,55 230,25 250,55 270,25 290,55 310,25 330,55 350,40" fill="none" stroke="#6B7280" stroke-width="2"/>
    <!-- Block -->
    <rect x="350" y="15" width="50" height="50" rx="3" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
    <text x="375" y="46" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a" font-style="italic">m</text>
    <!-- Force arrow (leftward, restoring) -->
    <line x1="350" y1="40" x2="280" y2="40" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arrR)"/>
    <text x="308" y="32" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">F = -kA</text>
    <!-- Displacement arrow -->
    <line x1="450" y1="40" x2="530" y2="40" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="420" y="78" font-size="13" fill="#6B7280">v = 0</text>
    <!-- Equilibrium reference -->
    <line x1="200" y1="0" x2="200" y2="80" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  </g>

  <!-- ===== Row 2: x = 0 (equilibrium) ===== -->
  <g transform="translate(60, 180)">
    <!-- Wall -->
    <rect x="0" y="10" width="10" height="60" fill="#6B7280"/>
    <line x1="0" y1="10" x2="10" y2="20" stroke="#6B7280" stroke-width="1"/>
    <line x1="0" y1="25" x2="10" y2="35" stroke="#6B7280" stroke-width="1"/>
    <line x1="0" y1="40" x2="10" y2="50" stroke="#6B7280" stroke-width="1"/>
    <line x1="0" y1="55" x2="10" y2="65" stroke="#6B7280" stroke-width="1"/>
    <!-- Spring (natural length) -->
    <polyline points="10,40 25,25 40,55 55,25 70,55 85,25 100,55 115,25 130,55 145,25 160,55 175,25 190,40" fill="none" stroke="#6B7280" stroke-width="2"/>
    <!-- Block -->
    <rect x="190" y="15" width="50" height="50" rx="3" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
    <text x="215" y="46" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a" font-style="italic">m</text>
    <!-- Velocity arrow (rightward) -->
    <line x1="240" y1="40" x2="320" y2="40" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrB)"/>
    <text x="268" y="32" font-size="14" fill="#2563EB" font-weight="bold" font-style="italic">v<tspan font-size="10" baseline-shift="sub">max</tspan></text>
    <text x="260" y="78" font-size="13" fill="#6B7280">F = 0</text>
    <!-- Equilibrium line -->
    <line x1="200" y1="0" x2="200" y2="80" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="200" y="-5" text-anchor="middle" font-size="12" fill="#6B7280">x = 0</text>
  </g>

  <!-- ===== Row 3: x = -A (compressed) ===== -->
  <g transform="translate(60, 300)">
    <!-- Wall -->
    <rect x="0" y="10" width="10" height="60" fill="#6B7280"/>
    <line x1="0" y1="10" x2="10" y2="20" stroke="#6B7280" stroke-width="1"/>
    <line x1="0" y1="25" x2="10" y2="35" stroke="#6B7280" stroke-width="1"/>
    <line x1="0" y1="40" x2="10" y2="50" stroke="#6B7280" stroke-width="1"/>
    <line x1="0" y1="55" x2="10" y2="65" stroke="#6B7280" stroke-width="1"/>
    <!-- Spring (compressed) -->
    <polyline points="10,40 18,25 26,55 34,25 42,55 50,25 58,55 66,25 74,55 82,25 90,55 98,25 100,40" fill="none" stroke="#6B7280" stroke-width="2"/>
    <!-- Block -->
    <rect x="100" y="15" width="50" height="50" rx="3" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
    <text x="125" y="46" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a" font-style="italic">m</text>
    <!-- Force arrow (rightward, restoring) -->
    <line x1="150" y1="40" x2="220" y2="40" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arrR)"/>
    <text x="168" y="32" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">F = +kA</text>
    <text x="140" y="78" font-size="13" fill="#6B7280">v = 0</text>
    <!-- Equilibrium reference -->
    <line x1="200" y1="0" x2="200" y2="80" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  </g>

  <!-- Axis labels on right -->
  <g transform="translate(560, 50)">
    <text x="0" y="40" font-size="14" fill="#8B0029" font-weight="bold">늘어남: 복원력 ←</text>
    <text x="0" y="170" font-size="14" fill="#2563EB" font-weight="bold">평형: 최대 속력</text>
    <text x="0" y="300" font-size="14" fill="#8B0029" font-weight="bold">압축: 복원력 →</text>
  </g>

  <!-- Ground line -->
  <line x1="60" y1="385" x2="500" y2="385" stroke="#6B7280" stroke-width="1"/>
</svg>
