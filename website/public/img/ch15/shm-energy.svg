<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 415" font-family="sans-serif">
  <defs>
    <marker id="enArrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" fill="#6B7280">
      <polygon points="0 0, 8 3, 0 6"/>
    </marker>
  </defs>

  <text x="350" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#8B0029">단순조화운동의 에너지</text>

  <!-- Axes -->
  <g transform="translate(80, 60)">
    <!-- y-axis (Energy) -->
    <line x1="0" y1="290" x2="0" y2="10" stroke="#6B7280" stroke-width="1.5" marker-end="url(#enArrG)"/>
    <text x="-10" y="8" font-size="14" fill="#6B7280" font-weight="bold">E</text>

    <!-- x-axis -->
    <line x1="-20" y1="290" x2="540" y2="290" stroke="#6B7280" stroke-width="1.5" marker-end="url(#enArrG)"/>
    <text x="545" y="295" font-size="14" font-style="italic" fill="#6B7280">x</text>

    <!-- x labels -->
    <text x="260" y="310" text-anchor="middle" font-size="13" fill="#6B7280">0</text>
    <text x="50" y="310" text-anchor="middle" font-size="13" font-style="italic" fill="#6B7280">-x<tspan font-size="9" baseline-shift="sub">m</tspan></text>
    <text x="470" y="310" text-anchor="middle" font-size="13" font-style="italic" fill="#6B7280">+x<tspan font-size="9" baseline-shift="sub">m</tspan></text>

    <!-- Tick marks -->
    <line x1="50" y1="287" x2="50" y2="293" stroke="#6B7280" stroke-width="1"/>
    <line x1="260" y1="287" x2="260" y2="293" stroke="#6B7280" stroke-width="1"/>
    <line x1="470" y1="287" x2="470" y2="293" stroke="#6B7280" stroke-width="1"/>

    <!-- E_total horizontal line -->
    <line x1="0" y1="40" x2="520" y2="40" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="-10" y="44" text-anchor="end" font-size="13" fill="#6B7280" font-weight="bold" font-style="italic">E</text>
    <text x="525" y="44" font-size="12" fill="#6B7280">= &#xBD;kx<tspan font-size="9" baseline-shift="sub" font-style="italic">m</tspan><tspan baseline-shift="super" font-size="9">2</tspan></text>

    <!-- U(x) = 1/2 kx^2 (parabola, red) -->
    <!-- Points: at x_m (470), U = E_total (y=40); at 0 (260), U = 0 (y=290) -->
    <path d="M 50,40 Q 155,290 260,290 Q 365,290 470,40" fill="none" stroke="#8B0029" stroke-width="2.5"/>
    <text x="480" y="80" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">U(x) = &#xBD;kx&#xB2;</text>

    <!-- K(x) = E - U (inverted parabola, blue) -->
    <path d="M 50,290 Q 155,40 260,40 Q 365,40 470,290" fill="none" stroke="#2563EB" stroke-width="2.5"/>
    <text x="480" y="260" font-size="14" fill="#2563EB" font-weight="bold" font-style="italic">K(x) = &#xBD;mv&#xB2;</text>

    <!-- Annotations -->
    <!-- At x = 0: K = max, U = 0 -->
    <circle cx="260" cy="290" r="4" fill="#8B0029"/>
    <circle cx="260" cy="40" r="4" fill="#2563EB"/>
    <text x="260" y="330" text-anchor="middle" font-size="12" fill="#8B0029">U = 0</text>
    <text x="260" y="25" text-anchor="middle" font-size="12" fill="#2563EB">K = E (최대)</text>

    <!-- At x = +x_m: K = 0, U = E -->
    <circle cx="470" cy="40" r="4" fill="#8B0029"/>
    <circle cx="470" cy="290" r="4" fill="#2563EB"/>

    <!-- At x = -x_m: K = 0, U = E -->
    <circle cx="50" cy="40" r="4" fill="#8B0029"/>
    <circle cx="50" cy="290" r="4" fill="#2563EB"/>

    <!-- Shaded region showing energy exchange at some intermediate x -->
    <line x1="370" y1="40" x2="370" y2="290" stroke="#6B7280" stroke-width="0.5" stroke-dasharray="3 3"/>

    <!-- U portion at x ~ 0.5 x_m -->
    <!-- U at 370: proportional, about y=165 -->
    <line x1="375" y1="165" x2="375" y2="290" stroke="#8B0029" stroke-width="3"/>
    <text x="388" y="235" font-size="11" fill="#8B0029" font-style="italic">U</text>

    <!-- K portion at same x -->
    <line x1="375" y1="40" x2="375" y2="165" stroke="#2563EB" stroke-width="3"/>
    <text x="388" y="100" font-size="11" fill="#2563EB" font-style="italic">K</text>

    <!-- Brace for E total -->
    <text x="395" y="165" font-size="11" fill="#6B7280">} E = K + U</text>
  </g>
</svg>
