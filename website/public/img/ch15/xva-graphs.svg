<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" font-family="sans-serif">
  <defs>
    <marker id="axArrow" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- x(t) graph -->
  <g transform="translate(30,20)">
    <!-- Axes -->
    <line x1="60" y1="60" x2="600" y2="60" stroke="#6B7280" stroke-width="1" marker-end="url(#axArrow)"/>
    <line x1="60" y1="10" x2="60" y2="110" stroke="#6B7280" stroke-width="1"/>
    <text x="608" y="64" font-size="12" fill="#6B7280" font-style="italic">t</text>
    <text x="30" y="65" font-size="13" fill="#8B0029" font-weight="bold" font-style="italic">x</text>

    <!-- Amplitude labels -->
    <text x="22" y="25" font-size="11" fill="#8B0029">+x<tspan baseline-shift="sub" font-size="8">m</tspan></text>
    <text x="22" y="105" font-size="11" fill="#8B0029">−x<tspan baseline-shift="sub" font-size="8">m</tspan></text>
    <line x1="55" y1="20" x2="600" y2="20" stroke="#6B7280" stroke-width="0.5" stroke-dasharray="3 3"/>
    <line x1="55" y1="100" x2="600" y2="100" stroke="#6B7280" stroke-width="0.5" stroke-dasharray="3 3"/>

    <!-- Cosine curve -->
    <path d="M60,20 Q120,20 150,60 Q180,100 240,100 Q300,100 330,60 Q360,20 420,20 Q480,20 510,60 Q540,100 600,100" fill="none" stroke="#8B0029" stroke-width="2.5"/>

    <!-- Period labels -->
    <line x1="60" y1="115" x2="420" y2="115" stroke="#6B7280" stroke-width="1"/>
    <line x1="60" y1="112" x2="60" y2="118" stroke="#6B7280" stroke-width="1"/>
    <line x1="420" y1="112" x2="420" y2="118" stroke="#6B7280" stroke-width="1"/>
    <text x="240" y="128" font-size="12" fill="#6B7280" text-anchor="middle" font-style="italic">T</text>

    <text x="630" y="64" font-size="12" fill="#8B0029">cos</text>
  </g>

  <!-- v(t) graph -->
  <g transform="translate(30,170)">
    <line x1="60" y1="60" x2="600" y2="60" stroke="#6B7280" stroke-width="1" marker-end="url(#axArrow)"/>
    <line x1="60" y1="10" x2="60" y2="110" stroke="#6B7280" stroke-width="1"/>
    <text x="608" y="64" font-size="12" fill="#6B7280" font-style="italic">t</text>
    <text x="30" y="65" font-size="13" fill="#2563EB" font-weight="bold" font-style="italic">v</text>

    <text x="14" y="25" font-size="11" fill="#2563EB">+ωx<tspan baseline-shift="sub" font-size="8">m</tspan></text>
    <text x="14" y="105" font-size="11" fill="#2563EB">−ωx<tspan baseline-shift="sub" font-size="8">m</tspan></text>
    <line x1="55" y1="20" x2="600" y2="20" stroke="#6B7280" stroke-width="0.5" stroke-dasharray="3 3"/>
    <line x1="55" y1="100" x2="600" y2="100" stroke="#6B7280" stroke-width="0.5" stroke-dasharray="3 3"/>

    <!-- Negative sine curve (starts at 0, goes down) -->
    <path d="M60,60 Q90,100 150,100 Q210,100 240,60 Q270,20 330,20 Q390,20 420,60 Q450,100 510,100 Q570,100 600,60" fill="none" stroke="#2563EB" stroke-width="2.5"/>

    <text x="630" y="64" font-size="12" fill="#2563EB">−sin</text>
  </g>

  <!-- a(t) graph -->
  <g transform="translate(30,320)">
    <line x1="60" y1="60" x2="600" y2="60" stroke="#6B7280" stroke-width="1" marker-end="url(#axArrow)"/>
    <line x1="60" y1="10" x2="60" y2="110" stroke="#6B7280" stroke-width="1"/>
    <text x="608" y="64" font-size="12" fill="#6B7280" font-style="italic">t</text>
    <text x="30" y="65" font-size="13" fill="#6B7280" font-weight="bold" font-style="italic">a</text>

    <text x="6" y="25" font-size="11" fill="#6B7280">+ω²x<tspan baseline-shift="sub" font-size="8">m</tspan></text>
    <text x="6" y="105" font-size="11" fill="#6B7280">−ω²x<tspan baseline-shift="sub" font-size="8">m</tspan></text>
    <line x1="55" y1="20" x2="600" y2="20" stroke="#6B7280" stroke-width="0.5" stroke-dasharray="3 3"/>
    <line x1="55" y1="100" x2="600" y2="100" stroke="#6B7280" stroke-width="0.5" stroke-dasharray="3 3"/>

    <!-- Negative cosine curve (starts at bottom) -->
    <path d="M60,100 Q120,100 150,60 Q180,20 240,20 Q300,20 330,60 Q360,100 420,100 Q480,100 510,60 Q540,20 600,20" fill="none" stroke="#6B7280" stroke-width="2.5"/>

    <text x="630" y="64" font-size="12" fill="#6B7280">−cos</text>
  </g>

  <!-- Annotations -->
  <g transform="translate(30,0)">
    <!-- Vertical dashed lines at key points -->
    <line x1="60" y1="20" x2="60" y2="430" stroke="#6B7280" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.4"/>
    <line x1="150" y1="20" x2="150" y2="430" stroke="#6B7280" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.4"/>
    <line x1="240" y1="20" x2="240" y2="430" stroke="#6B7280" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.4"/>
    <line x1="330" y1="20" x2="330" y2="430" stroke="#6B7280" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.4"/>
    <line x1="420" y1="20" x2="420" y2="430" stroke="#6B7280" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.4"/>
  </g>
</svg>
