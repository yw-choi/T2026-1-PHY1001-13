<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 445" font-family="sans-serif">
  <defs>
    <marker id="cpArrR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="cpArrB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="cpArrG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6B7280">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#8B0029">등속 원운동의 x축 투영 = 단순조화운동</text>

  <!-- Reference circle -->
  <g transform="translate(200, 230)">
    <!-- Axes -->
    <line x1="-160" y1="0" x2="160" y2="0" stroke="#6B7280" stroke-width="1"/>
    <line x1="0" y1="-160" x2="0" y2="160" stroke="#6B7280" stroke-width="1"/>
    <text x="165" y="5" font-size="14" font-style="italic" fill="#6B7280">x</text>
    <text x="5" y="-150" font-size="14" font-style="italic" fill="#6B7280">y</text>

    <!-- Circle -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="6 4"/>

    <!-- x_m labels -->
    <text x="125" y="18" font-size="13" font-style="italic" fill="#6B7280">x<tspan font-size="9" baseline-shift="sub">m</tspan></text>
    <text x="-142" y="18" font-size="13" font-style="italic" fill="#6B7280">-x<tspan font-size="9" baseline-shift="sub">m</tspan></text>

    <!-- Reference particle P' at angle 50 degrees -->
    <line x1="0" y1="0" x2="77.1" y2="-91.9" stroke="#8B0029" stroke-width="2"/>
    <circle cx="77.1" cy="-91.9" r="7" fill="#8B0029"/>
    <text x="88" y="-96" font-size="15" font-weight="bold" fill="#8B0029">P'</text>

    <!-- Angle arc -->
    <path d="M 35,0 A 35,35 0 0,0 22.5,-26.8" fill="none" stroke="#8B0029" stroke-width="1.5"/>
    <text x="42" y="-10" font-size="14" font-style="italic" fill="#8B0029">&#x3C9;t + &#x3C6;</text>

    <!-- Velocity vector on P' (tangent, perpendicular to radius) -->
    <line x1="77.1" y1="-91.9" x2="137" y2="-56" stroke="#2563EB" stroke-width="2.5" marker-end="url(#cpArrB)"/>
    <text x="140" y="-62" font-size="13" fill="#2563EB" font-weight="bold" font-style="italic">v = &#x3C9;x<tspan font-size="9" baseline-shift="sub">m</tspan></text>

    <!-- Radius label -->
    <text x="25" y="-55" font-size="13" font-style="italic" fill="#8B0029">x<tspan font-size="9" baseline-shift="sub">m</tspan></text>

    <!-- Projection onto x-axis: dashed vertical -->
    <line x1="77.1" y1="-91.9" x2="77.1" y2="0" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

    <!-- Projection point P -->
    <circle cx="77.1" cy="0" r="5" fill="#2563EB"/>
    <text x="82" y="18" font-size="15" font-weight="bold" fill="#2563EB">P</text>

    <!-- x(t) label -->
    <line x1="0" y1="5" x2="77.1" y2="5" stroke="#2563EB" stroke-width="2" marker-end="url(#cpArrB)"/>
    <text x="32" y="25" font-size="13" fill="#2563EB" font-weight="bold" font-style="italic">x(t)</text>

    <!-- Rotation arrow -->
    <path d="M 100,65 A 120,120 0 0,0 65,100" fill="none" stroke="#8B0029" stroke-width="1.5" marker-end="url(#cpArrR)"/>
    <text x="90" y="100" font-size="15" font-style="italic" fill="#8B0029" font-weight="bold">&#x3C9;</text>

    <!-- Caption below -->
    <text x="0" y="175" text-anchor="middle" font-size="13" fill="#6B7280">P'이 원 위를 등속 원운동 하면</text>
    <text x="0" y="192" text-anchor="middle" font-size="13" fill="#6B7280">투영 P는 x축 위에서 단순조화운동 한다</text>
  </g>

  <!-- Right side: resulting SHM graph -->
  <g transform="translate(440, 100)">
    <text x="110" y="0" text-anchor="middle" font-size="15" font-weight="bold" fill="#8B0029">x(t) 그래프</text>

    <!-- Axes -->
    <line x1="0" y1="120" x2="220" y2="120" stroke="#6B7280" stroke-width="1" marker-end="url(#cpArrG)"/>
    <line x1="0" y1="240" x2="0" y2="10" stroke="#6B7280" stroke-width="1" marker-end="url(#cpArrG)"/>
    <text x="225" y="125" font-size="13" font-style="italic" fill="#6B7280">t</text>
    <text x="-8" y="8" font-size="13" font-style="italic" fill="#6B7280">x</text>

    <!-- +x_m and -x_m -->
    <text x="-25" y="35" font-size="12" font-style="italic" fill="#6B7280">+x<tspan font-size="8" baseline-shift="sub">m</tspan></text>
    <line x1="-5" y1="30" x2="210" y2="30" stroke="#6B7280" stroke-width="0.5" stroke-dasharray="3 3"/>
    <text x="-25" y="215" font-size="12" font-style="italic" fill="#6B7280">-x<tspan font-size="8" baseline-shift="sub">m</tspan></text>
    <line x1="-5" y1="210" x2="210" y2="210" stroke="#6B7280" stroke-width="0.5" stroke-dasharray="3 3"/>

    <!-- Cosine curve: x(t) = x_m cos(wt + phi) -->
    <path d="M 0,30 C 17,30 26,55 35,75 C 44,95 52,120 70,160 C 78,180 87,210 105,210 C 123,210 131,180 140,160 C 149,140 157,120 175,75 C 183,55 192,30 210,30" fill="none" stroke="#2563EB" stroke-width="2.5"/>

    <!-- Period marker -->
    <line x1="0" y1="245" x2="0" y2="250" stroke="#6B7280" stroke-width="1"/>
    <line x1="210" y1="245" x2="210" y2="250" stroke="#6B7280" stroke-width="1"/>
    <line x1="0" y1="248" x2="210" y2="248" stroke="#6B7280" stroke-width="1" marker-end="url(#cpArrG)"/>
    <text x="105" y="265" text-anchor="middle" font-size="13" font-style="italic" fill="#6B7280">T</text>

    <!-- Formula -->
    <text x="110" y="295" text-anchor="middle" font-size="14" fill="#2563EB" font-weight="bold" font-style="italic">x(t) = x<tspan font-size="10" baseline-shift="sub">m</tspan> cos(&#x3C9;t + &#x3C6;)</text>
  </g>
</svg>
