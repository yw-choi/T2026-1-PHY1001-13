<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" font-family="sans-serif">
  <defs>
    <marker id="pArrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8B0029"/>
    </marker>
    <marker id="pArrowB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563EB"/>
    </marker>
    <marker id="pArrowGr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Pivot -->
  <rect x="130" y="30" width="80" height="10" fill="#6B7280" rx="2"/>
  <circle cx="170" cy="40" r="4" fill="#1a1a1a"/>

  <!-- Vertical dashed line (equilibrium) -->
  <line x1="170" y1="40" x2="170" y2="370" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- String -->
  <line x1="170" y1="40" x2="280" y2="310" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Angle arc -->
  <path d="M170,100 A60,60 0 0,1 190,95" fill="none" stroke="#8B0029" stroke-width="1.5"/>
  <text x="180" y="115" font-size="14" fill="#8B0029" font-style="italic">θ</text>

  <!-- Length label L -->
  <text x="205" y="175" font-size="14" fill="#6B7280" font-style="italic" transform="rotate(67,205,175)">L</text>

  <!-- Bob -->
  <circle cx="280" cy="310" r="18" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2"/>
  <text x="280" y="315" font-size="14" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-style="italic">m</text>

  <!-- Gravity force (mg, downward) -->
  <line x1="280" y1="328" x2="280" y2="395" stroke="#8B0029" stroke-width="2.5" marker-end="url(#pArrowR)"/>
  <text x="290" y="400" font-size="14" fill="#8B0029" font-weight="bold">F<tspan baseline-shift="sub" font-size="10">g</tspan></text>

  <!-- Gravity components -->
  <line x1="280" y1="328" x2="313" y2="385" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#pArrowGr)"/>
  <text x="320" y="393" font-size="12" fill="#6B7280">F<tspan baseline-shift="sub" font-size="9">g</tspan>cos θ</text>

  <line x1="280" y1="328" x2="233" y2="355" stroke="#8B0029" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#pArrowR)"/>
  <text x="195" y="365" font-size="12" fill="#8B0029">F<tspan baseline-shift="sub" font-size="9">g</tspan>sin θ</text>

  <!-- Tension -->
  <line x1="280" y1="292" x2="230" y2="220" stroke="#2563EB" stroke-width="2.5" marker-end="url(#pArrowB)"/>
  <text x="215" y="215" font-size="14" fill="#2563EB" font-weight="bold" font-style="italic">T</text>

  <!-- Arc showing motion path -->
  <path d="M170,340 A200,200 0 0,1 280,310" fill="none" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <text x="200" y="340" font-size="12" fill="#6B7280" font-style="italic">s = Lθ</text>

  <!-- Height h -->
  <line x1="300" y1="310" x2="300" y2="340" stroke="#6B7280" stroke-width="1"/>
  <line x1="170" y1="340" x2="310" y2="340" stroke="#6B7280" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="310" y="330" font-size="12" fill="#6B7280" font-style="italic">h = L(1−cos θ)</text>

  <!-- Right side: formulas -->
  <rect x="400" y="50" width="270" height="170" rx="8" fill="#F3F4F6" stroke="#8B0029" stroke-width="1"/>
  <text x="420" y="75" font-size="14" fill="#8B0029" font-weight="bold">단진자 (Simple Pendulum)</text>
  <text x="420" y="100" font-size="13" fill="#1a1a1a">복원 돌림힘:</text>
  <text x="420" y="120" font-size="13" fill="#1a1a1a" font-style="italic">τ = −L(mg sin θ)</text>
  <text x="420" y="148" font-size="13" fill="#1a1a1a">소각 근사 (sin θ ≈ θ):</text>
  <text x="420" y="168" font-size="13" fill="#1a1a1a" font-style="italic">α = −(g/L)θ → SHM!</text>
  <text x="420" y="198" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">T = 2π√(L/g)</text>

  <rect x="400" y="250" width="270" height="80" rx="8" fill="#F3F4F6" stroke="#2563EB" stroke-width="1"/>
  <text x="420" y="275" font-size="13" fill="#2563EB" font-weight="bold">주기 T는 질량 m에 무관!</text>
  <text x="420" y="300" font-size="12" fill="#1a1a1a">줄 길이 L과 중력가속도 g에만</text>
  <text x="420" y="318" font-size="12" fill="#1a1a1a">의존한다.</text>
</svg>
