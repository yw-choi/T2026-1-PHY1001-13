<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 460" font-family="sans-serif">
  <defs>
    <marker id="pvArr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#1a1a1a">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="pvArrR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" fill="#8B0029">
      <polygon points="0 0, 8 3, 0 6"/>
    </marker>
    <marker id="pvArrB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" fill="#2563EB">
      <polygon points="0 0, 8 3, 0 6"/>
    </marker>
    <marker id="pvArrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" fill="#6B7280">
      <polygon points="0 0, 8 3, 0 6"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="390" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#8B0029">p-V 다이어그램과 경로 의존성</text>

  <!-- ===== Left diagram: Work as area ===== -->
  <g transform="translate(40, 55)">
    <text x="160" y="10" text-anchor="middle" font-size="15" font-weight="bold" fill="#8B0029">일 = 곡선 아래 면적</text>

    <!-- Axes -->
    <line x1="50" y1="280" x2="310" y2="280" stroke="#1a1a1a" stroke-width="2" marker-end="url(#pvArr)"/>
    <line x1="50" y1="280" x2="50" y2="30" stroke="#1a1a1a" stroke-width="2" marker-end="url(#pvArr)"/>
    <text x="180" y="310" text-anchor="middle" font-size="14" fill="#1a1a1a" font-style="italic">V</text>
    <text x="30" y="155" text-anchor="middle" font-size="14" fill="#1a1a1a" font-style="italic">p</text>

    <!-- Shaded area (work) -->
    <path d="M 90,100 C 140,110 200,160 260,200 L 260,280 L 90,280 Z" fill="rgba(139,0,41,0.12)" stroke="none"/>

    <!-- Process curve -->
    <path d="M 90,100 C 140,110 200,160 260,200" fill="none" stroke="#8B0029" stroke-width="2.5" marker-end="url(#pvArrR)"/>

    <!-- Points i and f -->
    <circle cx="90" cy="100" r="5" fill="#8B0029"/>
    <text x="78" y="92" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">i</text>
    <circle cx="260" cy="200" r="5" fill="#8B0029"/>
    <text x="270" y="198" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">f</text>

    <!-- W > 0 label -->
    <text x="170" y="240" text-anchor="middle" font-size="16" fill="#8B0029" font-weight="bold">W &gt; 0</text>

    <!-- Dashed drop lines -->
    <line x1="90" y1="100" x2="90" y2="280" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="260" y1="200" x2="260" y2="280" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="90" y="296" text-anchor="middle" font-size="12" fill="#6B7280" font-style="italic">V<tspan font-size="10" baseline-shift="sub">i</tspan></text>
    <text x="260" y="296" text-anchor="middle" font-size="12" fill="#6B7280" font-style="italic">V<tspan font-size="10" baseline-shift="sub">f</tspan></text>

    <!-- Formula -->
    <text x="160" y="340" text-anchor="middle" font-size="14" fill="#1a1a1a" font-style="italic">W = ∫p dV</text>
  </g>

  <!-- ===== Right diagram: Different paths ===== -->
  <g transform="translate(410, 55)">
    <text x="160" y="10" text-anchor="middle" font-size="15" font-weight="bold" fill="#2563EB">경로에 따라 W가 다르다</text>

    <!-- Axes -->
    <line x1="50" y1="280" x2="310" y2="280" stroke="#1a1a1a" stroke-width="2" marker-end="url(#pvArr)"/>
    <line x1="50" y1="280" x2="50" y2="30" stroke="#1a1a1a" stroke-width="2" marker-end="url(#pvArr)"/>
    <text x="180" y="310" text-anchor="middle" font-size="14" fill="#1a1a1a" font-style="italic">V</text>
    <text x="30" y="155" text-anchor="middle" font-size="14" fill="#1a1a1a" font-style="italic">p</text>

    <!-- Points i and f -->
    <circle cx="90" cy="80" r="5" fill="#1a1a1a"/>
    <text x="78" y="72" font-size="14" fill="#1a1a1a" font-weight="bold" font-style="italic">i</text>
    <circle cx="260" cy="210" r="5" fill="#1a1a1a"/>
    <text x="270" y="208" font-size="14" fill="#1a1a1a" font-weight="bold" font-style="italic">f</text>

    <!-- Path 1: direct curve (red) -->
    <path d="M 90,80 C 150,95 210,160 260,210" fill="none" stroke="#8B0029" stroke-width="2.5" marker-end="url(#pvArrR)"/>
    <text x="200" y="125" font-size="13" fill="#8B0029" font-weight="600">경로 1</text>

    <!-- Path 2: isobaric then isochoric (blue) -->
    <line x1="90" y1="80" x2="260" y2="80" stroke="#2563EB" stroke-width="2.5" marker-end="url(#pvArrB)"/>
    <line x1="260" y1="80" x2="260" y2="205" stroke="#2563EB" stroke-width="2.5" marker-end="url(#pvArrB)"/>
    <text x="175" y="68" font-size="13" fill="#2563EB" font-weight="600">경로 2</text>
    <!-- Point a -->
    <circle cx="260" cy="80" r="4" fill="#2563EB"/>
    <text x="270" y="72" font-size="12" fill="#2563EB" font-style="italic">a</text>

    <!-- Path 3: isochoric then isobaric (gray) -->
    <line x1="90" y1="80" x2="90" y2="210" stroke="#6B7280" stroke-width="2.5" marker-end="url(#pvArrG)"/>
    <line x1="90" y1="210" x2="255" y2="210" stroke="#6B7280" stroke-width="2.5" marker-end="url(#pvArrG)"/>
    <text x="70" y="155" font-size="13" fill="#6B7280" font-weight="600">경로 3</text>
    <!-- Point b -->
    <circle cx="90" cy="210" r="4" fill="#6B7280"/>
    <text x="73" y="218" font-size="12" fill="#6B7280" font-style="italic">b</text>

    <!-- Drop lines -->
    <line x1="90" y1="215" x2="90" y2="280" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="260" y1="215" x2="260" y2="280" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

    <!-- Legend -->
    <text x="160" y="340" text-anchor="middle" font-size="13" fill="#1a1a1a">W: 경로 의존적 (path dependent)</text>
    <text x="160" y="360" text-anchor="middle" font-size="13" fill="#1a1a1a">ΔE<tspan font-size="10" baseline-shift="sub">int</tspan>: 경로 무관 (state function)</text>
  </g>

  <!-- Bottom formula -->
  <text x="390" y="430" text-anchor="middle" font-size="16" fill="#8B0029" font-weight="bold">ΔE<tspan font-size="12" baseline-shift="sub">int</tspan> = Q - W     (열역학 제1법칙)</text>
</svg>
