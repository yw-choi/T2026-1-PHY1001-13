<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 460" font-family="sans-serif">
  <defs>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8B0029"/>
    </marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563EB"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B7280"/>
    </marker>
    <marker id="arr-k" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1a1a"/>
    </marker>
  </defs>

  <text x="390" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">PV 다이어그램: 열역학 과정</text>

  <!-- ISOBARIC (top-left) -->
  <g transform="translate(30,40)">
    <text x="85" y="15" text-anchor="middle" font-size="13" font-weight="bold" fill="#8B0029">등압 과정 (Isobaric)</text>
    <!-- Axes -->
    <line x1="30" y1="170" x2="30" y2="30" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arr-k)"/>
    <line x1="30" y1="170" x2="170" y2="170" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arr-k)"/>
    <text x="15" y="95" font-size="12" fill="#1a1a1a" font-style="italic">P</text>
    <text x="170" y="188" font-size="12" fill="#1a1a1a" font-style="italic">V</text>
    <!-- Horizontal line at constant P -->
    <line x1="50" y1="90" x2="145" y2="90" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arr-r)"/>
    <!-- Shaded area -->
    <rect x="50" y="90" width="95" height="80" fill="#8B0029" opacity="0.1"/>
    <circle cx="50" cy="90" r="4" fill="#8B0029"/>
    <text x="42" y="82" font-size="11" fill="#8B0029" font-weight="bold">i</text>
    <text x="150" y="82" font-size="11" fill="#8B0029" font-weight="bold">f</text>
    <text x="97" y="145" text-anchor="middle" font-size="11" fill="#8B0029" font-style="italic">W = PΔV</text>
  </g>

  <!-- ISOCHORIC (top-right) -->
  <g transform="translate(210,40)">
    <text x="85" y="15" text-anchor="middle" font-size="13" font-weight="bold" fill="#2563EB">등적 과정 (Isochoric)</text>
    <line x1="30" y1="170" x2="30" y2="30" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arr-k)"/>
    <line x1="30" y1="170" x2="170" y2="170" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arr-k)"/>
    <text x="15" y="95" font-size="12" fill="#1a1a1a" font-style="italic">P</text>
    <text x="170" y="188" font-size="12" fill="#1a1a1a" font-style="italic">V</text>
    <!-- Vertical line at constant V -->
    <line x1="90" y1="140" x2="90" y2="60" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arr-b)"/>
    <circle cx="90" cy="140" r="4" fill="#2563EB"/>
    <text x="82" y="155" font-size="11" fill="#2563EB" font-weight="bold">i</text>
    <text x="82" y="55" font-size="11" fill="#2563EB" font-weight="bold">f</text>
    <text x="90" y="188" text-anchor="middle" font-size="11" fill="#2563EB" font-style="italic">W = 0</text>
  </g>

  <!-- ISOTHERMAL (bottom-left) -->
  <g transform="translate(30,240)">
    <text x="85" y="15" text-anchor="middle" font-size="13" font-weight="bold" fill="#6B7280">등온 과정 (Isothermal)</text>
    <line x1="30" y1="170" x2="30" y2="30" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arr-k)"/>
    <line x1="30" y1="170" x2="170" y2="170" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arr-k)"/>
    <text x="15" y="95" font-size="12" fill="#1a1a1a" font-style="italic">P</text>
    <text x="170" y="188" font-size="12" fill="#1a1a1a" font-style="italic">V</text>
    <!-- Hyperbolic curve PV=const -->
    <path d="M 50,60 Q 80,80 90,100 Q 100,120 145,140" stroke="#6B7280" stroke-width="2.5" fill="none" marker-end="url(#arr-g)"/>
    <!-- Shaded area under curve -->
    <path d="M 50,60 Q 80,80 90,100 Q 100,120 145,140 L 145,170 L 50,170 Z" fill="#6B7280" opacity="0.1"/>
    <circle cx="50" cy="60" r="4" fill="#6B7280"/>
    <text x="42" y="52" font-size="11" fill="#6B7280" font-weight="bold">i</text>
    <text x="150" y="135" font-size="11" fill="#6B7280" font-weight="bold">f</text>
    <text x="97" y="188" text-anchor="middle" font-size="11" fill="#6B7280" font-style="italic">T = const</text>
  </g>

  <!-- ADIABATIC (bottom-right) -->
  <g transform="translate(210,240)">
    <text x="85" y="15" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">단열 과정 (Adiabatic)</text>
    <line x1="30" y1="170" x2="30" y2="30" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arr-k)"/>
    <line x1="30" y1="170" x2="170" y2="170" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arr-k)"/>
    <text x="15" y="95" font-size="12" fill="#1a1a1a" font-style="italic">P</text>
    <text x="170" y="188" font-size="12" fill="#1a1a1a" font-style="italic">V</text>
    <!-- Steeper curve than isothermal -->
    <path d="M 50,55 Q 70,75 85,105 Q 95,130 145,150" stroke="#1a1a1a" stroke-width="2.5" fill="none" marker-end="url(#arr-k)"/>
    <!-- Shaded area -->
    <path d="M 50,55 Q 70,75 85,105 Q 95,130 145,150 L 145,170 L 50,170 Z" fill="#1a1a1a" opacity="0.08"/>
    <circle cx="50" cy="55" r="4" fill="#1a1a1a"/>
    <text x="42" y="47" font-size="11" fill="#1a1a1a" font-weight="bold">i</text>
    <text x="150" y="145" font-size="11" fill="#1a1a1a" font-weight="bold">f</text>
    <text x="97" y="188" text-anchor="middle" font-size="11" fill="#1a1a1a" font-style="italic">Q = 0</text>
  </g>

  <!-- Summary table on right side -->
  <g transform="translate(420,55)">
    <rect x="0" y="0" width="320" height="350" rx="10" fill="rgba(139,0,41,0.06)" stroke="#8B0029" stroke-width="2"/>
    <text x="160" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#8B0029">열역학 제1법칙 특수 경우</text>
    <text x="160" y="48" text-anchor="middle" font-size="13" font-style="italic" fill="#1a1a1a">ΔE_int = Q - W</text>
    <line x1="20" y1="60" x2="300" y2="60" stroke="#8B0029" stroke-width="1"/>

    <text x="30" y="90" font-size="13" font-weight="bold" fill="#8B0029">등압 (Isobaric):</text>
    <text x="30" y="110" font-size="12" fill="#1a1a1a" font-style="italic">W = PΔV, ΔE_int = Q - PΔV</text>

    <text x="30" y="145" font-size="13" font-weight="bold" fill="#2563EB">등적 (Isochoric):</text>
    <text x="30" y="165" font-size="12" fill="#1a1a1a" font-style="italic">W = 0, ΔE_int = Q</text>

    <text x="30" y="200" font-size="13" font-weight="bold" fill="#6B7280">등온 (Isothermal):</text>
    <text x="30" y="220" font-size="12" fill="#1a1a1a" font-style="italic">ΔE_int = 0, Q = W (이상기체)</text>

    <text x="30" y="255" font-size="13" font-weight="bold" fill="#1a1a1a">단열 (Adiabatic):</text>
    <text x="30" y="275" font-size="12" fill="#1a1a1a" font-style="italic">Q = 0, ΔE_int = -W</text>

    <text x="30" y="310" font-size="13" font-weight="bold" fill="#6B7280">자유팽창 (Free Expansion):</text>
    <text x="30" y="330" font-size="12" fill="#1a1a1a" font-style="italic">Q = W = 0, ΔE_int = 0</text>
  </g>
</svg>
