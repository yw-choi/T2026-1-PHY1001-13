  <g transform="translate(420,55)"><rect x="0" y="0" width="320" height="350" rx="10" fill="rgba(139,0,41,0.06)" stroke="#8B0029" stroke-width="2"/><text x="160" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#8B0029">열역학 제1법칙 특수 경우</text><text x="160" y="48" text-anchor="middle" font-size="13" font-style="italic" fill="#1a1a1a">ΔE_int = Q - W</text><line x1="20" y1="60" x2="300" y2="60" stroke="#8B0029" stroke-width="1"/><text x="30" y="90" font-size="13" font-weight="bold" fill="#8B0029">등압 (Isobaric):</text><text x="30" y="110" font-size="12" fill="#1a1a1a" font-style="italic">W = PΔV, ΔE_int = Q - PΔV</text><text x="30" y="145" font-size="13" font-weight="bold" fill="#2563EB">등적 (Isochoric):</text><text x="30" y="165" font-size="12" fill="#1a1a1a" font-style="italic">W = 0, ΔE_int = Q</text><text x="30" y="200" font-size="13" font-weight="bold" fill="#6B7280">등온 (Isothermal):</text><text x="30" y="220" font-size="12" fill="#1a1a1a" font-style="italic">ΔE_int = 0, Q = W (이상기체)</text><text x="30" y="255" font-size="13" font-weight="bold" fill="#1a1a1a">단열 (Adiabatic):</text><text x="30" y="275" font-size="12" fill="#1a1a1a" font-style="italic">Q = 0, ΔE_int = -W</text><text x="30" y="310" font-size="13" font-weight="bold" fill="#6B7280">자유팽창 (Free Expansion):</text><text x="30" y="330" font-size="12" fill="#1a1a1a" font-style="italic">Q = W = 0, ΔE_int = 0</text></g>
</svg>
