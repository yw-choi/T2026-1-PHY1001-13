<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="sans-serif">
  <defs>
    <marker id="htArr" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto" fill="#8B0029">
      <polygon points="0 0, 9 3, 0 6"/>
    </marker>
    <marker id="htArrB" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto" fill="#2563EB">
      <polygon points="0 0, 9 3, 0 6"/>
    </marker>
    <marker id="htArrO" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto" fill="#8B0029">
      <polygon points="0 0, 9 3, 0 6"/>
    </marker>
  </defs>

  <!-- ===== Conduction ===== -->
  <g transform="translate(30, 30)">
    <text x="110" y="0" text-anchor="middle" font-size="17" font-weight="bold" fill="#8B0029">전도 (Conduction)</text>

    <!-- Metal bar -->
    <rect x="30" y="40" width="160" height="50" rx="4" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>

    <!-- Hot side (red) -->
    <rect x="10" y="30" width="25" height="70" rx="3" fill="#8B0029" opacity="0.2" stroke="#8B0029" stroke-width="2"/>
    <text x="22" y="115" text-anchor="middle" font-size="13" fill="#8B0029" font-weight="600">T<tspan font-size="10" baseline-shift="sub">H</tspan></text>

    <!-- Cold side (blue) -->
    <rect x="185" y="30" width="25" height="70" rx="3" fill="#2563EB" opacity="0.2" stroke="#2563EB" stroke-width="2"/>
    <text x="198" y="115" text-anchor="middle" font-size="13" fill="#2563EB" font-weight="600">T<tspan font-size="10" baseline-shift="sub">C</tspan></text>

    <!-- Heat flow arrows -->
    <line x1="55" y1="65" x2="165" y2="65" stroke="#8B0029" stroke-width="2.5" marker-end="url(#htArr)"/>
    <text x="110" y="58" text-anchor="middle" font-size="13" fill="#8B0029" font-style="italic">Q</text>

    <!-- Molecular vibration dots -->
    <circle cx="60" cy="72" r="3" fill="#8B0029" opacity="0.5"/>
    <circle cx="80" cy="68" r="2.5" fill="#8B0029" opacity="0.4"/>
    <circle cx="100" cy="72" r="2" fill="#8B0029" opacity="0.3"/>
    <circle cx="120" cy="68" r="1.5" fill="#2563EB" opacity="0.3"/>
    <circle cx="140" cy="72" r="1.5" fill="#2563EB" opacity="0.4"/>

    <!-- Dimension L -->
    <line x1="35" y1="98" x2="185" y2="98" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="110" y="96" text-anchor="middle" font-size="12" fill="#6B7280" font-style="italic">L</text>

    <!-- Formula -->
    <text x="110" y="150" text-anchor="middle" font-size="13" fill="#1a1a1a" font-weight="600">P<tspan font-size="11" baseline-shift="sub">cond</tspan> = kA(T<tspan font-size="10" baseline-shift="sub">H</tspan> - T<tspan font-size="10" baseline-shift="sub">C</tspan>)/L</text>
    <text x="110" y="170" text-anchor="middle" font-size="11" fill="#6B7280">k: 열전도율, A: 단면적</text>

    <!-- Description -->
    <text x="110" y="200" text-anchor="middle" font-size="12" fill="#6B7280">분자의 진동이 이웃에</text>
    <text x="110" y="216" text-anchor="middle" font-size="12" fill="#6B7280">에너지를 전달</text>
  </g>

  <!-- ===== Convection ===== -->
  <g transform="translate(285, 30)">
    <text x="110" y="0" text-anchor="middle" font-size="17" font-weight="bold" fill="#2563EB">대류 (Convection)</text>

    <!-- Container -->
    <rect x="40" y="40" width="140" height="120" rx="4" fill="rgba(37,99,235,0.05)" stroke="#6B7280" stroke-width="2"/>

    <!-- Heat source at bottom -->
    <rect x="40" y="155" width="140" height="12" rx="2" fill="#8B0029" opacity="0.3"/>
    <text x="110" y="185" text-anchor="middle" font-size="11" fill="#8B0029">열원</text>

    <!-- Convection current arrows (circular flow) -->
    <!-- Left upward -->
    <path d="M 70,140 L 70,70" fill="none" stroke="#8B0029" stroke-width="2" marker-end="url(#htArr)"/>
    <!-- Top across -->
    <path d="M 75,65 C 90,55 130,55 150,65" fill="none" stroke="#8B0029" stroke-width="2" marker-end="url(#htArrO)"/>
    <!-- Right downward -->
    <path d="M 150,70 L 150,140" fill="none" stroke="#2563EB" stroke-width="2" marker-end="url(#htArrB)"/>
    <!-- Bottom across -->
    <path d="M 145,145 C 130,152 90,152 75,145" fill="none" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

    <!-- Temperature labels -->
    <text x="58" y="110" font-size="11" fill="#8B0029" font-weight="600">뜨거움</text>
    <text x="142" y="110" font-size="11" fill="#2563EB" font-weight="600">차가움</text>

    <!-- Formula/description -->
    <text x="110" y="210" text-anchor="middle" font-size="12" fill="#6B7280">유체의 흐름에 의한</text>
    <text x="110" y="226" text-anchor="middle" font-size="12" fill="#6B7280">열에너지 수송</text>
  </g>

  <!-- ===== Radiation ===== -->
  <g transform="translate(540, 30)">
    <text x="110" y="0" text-anchor="middle" font-size="17" font-weight="bold" fill="#8B0029">복사 (Radiation)</text>

    <!-- Hot object (sun-like circle) -->
    <circle cx="60" cy="100" r="35" fill="#8B0029" opacity="0.15" stroke="#8B0029" stroke-width="2"/>
    <text x="60" y="105" text-anchor="middle" font-size="14" fill="#8B0029" font-weight="600" font-style="italic">T</text>

    <!-- Wavy arrows (radiation) -->
    <path d="M 100,80 Q 112,75 120,80 Q 128,85 140,80 Q 152,75 160,80" fill="none" stroke="#8B0029" stroke-width="2" marker-end="url(#htArrO)"/>
    <path d="M 100,100 Q 112,95 120,100 Q 128,105 140,100 Q 152,95 160,100" fill="none" stroke="#8B0029" stroke-width="2" marker-end="url(#htArrO)"/>
    <path d="M 100,120 Q 112,115 120,120 Q 128,125 140,120 Q 152,115 160,120" fill="none" stroke="#8B0029" stroke-width="2" marker-end="url(#htArrO)"/>

    <!-- Target/environment -->
    <rect x="170" y="70" width="50" height="60" rx="4" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
    <text x="195" y="105" text-anchor="middle" font-size="13" fill="#6B7280">T<tspan font-size="10" baseline-shift="sub">env</tspan></text>

    <!-- Electromagnetic wave label -->
    <text x="130" y="60" text-anchor="middle" font-size="11" fill="#8B0029" font-style="italic">전자기파</text>

    <!-- Formula -->
    <text x="110" y="175" text-anchor="middle" font-size="13" fill="#1a1a1a" font-weight="600">P<tspan font-size="11" baseline-shift="sub">rad</tspan> = σεA T<tspan baseline-shift="super" font-size="10">4</tspan></text>
    <text x="110" y="195" text-anchor="middle" font-size="11" fill="#6B7280">σ: 슈테판-볼츠만 상수</text>
    <text x="110" y="211" text-anchor="middle" font-size="11" fill="#6B7280">ε: 방사율 (0~1)</text>

    <!-- Description -->
    <text x="110" y="240" text-anchor="middle" font-size="12" fill="#6B7280">매질 없이 전자기파로</text>
    <text x="110" y="256" text-anchor="middle" font-size="12" fill="#6B7280">에너지 전달</text>
  </g>

  <!-- Bottom comparison -->
  <line x1="30" y1="310" x2="770" y2="310" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="400" y="340" text-anchor="middle" font-size="14" fill="#8B0029" font-weight="bold">비교: 전도와 대류는 매질이 필요, 복사는 진공에서도 가능 (태양 → 지구)</text>
  <text x="400" y="365" text-anchor="middle" font-size="13" fill="#6B7280">열전달률: P = dQ/dt (단위: W = J/s)</text>
</svg>
