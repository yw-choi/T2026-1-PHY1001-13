<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 440" font-family="sans-serif">
  <defs>
    <marker id="ax-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1a1a"/>
    </marker>
  </defs>

  <text x="375" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">물의 가열 곡선 (Heating Curve of Water)</text>

  <!-- Axes -->
  <line x1="70" y1="360" x2="70" y2="40" stroke="#1a1a1a" stroke-width="2" marker-end="url(#ax-arr)"/>
  <line x1="70" y1="360" x2="700" y2="360" stroke="#1a1a1a" stroke-width="2" marker-end="url(#ax-arr)"/>
  <text x="30" y="200" font-size="14" fill="#1a1a1a" font-weight="bold" transform="rotate(-90,30,200)">온도 (°C)</text>
  <text x="700" y="390" text-anchor="end" font-size="14" fill="#1a1a1a" font-weight="bold">공급 열량 Q</text>

  <!-- Temperature labels on Y axis -->
  <text x="60" y="310" text-anchor="end" font-size="12" fill="#6B7280">-10</text>
  <line x1="65" y1="307" x2="75" y2="307" stroke="#6B7280" stroke-width="1"/>
  <text x="60" y="270" text-anchor="end" font-size="12" fill="#6B7280">0</text>
  <line x1="65" y1="267" x2="700" y2="267" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="60" y="120" text-anchor="end" font-size="12" fill="#6B7280">100</text>
  <line x1="65" y1="117" x2="700" y2="117" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Phase 1: Ice heating (-10 to 0) -->
  <line x1="90" y1="307" x2="150" y2="267" stroke="#2563EB" stroke-width="2.5"/>
  <text x="120" y="300" text-anchor="middle" font-size="11" fill="#2563EB" font-weight="bold">얼음 가열</text>

  <!-- Phase 2: Melting (0°C flat) -->
  <line x1="150" y1="267" x2="310" y2="267" stroke="#8B0029" stroke-width="2.5"/>
  <text x="230" y="258" text-anchor="middle" font-size="11" fill="#8B0029" font-weight="bold">융해 (0°C)</text>
  <text x="230" y="340" text-anchor="middle" font-size="12" fill="#8B0029" font-style="italic">Q = L_F m</text>
  <!-- Arrow pointing to flat region -->
  <line x1="230" y1="330" x2="230" y2="275" stroke="#8B0029" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Phase 3: Water heating (0 to 100) -->
  <line x1="310" y1="267" x2="430" y2="117" stroke="#2563EB" stroke-width="2.5"/>
  <text x="370" y="180" text-anchor="middle" font-size="11" fill="#2563EB" font-weight="bold">물 가열</text>
  <text x="380" y="200" text-anchor="middle" font-size="11" fill="#2563EB" font-style="italic">Q = cmΔT</text>

  <!-- Phase 4: Vaporization (100°C flat) -->
  <line x1="430" y1="117" x2="610" y2="117" stroke="#8B0029" stroke-width="2.5"/>
  <text x="520" y="108" text-anchor="middle" font-size="11" fill="#8B0029" font-weight="bold">기화 (100°C)</text>
  <text x="520" y="150" text-anchor="middle" font-size="12" fill="#8B0029" font-style="italic">Q = L_V m</text>

  <!-- Phase 5: Steam heating -->
  <line x1="610" y1="117" x2="670" y2="80" stroke="#2563EB" stroke-width="2.5"/>
  <text x="650" y="72" text-anchor="middle" font-size="11" fill="#2563EB" font-weight="bold">수증기 가열</text>

  <!-- Phase region labels at bottom -->
  <rect x="90" y="370" width="55" height="22" rx="4" fill="rgba(37,99,235,0.08)" stroke="#2563EB" stroke-width="1"/>
  <text x="117" y="385" text-anchor="middle" font-size="10" fill="#2563EB" font-weight="bold">고체</text>

  <rect x="165" y="370" width="130" height="22" rx="4" fill="rgba(139,0,41,0.06)" stroke="#8B0029" stroke-width="1"/>
  <text x="230" y="385" text-anchor="middle" font-size="10" fill="#8B0029" font-weight="bold">고체+액체</text>

  <rect x="315" y="370" width="100" height="22" rx="4" fill="rgba(37,99,235,0.08)" stroke="#2563EB" stroke-width="1"/>
  <text x="365" y="385" text-anchor="middle" font-size="10" fill="#2563EB" font-weight="bold">액체</text>

  <rect x="435" y="370" width="165" height="22" rx="4" fill="rgba(139,0,41,0.06)" stroke="#8B0029" stroke-width="1"/>
  <text x="517" y="385" text-anchor="middle" font-size="10" fill="#8B0029" font-weight="bold">액체+기체</text>

  <rect x="615" y="370" width="55" height="22" rx="4" fill="rgba(37,99,235,0.08)" stroke="#2563EB" stroke-width="1"/>
  <text x="642" y="385" text-anchor="middle" font-size="10" fill="#2563EB" font-weight="bold">기체</text>

  <!-- Key values -->
  <text x="375" y="410" text-anchor="middle" font-size="12" fill="#6B7280" font-style="italic">L_F = 333 kJ/kg,  L_V = 2256 kJ/kg  (물)</text>
</svg>
