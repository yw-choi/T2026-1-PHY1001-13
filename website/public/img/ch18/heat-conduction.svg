<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 370" font-family="sans-serif">
  <defs>
    <marker id="arr-heat" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
    <linearGradient id="tempGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B0029" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">열전도 (Thermal Conduction)</text>

  <!-- Hot reservoir -->
  <rect x="60" y="80" width="120" height="180" rx="8" fill="#8B0029" opacity="0.15" stroke="#8B0029" stroke-width="2"/>
  <text x="120" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#8B0029">뜨거운 쪽</text>
  <text x="120" y="155" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029" font-style="italic">T_H</text>

  <!-- Conducting slab -->
  <rect x="180" y="80" width="200" height="180" rx="0" fill="url(#tempGrad)" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Hatching for slab -->
  <text x="280" y="130" text-anchor="middle" font-size="13" fill="#1a1a1a">전도체</text>
  <text x="280" y="155" text-anchor="middle" font-size="13" fill="#1a1a1a" font-style="italic">열전도도 k</text>

  <!-- Cold reservoir -->
  <rect x="380" y="80" width="120" height="180" rx="8" fill="#2563EB" opacity="0.15" stroke="#2563EB" stroke-width="2"/>
  <text x="440" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#2563EB">차가운 쪽</text>
  <text x="440" y="155" text-anchor="middle" font-size="16" font-weight="bold" fill="#2563EB" font-style="italic">T_C</text>

  <!-- Heat flow arrow -->
  <line x1="145" y1="210" x2="415" y2="210" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arr-heat)"/>
  <text x="280" y="205" text-anchor="middle" font-size="14" font-weight="bold" fill="#8B0029" font-style="italic">Q</text>

  <!-- L dimension -->
  <line x1="180" y1="285" x2="380" y2="285" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="180" y1="275" x2="180" y2="295" stroke="#6B7280" stroke-width="1"/>
  <line x1="380" y1="275" x2="380" y2="295" stroke="#6B7280" stroke-width="1"/>
  <text x="280" y="300" text-anchor="middle" font-size="13" fill="#6B7280" font-style="italic">L</text>

  <!-- A dimension (vertical) -->
  <line x1="395" y1="80" x2="395" y2="260" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="405" y="170" font-size="12" fill="#6B7280" font-style="italic">A</text>

  <!-- Formula -->
  <rect x="510" y="100" width="170" height="80" rx="8" fill="rgba(139,0,41,0.06)" stroke="#8B0029" stroke-width="2"/>
  <text x="595" y="130" text-anchor="middle" font-size="14" fill="#1a1a1a" font-style="italic">P_cond = Q/t</text>
  <text x="595" y="160" text-anchor="middle" font-size="15" fill="#8B0029" font-weight="bold" font-style="italic">= kA(T_H - T_C)/L</text>

  <!-- Note -->
  <text x="350" y="340" text-anchor="middle" font-size="12" fill="#6B7280">k가 클수록 열전도가 잘 된다 (좋은 열전도체)</text>
</svg>
