<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 430" font-family="sans-serif">
  <defs>
    <marker id="teArr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="teArrG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6B7280">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="teArrB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="375" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#8B0029">열팽창</text>

  <!-- ===== Linear Expansion (left) ===== -->
  <text x="190" y="65" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">선팽창 (Linear)</text>

  <!-- Original rod -->
  <rect x="50" y="100" width="220" height="40" rx="4" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="160" y="126" text-anchor="middle" font-size="14" fill="#6B7280" font-style="italic">T</text>

  <!-- Expanded rod (dashed outline) -->
  <rect x="50" y="180" width="260" height="40" rx="4" fill="rgba(139,0,41,0.08)" stroke="#8B0029" stroke-width="2" stroke-dasharray="6 3"/>
  <rect x="50" y="180" width="220" height="40" rx="4" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="160" y="206" text-anchor="middle" font-size="14" fill="#8B0029" font-style="italic">T + ΔT</text>

  <!-- L dimension line -->
  <line x1="50" y1="155" x2="270" y2="155" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="50" y1="150" x2="50" y2="160" stroke="#6B7280" stroke-width="1"/>
  <line x1="270" y1="150" x2="270" y2="160" stroke="#6B7280" stroke-width="1"/>
  <text x="160" y="150" text-anchor="middle" font-size="14" fill="#6B7280" font-style="italic">L</text>

  <!-- ΔL dimension -->
  <line x1="270" y1="235" x2="310" y2="235" stroke="#8B0029" stroke-width="2.5" marker-end="url(#teArr)"/>
  <line x1="270" y1="230" x2="270" y2="240" stroke="#8B0029" stroke-width="1"/>
  <text x="290" y="255" text-anchor="middle" font-size="14" fill="#8B0029" font-style="italic" font-weight="bold">ΔL</text>

  <!-- Formula -->
  <text x="190" y="300" text-anchor="middle" font-size="16" fill="#1a1a1a" font-weight="bold">ΔL = αLΔT</text>
  <text x="190" y="322" text-anchor="middle" font-size="12" fill="#6B7280">α: 선팽창 계수 (1/°C)</text>

  <!-- ===== Volume Expansion (right) ===== -->
  <text x="560" y="65" text-anchor="middle" font-size="16" font-weight="bold" fill="#2563EB">부피 팽창 (Volume)</text>

  <!-- Original cube -->
  <g transform="translate(490, 90)">
    <!-- Front face -->
    <rect x="0" y="40" width="100" height="100" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
    <!-- Top face (parallelogram) -->
    <polygon points="0,40 40,10 140,10 100,40" fill="rgba(107,114,128,0.12)" stroke="#6B7280" stroke-width="2"/>
    <!-- Right face (parallelogram) -->
    <polygon points="100,40 140,10 140,110 100,140" fill="rgba(107,114,128,0.18)" stroke="#6B7280" stroke-width="2"/>
    <text x="50" y="98" text-anchor="middle" font-size="14" fill="#6B7280" font-style="italic">V, T</text>
  </g>

  <!-- Expanded cube (dashed) -->
  <g transform="translate(480, 190)">
    <!-- Front face -->
    <rect x="0" y="40" width="120" height="120" rx="2" fill="rgba(37,99,235,0.06)" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 3"/>
    <!-- Top face -->
    <polygon points="0,40 48,4 168,4 120,40" fill="rgba(37,99,235,0.04)" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 3"/>
    <!-- Right face -->
    <polygon points="120,40 168,4 168,124 120,160" fill="rgba(37,99,235,0.04)" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 3"/>
    <text x="60" y="110" text-anchor="middle" font-size="14" fill="#2563EB" font-style="italic">V + ΔV</text>
    <text x="60" y="128" text-anchor="middle" font-size="13" fill="#2563EB" font-style="italic">T + ΔT</text>
  </g>

  <!-- Formula -->
  <text x="560" y="380" text-anchor="middle" font-size="16" fill="#1a1a1a" font-weight="bold">ΔV = βVΔT</text>
  <text x="560" y="402" text-anchor="middle" font-size="12" fill="#6B7280">β = 3α: 부피 팽창 계수</text>
</svg>
