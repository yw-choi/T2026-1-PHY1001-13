<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 490" font-family="sans-serif">
  <defs>
    <linearGradient id="tempGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#F3F4F6"/>
      <stop offset="100%" stop-color="#8B0029"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#8B0029">온도 척도 비교</text>

  <!-- Three thermometer columns -->
  <!-- Kelvin -->
  <g transform="translate(120, 60)">
    <text x="0" y="0" text-anchor="middle" font-size="18" font-weight="bold" fill="#8B0029">Kelvin (K)</text>
    <rect x="-25" y="20" width="50" height="360" rx="8" fill="url(#tempGrad)" stroke="#6B7280" stroke-width="2"/>
    <!-- Scale marks -->
    <!-- Absolute zero: 0 K -->
    <line x1="30" y1="380" x2="50" y2="380" stroke="#6B7280" stroke-width="1"/>
    <text x="55" y="385" font-size="14" fill="#1a1a1a" font-weight="600">0 K</text>
    <text x="55" y="400" font-size="11" fill="#6B7280">절대 영도</text>
    <!-- Water freezes: 273.15 K -->
    <line x1="30" y1="142" x2="50" y2="142" stroke="#2563EB" stroke-width="2"/>
    <text x="55" y="147" font-size="14" fill="#2563EB" font-weight="600">273.15 K</text>
    <text x="55" y="162" font-size="11" fill="#6B7280">물의 어는점</text>
    <!-- Water boils: 373.15 K -->
    <line x1="30" y1="45" x2="50" y2="45" stroke="#8B0029" stroke-width="2"/>
    <text x="55" y="50" font-size="14" fill="#8B0029" font-weight="600">373.15 K</text>
    <text x="55" y="65" font-size="11" fill="#6B7280">물의 끓는점</text>
    <!-- Triple point: 273.16 K -->
    <circle cx="0" cy="141" r="4" fill="#2563EB"/>
  </g>

  <!-- Celsius -->
  <g transform="translate(340, 60)">
    <text x="0" y="0" text-anchor="middle" font-size="18" font-weight="bold" fill="#8B0029">Celsius (°C)</text>
    <rect x="-25" y="20" width="50" height="360" rx="8" fill="url(#tempGrad)" stroke="#6B7280" stroke-width="2"/>
    <!-- Absolute zero: -273.15 °C -->
    <line x1="30" y1="380" x2="50" y2="380" stroke="#6B7280" stroke-width="1"/>
    <text x="55" y="385" font-size="14" fill="#1a1a1a" font-weight="600">-273.15°C</text>
    <!-- Water freezes: 0 °C -->
    <line x1="30" y1="142" x2="50" y2="142" stroke="#2563EB" stroke-width="2"/>
    <text x="55" y="147" font-size="14" fill="#2563EB" font-weight="600">0°C</text>
    <!-- Water boils: 100 °C -->
    <line x1="30" y1="45" x2="50" y2="45" stroke="#8B0029" stroke-width="2"/>
    <text x="55" y="50" font-size="14" fill="#8B0029" font-weight="600">100°C</text>
    <!-- Body temp: 37 °C -->
    <line x1="-30" y1="106" x2="-50" y2="106" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="-55" y="111" text-anchor="end" font-size="12" fill="#6B7280">37°C (체온)</text>
  </g>

  <!-- Fahrenheit -->
  <g transform="translate(560, 60)">
    <text x="0" y="0" text-anchor="middle" font-size="18" font-weight="bold" fill="#8B0029">Fahrenheit (°F)</text>
    <rect x="-25" y="20" width="50" height="360" rx="8" fill="url(#tempGrad)" stroke="#6B7280" stroke-width="2"/>
    <!-- Absolute zero: -459.67 °F -->
    <line x1="30" y1="380" x2="50" y2="380" stroke="#6B7280" stroke-width="1"/>
    <text x="55" y="385" font-size="14" fill="#1a1a1a" font-weight="600">-459.67°F</text>
    <!-- Water freezes: 32 °F -->
    <line x1="30" y1="142" x2="50" y2="142" stroke="#2563EB" stroke-width="2"/>
    <text x="55" y="147" font-size="14" fill="#2563EB" font-weight="600">32°F</text>
    <!-- Water boils: 212 °F -->
    <line x1="30" y1="45" x2="50" y2="45" stroke="#8B0029" stroke-width="2"/>
    <text x="55" y="50" font-size="14" fill="#8B0029" font-weight="600">212°F</text>
    <!-- Body temp: 98.6 °F -->
    <line x1="-30" y1="106" x2="-50" y2="106" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="-55" y="111" text-anchor="end" font-size="12" fill="#6B7280">98.6°F</text>
  </g>

  <!-- Connecting dashed lines between scales -->
  <!-- Freeze -->
  <line x1="155" y1="202" x2="305" y2="202" stroke="#2563EB" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="375" y1="202" x2="525" y2="202" stroke="#2563EB" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Boil -->
  <line x1="155" y1="105" x2="305" y2="105" stroke="#8B0029" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="375" y1="105" x2="525" y2="105" stroke="#8B0029" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Absolute zero -->
  <line x1="155" y1="440" x2="305" y2="440" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="375" y1="440" x2="525" y2="440" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Conversion formulas at bottom -->
  <text x="350" y="460" text-anchor="middle" font-size="14" fill="#6B7280" font-style="italic">
    T(K) = T(°C) + 273.15,     T(°F) = (9/5)T(°C) + 32
  </text>
</svg>
