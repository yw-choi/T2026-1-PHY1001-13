<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -6 750 436" font-family="sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrowRd" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
  </defs>

  <!-- Ellipse: center at (375, 200), a=250, b=160 -->
  <!-- Focus at c = sqrt(250^2 - 160^2) = sqrt(62500-25600) = sqrt(36900) ~ 192 -->
  <!-- F1 (Sun) at (375-192, 200) = (183, 200) -->
  <!-- F2 at (375+192, 200) = (567, 200) -->

  <!-- Elliptical orbit -->
  <ellipse cx="375" cy="200" rx="250" ry="160" fill="none" stroke="#6B7280" stroke-width="2"/>

  <!-- Major axis (dashed) -->
  <line x1="125" y1="200" x2="625" y2="200" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Minor axis (dashed) -->
  <line x1="375" y1="40" x2="375" y2="360" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Sun at focus F -->
  <circle cx="183" cy="200" r="14" fill="#8B0029"/>
  <text x="183" y="235" text-anchor="middle" font-size="14" fill="#6B7280" font-weight="bold">태양 (M)</text>
  <text x="183" y="252" text-anchor="middle" font-size="14" fill="#6B7280">초점 F</text>

  <!-- Other focus F' -->
  <circle cx="567" cy="200" r="3" fill="#6B7280"/>
  <text x="567" y="220" text-anchor="middle" font-size="14" fill="#6B7280">F'</text>

  <!-- Planet at perihelion -->
  <circle cx="125" cy="200" r="8" fill="#2563EB"/>
  <text x="125" y="185" text-anchor="middle" font-size="14" fill="#2563EB" font-weight="bold">근일점</text>

  <!-- Planet at aphelion -->
  <circle cx="625" cy="200" r="8" fill="#2563EB"/>
  <text x="625" y="185" text-anchor="middle" font-size="14" fill="#2563EB" font-weight="bold">원일점</text>

  <!-- Planet on orbit (top) -->
  <circle cx="375" cy="40" r="7" fill="#8B0029"/>
  <text x="375" y="28" text-anchor="middle" font-size="14" font-style="italic" fill="#6B7280">m</text>

  <!-- Semimajor axis label (a) -->
  <line x1="375" y1="375" x2="625" y2="375" stroke="#8B0029" stroke-width="2"/>
  <line x1="375" y1="370" x2="375" y2="380" stroke="#8B0029" stroke-width="2"/>
  <line x1="625" y1="370" x2="625" y2="380" stroke="#8B0029" stroke-width="2"/>
  <text x="500" y="395" text-anchor="middle" font-size="14" font-style="italic" fill="#8B0029" font-weight="bold">a</text>

  <!-- Perihelion distance Rp -->
  <line x1="125" y1="160" x2="183" y2="160" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="154" y="150" text-anchor="middle" font-size="14" fill="#6B7280">R&#x209A;</text>

  <!-- Aphelion distance Ra -->
  <line x1="183" y1="160" x2="625" y2="160" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="404" y="150" text-anchor="middle" font-size="14" fill="#6B7280">R&#x2090;</text>

  <!-- Center label -->
  <circle cx="375" cy="200" r="2" fill="#6B7280"/>

  <!-- Semiminor axis label -->
  <text x="385" y="125" font-size="14" font-style="italic" fill="#6B7280">b</text>

  <!-- Direction arrow on orbit -->
  <path d="M 290 58 L 310 50" stroke="#8B0029" stroke-width="2" marker-end="url(#arrowRd)" fill="none"/>

  <!-- Legend -->
  <text x="60" y="410" font-size="14" fill="#8B0029">R&#x209A; = a(1-e), R&#x2090; = a(1+e)</text>
</svg>
