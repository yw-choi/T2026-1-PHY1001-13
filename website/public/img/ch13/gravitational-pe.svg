<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" font-family="sans-serif">
  <defs>
    <marker id="peArrG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6B7280">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="80" y1="100" x2="80" y2="400" stroke="#6B7280" stroke-width="2"/>
  <line x1="80" y1="100" x2="680" y2="100" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="80" y1="100" x2="80" y2="50" stroke="#6B7280" stroke-width="2" marker-end="url(#peArrG)"/>
  <line x1="80" y1="400" x2="680" y2="400" stroke="#6B7280" stroke-width="2" marker-end="url(#peArrG)"/>

  <!-- Axis labels -->
  <text x="50" y="55" font-size="14" fill="#6B7280" font-style="italic">U(r)</text>
  <text x="670" y="425" font-size="14" fill="#6B7280" font-style="italic">r</text>
  <text x="65" y="95" font-size="14" fill="#6B7280">0</text>

  <!-- U(r) = -GMm/r curve -->
  <path d="M 120,390 Q 140,340 170,280 Q 210,200 270,155 Q 340,125 430,112 Q 530,105 650,102"
        fill="none" stroke="#8B0029" stroke-width="2.5"/>
  <text x="250" y="240" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">U(r) = -GMm/r</text>

  <!-- E = 0 line (horizontal at U=0) -->
  <text x="600" y="90" font-size="14" fill="#6B7280" font-style="italic">U = 0 (r = infinity)</text>

  <!-- E_total line for bound orbit -->
  <line x1="80" y1="160" x2="650" y2="160" stroke="#2563EB" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="590" y="153" font-size="14" fill="#2563EB" font-weight="bold" font-style="italic">E &lt; 0 (속박)</text>

  <!-- E_total = 0 for escape -->
  <line x1="80" y1="100" x2="650" y2="100" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="590" y="78" font-size="14" fill="#6B7280" font-weight="bold" font-style="italic">E = 0 (탈출)</text>

  <!-- K arrow at some point -->
  <line x1="300" y1="145" x2="300" y2="100" stroke="#2563EB" stroke-width="2"/>
  <line x1="295" y1="145" x2="305" y2="145" stroke="#2563EB" stroke-width="2"/>
  <line x1="295" y1="100" x2="305" y2="100" stroke="#2563EB" stroke-width="2"/>
  <text x="315" y="128" font-size="14" fill="#2563EB" font-weight="bold" font-style="italic">K</text>

  <!-- U arrow at same point -->
  <line x1="300" y1="160" x2="300" y2="400" stroke="#8B0029" stroke-width="1" stroke-dasharray="4 3"/>
  <circle cx="300" cy="145" r="4" fill="#2563EB"/>

  <!-- Planet surface marker -->
  <line x1="120" y1="395" x2="120" y2="405" stroke="#6B7280" stroke-width="2"/>
  <text x="120" y="425" text-anchor="middle" font-size="14" fill="#6B7280" font-style="italic">R</text>

  <!-- Vertical label for negative region -->
  <text x="40" y="260" text-anchor="middle" font-size="14" fill="#8B0029" transform="rotate(-90, 40, 260)">U &lt; 0</text>
</svg>
