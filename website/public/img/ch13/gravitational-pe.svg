<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" font-family="sans-serif">
  <defs>
    <marker id="peArrG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
    <marker id="peArrR" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#8B0029"/>
    </marker>
    <marker id="peArrB" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#2563EB"/>
    </marker>
    <pattern id="forbidPat" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#6B7280" stroke-width="0.7" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Title -->
  <text x="380" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#8B0029">중력 퍼텐셜에너지 U(r) = -GMm/r</text>

  <!--
    Plot rectangle: x in [120, 700], y in [60, 410].
    Origin (r=0) at x=120; r increases rightward.
    U=0 at y=60; U becomes more negative downward.
    Use 1 R = 75 px on x-axis: r=R at x=195, r=2R at x=270, ..., r=8R at x=720 (clipped at 700).
    U(R) maps to y=410 (deepest).  U(r)/U(R) = R/r.
  -->

  <!-- Forbidden region for the bound-orbit example (E = -0.375 |U_R|): r > r_max ≈ 2.67R, x_max ≈ 320.
       Shade x > 320 down to E line as classically forbidden. -->
  <rect x="320" y="60" width="380" height="170" fill="url(#forbidPat)"/>

  <!-- y-axis (U) -->
  <line x1="120" y1="430" x2="120" y2="50" stroke="#6B7280" stroke-width="2" marker-end="url(#peArrG)"/>
  <text x="100" y="55" font-size="15" fill="#1a1a1a" font-style="italic">U</text>

  <!-- x-axis (r) at U=0 -->
  <line x1="100" y1="60" x2="720" y2="60" stroke="#6B7280" stroke-width="2" marker-end="url(#peArrG)"/>
  <text x="725" y="64" font-size="15" fill="#1a1a1a" font-style="italic">r</text>
  <text x="115" y="50" text-anchor="end" font-size="12" fill="#6B7280">0</text>

  <!-- r-axis tick marks at R, 2R, 4R, 6R -->
  <g stroke="#6B7280" stroke-width="1">
    <line x1="195" y1="58" x2="195" y2="64"/>
    <line x1="270" y1="58" x2="270" y2="64"/>
    <line x1="420" y1="58" x2="420" y2="64"/>
    <line x1="570" y1="58" x2="570" y2="64"/>
  </g>
  <text x="195" y="48" text-anchor="middle" font-size="12" fill="#6B7280" font-style="italic">R</text>
  <text x="270" y="48" text-anchor="middle" font-size="12" fill="#6B7280">2R</text>
  <text x="420" y="48" text-anchor="middle" font-size="12" fill="#6B7280">4R</text>
  <text x="570" y="48" text-anchor="middle" font-size="12" fill="#6B7280">6R</text>

  <!-- Earth (planet) at r=R, drawn just above x-axis as visual marker -->
  <circle cx="195" cy="430" r="14" fill="#2563EB" stroke="#1a1a1a" stroke-width="1"/>
  <text x="195" y="455" text-anchor="middle" font-size="11" fill="#6B7280">행성 (r = R)</text>

  <!-- U(r) curve: hyperbolic -1/r shape.
       Computed reference points (x, y):
       r=R   → (195, 410)   U/U_R = 1
       r=1.25R→ (213.75, 340) U/U_R = 0.8
       r=1.5R→ (232.5, 293.3) ≈ (233, 293) U/U_R = 0.667
       r=2R  → (270, 235)    U/U_R = 0.5
       r=2.5R→ (307.5, 200)  ≈ (308, 200) U/U_R = 0.4
       r=3R  → (345, 176.7)  ≈ (345, 177) U/U_R = 0.333
       r=4R  → (420, 147.5)  ≈ (420, 148) U/U_R = 0.25
       r=5R  → (495, 130)    U/U_R = 0.2
       r=6R  → (570, 118.3)  ≈ (570, 118) U/U_R = 0.167
       r=8R  → (720, 103.75) ≈ (700, 104) (clipped)
  -->
  <path d="M 195,410
           C 200,360 220,310 233,293
           S 258,250 270,235
           S 295,210 308,200
           S 332,182 345,177
           S 395,155 420,148
           S 470,134 495,130
           S 545,121 570,118
           S 660,108 700,104"
        fill="none" stroke="#8B0029" stroke-width="2.5"/>
  <text x="495" y="170" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">U(r) = -GMm/r</text>

  <!-- Surface point: U(R) = -GMm/R -->
  <circle cx="195" cy="410" r="5" fill="#8B0029"/>
  <line x1="120" y1="410" x2="195" y2="410" stroke="#8B0029" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="115" y="414" text-anchor="end" font-size="13" fill="#8B0029" font-weight="bold">-GMm/R</text>

  <!-- E = 0 line: escape boundary -->
  <line x1="120" y1="60" x2="700" y2="60" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="700" y="76" text-anchor="end" font-size="13" fill="#1a1a1a">E = 0  (탈출 경계, r→∞에서 U=0)</text>

  <!-- E = -0.375 |U_R| line: bound orbit (turning point at r_max ≈ 2.67R, x ≈ 320, y=200) -->
  <line x1="120" y1="200" x2="700" y2="200" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="120" y="194" font-size="13" fill="#2563EB" font-weight="bold">E &lt; 0  (속박 궤도)</text>

  <!-- Turning point at intersection of E line with U(r) curve -->
  <circle cx="320" cy="200" r="5" fill="#2563EB"/>
  <line x1="320" y1="200" x2="320" y2="60" stroke="#2563EB" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="328" y="78" font-size="12" fill="#2563EB" font-style="italic">r<tspan font-size="9" baseline-shift="sub">max</tspan> (회귀점)</text>

  <!-- Allowed-region label inside left side -->
  <text x="240" y="115" font-size="12" fill="#6B7280" font-style="italic">허용 영역 (E ≥ U)</text>
  <text x="500" y="170" font-size="12" fill="#6B7280" font-style="italic">금지 영역 (U &gt; E)</text>

  <!-- ============================================================
       K, U decomposition at r = 2R (x=270, on the curve y=235).
       At E_bound y=200: K bar from y=235 up to y=200 (height 35).
       |U| bar from y=60 (U=0) down to y=235 (height 175).
       ============================================================ -->

  <!-- Marker dot on curve at r=2R -->
  <circle cx="270" cy="235" r="5" fill="#1a1a1a"/>

  <!-- K bar (curve up to E line), at x=275 -->
  <line x1="275" y1="235" x2="275" y2="200" stroke="#2563EB" stroke-width="4"/>
  <line x1="270" y1="235" x2="280" y2="235" stroke="#2563EB" stroke-width="2"/>
  <line x1="270" y1="200" x2="280" y2="200" stroke="#2563EB" stroke-width="2"/>

  <!-- |U| bar (U=0 baseline down to curve), at x=265 -->
  <line x1="265" y1="60" x2="265" y2="235" stroke="#8B0029" stroke-width="4"/>
  <line x1="260" y1="60" x2="270" y2="60" stroke="#8B0029" stroke-width="2"/>
  <line x1="260" y1="235" x2="270" y2="235" stroke="#8B0029" stroke-width="2"/>

  <!-- Decomposition labels with leader lines pointing out -->
  <text x="295" y="221" font-size="13" fill="#2563EB" font-weight="bold" font-style="italic">K = E - U</text>
  <line x1="293" y1="218" x2="280" y2="218" stroke="#2563EB" stroke-width="1"/>

  <text x="200" y="155" font-size="13" fill="#8B0029" font-weight="bold" font-style="italic">|U|</text>
  <line x1="220" y1="151" x2="263" y2="151" stroke="#8B0029" stroke-width="1"/>

  <!-- Vertical guide at r=2R sample point -->
  <line x1="270" y1="235" x2="270" y2="60" stroke="#6B7280" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.6"/>
  <text x="270" y="265" text-anchor="middle" font-size="11" fill="#6B7280" font-style="italic">샘플 위치</text>

  <!-- Vertical "U &lt; 0" axis label -->
  <text x="80" y="240" text-anchor="middle" font-size="13" fill="#8B0029" transform="rotate(-90, 80, 240)">U &lt; 0  (중력 우물)</text>
</svg>
