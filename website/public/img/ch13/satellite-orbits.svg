<svg xmlns="http://www.w3.org/2000/svg" width="780" height="500" viewBox="0 0 780 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <title>Orbital energy and orbit types</title>
  <desc>Negative mechanical energy produces bound circular or elliptical orbits; zero or positive energy produces escape trajectories.</desc>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <rect width="780" height="500" fill="#ffffff"/>
  <text x="390" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#8B0029">
    위성 궤도와 역학적 에너지
  </text>

  <!-- Central body -->
  <circle cx="390" cy="225" r="32" fill="#F3F4F6" stroke="#8B0029" stroke-width="2"/>
  <text x="390" y="231" text-anchor="middle" font-size="15" font-weight="700" fill="#8B0029">M</text>

  <!-- Circular orbit -->
  <circle cx="390" cy="225" r="92" fill="none" stroke="#8B0029" stroke-width="2.2"/>
  <circle cx="482" cy="225" r="6" fill="#8B0029"/>
  <line x1="482" y1="225" x2="482" y2="170" stroke="#2563EB" stroke-width="2.6" marker-end="url(#arrowBlue)"/>
  <text x="496" y="178" font-size="14" fill="#2563EB" font-style="italic" font-weight="700">v</text>
  <text x="515" y="222" font-size="14" fill="#8B0029" font-weight="700">원궤도</text>
  <text x="515" y="242" font-size="13" fill="#6B7280">E = −GMm/(2r)</text>

  <!-- Elliptical orbit with Earth at the right focus: a = 180, c = 90, b ≈ 156 -->
  <ellipse cx="300" cy="225" rx="180" ry="156" fill="none" stroke="#2563EB" stroke-width="2.2" stroke-dasharray="7 5"/>
  <circle cx="120" cy="225" r="5" fill="#2563EB"/>
  <circle cx="480" cy="225" r="5" fill="#2563EB"/>
  <text x="112" y="205" text-anchor="end" font-size="13" fill="#2563EB" font-weight="700">원지점</text>
  <text x="492" y="265" font-size="13" fill="#2563EB" font-weight="700">근지점</text>
  <text x="130" y="104" font-size="14" fill="#2563EB" font-weight="700">타원 궤도</text>
  <text x="130" y="124" font-size="13" fill="#6B7280">E = −GMm/(2a)</text>

  <!-- Escape trajectories -->
  <path d="M390,115 C485,116 565,82 650,48" fill="none" stroke="#6B7280" stroke-width="2.2"/>
  <path d="M650,48 L710,24" fill="none" stroke="#6B7280" stroke-width="2.2" marker-end="url(#arrowGray)"/>
  <text x="596" y="91" font-size="14" fill="#6B7280" font-weight="700">탈출 궤도</text>
  <text x="596" y="111" font-size="13" fill="#6B7280">E ≥ 0</text>

  <!-- Energy sign cards -->
  <text x="390" y="394" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">
    총 역학적 에너지의 부호가 궤도 종류를 결정
  </text>
  <g font-size="13" text-anchor="middle">
    <rect x="110" y="418" width="160" height="44" rx="7" fill="#F3F4F6" stroke="#8B0029" stroke-width="1.6"/>
    <text x="190" y="437" fill="#8B0029" font-weight="700">E &lt; 0</text>
    <text x="190" y="456" fill="#6B7280">원·타원 (속박)</text>

    <rect x="310" y="418" width="160" height="44" rx="7" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.6"/>
    <text x="390" y="437" fill="#1a1a1a" font-weight="700">E = 0</text>
    <text x="390" y="456" fill="#6B7280">포물선 경계</text>

    <rect x="510" y="418" width="160" height="44" rx="7" fill="#F3F4F6" stroke="#2563EB" stroke-width="1.6"/>
    <text x="590" y="437" fill="#2563EB" font-weight="700">E &gt; 0</text>
    <text x="590" y="456" fill="#6B7280">쌍곡선 탈출</text>
  </g>
</svg>
