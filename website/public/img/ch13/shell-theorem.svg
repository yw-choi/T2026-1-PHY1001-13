<svg xmlns="http://www.w3.org/2000/svg" width="780" height="430" viewBox="0 0 780 430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <title>Shell theorem for a uniform spherical shell</title>
  <desc>Outside a uniform spherical shell the gravitational field is equivalent to a point mass at the center; inside the net field is zero.</desc>
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#8B0029"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <rect width="780" height="430" fill="#ffffff"/>
  <text x="390" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#8B0029">
    구각 정리: 균일한 구껍질의 중력
  </text>

  <!-- Panel A -->
  <text x="200" y="76" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">A. 껍질 바깥</text>
  <circle cx="200" cy="210" r="86" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <circle cx="200" cy="210" r="62" fill="#ffffff" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3"/>
  <circle cx="200" cy="210" r="4" fill="#6B7280"/>
  <text x="200" y="232" text-anchor="middle" font-size="14" fill="#6B7280">중심</text>
  <circle cx="350" cy="210" r="9" fill="#8B0029"/>
  <text x="350" y="193" text-anchor="middle" font-size="15" font-style="italic" fill="#1a1a1a">m</text>
  <line x1="338" y1="210" x2="272" y2="210" stroke="#8B0029" stroke-width="2.8" marker-end="url(#arrowRed)"/>
  <line x1="200" y1="318" x2="350" y2="318" stroke="#6B7280" stroke-width="1.2"/>
  <line x1="200" y1="306" x2="200" y2="330" stroke="#6B7280" stroke-width="1.2"/>
  <line x1="350" y1="306" x2="350" y2="330" stroke="#6B7280" stroke-width="1.2"/>
  <text x="275" y="342" text-anchor="middle" font-size="15" font-style="italic" fill="#6B7280">r &gt; R</text>
  <text x="200" y="382" text-anchor="middle" font-size="15" font-weight="700" fill="#8B0029">
    F = GMm/r²
  </text>
  <text x="200" y="404" text-anchor="middle" font-size="13" fill="#6B7280">
    전체 질량 M이 중심에 있는 것처럼 작용
  </text>

  <!-- Divider -->
  <line x1="390" y1="70" x2="390" y2="406" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Panel B -->
  <text x="585" y="76" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">B. 껍질 내부</text>
  <circle cx="585" cy="210" r="86" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <circle cx="585" cy="210" r="62" fill="#ffffff" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3"/>
  <circle cx="585" cy="210" r="4" fill="#6B7280"/>
  <circle cx="622" cy="178" r="9" fill="#8B0029"/>
  <text x="639" y="176" font-size="15" font-style="italic" fill="#1a1a1a">m</text>

  <!-- Balanced pulls -->
  <line x1="622" y1="178" x2="574" y2="178" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="622" y1="178" x2="656" y2="222" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="622" y1="178" x2="616" y2="124" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="622" y1="178" x2="584" y2="224" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowGray)"/>

  <rect x="520" y="305" width="130" height="45" rx="7" fill="#ffffff" stroke="#8B0029" stroke-width="1.6"/>
  <text x="585" y="333" text-anchor="middle" font-size="18" font-weight="700" fill="#8B0029">ΣF = 0</text>
  <text x="585" y="382" text-anchor="middle" font-size="15" font-weight="700" fill="#8B0029">
    껍질 내부 중력장 g = 0
  </text>
  <text x="585" y="404" text-anchor="middle" font-size="13" fill="#6B7280">
    각 조각의 힘은 존재하지만 벡터합이 0
  </text>
</svg>
