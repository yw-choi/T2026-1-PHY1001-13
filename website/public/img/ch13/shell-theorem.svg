<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400" font-family="sans-serif">
  <defs>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
  </defs>

  <!-- Left: particle outside shell -->
  <text x="190" y="35" text-anchor="middle" font-size="14" font-weight="bold" fill="#6B7280">정리 1: 바깥 입자</text>

  <!-- Shell -->
  <circle cx="160" cy="200" r="90" fill="none" stroke="#6B7280" stroke-width="2" stroke-dasharray="4 3"/>
  <circle cx="160" cy="200" r="88" fill="#F3F4F6" opacity="0.4"/>
  <circle cx="160" cy="200" r="70" fill="#fff"/>
  <circle cx="160" cy="200" r="3" fill="#6B7280"/>
  <text x="160" y="220" text-anchor="middle" font-size="14" fill="#6B7280">M</text>

  <!-- External particle -->
  <circle cx="310" cy="200" r="8" fill="#8B0029"/>
  <text x="310" y="188" text-anchor="middle" font-size="14" font-style="italic" fill="#6B7280">m</text>

  <!-- Force arrow -->
  <line x1="300" y1="200" x2="262" y2="200" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arrowR)"/>

  <!-- Distance label -->
  <line x1="160" y1="310" x2="310" y2="310" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="235" y="330" text-anchor="middle" font-size="14" font-style="italic" fill="#6B7280">r</text>

  <text x="190" y="365" text-anchor="middle" font-size="14" fill="#8B0029">F = GMm/r&#xB2; (점질량과 동일)</text>

  <!-- Right: particle inside shell -->
  <text x="565" y="35" text-anchor="middle" font-size="14" font-weight="bold" fill="#6B7280">정리 2: 내부 입자</text>

  <!-- Shell -->
  <circle cx="535" cy="200" r="90" fill="none" stroke="#6B7280" stroke-width="2" stroke-dasharray="4 3"/>
  <circle cx="535" cy="200" r="88" fill="#F3F4F6" opacity="0.4"/>
  <circle cx="535" cy="200" r="70" fill="#fff"/>
  <circle cx="535" cy="200" r="3" fill="#6B7280"/>

  <!-- Internal particle -->
  <circle cx="570" cy="180" r="8" fill="#8B0029"/>
  <text x="585" y="175" font-size="14" font-style="italic" fill="#6B7280">m</text>

  <!-- No force label -->
  <text x="535" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#8B0029">F = 0</text>

  <text x="565" y="365" text-anchor="middle" font-size="14" fill="#8B0029">내부 입자에 알짜 중력 없음</text>
</svg>
