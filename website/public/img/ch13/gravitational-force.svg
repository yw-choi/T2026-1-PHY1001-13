<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" font-family="sans-serif">
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
  </defs>

  <!-- Particle 1 -->
  <circle cx="200" cy="175" r="22" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="200" y="180" text-anchor="middle" font-size="14" font-weight="bold" fill="#6B7280">m&#x2081;</text>

  <!-- Particle 2 -->
  <circle cx="500" cy="175" r="28" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="500" y="180" text-anchor="middle" font-size="14" font-weight="bold" fill="#6B7280">m&#x2082;</text>

  <!-- Distance bracket -->
  <line x1="222" y1="240" x2="222" y2="250" stroke="#6B7280" stroke-width="1"/>
  <line x1="472" y1="240" x2="472" y2="250" stroke="#6B7280" stroke-width="1"/>
  <line x1="222" y1="245" x2="472" y2="245" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="347" y="265" text-anchor="middle" font-size="14" font-style="italic" fill="#6B7280">r</text>

  <!-- Force on m1 (toward m2) -->
  <line x1="225" y1="125" x2="310" y2="125" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="267" y="115" text-anchor="middle" font-size="14" fill="#8B0029" font-weight="bold">F&#x2081;&#x2082;</text>

  <!-- Force on m2 (toward m1) -->
  <line x1="495" y1="125" x2="410" y2="125" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="452" y="115" text-anchor="middle" font-size="14" fill="#8B0029" font-weight="bold">F&#x2082;&#x2081;</text>

  <!-- Labels below -->
  <text x="200" y="215" text-anchor="middle" font-size="14" fill="#6B7280">입자 1</text>
  <text x="500" y="215" text-anchor="middle" font-size="14" fill="#6B7280">입자 2</text>

  <!-- Formula -->
  <text x="350" y="305" text-anchor="middle" font-size="14" fill="#8B0029" font-weight="bold">F = Gm&#x2081;m&#x2082;/r&#xB2;</text>
  <text x="350" y="328" text-anchor="middle" font-size="14" fill="#6B7280">|F&#x2081;&#x2082;| = |F&#x2082;&#x2081;|  (Newton's 3rd law)</text>
</svg>
