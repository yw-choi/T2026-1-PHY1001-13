<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <title>Newton's law of gravitation between two masses</title>
  <desc>Two particles attract each other with equal and opposite forces along their center-to-center line.</desc>
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#8B0029"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563EB"/>
    </marker>
  </defs>

  <rect width="760" height="420" fill="#ffffff"/>

  <text x="380" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#8B0029">
    뉴턴의 만유인력: 두 질량 사이의 상호작용
  </text>

  <!-- Center-to-center reference line -->
  <line x1="190" y1="190" x2="570" y2="190" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="5 4"/>
  <circle cx="190" cy="190" r="3" fill="#6B7280"/>
  <circle cx="570" cy="190" r="3" fill="#6B7280"/>

  <!-- Bodies -->
  <circle cx="190" cy="190" r="38" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <circle cx="570" cy="190" r="50" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="190" y="196" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">m₁</text>
  <text x="570" y="196" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">m₂</text>

  <!-- Force pair -->
  <line x1="230" y1="138" x2="333" y2="138" stroke="#8B0029" stroke-width="2.8" marker-end="url(#arrowRed)"/>
  <text x="282" y="122" text-anchor="middle" font-size="15" font-weight="700" fill="#8B0029">F₁₂</text>
  <line x1="520" y1="138" x2="417" y2="138" stroke="#8B0029" stroke-width="2.8" marker-end="url(#arrowRed)"/>
  <text x="468" y="122" text-anchor="middle" font-size="15" font-weight="700" fill="#8B0029">F₂₁</text>

  <!-- r dimension -->
  <line x1="190" y1="300" x2="570" y2="300" stroke="#6B7280" stroke-width="1.2"/>
  <line x1="190" y1="288" x2="190" y2="312" stroke="#6B7280" stroke-width="1.2"/>
  <line x1="570" y1="288" x2="570" y2="312" stroke="#6B7280" stroke-width="1.2"/>
  <text x="380" y="325" text-anchor="middle" font-size="16" font-style="italic" fill="#6B7280">r: 중심 사이 거리</text>

  <!-- Unit vector convention -->
  <line x1="190" y1="244" x2="270" y2="244" stroke="#2563EB" stroke-width="2.4" marker-end="url(#arrowBlue)"/>
  <text x="230" y="267" text-anchor="middle" font-size="15" fill="#2563EB" font-weight="700">r̂₁₂</text>

  <rect x="165" y="350" width="430" height="42" rx="7" fill="#F3F4F6" stroke="#e5e7eb"/>
  <text x="380" y="376" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">
    |F₁₂| = |F₂₁| = Gm₁m₂/r²,  방향은 항상 상대 질량 쪽
  </text>
</svg>
