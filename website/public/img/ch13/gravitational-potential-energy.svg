<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" font-family="sans-serif">
  <defs>
    <marker id="axisArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="80" y1="380" x2="650" y2="380" stroke="#6B7280" stroke-width="2" marker-end="url(#axisArrow)"/>
  <line x1="80" y1="380" x2="80" y2="30" stroke="#6B7280" stroke-width="2" marker-end="url(#axisArrow)"/>

  <!-- Axis labels -->
  <text x="660" y="395" font-size="14" font-style="italic" fill="#6B7280">r</text>
  <text x="55" y="35" font-size="14" font-style="italic" fill="#6B7280">U(r)</text>

  <!-- Zero line -->
  <line x1="80" y1="100" x2="640" y2="100" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="645" y="105" font-size="14" fill="#6B7280">U = 0</text>

  <!-- U(r) = -GMm/r curve -->
  <path d="M 120 370 Q 150 330 180 280 Q 220 210 280 160 Q 350 120 450 108 Q 550 103 640 101"
        fill="none" stroke="#8B0029" stroke-width="2.5"/>

  <!-- Surface line -->
  <line x1="120" y1="380" x2="120" y2="30" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="120" y="400" text-anchor="middle" font-size="14" fill="#6B7280">r = R</text>
  <text x="120" y="418" text-anchor="middle" font-size="14" fill="#6B7280">(표면)</text>

  <!-- Label the curve -->
  <text x="320" y="185" font-size="14" fill="#8B0029" font-weight="bold">U(r) = -GMm/r</text>

  <!-- Annotations -->
  <!-- Point at surface -->
  <circle cx="120" cy="370" r="4" fill="#8B0029"/>
  <text x="55" y="375" font-size="14" fill="#8B0029">-GMm/R</text>

  <!-- Arrow showing U increases (becomes less negative) as r increases -->
  <line x1="400" y1="200" x2="400" y2="115" stroke="#2563EB" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="410" y="155" font-size="14" fill="#2563EB">r 증가</text>
  <text x="410" y="173" font-size="14" fill="#2563EB">U 증가 (&#x2192; 0)</text>

  <!-- Key property annotations -->
  <text x="350" y="430" text-anchor="middle" font-size="14" fill="#6B7280">
    항상 U &lt; 0 (유한한 r에서), r &#x2192; &#x221E;에서 U &#x2192; 0
  </text>
</svg>
