<svg xmlns="http://www.w3.org/2000/svg" width="780" height="460" viewBox="0 0 780 460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <title>Kepler's second law: equal areas in equal times</title>
  <desc>Near perihelion the planet moves faster and sweeps a wide angular sector; near aphelion it moves slower and sweeps a narrow angular sector with the same area in the same time.</desc>

  <rect width="780" height="460" fill="#ffffff"/>
  <text x="390" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#8B0029">
    케플러 제2법칙: 같은 시간에는 같은 면적
  </text>

  <!-- Orbit: center (390,200), a=250, b=155; Sun at left focus -->
  <ellipse cx="390" cy="200" rx="250" ry="155" fill="none" stroke="#6B7280" stroke-width="2"/>
  <line x1="140" y1="200" x2="640" y2="200" stroke="#6B7280" stroke-width="1.1" stroke-dasharray="5 4"/>
  <circle cx="195" cy="200" r="14" fill="#8B0029"/>
  <text x="195" y="233" text-anchor="middle" font-size="14" font-weight="700" fill="#8B0029">태양</text>

  <!-- Equal-time sectors. The arc endpoints are chosen on the shown ellipse. -->
  <path d="M195,200 L163,135 A250,155 0 0 0 163,265 Z"
        fill="#8B0029" fill-opacity="0.18" stroke="#8B0029" stroke-width="1.4"/>
  <path d="M195,200 L636,174 A250,155 0 0 1 636,226 Z"
        fill="#2563EB" fill-opacity="0.18" stroke="#2563EB" stroke-width="1.4"/>

  <line x1="195" y1="200" x2="163" y2="135" stroke="#8B0029" stroke-width="2"/>
  <line x1="195" y1="200" x2="163" y2="265" stroke="#8B0029" stroke-width="2"/>
  <line x1="195" y1="200" x2="636" y2="174" stroke="#2563EB" stroke-width="2"/>
  <line x1="195" y1="200" x2="636" y2="226" stroke="#2563EB" stroke-width="2"/>

  <circle cx="163" cy="135" r="5" fill="#8B0029"/>
  <circle cx="163" cy="265" r="5" fill="#8B0029"/>
  <circle cx="636" cy="174" r="5" fill="#2563EB"/>
  <circle cx="636" cy="226" r="5" fill="#2563EB"/>

  <text x="176" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="#8B0029">가까울 때 빠름</text>
  <text x="630" y="154" text-anchor="middle" font-size="14" font-weight="700" fill="#2563EB">멀 때 느림</text>
  <text x="225" y="205" text-anchor="middle" font-size="15" font-weight="700" fill="#8B0029">ΔA₁</text>
  <text x="540" y="205" text-anchor="middle" font-size="15" font-weight="700" fill="#2563EB">ΔA₂</text>

  <rect x="170" y="382" width="440" height="48" rx="7" fill="#F3F4F6" stroke="#e5e7eb"/>
  <text x="390" y="404" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">
    ΔA₁ = ΔA₂ for the same Δt
  </text>
  <text x="390" y="425" text-anchor="middle" font-size="14" fill="#6B7280">
    dA/dt = L/(2m) = 일정  ⇔  각운동량 보존
  </text>
</svg>
