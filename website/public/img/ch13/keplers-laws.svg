<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400" font-family="sans-serif">
  <!-- Kepler's 2nd law: equal areas in equal times -->
  <!-- Ellipse: rx=220, ry=210, c=65.6, e=0.298 (mild eccentricity for visual clarity) -->
  <!-- Sun at left focus (309, 200); perihelion (155, 200); aphelion (595, 200) -->

  <!-- Elliptical orbit -->
  <ellipse cx="375" cy="200" rx="220" ry="210" fill="none" stroke="#6B7280" stroke-width="2"/>

  <!-- Major axis (light dashed) -->
  <line x1="155" y1="200" x2="595" y2="200" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Sun at focus -->
  <circle cx="309" cy="200" r="12" fill="#8B0029"/>
  <text x="309" y="234" text-anchor="middle" font-size="14" fill="#6B7280" font-weight="bold">태양</text>

  <!-- Area 1: near perihelion. Half-angle 28.7° from sun, r_p ≈ 159 → endpoints (170, 124) and (170, 276). -->
  <path d="M 309 200 L 170 124 A 220 210 0 0 1 170 276 Z"
        fill="#8B0029" opacity="0.25" stroke="#8B0029" stroke-width="1"/>
  <text x="210" y="200" font-size="14" fill="#8B0029" font-weight="bold" text-anchor="middle">&#x0394;A&#x2081;</text>

  <!-- Area 2: near aphelion. Half-angle 7.5° from sun, r_a ≈ 285 → endpoints (591, 163) and (591, 237). -->
  <path d="M 309 200 L 591 163 A 220 210 0 0 1 591 237 Z"
        fill="#2563EB" opacity="0.25" stroke="#2563EB" stroke-width="1"/>
  <text x="540" y="204" font-size="14" fill="#2563EB" font-weight="bold" text-anchor="middle">&#x0394;A&#x2082;</text>

  <!-- Radii lines (sun to orbit points) -->
  <line x1="309" y1="200" x2="170" y2="124" stroke="#8B0029" stroke-width="2"/>
  <line x1="309" y1="200" x2="170" y2="276" stroke="#8B0029" stroke-width="2"/>
  <line x1="309" y1="200" x2="591" y2="163" stroke="#2563EB" stroke-width="2"/>
  <line x1="309" y1="200" x2="591" y2="237" stroke="#2563EB" stroke-width="2"/>

  <!-- Planet dots at boundary points -->
  <circle cx="170" cy="124" r="5" fill="#8B0029"/>
  <circle cx="170" cy="276" r="5" fill="#8B0029"/>
  <circle cx="591" cy="163" r="5" fill="#2563EB"/>
  <circle cx="591" cy="237" r="5" fill="#2563EB"/>

  <!-- Speed labels -->
  <text x="155" y="100" font-size="14" fill="#8B0029" text-anchor="middle">v 큼 (빠름)</text>
  <text x="595" y="155" font-size="14" fill="#2563EB" text-anchor="middle">v 작음 (느림)</text>

  <!-- Equal areas text -->
  <text x="375" y="345" text-anchor="middle" font-size="14" fill="#1a1a1a" font-weight="bold">
    같은 시간 &#x0394;t 동안 휩쓰는 면적: &#x0394;A&#x2081; = &#x0394;A&#x2082;
  </text>
  <text x="375" y="368" text-anchor="middle" font-size="13" fill="#6B7280">
    dA/dt = L/(2m) = 일정 (각운동량 보존)
  </text>
</svg>
