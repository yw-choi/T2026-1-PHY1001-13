<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400" font-family="sans-serif">
  <!-- Kepler's 2nd law: equal areas in equal times -->

  <!-- Elliptical orbit -->
  <ellipse cx="375" cy="200" rx="240" ry="150" fill="none" stroke="#6B7280" stroke-width="2"/>

  <!-- Sun at focus -->
  <!-- c = sqrt(240^2 - 150^2) = sqrt(57600-22500) = sqrt(35100) ~ 187 -->
  <circle cx="188" cy="200" r="12" fill="#8B0029"/>
  <text x="188" y="230" text-anchor="middle" font-size="14" fill="#6B7280" font-weight="bold">태양</text>

  <!-- Area 1: near perihelion (small arc, large speed) -->
  <!-- Two radii from sun to nearby orbit points near perihelion -->
  <path d="M 188 200 L 139 175 A 240 150 0 0 1 135 200 Z" fill="#8B0029" opacity="0.25" stroke="#8B0029" stroke-width="1"/>
  <text x="120" y="165" font-size="14" fill="#8B0029" font-weight="bold">&#x0394;A&#x2081;</text>

  <!-- Area 2: near aphelion (large arc, small speed) -->
  <path d="M 188 200 L 580 155 A 240 150 0 0 1 610 185 Z" fill="#2563EB" opacity="0.2" stroke="#2563EB" stroke-width="1"/>
  <text x="590" y="145" font-size="14" fill="#2563EB" font-weight="bold">&#x0394;A&#x2082;</text>

  <!-- Radii lines (dashed, from sun to orbit) -->
  <line x1="188" y1="200" x2="139" y2="175" stroke="#8B0029" stroke-width="2"/>
  <line x1="188" y1="200" x2="135" y2="200" stroke="#8B0029" stroke-width="2"/>
  <line x1="188" y1="200" x2="580" y2="155" stroke="#2563EB" stroke-width="2"/>
  <line x1="188" y1="200" x2="610" y2="185" stroke="#2563EB" stroke-width="2"/>

  <!-- Label: r1 and r2 -->
  <text x="160" y="195" font-size="14" font-style="italic" fill="#8B0029">r&#x2081;</text>
  <text x="400" y="175" font-size="14" font-style="italic" fill="#2563EB">r&#x2082;</text>

  <!-- Planet dots -->
  <circle cx="139" cy="175" r="5" fill="#8B0029"/>
  <circle cx="135" cy="200" r="5" fill="#8B0029"/>
  <circle cx="580" cy="155" r="5" fill="#2563EB"/>
  <circle cx="610" cy="185" r="5" fill="#2563EB"/>

  <!-- Speed labels -->
  <text x="100" y="155" font-size="14" fill="#8B0029">v 큼 (빠름)</text>
  <text x="580" y="140" font-size="14" fill="#2563EB">v 작음 (느림)</text>

  <!-- Equal areas text -->
  <text x="375" y="335" text-anchor="middle" font-size="14" fill="#6B7280" font-weight="bold">
    같은 시간 &#x0394;t 동안: &#x0394;A&#x2081; = &#x0394;A&#x2082;
  </text>
  <text x="375" y="360" text-anchor="middle" font-size="14" fill="#6B7280">
    dA/dt = L/(2m) = 일정 (각운동량 보존)
  </text>
</svg>
