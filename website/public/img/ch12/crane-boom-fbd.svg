<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 480" font-family="sans-serif">
  <defs>
    <marker id="cbR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="cbB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="370" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">크레인 붐 — 자유 물체 다이어그램</text>

  <!-- Wall -->
  <rect x="60" y="50" width="20" height="360" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <g stroke="#6B7280" stroke-width="1">
    <line x1="60" y1="70" x2="45" y2="85"/>
    <line x1="60" y1="100" x2="45" y2="115"/>
    <line x1="60" y1="130" x2="45" y2="145"/>
    <line x1="60" y1="160" x2="45" y2="175"/>
    <line x1="60" y1="190" x2="45" y2="205"/>
    <line x1="60" y1="220" x2="45" y2="235"/>
    <line x1="60" y1="250" x2="45" y2="265"/>
    <line x1="60" y1="280" x2="45" y2="295"/>
    <line x1="60" y1="310" x2="45" y2="325"/>
    <line x1="60" y1="340" x2="45" y2="355"/>
    <line x1="60" y1="370" x2="45" y2="385"/>
  </g>

  <!-- Boom (rod from wall pivot at (80,360) to tip (480,130)) -->
  <line x1="80" y1="360" x2="480" y2="130" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>

  <!-- Cable (horizontal from wall point (80,130) to boom tip (480,130)) -->
  <line x1="80" y1="130" x2="480" y2="130" stroke="#6B7280" stroke-width="2"/>
  <text x="220" y="120" font-size="13" fill="#6B7280">케이블 (Cable)</text>

  <!-- Angle θ at pivot -->
  <path d="M 145,360 A 65,65 0 0,0 124,323" fill="none" stroke="#6B7280" stroke-width="1.2"/>
  <text x="155" y="340" font-size="14" font-style="italic" fill="#6B7280">&#x3B8;</text>

  <!-- Load cord and block hanging from tip -->
  <line x1="480" y1="130" x2="480" y2="155" stroke="#6B7280" stroke-width="1.5"/>
  <rect x="458" y="155" width="44" height="44" fill="#6B7280" stroke="#1a1a1a" stroke-width="2" fill-opacity="0.15"/>
  <text x="480" y="183" text-anchor="middle" font-size="14" font-weight="bold" font-style="italic" fill="#1a1a1a">M</text>

  <!-- Mg force (load weight, drawn at the tip pointing down) -->
  <line x1="500" y1="130" x2="500" y2="220" stroke="#8B0029" stroke-width="2.5" marker-end="url(#cbR)"/>
  <text x="510" y="215" font-size="14" font-weight="bold" font-style="italic" fill="#8B0029">Mg</text>

  <!-- mg (boom weight) at boom center: midpoint (280, 245) -->
  <line x1="280" y1="245" x2="280" y2="325" stroke="#8B0029" stroke-width="2.5" marker-end="url(#cbR)"/>
  <text x="290" y="320" font-size="14" font-weight="bold" font-style="italic" fill="#8B0029">mg</text>

  <!-- Tension T at the tip, pulling the boom toward the wall (leftward along cable) -->
  <line x1="475" y1="130" x2="395" y2="130" stroke="#2563EB" stroke-width="2.5" marker-end="url(#cbB)"/>
  <text x="430" y="148" text-anchor="middle" font-size="14" font-weight="bold" font-style="italic" fill="#2563EB">T</text>

  <!-- Pivot dot at wall -->
  <circle cx="80" cy="360" r="4.5" fill="#8B0029"/>

  <!-- F_v (vertical reaction at pivot, upward) -->
  <line x1="80" y1="360" x2="80" y2="285" stroke="#2563EB" stroke-width="2.5" marker-end="url(#cbB)"/>
  <text x="60" y="305" text-anchor="end" font-size="14" font-weight="bold" fill="#2563EB">
    <tspan font-style="italic">F</tspan><tspan font-size="10" baseline-shift="sub">v</tspan>
  </text>

  <!-- F_h (horizontal reaction at pivot, rightward) -->
  <line x1="80" y1="360" x2="160" y2="360" stroke="#2563EB" stroke-width="2.5" marker-end="url(#cbB)"/>
  <text x="125" y="378" font-size="14" font-weight="bold" fill="#2563EB">
    <tspan font-style="italic">F</tspan><tspan font-size="10" baseline-shift="sub">h</tspan>
  </text>

  <!-- Length L dimension (along the boom direction, below) -->
  <line x1="80" y1="425" x2="480" y2="425" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="80" y1="418" x2="80" y2="432" stroke="#6B7280" stroke-width="1.2"/>
  <line x1="480" y1="418" x2="480" y2="432" stroke="#6B7280" stroke-width="1.2"/>
  <text x="280" y="445" text-anchor="middle" font-size="13" fill="#6B7280">수평 거리: <tspan font-style="italic">L</tspan> cos <tspan font-style="italic">&#x3B8;</tspan></text>

  <!-- Bottom equation hint -->
  <text x="370" y="468" text-anchor="middle" font-size="12" fill="#6B7280">
    피벗에 대한 토크 합 = 0 &#x21D2; <tspan font-style="italic">T L</tspan> sin <tspan font-style="italic">&#x3B8;</tspan> = (<tspan font-style="italic">m</tspan>/2 + <tspan font-style="italic">M</tspan>) <tspan font-style="italic">gL</tspan> cos <tspan font-style="italic">&#x3B8;</tspan>
  </text>
</svg>
