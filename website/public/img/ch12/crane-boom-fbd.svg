<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" font-family="sans-serif">
  <defs>
    <marker id="aR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
    <marker id="aB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="aGr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
  </defs>

  <text x="350" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">크레인 붐 (자유 물체 다이어그램)</text>

  <!-- Wall -->
  <rect x="60" y="60" width="20" height="340" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <!-- Wall hatching -->
  <g stroke="#ccc" stroke-width="1">
    <line x1="60" y1="80" x2="45" y2="95"/>
    <line x1="60" y1="110" x2="45" y2="125"/>
    <line x1="60" y1="140" x2="45" y2="155"/>
    <line x1="60" y1="170" x2="45" y2="185"/>
    <line x1="60" y1="200" x2="45" y2="215"/>
    <line x1="60" y1="230" x2="45" y2="245"/>
    <line x1="60" y1="260" x2="45" y2="275"/>
    <line x1="60" y1="290" x2="45" y2="305"/>
    <line x1="60" y1="320" x2="45" y2="335"/>
    <line x1="60" y1="350" x2="45" y2="365"/>
    <line x1="60" y1="380" x2="45" y2="395"/>
  </g>

  <!-- Boom (beam at angle theta) -->
  <line x1="80" y1="340" x2="500" y2="160" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>

  <!-- Cable (horizontal from wall to end of boom) -->
  <line x1="80" y1="160" x2="500" y2="160" stroke="#6B7280" stroke-width="2"/>
  <text x="290" y="150" text-anchor="middle" font-size="14" fill="#6B7280">케이블</text>

  <!-- Angle theta -->
  <path d="M130,340 A60,60 0 0,0 108,300" fill="none" stroke="#6B7280" stroke-width="1.5"/>
  <text x="140" y="316" font-size="14" fill="#6B7280" font-style="italic">&theta;</text>

  <!-- Boom weight (mg) at center -->
  <line x1="290" y1="250" x2="290" y2="330" stroke="#8B0029" stroke-width="2.5" marker-end="url(#aR)"/>
  <text x="306" y="325" font-size="14" fill="#8B0029" font-style="italic">mg</text>

  <!-- Load weight (Mg) at end -->
  <line x1="500" y1="170" x2="500" y2="280" stroke="#8B0029" stroke-width="2.5" marker-end="url(#aR)"/>
  <text x="520" y="265" font-size="14" fill="#8B0029" font-style="italic">Mg</text>

  <!-- Load block -->
  <rect x="478" y="280" width="44" height="44" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2"/>
  <text x="500" y="307" text-anchor="middle" font-size="13" font-weight="bold">M</text>

  <!-- Tension in cable -->
  <line x1="500" y1="160" x2="420" y2="160" stroke="#2563EB" stroke-width="2.5" marker-end="url(#aB)"/>
  <text x="450" y="148" text-anchor="middle" font-size="14" fill="#2563EB" font-style="italic">T</text>

  <!-- Pivot forces at wall -->
  <circle cx="80" cy="340" r="5" fill="#8B0029"/>
  <line x1="80" y1="340" x2="80" y2="270" stroke="#2563EB" stroke-width="2.5" marker-end="url(#aB)"/>
  <text x="56" y="285" font-size="14" fill="#2563EB" font-style="italic">F<tspan font-size="10" dy="4">v</tspan></text>
  <line x1="80" y1="340" x2="150" y2="340" stroke="#2563EB" stroke-width="2.5" marker-end="url(#aB)"/>
  <text x="130" y="360" font-size="14" fill="#2563EB" font-style="italic">F<tspan font-size="10" dy="4">h</tspan></text>

  <!-- Dimension: L -->
  <line x1="80" y1="400" x2="500" y2="400" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="80" y1="390" x2="80" y2="410" stroke="#6B7280" stroke-width="1"/>
  <line x1="500" y1="390" x2="500" y2="410" stroke="#6B7280" stroke-width="1"/>
  <text x="290" y="420" text-anchor="middle" font-size="14" fill="#6B7280" font-style="italic">L</text>
</svg>