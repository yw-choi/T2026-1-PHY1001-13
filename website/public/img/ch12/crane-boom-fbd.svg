<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 480" font-family="sans-serif">
  <defs>
    <marker id="cbR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="cbB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Wall -->
  <rect x="60" y="40" width="22" height="380" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <g stroke="#6B7280" stroke-width="1">
    <line x1="60" y1="60" x2="44" y2="76"/>
    <line x1="60" y1="100" x2="44" y2="116"/>
    <line x1="60" y1="140" x2="44" y2="156"/>
    <line x1="60" y1="180" x2="44" y2="196"/>
    <line x1="60" y1="220" x2="44" y2="236"/>
    <line x1="60" y1="260" x2="44" y2="276"/>
    <line x1="60" y1="300" x2="44" y2="316"/>
    <line x1="60" y1="340" x2="44" y2="356"/>
    <line x1="60" y1="380" x2="44" y2="396"/>
  </g>

  <!-- Boom (rod from wall pivot at (82,370) to tip (480,130)) -->
  <line x1="82" y1="370" x2="480" y2="130" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cable (horizontal from wall point to boom tip) -->
  <line x1="82" y1="130" x2="480" y2="130" stroke="#6B7280" stroke-width="2"/>
  <text x="220" y="118" font-size="16" fill="#6B7280">케이블</text>

  <!-- Angle θ at pivot -->
  <path d="M 150,370 A 70,70 0 0,0 124,330" fill="none" stroke="#6B7280" stroke-width="1"/>
  <text x="160" y="345" font-size="22" font-style="italic" fill="#6B7280">&#x3B8;</text>

  <!-- Load cord and block hanging from tip -->
  <line x1="480" y1="130" x2="480" y2="160" stroke="#6B7280" stroke-width="2"/>
  <rect x="455" y="160" width="50" height="50" fill="#6B7280" stroke="#1a1a1a" stroke-width="2" fill-opacity="0.18"/>
  <text x="480" y="192" text-anchor="middle" font-size="22" font-weight="bold" font-style="italic" fill="#1a1a1a">M</text>

  <!-- Mg force (load weight) -->
  <line x1="480" y1="210" x2="480" y2="295" stroke="#8B0029" stroke-width="2.5" marker-end="url(#cbR)"/>
  <text x="496" y="290" font-size="22" font-weight="bold" font-style="italic" fill="#8B0029">Mg</text>

  <!-- mg (boom weight) at boom center -->
  <line x1="280" y1="250" x2="280" y2="335" stroke="#8B0029" stroke-width="2.5" marker-end="url(#cbR)"/>
  <text x="294" y="328" font-size="22" font-weight="bold" font-style="italic" fill="#8B0029">mg</text>

  <!-- Tension T at the tip, leftward along cable -->
  <line x1="475" y1="130" x2="395" y2="130" stroke="#2563EB" stroke-width="2.5" marker-end="url(#cbB)"/>
  <text x="430" y="148" text-anchor="middle" font-size="22" font-weight="bold" font-style="italic" fill="#2563EB">T</text>

  <!-- Pivot dot at wall -->
  <circle cx="82" cy="370" r="5" fill="#8B0029"/>

  <!-- F_v (vertical reaction at pivot, upward) -->
  <line x1="82" y1="370" x2="82" y2="285" stroke="#2563EB" stroke-width="2.5" marker-end="url(#cbB)"/>
  <text x="60" y="305" text-anchor="end" font-size="22" font-weight="bold" fill="#2563EB">
    <tspan font-style="italic">F</tspan><tspan font-size="15" baseline-shift="sub">v</tspan>
  </text>

  <!-- F_h (horizontal reaction at pivot, rightward) -->
  <line x1="82" y1="370" x2="170" y2="370" stroke="#2563EB" stroke-width="2.5" marker-end="url(#cbB)"/>
  <text x="135" y="392" font-size="22" font-weight="bold" fill="#2563EB">
    <tspan font-style="italic">F</tspan><tspan font-size="15" baseline-shift="sub">h</tspan>
  </text>
</svg>
