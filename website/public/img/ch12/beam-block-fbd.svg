<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 400" font-family="sans-serif">
  <defs>
    <marker id="bbR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="bbB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="370" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">보 위의 블록 — 자유 물체 다이어그램</text>

  <!-- Beam -->
  <rect x="90" y="180" width="480" height="16" fill="#F3F4F6" stroke="#6B7280" stroke-width="2" rx="2"/>

  <!-- Block on beam (positioned at x = 290 from left, i.e. centered at x=380) -->
  <rect x="358" y="130" width="44" height="50" fill="#6B7280" stroke="#1a1a1a" stroke-width="2" fill-opacity="0.15"/>
  <text x="380" y="160" text-anchor="middle" font-size="14" font-weight="bold" font-style="italic" fill="#1a1a1a">M</text>

  <!-- Left support (triangle) -->
  <polygon points="75,230 105,230 90,200" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <!-- Right support (triangle) -->
  <polygon points="555,230 585,230 570,200" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>

  <!-- Ground hatching under supports -->
  <line x1="60" y1="230" x2="600" y2="230" stroke="#6B7280" stroke-width="1.5"/>
  <g stroke="#6B7280" stroke-width="1">
    <line x1="80" y1="230" x2="68" y2="245"/>
    <line x1="120" y1="230" x2="108" y2="245"/>
    <line x1="160" y1="230" x2="148" y2="245"/>
    <line x1="200" y1="230" x2="188" y2="245"/>
    <line x1="240" y1="230" x2="228" y2="245"/>
    <line x1="280" y1="230" x2="268" y2="245"/>
    <line x1="320" y1="230" x2="308" y2="245"/>
    <line x1="360" y1="230" x2="348" y2="245"/>
    <line x1="400" y1="230" x2="388" y2="245"/>
    <line x1="440" y1="230" x2="428" y2="245"/>
    <line x1="480" y1="230" x2="468" y2="245"/>
    <line x1="520" y1="230" x2="508" y2="245"/>
    <line x1="560" y1="230" x2="548" y2="245"/>
    <line x1="600" y1="230" x2="588" y2="245"/>
  </g>

  <!-- Reaction forces (upward, blue) -->
  <line x1="90" y1="180" x2="90" y2="110" stroke="#2563EB" stroke-width="2.5" marker-end="url(#bbB)"/>
  <text x="80" y="100" text-anchor="end" font-size="14" font-weight="bold" fill="#2563EB">
    <tspan font-style="italic">F</tspan><tspan font-size="10" baseline-shift="sub">L</tspan>
  </text>

  <line x1="570" y1="180" x2="570" y2="110" stroke="#2563EB" stroke-width="2.5" marker-end="url(#bbB)"/>
  <text x="580" y="100" font-size="14" font-weight="bold" fill="#2563EB">
    <tspan font-style="italic">F</tspan><tspan font-size="10" baseline-shift="sub">R</tspan>
  </text>

  <!-- Beam weight mg (red, downward) at beam center x=330 -->
  <line x1="330" y1="196" x2="330" y2="265" stroke="#8B0029" stroke-width="2.5" marker-end="url(#bbR)"/>
  <text x="320" y="280" text-anchor="end" font-size="14" font-weight="bold" font-style="italic" fill="#8B0029">mg</text>

  <!-- Block weight Mg (red, downward) at block center x=380, starting from below the block -->
  <line x1="380" y1="180" x2="380" y2="265" stroke="#8B0029" stroke-width="2.5" marker-end="url(#bbR)"/>
  <text x="392" y="280" font-size="14" font-weight="bold" font-style="italic" fill="#8B0029">Mg</text>

  <!-- Pivot indicator at left support -->
  <circle cx="90" cy="200" r="3.5" fill="#8B0029"/>
  <text x="76" y="218" font-size="11" fill="#8B0029">피벗</text>

  <!-- Dimension: distance x to the block -->
  <line x1="90" y1="320" x2="380" y2="320" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="90" y1="313" x2="90" y2="327" stroke="#6B7280" stroke-width="1.2"/>
  <line x1="380" y1="313" x2="380" y2="327" stroke="#6B7280" stroke-width="1.2"/>
  <text x="235" y="315" text-anchor="middle" font-size="14" font-style="italic" fill="#6B7280">x</text>

  <!-- Dimension: total length L -->
  <line x1="90" y1="355" x2="570" y2="355" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="90" y1="348" x2="90" y2="362" stroke="#6B7280" stroke-width="1.2"/>
  <line x1="570" y1="348" x2="570" y2="362" stroke="#6B7280" stroke-width="1.2"/>
  <text x="330" y="350" text-anchor="middle" font-size="14" font-style="italic" fill="#6B7280">L</text>

  <!-- Equation note at bottom-right -->
  <text x="730" y="385" text-anchor="end" font-size="12" fill="#6B7280">
    피벗(왼쪽)에 대한 토크 합 = 0  &#x21D2;  <tspan font-style="italic">F</tspan><tspan font-size="9" baseline-shift="sub">R</tspan> · <tspan font-style="italic">L</tspan> = <tspan font-style="italic">mg</tspan>(<tspan font-style="italic">L</tspan>/2) + <tspan font-style="italic">Mgx</tspan>
  </text>
</svg>
