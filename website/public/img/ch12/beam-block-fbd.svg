<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 380" font-family="sans-serif">
  <defs>
    <marker id="bbR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="bbB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Beam -->
  <rect x="90" y="170" width="480" height="20" fill="#F3F4F6" stroke="#6B7280" stroke-width="2.5" rx="2"/>

  <!-- Block on beam -->
  <rect x="358" y="115" width="48" height="55" fill="#6B7280" stroke="#1a1a1a" stroke-width="2.5" fill-opacity="0.18"/>
  <text x="382" y="150" text-anchor="middle" font-size="22" font-weight="bold" font-style="italic" fill="#1a1a1a">M</text>

  <!-- Left support (triangle) -->
  <polygon points="73,222 107,222 90,190" fill="#F3F4F6" stroke="#6B7280" stroke-width="2.5"/>
  <!-- Right support (triangle) -->
  <polygon points="553,222 587,222 570,190" fill="#F3F4F6" stroke="#6B7280" stroke-width="2.5"/>

  <!-- Ground line -->
  <line x1="60" y1="222" x2="600" y2="222" stroke="#6B7280" stroke-width="2"/>
  <g stroke="#6B7280" stroke-width="1">
    <line x1="80" y1="222" x2="68" y2="238"/>
    <line x1="120" y1="222" x2="108" y2="238"/>
    <line x1="160" y1="222" x2="148" y2="238"/>
    <line x1="200" y1="222" x2="188" y2="238"/>
    <line x1="240" y1="222" x2="228" y2="238"/>
    <line x1="280" y1="222" x2="268" y2="238"/>
    <line x1="320" y1="222" x2="308" y2="238"/>
    <line x1="360" y1="222" x2="348" y2="238"/>
    <line x1="400" y1="222" x2="388" y2="238"/>
    <line x1="440" y1="222" x2="428" y2="238"/>
    <line x1="480" y1="222" x2="468" y2="238"/>
    <line x1="520" y1="222" x2="508" y2="238"/>
    <line x1="560" y1="222" x2="548" y2="238"/>
  </g>

  <!-- Reaction forces (upward, blue) -->
  <line x1="90" y1="170" x2="90" y2="90" stroke="#2563EB" stroke-width="3" marker-end="url(#bbB)"/>
  <text x="78" y="80" text-anchor="end" font-size="22" font-weight="bold" fill="#2563EB">
    <tspan font-style="italic">F</tspan><tspan font-size="15" baseline-shift="sub">L</tspan>
  </text>

  <line x1="570" y1="170" x2="570" y2="90" stroke="#2563EB" stroke-width="3" marker-end="url(#bbB)"/>
  <text x="582" y="80" font-size="22" font-weight="bold" fill="#2563EB">
    <tspan font-style="italic">F</tspan><tspan font-size="15" baseline-shift="sub">R</tspan>
  </text>

  <!-- Beam weight mg at beam center -->
  <line x1="330" y1="190" x2="330" y2="265" stroke="#8B0029" stroke-width="3" marker-end="url(#bbR)"/>
  <text x="318" y="282" text-anchor="end" font-size="22" font-weight="bold" font-style="italic" fill="#8B0029">mg</text>

  <!-- Block weight Mg at block center -->
  <line x1="382" y1="170" x2="382" y2="265" stroke="#8B0029" stroke-width="3" marker-end="url(#bbR)"/>
  <text x="396" y="282" font-size="22" font-weight="bold" font-style="italic" fill="#8B0029">Mg</text>

  <!-- Dimension: distance x to the block -->
  <line x1="90" y1="320" x2="382" y2="320" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="90" y1="313" x2="90" y2="327" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="382" y1="313" x2="382" y2="327" stroke="#6B7280" stroke-width="1.5"/>
  <text x="236" y="315" text-anchor="middle" font-size="20" font-style="italic" fill="#6B7280">x</text>

  <!-- Dimension: total length L -->
  <line x1="90" y1="355" x2="570" y2="355" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="90" y1="348" x2="90" y2="362" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="570" y1="348" x2="570" y2="362" stroke="#6B7280" stroke-width="1.5"/>
  <text x="330" y="350" text-anchor="middle" font-size="20" font-style="italic" fill="#6B7280">L</text>
</svg>
