<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="sans-serif">
  <defs>
    <marker id="axR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1a1a"/>
    </marker>
  </defs>

  <text x="350" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">응력-변형률 곡선 (Stress-Strain Curve)</text>

  <!-- Axes -->
  <line x1="80" y1="370" x2="650" y2="370" stroke="#1a1a1a" stroke-width="2" marker-end="url(#axR)"/>
  <line x1="80" y1="370" x2="80" y2="50" stroke="#1a1a1a" stroke-width="2" marker-end="url(#axR)"/>

  <!-- Axis labels -->
  <text x="380" y="405" text-anchor="middle" font-size="15" fill="#1a1a1a">변형률 (Strain)</text>
  <text x="35" y="210" text-anchor="middle" font-size="15" fill="#1a1a1a" transform="rotate(-90,35,210)">응력 (Stress)</text>

  <!-- Stress-strain curve -->
  <!-- Linear (elastic) region -->
  <line x1="80" y1="370" x2="200" y2="180" stroke="#8B0029" stroke-width="2.5"/>

  <!-- Yield point -->
  <circle cx="200" cy="180" r="5" fill="#8B0029"/>
  <text x="195" y="165" text-anchor="middle" font-size="13" fill="#8B0029" font-weight="bold">항복점</text>
  <text x="195" y="150" text-anchor="middle" font-size="12" fill="#6B7280">(Yield point)</text>

  <!-- Yield stress dashed line -->
  <line x1="80" y1="180" x2="200" y2="180" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="55" y="185" text-anchor="middle" font-size="12" fill="#6B7280" font-style="italic">S<tspan font-size="9" dy="3">y</tspan></text>

  <!-- Plastic region (curve rising then falling) -->
  <path d="M200,180 Q280,110 380,100 Q480,90 520,95 Q560,100 590,140" fill="none" stroke="#8B0029" stroke-width="2.5"/>

  <!-- Ultimate strength point -->
  <circle cx="380" cy="100" r="5" fill="#2563EB"/>
  <text x="380" y="80" text-anchor="middle" font-size="13" fill="#2563EB" font-weight="bold">극한 강도</text>
  <text x="380" y="65" text-anchor="middle" font-size="12" fill="#6B7280">(Ultimate strength)</text>

  <!-- Ultimate stress dashed line -->
  <line x1="80" y1="100" x2="380" y2="100" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="55" y="105" text-anchor="middle" font-size="12" fill="#6B7280" font-style="italic">S<tspan font-size="9" dy="3">u</tspan></text>

  <!-- Fracture point -->
  <circle cx="590" cy="140" r="5" fill="#1a1a1a"/>
  <text x="590" y="125" text-anchor="middle" font-size="13" fill="#1a1a1a" font-weight="bold">파단</text>
  <text x="590" y="110" text-anchor="middle" font-size="12" fill="#6B7280">(Fracture)</text>

  <!-- X mark at fracture -->
  <line x1="583" y1="133" x2="597" y2="147" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="597" y1="133" x2="583" y2="147" stroke="#1a1a1a" stroke-width="3"/>

  <!-- Region labels with background -->
  <!-- Elastic region -->
  <rect x="100" y="280" width="80" height="40" fill="rgba(243,244,246,0.9)" rx="4"/>
  <text x="140" y="298" text-anchor="middle" font-size="13" fill="#8B0029" font-weight="bold">탄성 영역</text>
  <text x="140" y="314" text-anchor="middle" font-size="11" fill="#6B7280">(Elastic)</text>

  <!-- Plastic region -->
  <rect x="290" y="300" width="80" height="40" fill="rgba(243,244,246,0.9)" rx="4"/>
  <text x="330" y="318" text-anchor="middle" font-size="13" fill="#8B0029" font-weight="bold">소성 영역</text>
  <text x="330" y="334" text-anchor="middle" font-size="11" fill="#6B7280">(Plastic)</text>

  <!-- Necking region -->
  <rect x="490" y="300" width="80" height="40" fill="rgba(243,244,246,0.9)" rx="4"/>
  <text x="530" y="318" text-anchor="middle" font-size="13" fill="#8B0029" font-weight="bold">네킹</text>
  <text x="530" y="334" text-anchor="middle" font-size="11" fill="#6B7280">(Necking)</text>

  <!-- Young's modulus slope annotation -->
  <line x1="120" y1="320" x2="170" y2="250" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="188" y="248" font-size="13" fill="#2563EB" font-style="italic">E = 기울기</text>
</svg>