<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 460" font-family="sans-serif">
  <defs>
    <marker id="ssR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="ssG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6B7280">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="ssB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="370" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">응력-변형률 곡선 (Stress-Strain Curve)</text>

  <!-- Axes (palette compliant: gray) -->
  <line x1="100" y1="400" x2="675" y2="400" stroke="#6B7280" stroke-width="2" marker-end="url(#ssG)"/>
  <line x1="100" y1="400" x2="100" y2="60" stroke="#6B7280" stroke-width="2" marker-end="url(#ssG)"/>

  <!-- Axis labels -->
  <text x="690" y="405" font-size="13" fill="#6B7280">변형률 <tspan font-style="italic">&#x3B5;</tspan></text>
  <text x="100" y="50" text-anchor="middle" font-size="13" fill="#6B7280">응력 <tspan font-style="italic">&#x3C3;</tspan></text>

  <!-- Dashed reference lines for S_y and S_u -->
  <line x1="100" y1="220" x2="220" y2="220" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="100" y1="100" x2="430" y2="100" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Y-axis tick labels -->
  <text x="92" y="225" text-anchor="end" font-size="13" fill="#6B7280">
    <tspan font-style="italic">S</tspan><tspan font-size="10" baseline-shift="sub">y</tspan>
  </text>
  <text x="92" y="105" text-anchor="end" font-size="13" fill="#6B7280">
    <tspan font-style="italic">S</tspan><tspan font-size="10" baseline-shift="sub">u</tspan>
  </text>

  <!-- Vertical dashed strain markers -->
  <line x1="220" y1="220" x2="220" y2="400" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="430" y1="100" x2="430" y2="400" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="590" y1="170" x2="590" y2="400" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- X-axis tick labels -->
  <text x="220" y="418" text-anchor="middle" font-size="12" fill="#6B7280">
    <tspan font-style="italic">&#x3B5;</tspan><tspan font-size="10" baseline-shift="sub">y</tspan>
  </text>
  <text x="430" y="418" text-anchor="middle" font-size="12" fill="#6B7280">
    <tspan font-style="italic">&#x3B5;</tspan><tspan font-size="10" baseline-shift="sub">u</tspan>
  </text>
  <text x="590" y="418" text-anchor="middle" font-size="12" fill="#6B7280">
    <tspan font-style="italic">&#x3B5;</tspan><tspan font-size="10" baseline-shift="sub">f</tspan>
  </text>

  <!-- ===== Curve ===== -->
  <!-- Elastic (linear) region: (100, 400) to (220, 220) -->
  <line x1="100" y1="400" x2="220" y2="220" stroke="#8B0029" stroke-width="3"/>

  <!-- Plastic (strain hardening): (220, 220) curving up to ultimate (430, 100) -->
  <path d="M 220,220 Q 290,140 430,100" fill="none" stroke="#8B0029" stroke-width="3"/>

  <!-- Necking: (430, 100) curving down to fracture (590, 170) -->
  <path d="M 430,100 Q 510,110 590,170" fill="none" stroke="#8B0029" stroke-width="3"/>

  <!-- Yield point dot -->
  <circle cx="220" cy="220" r="5" fill="#8B0029"/>
  <text x="232" y="216" font-size="13" font-weight="bold" fill="#8B0029">항복점</text>
  <text x="232" y="232" font-size="11" fill="#6B7280">(Yield)</text>

  <!-- Ultimate strength dot -->
  <circle cx="430" cy="100" r="5" fill="#8B0029"/>
  <text x="430" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#8B0029">극한 강도</text>
  <text x="430" y="71" text-anchor="middle" font-size="11" fill="#6B7280">(Ultimate)</text>

  <!-- Fracture point with X marker -->
  <line x1="583" y1="163" x2="597" y2="177" stroke="#8B0029" stroke-width="2.5"/>
  <line x1="597" y1="163" x2="583" y2="177" stroke="#8B0029" stroke-width="2.5"/>
  <text x="610" y="170" font-size="13" font-weight="bold" fill="#8B0029">파단</text>
  <text x="610" y="186" font-size="11" fill="#6B7280">(Fracture)</text>

  <!-- E slope callout -->
  <line x1="180" y1="370" x2="148" y2="345" stroke="#2563EB" stroke-width="1.2" marker-end="url(#ssB)"/>
  <text x="186" y="378" font-size="13" fill="#2563EB" font-weight="bold">
    기울기 = <tspan font-style="italic">E</tspan> (영률)
  </text>

  <!-- Region brackets below x-axis -->
  <line x1="100" y1="436" x2="220" y2="436" stroke="#6B7280" stroke-width="1.2"/>
  <line x1="100" y1="432" x2="100" y2="440" stroke="#6B7280" stroke-width="1.2"/>
  <line x1="220" y1="432" x2="220" y2="440" stroke="#6B7280" stroke-width="1.2"/>
  <text x="160" y="452" text-anchor="middle" font-size="12" fill="#6B7280">탄성</text>

  <line x1="220" y1="436" x2="430" y2="436" stroke="#6B7280" stroke-width="1.2"/>
  <line x1="430" y1="432" x2="430" y2="440" stroke="#6B7280" stroke-width="1.2"/>
  <text x="325" y="452" text-anchor="middle" font-size="12" fill="#6B7280">소성 (변형 경화)</text>

  <line x1="430" y1="436" x2="590" y2="436" stroke="#6B7280" stroke-width="1.2"/>
  <line x1="590" y1="432" x2="590" y2="440" stroke="#6B7280" stroke-width="1.2"/>
  <text x="510" y="452" text-anchor="middle" font-size="12" fill="#6B7280">네킹</text>
</svg>
