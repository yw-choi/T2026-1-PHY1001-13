<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" font-family="sans-serif">
  <defs>
    <marker id="ssG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6B7280">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="100" y1="400" x2="675" y2="400" stroke="#6B7280" stroke-width="2.5" marker-end="url(#ssG)"/>
  <line x1="100" y1="400" x2="100" y2="50" stroke="#6B7280" stroke-width="2.5" marker-end="url(#ssG)"/>

  <!-- Axis labels -->
  <text x="690" y="408" font-size="20" fill="#1a1a1a">변형률 <tspan font-style="italic">&#x3B5;</tspan></text>
  <text x="100" y="38" text-anchor="middle" font-size="20" fill="#1a1a1a">응력 <tspan font-style="italic">&#x3C3;</tspan></text>

  <!-- Dashed reference lines for S_y and S_u -->
  <line x1="100" y1="220" x2="220" y2="220" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="100" y1="100" x2="430" y2="100" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3"/>

  <!-- Y-axis tick labels -->
  <text x="92" y="226" text-anchor="end" font-size="20" fill="#1a1a1a">
    <tspan font-style="italic">S</tspan><tspan font-size="14" baseline-shift="sub">y</tspan>
  </text>
  <text x="92" y="106" text-anchor="end" font-size="20" fill="#1a1a1a">
    <tspan font-style="italic">S</tspan><tspan font-size="14" baseline-shift="sub">u</tspan>
  </text>

  <!-- Vertical dashed strain markers -->
  <line x1="220" y1="220" x2="220" y2="400" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="430" y1="100" x2="430" y2="400" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="590" y1="170" x2="590" y2="400" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3"/>

  <!-- X-axis tick labels -->
  <text x="220" y="424" text-anchor="middle" font-size="18" fill="#1a1a1a">
    <tspan font-style="italic">&#x3B5;</tspan><tspan font-size="13" baseline-shift="sub">y</tspan>
  </text>
  <text x="430" y="424" text-anchor="middle" font-size="18" fill="#1a1a1a">
    <tspan font-style="italic">&#x3B5;</tspan><tspan font-size="13" baseline-shift="sub">u</tspan>
  </text>
  <text x="590" y="424" text-anchor="middle" font-size="18" fill="#1a1a1a">
    <tspan font-style="italic">&#x3B5;</tspan><tspan font-size="13" baseline-shift="sub">f</tspan>
  </text>

  <!-- Curve segments -->
  <line x1="100" y1="400" x2="220" y2="220" stroke="#8B0029" stroke-width="3.5"/>
  <path d="M 220,220 Q 290,140 430,100" fill="none" stroke="#8B0029" stroke-width="3.5"/>
  <path d="M 430,100 Q 510,110 590,170" fill="none" stroke="#8B0029" stroke-width="3.5"/>

  <!-- Yield point dot -->
  <circle cx="220" cy="220" r="6" fill="#8B0029"/>
  <text x="234" y="216" font-size="18" font-weight="bold" fill="#8B0029">항복점</text>

  <!-- Ultimate strength dot -->
  <circle cx="430" cy="100" r="6" fill="#8B0029"/>
  <text x="430" y="80" text-anchor="middle" font-size="18" font-weight="bold" fill="#8B0029">극한 강도</text>

  <!-- Fracture point with X marker -->
  <line x1="582" y1="162" x2="598" y2="178" stroke="#8B0029" stroke-width="3"/>
  <line x1="598" y1="162" x2="582" y2="178" stroke="#8B0029" stroke-width="3"/>
  <text x="615" y="172" font-size="18" font-weight="bold" fill="#8B0029">파단</text>

  <!-- E slope label inside the elastic region -->
  <text x="170" y="345" font-size="18" font-weight="bold" fill="#2563EB">기울기 = <tspan font-style="italic">E</tspan></text>
</svg>
