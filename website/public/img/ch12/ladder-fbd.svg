<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 500" font-family="sans-serif">
  <defs>
    <marker id="ar1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="ar2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Wall (right) -->
  <rect x="450" y="40" width="22" height="400" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <g stroke="#6B7280" stroke-width="1">
    <line x1="472" y1="60" x2="488" y2="76"/>
    <line x1="472" y1="100" x2="488" y2="116"/>
    <line x1="472" y1="140" x2="488" y2="156"/>
    <line x1="472" y1="180" x2="488" y2="196"/>
    <line x1="472" y1="220" x2="488" y2="236"/>
    <line x1="472" y1="260" x2="488" y2="276"/>
    <line x1="472" y1="300" x2="488" y2="316"/>
    <line x1="472" y1="340" x2="488" y2="356"/>
    <line x1="472" y1="380" x2="488" y2="396"/>
    <line x1="472" y1="420" x2="488" y2="436"/>
  </g>

  <!-- Ground -->
  <line x1="40" y1="440" x2="470" y2="440" stroke="#6B7280" stroke-width="2"/>
  <g stroke="#6B7280" stroke-width="1">
    <line x1="60" y1="440" x2="48" y2="456"/>
    <line x1="100" y1="440" x2="88" y2="456"/>
    <line x1="140" y1="440" x2="128" y2="456"/>
    <line x1="180" y1="440" x2="168" y2="456"/>
    <line x1="220" y1="440" x2="208" y2="456"/>
    <line x1="260" y1="440" x2="248" y2="456"/>
    <line x1="300" y1="440" x2="288" y2="456"/>
    <line x1="340" y1="440" x2="328" y2="456"/>
    <line x1="380" y1="440" x2="368" y2="456"/>
    <line x1="420" y1="440" x2="408" y2="456"/>
  </g>

  <!-- Ladder -->
  <line x1="150" y1="440" x2="450" y2="100" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Angle theta at base -->
  <path d="M 210,440 A 60,60 0 0,0 192,398" fill="none" stroke="#6B7280" stroke-width="1"/>
  <text x="216" y="424" font-size="22" font-style="italic" fill="#6B7280">&#x3B8;</text>

  <!-- Weight mg at center of ladder (offset off the line for visibility) -->
  <circle cx="305" cy="276" r="4" fill="#8B0029"/>
  <line x1="305" y1="276" x2="305" y2="360" stroke="#8B0029" stroke-width="2.5" marker-end="url(#ar1)"/>
  <text x="320" y="355" font-size="22" font-weight="bold" font-style="italic" fill="#8B0029">mg</text>

  <!-- Normal force at wall (Fw, horizontal, pointing left) -->
  <line x1="450" y1="100" x2="370" y2="100" stroke="#2563EB" stroke-width="2.5" marker-end="url(#ar2)"/>
  <text x="395" y="86" font-size="22" font-weight="bold" fill="#2563EB">
    <tspan font-style="italic">F</tspan><tspan font-size="14" baseline-shift="sub">w</tspan>
  </text>

  <!-- Normal force at ground (N, vertical) -->
  <line x1="150" y1="440" x2="150" y2="360" stroke="#2563EB" stroke-width="2.5" marker-end="url(#ar2)"/>
  <text x="125" y="380" text-anchor="end" font-size="22" font-weight="bold" font-style="italic" fill="#2563EB">N</text>

  <!-- Friction at ground (f, horizontal, rightward) -->
  <line x1="155" y1="432" x2="225" y2="432" stroke="#8B0029" stroke-width="2.5" marker-end="url(#ar1)"/>
  <text x="190" y="424" text-anchor="middle" font-size="22" font-weight="bold" font-style="italic" fill="#8B0029">f</text>

  <!-- Pivot dot at base -->
  <circle cx="150" cy="440" r="4" fill="#1a1a1a"/>
</svg>
