<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="sans-serif">
  <defs>
    <marker id="tdR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="tdB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- ========== Panel (a): Tension ========== -->
  <g transform="translate(140, 60)">
    <text x="0" y="0" text-anchor="middle" font-size="20" font-weight="bold" fill="#8B0029">(a) 인장</text>
    <text x="0" y="22" text-anchor="middle" font-size="14" fill="#6B7280">(Tension)</text>

    <!-- Stretched shape (bottom anchored at y=260, top extended up to y=50) -->
    <rect x="-40" y="50" width="80" height="210" fill="#F3F4F6" stroke="#6B7280" stroke-width="2" rx="3"/>
    <!-- Original shape (dashed, same bottom, original top at y=80) -->
    <rect x="-40" y="80" width="80" height="180" fill="none" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3" rx="3"/>

    <!-- Force arrow (applied tension at top) -->
    <line x1="0" y1="50" x2="0" y2="10" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <text x="14" y="28" font-size="20" font-weight="bold" font-style="italic" fill="#8B0029">F</text>

    <!-- Force arrow (reaction at fixed bottom) -->
    <line x1="0" y1="260" x2="0" y2="303" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <text x="14" y="297" font-size="20" font-weight="bold" font-style="italic" fill="#8B0029">F</text>

    <!-- ΔL dimension (full elongation between original top and stretched top) -->
    <line x1="60" y1="80" x2="60" y2="50" stroke="#6B7280" stroke-width="1"/>
    <line x1="53" y1="80" x2="67" y2="80" stroke="#6B7280" stroke-width="1"/>
    <line x1="53" y1="50" x2="67" y2="50" stroke="#6B7280" stroke-width="1"/>
    <text x="72" y="70" font-size="18" fill="#1a1a1a" font-weight="bold">
      <tspan font-style="italic">&#x394;L</tspan>
    </text>

    <!-- L dimension on left (original length) -->
    <line x1="-60" y1="80" x2="-60" y2="260" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3"/>
    <line x1="-67" y1="80" x2="-53" y2="80" stroke="#6B7280" stroke-width="1.2"/>
    <line x1="-67" y1="260" x2="-53" y2="260" stroke="#6B7280" stroke-width="1.2"/>
    <text x="-78" y="175" font-size="18" font-style="italic" fill="#6B7280">L</text>
  </g>

  <!-- ========== Panel (b): Shear ========== -->
  <g transform="translate(410, 60)">
    <text x="0" y="0" text-anchor="middle" font-size="20" font-weight="bold" fill="#8B0029">(b) 전단</text>
    <text x="0" y="22" text-anchor="middle" font-size="14" fill="#6B7280">(Shear)</text>

    <!-- Sheared parallelogram -->
    <path d="M -25,80 L 75,80 L 50,260 L -50,260 Z" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
    <!-- Original shape (dashed, drawn on top) -->
    <rect x="-50" y="80" width="100" height="180" fill="none" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3" rx="3"/>

    <!-- Force arrow on top (rightward) -->
    <line x1="80" y1="80" x2="125" y2="80" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <text x="115" y="70" font-size="20" font-weight="bold" font-style="italic" fill="#8B0029">F</text>

    <!-- Force arrow on bottom (leftward) -->
    <line x1="-55" y1="260" x2="-100" y2="260" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <text x="-115" y="250" font-size="20" font-weight="bold" font-style="italic" fill="#8B0029">F</text>

    <!-- Δx dimension showing horizontal displacement of top -->
    <line x1="-50" y1="64" x2="-25" y2="64" stroke="#6B7280" stroke-width="1"/>
    <line x1="-50" y1="58" x2="-50" y2="70" stroke="#6B7280" stroke-width="1"/>
    <line x1="-25" y1="58" x2="-25" y2="70" stroke="#6B7280" stroke-width="1"/>
    <text x="-37" y="50" text-anchor="middle" font-size="18" fill="#1a1a1a" font-weight="bold">
      <tspan font-style="italic">&#x394;x</tspan>
    </text>

    <!-- L dimension (height) on left side -->
    <line x1="-65" y1="80" x2="-65" y2="260" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3"/>
    <line x1="-72" y1="80" x2="-58" y2="80" stroke="#6B7280" stroke-width="1.2"/>
    <line x1="-72" y1="260" x2="-58" y2="260" stroke="#6B7280" stroke-width="1.2"/>
    <text x="-83" y="175" font-size="18" font-style="italic" fill="#6B7280">L</text>
  </g>

  <!-- ========== Panel (c): Hydraulic ========== -->
  <g transform="translate(685, 60)">
    <text x="0" y="0" text-anchor="middle" font-size="20" font-weight="bold" fill="#8B0029">(c) 체적</text>
    <text x="0" y="22" text-anchor="middle" font-size="14" fill="#6B7280">(Hydraulic)</text>

    <!-- Original sphere (dashed) -->
    <circle cx="0" cy="170" r="80" fill="none" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3"/>
    <!-- Compressed sphere -->
    <circle cx="0" cy="170" r="62" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>

    <!-- 8 inward pressure arrows, uniform stroke-width -->
    <line x1="100" y1="170" x2="72" y2="170" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <line x1="70.7" y1="99.3" x2="50.9" y2="119.1" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <line x1="0" y1="70" x2="0" y2="98" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <line x1="-70.7" y1="99.3" x2="-50.9" y2="119.1" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <line x1="-100" y1="170" x2="-72" y2="170" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <line x1="-70.7" y1="240.7" x2="-50.9" y2="220.9" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <line x1="0" y1="270" x2="0" y2="242" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <line x1="70.7" y1="240.7" x2="50.9" y2="220.9" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>

    <!-- Pressure label -->
    <text x="-115" y="60" font-size="18" fill="#8B0029" font-weight="bold">
      <tspan font-style="italic">p</tspan> (균일)
    </text>
  </g>
</svg>
