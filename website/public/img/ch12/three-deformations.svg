<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="sans-serif">
  <defs>
    <marker id="tdR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="tdB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="tdG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6B7280">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- ========== Panel (a): Tension / Compression ========== -->
  <g transform="translate(130, 50)">
    <text x="0" y="0" text-anchor="middle" font-size="15" font-weight="bold" fill="#8B0029">(a) 인장</text>
    <text x="0" y="18" text-anchor="middle" font-size="12" fill="#6B7280">(Tension)</text>

    <!-- Original shape (dashed) -->
    <rect x="-40" y="80" width="80" height="180" fill="none" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" rx="3"/>

    <!-- Stretched shape -->
    <rect x="-40" y="65" width="80" height="210" fill="#F3F4F6" stroke="#6B7280" stroke-width="2" rx="3"/>

    <!-- Force arrows -->
    <line x1="0" y1="65" x2="0" y2="25" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <text x="12" y="40" font-size="14" font-weight="bold" font-style="italic" fill="#8B0029">F</text>

    <line x1="0" y1="275" x2="0" y2="318" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <text x="12" y="312" font-size="14" font-weight="bold" font-style="italic" fill="#8B0029">F</text>

    <!-- ΔL dimension on right -->
    <line x1="55" y1="80" x2="65" y2="80" stroke="#6B7280" stroke-width="1"/>
    <line x1="55" y1="65" x2="65" y2="65" stroke="#6B7280" stroke-width="1"/>
    <line x1="60" y1="80" x2="60" y2="65" stroke="#2563EB" stroke-width="1.2"/>
    <text x="70" y="78" font-size="13" fill="#2563EB">
      <tspan font-style="italic">&#x394;L</tspan>
    </text>

    <!-- L dimension on left -->
    <line x1="-60" y1="80" x2="-60" y2="260" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="-67" y1="80" x2="-53" y2="80" stroke="#6B7280" stroke-width="1"/>
    <line x1="-67" y1="260" x2="-53" y2="260" stroke="#6B7280" stroke-width="1"/>
    <text x="-78" y="173" font-size="13" font-style="italic" fill="#6B7280">L</text>

    <!-- Area A label inside -->
    <text x="0" y="173" text-anchor="middle" font-size="13" font-style="italic" fill="#6B7280">A</text>
  </g>

  <!-- ========== Panel (b): Shear ========== -->
  <g transform="translate(410, 50)">
    <text x="0" y="0" text-anchor="middle" font-size="15" font-weight="bold" fill="#8B0029">(b) 전단</text>
    <text x="0" y="18" text-anchor="middle" font-size="12" fill="#6B7280">(Shear)</text>

    <!-- Original shape (dashed) -->
    <rect x="-50" y="80" width="100" height="180" fill="none" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" rx="3"/>

    <!-- Sheared parallelogram (top shifted right by 25) -->
    <path d="M -25,80 L 75,80 L 50,260 L -50,260 Z" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>

    <!-- Force arrow on top (rightward) -->
    <line x1="80" y1="80" x2="125" y2="80" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <text x="118" y="72" font-size="14" font-weight="bold" font-style="italic" fill="#8B0029">F</text>

    <!-- Force arrow on bottom (leftward) -->
    <line x1="-55" y1="260" x2="-100" y2="260" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <text x="-110" y="252" font-size="14" font-weight="bold" font-style="italic" fill="#8B0029">F</text>

    <!-- Δx dimension showing horizontal displacement of top -->
    <line x1="-50" y1="62" x2="-50" y2="74" stroke="#6B7280" stroke-width="1"/>
    <line x1="-25" y1="62" x2="-25" y2="74" stroke="#6B7280" stroke-width="1"/>
    <line x1="-50" y1="68" x2="-25" y2="68" stroke="#2563EB" stroke-width="1.2"/>
    <text x="-37" y="60" text-anchor="middle" font-size="13" fill="#2563EB">
      <tspan font-style="italic">&#x394;x</tspan>
    </text>

    <!-- L dimension (height) on left side, on the original (dashed) rectangle's vertical edge -->
    <line x1="-65" y1="80" x2="-65" y2="260" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="-72" y1="80" x2="-58" y2="80" stroke="#6B7280" stroke-width="1"/>
    <line x1="-72" y1="260" x2="-58" y2="260" stroke="#6B7280" stroke-width="1"/>
    <text x="-83" y="173" font-size="13" font-style="italic" fill="#6B7280">L</text>

    <!-- Area A label inside the parallelogram -->
    <text x="0" y="175" text-anchor="middle" font-size="13" font-style="italic" fill="#6B7280">A</text>
  </g>

  <!-- ========== Panel (c): Hydraulic / Volume ========== -->
  <g transform="translate(690, 50)">
    <text x="0" y="0" text-anchor="middle" font-size="15" font-weight="bold" fill="#8B0029">(c) 체적</text>
    <text x="0" y="18" text-anchor="middle" font-size="12" fill="#6B7280">(Hydraulic)</text>

    <!-- Original sphere (dashed) -->
    <circle cx="0" cy="170" r="80" fill="none" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

    <!-- Compressed sphere -->
    <circle cx="0" cy="170" r="62" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>

    <!-- 8 inward pressure arrows, uniform stroke-width, all at r=100 outside -> r=70 just outside compressed -->
    <!-- 0° (right) -->
    <line x1="100" y1="170" x2="72" y2="170" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <!-- 45° -->
    <line x1="70.7" y1="99.3" x2="50.9" y2="119.1" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <!-- 90° (top) -->
    <line x1="0" y1="70" x2="0" y2="98" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <!-- 135° -->
    <line x1="-70.7" y1="99.3" x2="-50.9" y2="119.1" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <!-- 180° (left) -->
    <line x1="-100" y1="170" x2="-72" y2="170" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <!-- 225° -->
    <line x1="-70.7" y1="240.7" x2="-50.9" y2="220.9" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <!-- 270° (bottom) -->
    <line x1="0" y1="270" x2="0" y2="242" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>
    <!-- 315° -->
    <line x1="70.7" y1="240.7" x2="50.9" y2="220.9" stroke="#8B0029" stroke-width="2.5" marker-end="url(#tdR)"/>

    <!-- Pressure label outside top -->
    <text x="-110" y="65" font-size="14" fill="#8B0029" font-weight="bold">
      <tspan font-style="italic">p</tspan> (모든 방향)
    </text>

    <!-- Volume change label -->
    <text x="0" y="290" text-anchor="middle" font-size="13" fill="#2563EB">
      <tspan font-style="italic">&#x394;V</tspan> &lt; 0 (수축)
    </text>
  </g>

  <!-- Bottom note -->
  <rect x="60" y="390" width="700" height="36" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
  <text x="410" y="413" text-anchor="middle" font-size="13" fill="#1a1a1a">
    인장: <tspan font-style="italic" fill="#8B0029">F/A</tspan> = <tspan font-style="italic" fill="#8B0029">E</tspan> &#x394;<tspan font-style="italic">L</tspan>/<tspan font-style="italic">L</tspan> &#xA0;&#xA0; 전단: <tspan font-style="italic" fill="#8B0029">F/A</tspan> = <tspan font-style="italic" fill="#8B0029">G</tspan> &#x394;<tspan font-style="italic">x</tspan>/<tspan font-style="italic">L</tspan> &#xA0;&#xA0; 체적: &#x394;<tspan font-style="italic">p</tspan> = &#x2212;<tspan font-style="italic" fill="#8B0029">B</tspan> &#x394;<tspan font-style="italic">V</tspan>/<tspan font-style="italic">V</tspan>
  </text>
</svg>
