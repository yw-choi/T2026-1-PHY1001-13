<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="sans-serif">
  <defs>
    <marker id="fR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
    <marker id="fB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
  </defs>

  <!-- (a) Tension / Compression -->
  <g transform="translate(130,30)">
    <text x="0" y="0" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">(a) 인장 / 압축</text>
    <text x="0" y="18" text-anchor="middle" font-size="14" fill="#6B7280">(Tension / Compression)</text>

    <!-- Original shape (dashed) -->
    <rect x="-40" y="50" width="80" height="180" fill="none" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" rx="3"/>

    <!-- Stretched shape -->
    <rect x="-40" y="35" width="80" height="210" fill="#F3F4F6" stroke="#000000" stroke-width="2" rx="3"/>

    <!-- Force arrows -->
    <line x1="0" y1="35" x2="0" y2="-10" stroke="#8B0029" stroke-width="2.5" marker-end="url(#fR)"/>
    <text x="18" y="-5" font-size="14" fill="#8B0029" font-style="italic">F</text>
    <line x1="0" y1="245" x2="0" y2="295" stroke="#8B0029" stroke-width="2.5" marker-end="url(#fR)"/>
    <text x="18" y="290" font-size="14" fill="#8B0029" font-style="italic">F</text>

    <!-- Delta L -->
    <line x1="60" y1="50" x2="60" y2="35" stroke="#2563EB" stroke-width="1"/>
    <text x="85" y="45" font-size="14" fill="#2563EB">
      <tspan font-style="italic">&#x394;L</tspan>
    </text>

    <!-- L dimension -->
    <line x1="-60" y1="50" x2="-60" y2="230" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="-67" y1="50" x2="-53" y2="50" stroke="#6B7280" stroke-width="1"/>
    <line x1="-67" y1="230" x2="-53" y2="230" stroke="#6B7280" stroke-width="1"/>
    <text x="-75" y="145" font-size="14" fill="#6B7280" font-style="italic">L</text>

    <!-- Area A label -->
    <text x="0" y="155" text-anchor="middle" font-size="14" fill="#6B7280" font-style="italic">A</text>
  </g>

  <!-- (b) Shear -->
  <g transform="translate(400,30)">
    <text x="0" y="0" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">(b) 전단</text>
    <text x="0" y="18" text-anchor="middle" font-size="14" fill="#6B7280">(Shear)</text>

    <!-- Original shape (dashed) -->
    <rect x="-50" y="50" width="100" height="180" fill="none" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" rx="3"/>

    <!-- Sheared shape -->
    <path d="M-30,50 L70,50 L50,230 L-50,230 Z" fill="#F3F4F6" stroke="#000000" stroke-width="2"/>

    <!-- Force arrows -->
    <line x1="20" y1="50" x2="70" y2="50" stroke="#8B0029" stroke-width="2.5" marker-end="url(#fR)"/>
    <text x="75" y="47" font-size="14" fill="#8B0029" font-style="italic">F</text>
    <line x1="0" y1="230" x2="-50" y2="230" stroke="#8B0029" stroke-width="2.5" marker-end="url(#fR)"/>
    <text x="-60" y="227" font-size="14" fill="#8B0029" font-style="italic">F</text>

    <!-- Delta x -->
    <line x1="-50" y1="40" x2="-30" y2="40" stroke="#2563EB" stroke-width="1"/>
    <text x="-40" y="35" font-size="14" fill="#2563EB" text-anchor="middle">
      <tspan font-style="italic">&#x394;x</tspan>
    </text>

    <!-- L dimension -->
    <line x1="-70" y1="50" x2="-70" y2="230" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="-77" y1="50" x2="-63" y2="50" stroke="#6B7280" stroke-width="1"/>
    <line x1="-77" y1="230" x2="-63" y2="230" stroke="#6B7280" stroke-width="1"/>
    <text x="-85" y="145" font-size="14" fill="#6B7280" font-style="italic">L</text>
  </g>

  <!-- (c) Hydraulic (volume) -->
  <g transform="translate(650,30)">
    <text x="0" y="0" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">(c) 체적</text>
    <text x="0" y="18" text-anchor="middle" font-size="14" fill="#6B7280">(Hydraulic)</text>

    <!-- Original circle (dashed) -->
    <circle cx="0" cy="155" r="75" fill="none" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

    <!-- Compressed circle -->
    <circle cx="0" cy="155" r="60" fill="#F3F4F6" stroke="#000000" stroke-width="2"/>

    <!-- Inward arrows all around -->
    <line x1="0" y1="60" x2="0" y2="85" stroke="#8B0029" stroke-width="2.5" marker-end="url(#fR)"/>
    <line x1="0" y1="250" x2="0" y2="225" stroke="#8B0029" stroke-width="2.5" marker-end="url(#fR)"/>
    <line x1="-95" y1="155" x2="-70" y2="155" stroke="#8B0029" stroke-width="2.5" marker-end="url(#fR)"/>
    <line x1="95" y1="155" x2="70" y2="155" stroke="#8B0029" stroke-width="2.5" marker-end="url(#fR)"/>

    <!-- Diagonal arrows -->
    <line x1="-67" y1="88" x2="-47" y2="108" stroke="#8B0029" stroke-width="2" marker-end="url(#fR)"/>
    <line x1="67" y1="88" x2="47" y2="108" stroke="#8B0029" stroke-width="2" marker-end="url(#fR)"/>
    <line x1="-67" y1="222" x2="-47" y2="202" stroke="#8B0029" stroke-width="2" marker-end="url(#fR)"/>
    <line x1="67" y1="222" x2="47" y2="202" stroke="#8B0029" stroke-width="2" marker-end="url(#fR)"/>

    <!-- Label -->
    <text x="0" y="160" text-anchor="middle" font-size="14" fill="#6B7280" font-style="italic">p</text>

    <!-- Delta V -->
    <text x="0" y="290" text-anchor="middle" font-size="14" fill="#2563EB">
      <tspan font-style="italic">&#x394;V</tspan>
    </text>
  </g>
</svg>
