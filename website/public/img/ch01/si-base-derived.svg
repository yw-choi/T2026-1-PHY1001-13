<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 460" font-family="sans-serif">
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="375" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#8B0029">SI 기본량과 유도량</text>

  <!-- Base quantities (left column) -->
  <rect x="40" y="70" width="200" height="42" rx="8" fill="#F3F4F6" stroke="#8B0029" stroke-width="2"/>
  <text x="140" y="96" text-anchor="middle" font-size="14" fill="#000000" font-weight="600">길이 (m)</text>

  <rect x="40" y="130" width="200" height="42" rx="8" fill="#F3F4F6" stroke="#8B0029" stroke-width="2"/>
  <text x="140" y="156" text-anchor="middle" font-size="14" fill="#000000" font-weight="600">질량 (kg)</text>

  <rect x="40" y="190" width="200" height="42" rx="8" fill="#F3F4F6" stroke="#8B0029" stroke-width="2"/>
  <text x="140" y="216" text-anchor="middle" font-size="14" fill="#000000" font-weight="600">시간 (s)</text>

  <rect x="40" y="250" width="200" height="42" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
  <text x="140" y="276" text-anchor="middle" font-size="14" fill="#6B7280">전류 (A)</text>

  <rect x="40" y="310" width="200" height="42" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
  <text x="140" y="336" text-anchor="middle" font-size="14" fill="#6B7280">온도 (K)</text>

  <rect x="40" y="370" width="200" height="42" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
  <text x="140" y="396" text-anchor="middle" font-size="14" fill="#6B7280">물질의 양 (mol)</text>

  <!-- Label for base quantities -->
  <text x="140" y="435" text-anchor="middle" font-size="13" fill="#8B0029" font-weight="600">기본량 (Base Quantities)</text>

  <!-- Derived quantities (right column) -->
  <rect x="460" y="90" width="240" height="42" rx="8" fill="#F3F4F6" stroke="#2563EB" stroke-width="2"/>
  <text x="580" y="116" text-anchor="middle" font-size="14" fill="#000000" font-weight="600">속력 (m/s) = 길이/시간</text>

  <rect x="460" y="155" width="240" height="42" rx="8" fill="#F3F4F6" stroke="#2563EB" stroke-width="2"/>
  <text x="580" y="181" text-anchor="middle" font-size="14" fill="#000000" font-weight="600">가속도 (m/s²)</text>

  <rect x="460" y="220" width="240" height="42" rx="8" fill="#F3F4F6" stroke="#2563EB" stroke-width="2"/>
  <text x="580" y="246" text-anchor="middle" font-size="14" fill="#000000" font-weight="600">힘 (N) = kg·m/s²</text>

  <rect x="460" y="285" width="240" height="42" rx="8" fill="#F3F4F6" stroke="#2563EB" stroke-width="2"/>
  <text x="580" y="311" text-anchor="middle" font-size="14" fill="#000000" font-weight="600">에너지 (J) = kg·m²/s²</text>

  <rect x="460" y="350" width="240" height="42" rx="8" fill="#F3F4F6" stroke="#2563EB" stroke-width="2"/>
  <text x="580" y="376" text-anchor="middle" font-size="14" fill="#000000" font-weight="600">밀도 (kg/m³)</text>

  <!-- Label for derived quantities -->
  <text x="580" y="435" text-anchor="middle" font-size="13" fill="#2563EB" font-weight="600">유도량 (Derived Quantities)</text>

  <!-- Arrows from base to derived -->
  <line x1="240" y1="91" x2="455" y2="111" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowGray)"/>
  <line x1="240" y1="211" x2="455" y2="111" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowGray)"/>

  <line x1="240" y1="91" x2="455" y2="176" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowGray)"/>
  <line x1="240" y1="211" x2="455" y2="176" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowGray)"/>

  <line x1="240" y1="91" x2="455" y2="241" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowGray)"/>
  <line x1="240" y1="151" x2="455" y2="241" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowGray)"/>
  <line x1="240" y1="211" x2="455" y2="241" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowGray)"/>

  <line x1="240" y1="91" x2="455" y2="306" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowGray)"/>
  <line x1="240" y1="151" x2="455" y2="306" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowGray)"/>
  <line x1="240" y1="211" x2="455" y2="306" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowGray)"/>

  <line x1="240" y1="91" x2="455" y2="371" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowGray)"/>
  <line x1="240" y1="151" x2="455" y2="371" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowGray)"/>
</svg>