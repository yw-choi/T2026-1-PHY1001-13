<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 500" font-family="sans-serif">
  <!-- Title -->
  <text x="390" y="35" text-anchor="middle" font-size="18" fill="#8B0029" font-weight="bold">병진 운동 vs 회전 운동</text>

  <!-- Column headers -->
  <rect x="30" y="50" width="230" height="35" rx="6" fill="#8B0029"/>
  <text x="145" y="74" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="bold">병진 운동</text>

  <rect x="275" y="50" width="230" height="35" rx="6" fill="#8B0029"/>
  <text x="390" y="74" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="bold">회전 운동</text>

  <rect x="520" y="50" width="230" height="35" rx="6" fill="#6B7280"/>
  <text x="635" y="74" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="bold">관계</text>

  <!-- Row backgrounds -->
  <rect x="30" y="93" width="720" height="36" fill="#F3F4F6" rx="4"/>
  <rect x="30" y="165" width="720" height="36" fill="#F3F4F6" rx="4"/>
  <rect x="30" y="237" width="720" height="36" fill="#F3F4F6" rx="4"/>
  <rect x="30" y="345" width="720" height="72" fill="#F3F4F6" rx="4"/>
  <rect x="30" y="449" width="720" height="36" fill="#F3F4F6" rx="4"/>

  <!-- Row 1: Position -->
  <text x="145" y="113" text-anchor="middle" font-size="14" fill="#000000">위치: <tspan font-style="italic">x</tspan></text>
  <text x="390" y="113" text-anchor="middle" font-size="14" fill="#000000">각위치: <tspan font-style="italic">&#x3B8;</tspan></text>
  <text x="635" y="113" text-anchor="middle" font-size="14" fill="#6B7280">
    <tspan font-style="italic">s</tspan> = <tspan font-style="italic">&#x3B8;r</tspan>
  </text>

  <!-- Row 2: Velocity -->
  <text x="145" y="149" text-anchor="middle" font-size="14" fill="#000000">
    속도: <tspan font-style="italic">v</tspan> = <tspan font-style="italic">dx</tspan>/<tspan font-style="italic">dt</tspan>
  </text>
  <text x="390" y="149" text-anchor="middle" font-size="14" fill="#000000">
    각속도: <tspan font-style="italic">&#x3C9;</tspan> = <tspan font-style="italic">d&#x3B8;</tspan>/<tspan font-style="italic">dt</tspan>
  </text>
  <text x="635" y="149" text-anchor="middle" font-size="14" fill="#6B7280">
    <tspan font-style="italic">v</tspan> = <tspan font-style="italic">&#x3C9;r</tspan>
  </text>

  <!-- Row 3: Acceleration -->
  <text x="145" y="185" text-anchor="middle" font-size="14" fill="#000000">
    가속도: <tspan font-style="italic">a</tspan> = <tspan font-style="italic">dv</tspan>/<tspan font-style="italic">dt</tspan>
  </text>
  <text x="390" y="185" text-anchor="middle" font-size="14" fill="#000000">
    각가속도: <tspan font-style="italic">&#x3B1;</tspan> = <tspan font-style="italic">d&#x3C9;</tspan>/<tspan font-style="italic">dt</tspan>
  </text>
  <text x="635" y="185" text-anchor="middle" font-size="14" fill="#6B7280">
    <tspan font-style="italic">a</tspan><tspan font-size="10" baseline-shift="sub">t</tspan> = <tspan font-style="italic">&#x3B1;r</tspan>
  </text>

  <!-- Row 4: Mass / I -->
  <text x="145" y="221" text-anchor="middle" font-size="14" fill="#000000">질량: <tspan font-style="italic">m</tspan></text>
  <text x="390" y="221" text-anchor="middle" font-size="14" fill="#000000">관성모멘트: <tspan font-style="italic">I</tspan></text>
  <text x="635" y="221" text-anchor="middle" font-size="14" fill="#6B7280">
    <tspan font-style="italic">I</tspan> = &#x2211;<tspan font-style="italic">m</tspan><tspan font-size="10" baseline-shift="sub">i</tspan><tspan font-style="italic">r</tspan><tspan font-size="10" baseline-shift="sub">i</tspan>&#xB2;
  </text>

  <!-- Row 5: Force / Torque -->
  <text x="145" y="257" text-anchor="middle" font-size="14" fill="#000000">
    힘: <tspan font-style="italic">F</tspan>
  </text>
  <text x="390" y="257" text-anchor="middle" font-size="14" fill="#000000">
    토크: <tspan font-style="italic">&#x3C4;</tspan>
  </text>
  <text x="635" y="257" text-anchor="middle" font-size="14" fill="#6B7280">
    <tspan font-style="italic">&#x3C4;</tspan> = <tspan font-style="italic">rF</tspan> sin <tspan font-style="italic">&#x3C6;</tspan>
  </text>

  <!-- Row 6: Newton's 2nd Law -->
  <text x="145" y="293" text-anchor="middle" font-size="14" fill="#000000">뉴턴 제2법칙:</text>
  <text x="390" y="293" text-anchor="middle" font-size="14" fill="#000000">뉴턴 제2법칙:</text>
  <text x="635" y="293" text-anchor="middle" font-size="14" fill="#6B7280">&#x2014;</text>
  <text x="145" y="329" text-anchor="middle" font-size="14" fill="#8B0029" font-weight="bold">
    <tspan font-style="italic">F</tspan> = <tspan font-style="italic">ma</tspan>
  </text>
  <text x="390" y="329" text-anchor="middle" font-size="14" fill="#8B0029" font-weight="bold">
    <tspan font-style="italic">&#x3C4;</tspan> = <tspan font-style="italic">I&#x3B1;</tspan>
  </text>

  <!-- Row 7: KE -->
  <text x="145" y="365" text-anchor="middle" font-size="14" fill="#000000">운동에너지:</text>
  <text x="390" y="365" text-anchor="middle" font-size="14" fill="#000000">회전 운동에너지:</text>
  <text x="635" y="365" text-anchor="middle" font-size="14" fill="#6B7280">&#x2014;</text>
  <text x="145" y="401" text-anchor="middle" font-size="14" fill="#8B0029" font-weight="bold">
    <tspan font-style="italic">K</tspan> = &#xBD;<tspan font-style="italic">m</tspan><tspan font-style="italic">v</tspan>&#xB2;
  </text>
  <text x="390" y="401" text-anchor="middle" font-size="14" fill="#8B0029" font-weight="bold">
    <tspan font-style="italic">K</tspan> = &#xBD;<tspan font-style="italic">I</tspan><tspan font-style="italic">&#x3C9;</tspan>&#xB2;
  </text>

  <!-- Row 8: Work -->
  <text x="145" y="437" text-anchor="middle" font-size="14" fill="#000000">
    일: <tspan font-style="italic">W</tspan> = <tspan font-style="italic">Fd</tspan>
  </text>
  <text x="390" y="437" text-anchor="middle" font-size="14" fill="#000000">
    일: <tspan font-style="italic">W</tspan> = <tspan font-style="italic">&#x3C4;&#x3B8;</tspan>
  </text>
  <text x="635" y="437" text-anchor="middle" font-size="14" fill="#6B7280">&#x2014;</text>

  <!-- Row 9: Power -->
  <text x="145" y="468" text-anchor="middle" font-size="14" fill="#000000">
    일률: <tspan font-style="italic">P</tspan> = <tspan font-style="italic">Fv</tspan>
  </text>
  <text x="390" y="468" text-anchor="middle" font-size="14" fill="#000000">
    일률: <tspan font-style="italic">P</tspan> = <tspan font-style="italic">&#x3C4;&#x3C9;</tspan>
  </text>
  <text x="635" y="468" text-anchor="middle" font-size="14" fill="#6B7280">&#x2014;</text>

  <!-- Vertical separators -->
  <line x1="270" y1="50" x2="270" y2="480" stroke="#6B7280" stroke-width="1"/>
  <line x1="515" y1="50" x2="515" y2="480" stroke="#6B7280" stroke-width="1"/>
</svg>
