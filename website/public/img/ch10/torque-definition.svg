  <text x="248" y="258" font-size="14" fill="#2563EB" font-style="italic">r sin φ</text>
  <rect x="490" y="300" width="240" height="90" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
  <text x="610" y="328" font-size="14" fill="#8B0029" text-anchor="middle" font-weight="bold">토크 (torque)</text>
  <text x="610" y="355" font-size="16" fill="#1a1a1a" text-anchor="middle" font-style="italic">τ = rF sin φ</text>
  <text x="610" y="380" font-size="14" fill="#6B7280" text-anchor="middle">단위: N·m (뉴턴미터)</text>
