<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 450" font-family="sans-serif">
  <defs>
    <marker id="ar-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
    <marker id="ar-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="ar-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Rigid body outline -->
  <ellipse cx="300" cy="230" rx="200" ry="130" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="300" y="340" text-anchor="middle" font-size="14" fill="#6B7280">강체</text>

  <!-- Rotation axis -->
  <circle cx="160" cy="230" r="5" fill="#000000"/>
  <circle cx="160" cy="230" r="10" fill="none" stroke="#000000" stroke-width="1"/>
  <text x="140" y="265" font-size="14" fill="#000000" font-weight="bold">회전축</text>

  <!-- Position vector r from axis to point P -->
  <line x1="160" y1="230" x2="410" y2="160" stroke="#6B7280" stroke-width="2.5" marker-end="url(#ar-gray)"/>
  <text x="275" y="185" font-size="14" fill="#6B7280" font-weight="bold" font-style="italic">r</text>

  <!-- Point P -->
  <circle cx="410" cy="160" r="6" fill="#8B0029"/>
  <text x="398" y="148" font-size="14" fill="#8B0029" font-weight="bold">P</text>

  <!-- Force F at P (phi=70° from r direction, F_angle=85.6°) -->
  <line x1="410" y1="160" x2="420" y2="30" stroke="#8B0029" stroke-width="2.5" marker-end="url(#ar-red)"/>
  <text x="428" y="35" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">F</text>

  <!-- r-extension dashed (same direction as r, from P) -->
  <line x1="410" y1="160" x2="487" y2="138" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Angle φ arc between r-extension and F -->
  <path d="M 449 149 A 40 40 0 0 0 413 120" fill="none" stroke="#8B0029" stroke-width="1.5"/>
  <text x="444" y="118" font-size="14" fill="#8B0029" font-style="italic" font-weight="bold">&#x3C6;</text>

  <!-- Line of action of F (extended dashed line through P in F direction) -->
  <line x1="401" y1="283" x2="424" y2="20" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="435" y="22" font-size="14" fill="#6B7280">힘의 작용선</text>

  <!-- Moment arm (perpendicular from O to line of action) -->
  <line x1="160" y1="230" x2="403" y2="249" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- Perpendicular marker at foot -->
  <rect x="396" y="242" width="8" height="8" fill="none" stroke="#2563EB" stroke-width="1" transform="rotate(-86, 403, 249)"/>
  <text x="240" y="228" font-size="14" fill="#2563EB" font-weight="bold">모멘트 팔</text>
  <text x="248" y="258" font-size="14" fill="#2563EB">
    <tspan font-style="italic">r</tspan> sin <tspan font-style="italic">&#x3C6;</tspan>
  </text>

  <!-- Formula box -->
  <rect x="490" y="300" width="240" height="90" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
  <text x="610" y="328" text-anchor="middle" font-size="14" fill="#8B0029" font-weight="bold">토크 (torque)</text>
  <text x="610" y="355" text-anchor="middle" font-size="16" fill="#000000">
    <tspan font-style="italic">&#x3C4;</tspan> = <tspan font-style="italic">rF</tspan> sin <tspan font-style="italic">&#x3C6;</tspan>
  </text>
  <text x="610" y="380" text-anchor="middle" font-size="14" fill="#6B7280">단위: N&#xB7;m (뉴턴미터)</text>
</svg>
