<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 450" font-family="sans-serif">
  <defs>
    <marker id="tdR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/></marker>
    <marker id="tdB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/></marker>
    <marker id="tdG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/></marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <ellipse cx="300" cy="230" rx="200" ry="130" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="300" y="340" font-size="14" fill="#6B7280" text-anchor="middle">강체</text>
  <circle cx="160" cy="230" r="5" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="0"/>
  <circle cx="160" cy="230" r="10" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <text x="140" y="265" font-size="14" fill="#1a1a1a" font-weight="bold">회전축</text>
  <line x1="160" y1="230" x2="410" y2="160" stroke="#6B7280" stroke-width="2.5" fill="none" marker-end="url(#tdG)"/>
  <text x="275" y="185" font-size="14" fill="#6B7280" font-weight="bold" font-style="italic">r</text>
  <circle cx="410" cy="160" r="6" fill="#8B0029" stroke="#8B0029" stroke-width="0"/>
  <text x="398" y="148" font-size="14" fill="#8B0029" font-weight="bold">P</text>
  <line x1="410" y1="160" x2="420" y2="30" stroke="#8B0029" stroke-width="2.5" fill="none" marker-end="url(#tdR)"/>
  <text x="428" y="35" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">F</text>
  <line x1="410" y1="160" x2="485.1" y2="139" stroke="#6B7280" stroke-width="1" fill="none" marker-end="url(#tdG)" stroke-dasharray="4 3"/>
  <path d="M 448.5,149.2 A 40,40 0 0,0 413.1,120.1" fill="none" stroke="#8B0029" stroke-width="1.5" data-angle-origin="410,160" data-angle-radius="40" data-angle-start="15.6" data-angle-end="85.6"/>
  <text x="445.5" y="121.7" font-size="14" fill="#8B0029" text-anchor="middle" font-weight="bold" font-style="italic">φ</text>
  <line x1="401" y1="283" x2="424" y2="20" stroke="#6B7280" stroke-width="1" fill="none" stroke-dasharray="4 3"/>
