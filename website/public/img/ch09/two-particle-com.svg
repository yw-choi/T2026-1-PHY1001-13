<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="sans-serif">
  <defs>
    <marker id="arrowBlack" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
  </defs>

  <!-- Formula box at top -->
  <rect x="140" y="15" width="420" height="55" rx="8" fill="#F3F4F6" stroke="#8B0029" stroke-width="1"/>
  <!-- x_com = (m1 x1 + m2 x2) / (m1 + m2) -->
  <!-- Numerator -->
  <text x="220" y="38" font-size="14" fill="#8B0029" text-anchor="middle">
    <tspan font-style="italic">x</tspan><tspan font-size="10" baseline-shift="sub">com</tspan>
    =
  </text>
  <text x="350" y="38" font-size="14" fill="#8B0029" text-anchor="middle">
    <tspan font-style="italic">m</tspan><tspan font-size="10" baseline-shift="sub">1</tspan><tspan font-style="italic">x</tspan><tspan font-size="10" baseline-shift="sub">1</tspan>
    + <tspan font-style="italic">m</tspan><tspan font-size="10" baseline-shift="sub">2</tspan><tspan font-style="italic">x</tspan><tspan font-size="10" baseline-shift="sub">2</tspan>
  </text>
  <!-- Fraction line -->
  <line x1="280" y1="44" x2="430" y2="44" stroke="#8B0029" stroke-width="1.5"/>
  <!-- Denominator -->
  <text x="355" y="60" font-size="14" fill="#8B0029" text-anchor="middle">
    <tspan font-style="italic">m</tspan><tspan font-size="10" baseline-shift="sub">1</tspan>
    + <tspan font-style="italic">m</tspan><tspan font-size="10" baseline-shift="sub">2</tspan>
  </text>

  <!-- x-axis -->
  <line x1="60" y1="240" x2="650" y2="240" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowBlack)"/>
  <text x="660" y="245" font-size="14" fill="#6B7280" font-style="italic">x</text>

  <!-- Origin -->
  <text x="60" y="262" font-size="14" fill="#6B7280" text-anchor="middle">O</text>
  <line x1="60" y1="235" x2="60" y2="245" stroke="#6B7280" stroke-width="1"/>

  <!-- Particle 1 -->
  <circle cx="180" cy="160" r="28" fill="#F3F4F6" stroke="#000000" stroke-width="2"/>
  <text x="180" y="166" font-size="14" fill="#000000" text-anchor="middle" font-weight="bold">
    <tspan font-style="italic">m</tspan><tspan font-size="10" baseline-shift="sub">1</tspan>
  </text>

  <!-- Dashed line from m1 to axis -->
  <line x1="180" y1="190" x2="180" y2="240" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="180" y="262" font-size="14" fill="#6B7280" text-anchor="middle">
    <tspan font-style="italic">x</tspan><tspan font-size="10" baseline-shift="sub">1</tspan>
  </text>

  <!-- Particle 2 -->
  <circle cx="500" cy="130" r="38" fill="#F3F4F6" stroke="#000000" stroke-width="2"/>
  <text x="500" y="136" font-size="14" fill="#000000" text-anchor="middle" font-weight="bold">
    <tspan font-style="italic">m</tspan><tspan font-size="10" baseline-shift="sub">2</tspan>
  </text>

  <!-- Dashed line from m2 to axis -->
  <line x1="500" y1="170" x2="500" y2="240" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="500" y="262" font-size="14" fill="#6B7280" text-anchor="middle">
    <tspan font-style="italic">x</tspan><tspan font-size="10" baseline-shift="sub">2</tspan>
  </text>

  <!-- Center of mass marker -->
  <line x1="387" y1="222" x2="387" y2="240" stroke="#8B0029" stroke-width="2"/>
  <polygon points="377,222 387,205 397,222" fill="#8B0029"/>
  <text x="387" y="262" font-size="14" fill="#8B0029" text-anchor="middle" font-weight="bold">
    <tspan font-style="italic">x</tspan><tspan font-size="10" baseline-shift="sub">com</tspan>
  </text>

  <!-- Distance bracket -->
  <line x1="60" y1="295" x2="387" y2="295" stroke="#6B7280" stroke-width="1" marker-end="url(#arrowBlack)"/>
  <line x1="60" y1="290" x2="60" y2="300" stroke="#6B7280" stroke-width="1"/>
  <line x1="387" y1="290" x2="387" y2="300" stroke="#6B7280" stroke-width="1"/>
</svg>
