<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 440" font-family="sans-serif">
  <defs>
    <marker id="arrRed2d" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
    <marker id="arrBlue2d" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrGray2d" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Divider -->
  <line x1="375" y1="30" x2="375" y2="320" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- === Before (left) === -->
  <text x="188" y="30" font-size="14" fill="#000000" text-anchor="middle" font-weight="bold">충돌 전</text>

  <!-- x-axis (before) -->
  <line x1="40" y1="200" x2="350" y2="200" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrGray2d)"/>
  <text x="358" y="205" font-size="14" fill="#6B7280" font-style="italic">x</text>

  <!-- m1 approaching -->
  <circle cx="100" cy="200" r="22" fill="#F3F4F6" stroke="#000000" stroke-width="2"/>
  <text x="100" y="206" font-size="14" fill="#000000" text-anchor="middle" font-weight="bold">
    <tspan font-style="italic">m</tspan><tspan font-size="9" baseline-shift="sub">1</tspan>
  </text>
  <!-- v1i arrow -->
  <line x1="127" y1="200" x2="200" y2="200" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arrRed2d)"/>
  <text x="165" y="188" font-size="14" fill="#8B0029" text-anchor="middle" font-weight="bold">
    <tspan font-style="italic">v</tspan><tspan font-size="10" baseline-shift="sub">1i</tspan>
  </text>

  <!-- m2 at rest (target) -->
  <circle cx="270" cy="200" r="26" fill="#F3F4F6" stroke="#000000" stroke-width="2"/>
  <text x="270" y="206" font-size="14" fill="#000000" text-anchor="middle" font-weight="bold">
    <tspan font-style="italic">m</tspan><tspan font-size="9" baseline-shift="sub">2</tspan>
  </text>
  <text x="270" y="247" font-size="13" fill="#6B7280" text-anchor="middle">(정지)</text>

  <!-- === After (right) === -->
  <text x="562" y="30" font-size="14" fill="#000000" text-anchor="middle" font-weight="bold">충돌 후</text>

  <!-- x-axis (after) -->
  <line x1="400" y1="200" x2="720" y2="200" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrGray2d)"/>
  <text x="728" y="205" font-size="14" fill="#6B7280" font-style="italic">x</text>

  <!-- Collision point -->
  <circle cx="470" cy="200" r="4" fill="#6B7280"/>

  <!-- m1 scattered upward -->
  <circle cx="590" cy="105" r="22" fill="#F3F4F6" stroke="#000000" stroke-width="2"/>
  <text x="590" y="111" font-size="14" fill="#000000" text-anchor="middle" font-weight="bold">
    <tspan font-style="italic">m</tspan><tspan font-size="9" baseline-shift="sub">1</tspan>
  </text>
  <!-- v1f arrow -->
  <line x1="476" y1="194" x2="564" y2="118" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arrRed2d)"/>
  <text x="505" y="140" font-size="14" fill="#8B0029" font-weight="bold">
    <tspan font-style="italic">v</tspan><tspan font-size="10" baseline-shift="sub">1f</tspan>
  </text>

  <!-- Angle theta1 -->
  <path d="M 510,200 A 40,40 0 0,0 505,170" stroke="#8B0029" stroke-width="1" fill="none"/>
  <text x="525" y="185" font-size="14" fill="#8B0029">
    <tspan font-style="italic">&#x3B8;</tspan><tspan font-size="10" baseline-shift="sub">1</tspan>
  </text>

  <!-- m2 scattered downward -->
  <circle cx="630" cy="300" r="26" fill="#F3F4F6" stroke="#000000" stroke-width="2"/>
  <text x="630" y="306" font-size="14" fill="#000000" text-anchor="middle" font-weight="bold">
    <tspan font-style="italic">m</tspan><tspan font-size="9" baseline-shift="sub">2</tspan>
  </text>
  <!-- v2f arrow -->
  <line x1="476" y1="206" x2="601" y2="286" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrBlue2d)"/>
  <text x="555" y="275" font-size="14" fill="#2563EB" font-weight="bold">
    <tspan font-style="italic">v</tspan><tspan font-size="10" baseline-shift="sub">2f</tspan>
  </text>

  <!-- Angle theta2 -->
  <path d="M 515,200 A 45,45 0 0,1 510,232" stroke="#2563EB" stroke-width="1" fill="none"/>
  <text x="525" y="228" font-size="14" fill="#2563EB">
    <tspan font-style="italic">&#x3B8;</tspan><tspan font-size="10" baseline-shift="sub">2</tspan>
  </text>

  <!-- Conservation equations -->
  <rect x="60" y="340" width="630" height="85" rx="8" fill="#F3F4F6" stroke="#8B0029" stroke-width="1"/>
  <text x="375" y="365" font-size="14" fill="#8B0029" text-anchor="middle" font-weight="bold">2차원 탄성 충돌 보존법칙</text>

  <!-- x-component -->
  <text x="375" y="390" font-size="14" fill="#8B0029" text-anchor="middle">
    <tspan font-style="italic">x</tspan> :
    <tspan font-style="italic">m</tspan><tspan font-size="9" baseline-shift="sub">1</tspan><tspan font-style="italic">v</tspan><tspan font-size="9" baseline-shift="sub">1i</tspan>
    = <tspan font-style="italic">m</tspan><tspan font-size="9" baseline-shift="sub">1</tspan><tspan font-style="italic">v</tspan><tspan font-size="9" baseline-shift="sub">1f</tspan>cos<tspan font-style="italic">&#x3B8;</tspan><tspan font-size="9" baseline-shift="sub">1</tspan>
    + <tspan font-style="italic">m</tspan><tspan font-size="9" baseline-shift="sub">2</tspan><tspan font-style="italic">v</tspan><tspan font-size="9" baseline-shift="sub">2f</tspan>cos<tspan font-style="italic">&#x3B8;</tspan><tspan font-size="9" baseline-shift="sub">2</tspan>
  </text>

  <!-- y-component -->
  <text x="375" y="415" font-size="14" fill="#2563EB" text-anchor="middle">
    <tspan font-style="italic">y</tspan> :
    0 = <tspan font-style="italic">m</tspan><tspan font-size="9" baseline-shift="sub">1</tspan><tspan font-style="italic">v</tspan><tspan font-size="9" baseline-shift="sub">1f</tspan>sin<tspan font-style="italic">&#x3B8;</tspan><tspan font-size="9" baseline-shift="sub">1</tspan>
    &#x2212; <tspan font-style="italic">m</tspan><tspan font-size="9" baseline-shift="sub">2</tspan><tspan font-style="italic">v</tspan><tspan font-size="9" baseline-shift="sub">2f</tspan>sin<tspan font-style="italic">&#x3B8;</tspan><tspan font-size="9" baseline-shift="sub">2</tspan>
  </text>
</svg>
