<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 420" font-family="sans-serif">
  <defs>
    <marker id="arrRed2d" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
    <marker id="arrBlue2d" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrGray2d" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Divider -->
  <line x1="375" y1="30" x2="375" y2="390" stroke="#eee" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- === Before (left) === -->
  <text x="188" y="30" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="bold">충돌 전</text>

  <!-- x-axis (before) -->
  <line x1="40" y1="210" x2="350" y2="210" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrGray2d)"/>
  <text x="358" y="215" font-size="13" fill="#6B7280" font-style="italic">x</text>

  <!-- m1 approaching -->
  <circle cx="100" cy="210" r="22" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2"/>
  <text x="100" y="215" font-size="13" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-style="italic">m<tspan font-size="9" dy="3">1</tspan></text>
  <!-- v1i arrow -->
  <line x1="127" y1="210" x2="200" y2="210" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arrRed2d)"/>
  <text x="165" y="198" font-size="14" fill="#8B0029" text-anchor="middle" font-weight="bold" font-style="italic">v<tspan font-size="10" dy="3">1i</tspan></text>

  <!-- m2 at rest (target) -->
  <circle cx="270" cy="210" r="26" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2"/>
  <text x="270" y="215" font-size="13" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-style="italic">m<tspan font-size="9" dy="3">2</tspan></text>
  <text x="270" y="255" font-size="13" fill="#6B7280" text-anchor="middle">(정지)</text>

  <!-- === After (right) === -->
  <text x="562" y="30" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="bold">충돌 후</text>

  <!-- x-axis (after) -->
  <line x1="400" y1="210" x2="720" y2="210" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrGray2d)"/>
  <text x="728" y="215" font-size="13" fill="#6B7280" font-style="italic">x</text>

  <!-- Collision point -->
  <circle cx="480" cy="210" r="4" fill="#6B7280"/>

  <!-- m1 scattered upward -->
  <circle cx="570" cy="120" r="22" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2"/>
  <text x="570" y="125" font-size="13" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-style="italic">m<tspan font-size="9" dy="3">1</tspan></text>
  <!-- v1f arrow -->
  <line x1="485" y1="205" x2="545" y2="132" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arrRed2d)"/>
  <text x="500" y="150" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">v<tspan font-size="10" dy="3">1f</tspan></text>

  <!-- Angle theta1 -->
  <path d="M 520,210 A 40,40 0 0,0 515,175" stroke="#8B0029" stroke-width="1.5" fill="none"/>
  <text x="535" y="195" font-size="13" fill="#8B0029" font-style="italic">&#x3B8;<tspan font-size="10" dy="3">1</tspan></text>

  <!-- m2 scattered downward -->
  <circle cx="620" cy="300" r="26" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2"/>
  <text x="620" y="305" font-size="13" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-style="italic">m<tspan font-size="9" dy="3">2</tspan></text>
  <!-- v2f arrow -->
  <line x1="485" y1="215" x2="592" y2="286" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrBlue2d)"/>
  <text x="555" y="275" font-size="14" fill="#2563EB" font-weight="bold" font-style="italic">v<tspan font-size="10" dy="3">2f</tspan></text>

  <!-- Angle theta2 -->
  <path d="M 525,210 A 45,45 0 0,1 518,248" stroke="#2563EB" stroke-width="1.5" fill="none"/>
  <text x="538" y="240" font-size="13" fill="#2563EB" font-style="italic">&#x3B8;<tspan font-size="10" dy="3">2</tspan></text>

  <!-- Conservation equations -->
  <rect x="100" y="320" width="550" height="75" rx="8" fill="#f8f0f2" stroke="#e0c0c8" stroke-width="1"/>
  <text x="375" y="345" font-size="13" fill="#8B0029" text-anchor="middle" font-weight="bold">2차원 탄성 충돌 보존법칙</text>
  <text x="375" y="365" font-size="12" fill="#8B0029" text-anchor="middle" font-style="italic">x: m<tspan font-size="9" dy="2">1</tspan><tspan dy="-2">v</tspan><tspan font-size="9" dy="2">1i</tspan><tspan dy="-2"> = m</tspan><tspan font-size="9" dy="2">1</tspan><tspan dy="-2">v</tspan><tspan font-size="9" dy="2">1f</tspan><tspan dy="-2">cos&#x3B8;</tspan><tspan font-size="9" dy="2">1</tspan><tspan dy="-2"> + m</tspan><tspan font-size="9" dy="2">2</tspan><tspan dy="-2">v</tspan><tspan font-size="9" dy="2">2f</tspan><tspan dy="-2">cos&#x3B8;</tspan><tspan font-size="9" dy="2">2</tspan></text>
  <text x="375" y="385" font-size="12" fill="#2563EB" text-anchor="middle" font-style="italic">y: 0 = m<tspan font-size="9" dy="2">1</tspan><tspan dy="-2">v</tspan><tspan font-size="9" dy="2">1f</tspan><tspan dy="-2">sin&#x3B8;</tspan><tspan font-size="9" dy="2">1</tspan><tspan dy="-2"> - m</tspan><tspan font-size="9" dy="2">2</tspan><tspan dy="-2">v</tspan><tspan font-size="9" dy="2">2f</tspan><tspan dy="-2">sin&#x3B8;</tspan><tspan font-size="9" dy="2">2</tspan></text>
</svg>