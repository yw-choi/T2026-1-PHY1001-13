<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -35 750 490" font-family="sans-serif">
  <defs>
    <marker id="arrRedR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
    <marker id="arrBlueR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrGrayR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Divider -->
  <line x1="375" y1="30" x2="375" y2="360" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- === Time t (left) === -->
  <text x="188" y="30" font-size="14" fill="#000000" text-anchor="middle" font-weight="bold">시각 <tspan font-style="italic">t</tspan></text>

  <!-- Rocket body at time t -->
  <rect x="130" y="100" width="80" height="160" rx="10" fill="#F3F4F6" stroke="#000000" stroke-width="2"/>
  <!-- Nose cone -->
  <polygon points="130,100 170,50 210,100" fill="#F3F4F6" stroke="#000000" stroke-width="2"/>

  <!-- Labels -->
  <text x="170" y="175" font-size="16" fill="#000000" text-anchor="middle" font-weight="bold" font-style="italic">M</text>
  <text x="170" y="200" font-size="12" fill="#6B7280" text-anchor="middle">(로켓+연료)</text>

  <!-- velocity arrow upward -->
  <line x1="170" y1="48" x2="170" y2="-5" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrBlueR)"/>
  <text x="185" y="15" font-size="14" fill="#2563EB" font-weight="bold">
    <tspan font-style="italic">v</tspan>
  </text>

  <!-- Momentum label -->
  <text x="170" y="310" font-size="14" fill="#6B7280" text-anchor="middle">
    총 운동량: <tspan font-style="italic">Mv</tspan>
  </text>

  <!-- === Time t + dt (right) === -->
  <text x="562" y="30" font-size="14" fill="#000000" text-anchor="middle" font-weight="bold">
    시각 <tspan font-style="italic">t</tspan> + <tspan font-style="italic">dt</tspan>
  </text>

  <!-- Rocket body (smaller - fuel consumed) -->
  <rect x="500" y="100" width="80" height="130" rx="10" fill="#F3F4F6" stroke="#000000" stroke-width="2"/>
  <polygon points="500,100 540,55 580,100" fill="#F3F4F6" stroke="#000000" stroke-width="2"/>

  <text x="540" y="165" font-size="14" fill="#000000" text-anchor="middle" font-weight="bold">
    <tspan font-style="italic">M</tspan> + <tspan font-style="italic">dM</tspan>
  </text>
  <text x="540" y="182" font-size="11" fill="#6B7280" text-anchor="middle">(<tspan font-style="italic">dM</tspan> &lt; 0)</text>

  <!-- velocity arrow (v + dv) -->
  <line x1="540" y1="53" x2="540" y2="-10" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrBlueR)"/>
  <text x="560" y="15" font-size="14" fill="#2563EB" font-weight="bold">
    <tspan font-style="italic">v</tspan> + <tspan font-style="italic">dv</tspan>
  </text>

  <!-- Exhaust flame -->
  <path d="M 520,232 Q 530,250 540,245 Q 550,250 560,232" stroke="#8B0029" stroke-width="1" fill="#F3F4F6"/>
  <path d="M 525,240 Q 535,268 540,260 Q 545,268 555,240" stroke="#8B0029" stroke-width="1" fill="#F3F4F6"/>

  <!-- Exhaust gas -->
  <ellipse cx="540" cy="295" rx="25" ry="15" fill="#F3F4F6" stroke="#8B0029" stroke-width="1.5"/>
  <text x="540" y="296" font-size="14" fill="#8B0029" text-anchor="middle" font-weight="bold">&#x2212;<tspan font-style="italic">dM</tspan></text>

  <!-- Exhaust ground-frame velocity arrow (downward) -->
  <line x1="540" y1="313" x2="540" y2="360" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arrRedR)"/>
  <text x="575" y="338" font-size="14" fill="#8B0029" font-weight="bold">
    <tspan font-style="italic">v</tspan> &#x2212; <tspan font-style="italic">v</tspan><tspan font-size="10" baseline-shift="sub">rel</tspan>
  </text>
  <text x="575" y="358" font-size="11" fill="#6B7280">(지면 기준)</text>

  <!-- v_rel brace annotation -->
  <line x1="470" y1="165" x2="470" y2="295" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="460" y1="165" x2="470" y2="165" stroke="#6B7280" stroke-width="1"/>
  <line x1="460" y1="295" x2="470" y2="295" stroke="#6B7280" stroke-width="1"/>
  <!-- v_rel arrow between rocket and exhaust -->
  <line x1="470" y1="180" x2="470" y2="280" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrGrayR)"/>
  <text x="435" y="235" font-size="12" fill="#6B7280" text-anchor="middle">
    <tspan font-style="italic">v</tspan><tspan font-size="9" baseline-shift="sub">rel</tspan>
  </text>
  <text x="435" y="250" font-size="10" fill="#6B7280" text-anchor="middle">(상대 속력)</text>

  <!-- Notation box -->
  <rect x="80" y="385" width="590" height="80" rx="8" fill="#F3F4F6" stroke="#8B0029" stroke-width="1"/>
  <text x="375" y="405" font-size="13" fill="#000000" text-anchor="middle">
    <tspan font-style="italic">dM</tspan> &lt; 0: 로켓 질량 변화 &#160;&#160;|&#160;&#160;
    &#x2212;<tspan font-style="italic">dM</tspan> &gt; 0: 분출된 가스 질량 &#160;&#160;|&#160;&#160;
    <tspan font-style="italic">v</tspan><tspan font-size="10" baseline-shift="sub">rel</tspan> &gt; 0: 상대 속력
  </text>
  <text x="375" y="428" font-size="13" fill="#8B0029" text-anchor="middle" font-weight="bold">치올코프스키 로켓 방정식</text>
  <text x="375" y="450" font-size="14" fill="#8B0029" text-anchor="middle">
    <tspan font-style="italic">v</tspan><tspan font-size="10" baseline-shift="sub">f</tspan>
    &#x2212; <tspan font-style="italic">v</tspan><tspan font-size="10" baseline-shift="sub">i</tspan>
    = <tspan font-style="italic">v</tspan><tspan font-size="10" baseline-shift="sub">rel</tspan>
    ln(<tspan font-style="italic">M</tspan><tspan font-size="10" baseline-shift="sub">i</tspan>
    / <tspan font-style="italic">M</tspan><tspan font-size="10" baseline-shift="sub">f</tspan>)
  </text>
</svg>
