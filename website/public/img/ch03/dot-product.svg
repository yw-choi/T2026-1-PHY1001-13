<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="sans-serif">
  <defs>
    <marker id="dpR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/></marker>
    <marker id="dpB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/></marker>
    <marker id="dpG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/></marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <line x1="100" y1="300" x2="550" y2="300" stroke="#8B0029" stroke-width="2.5" fill="none" marker-end="url(#dpR)"/>
  <line x1="100" y1="300" x2="420" y2="110" stroke="#2563EB" stroke-width="2.5" fill="none" marker-end="url(#dpB)"/>
  <text x="330" y="330" font-size="18" fill="#8B0029" font-weight="bold" font-style="italic">a</text>
  <text x="240" y="180" font-size="18" fill="#2563EB" font-weight="bold" font-style="italic">b</text>
  <path d="M 180,300 A 80,80 0 0,0 168.8,259.2" fill="none" stroke="#6B7280" stroke-width="1.5" data-angle-origin="100,300" data-angle-radius="80" data-angle-start="0" data-angle-end="30.7"/>
  <text x="192.6" y="279.6" font-size="16" fill="#6B7280" text-anchor="middle" font-weight="bold" font-style="italic">φ</text>
  <line x1="420" y1="110" x2="375.2" y2="300" stroke="#6B7280" stroke-width="1" fill="none" stroke-dasharray="4 3"/>
  <line x1="100" y1="300" x2="375.2" y2="300" stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#dpG)"/>
  <rect x="360.2" y="285" width="15" height="15" fill="none" stroke="#6B7280" stroke-width="1"/>
  <line x1="100" y1="345" x2="375.2" y2="345" stroke="#6B7280" stroke-width="1" fill="none"/>
  <line x1="100" y1="345" x2="100" y2="340" stroke="#6B7280" stroke-width="1" fill="none"/>
  <line x1="375.2" y1="345" x2="375.2" y2="340" stroke="#6B7280" stroke-width="1" fill="none"/>
  <text x="237.6" y="360" font-size="14" fill="#6B7280" text-anchor="middle" font-style="italic">b cos φ  (b의 a 방향 사영)</text>
  <text x="450" y="80" font-size="16" fill="#8B0029" font-weight="bold">a · b = ab cos φ</text>
  <text x="450" y="110" font-size="14" fill="#6B7280">= (a 방향 b의 사영) × a</text>
</svg>
