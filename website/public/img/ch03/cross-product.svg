<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 435" font-family="sans-serif">
  <defs>
    <marker id="cpR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/></marker>
    <marker id="cpB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/></marker>
    <marker id="cpG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/></marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <text x="200" y="30" font-size="15" fill="#6B7280" text-anchor="middle" font-weight="bold">외적의 기하학적 의미</text>
  <polygon points="80,320 320,320 490,190 250,190" fill="#F3F4F6" stroke="#8B0029" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="80" y1="320" x2="320" y2="320" stroke="#8B0029" stroke-width="2.5" fill="none" marker-end="url(#cpR)"/>
  <line x1="80" y1="320" x2="250" y2="190" stroke="#2563EB" stroke-width="2.5" fill="none" marker-end="url(#cpB)"/>
  <line x1="80" y1="320" x2="80" y2="80" stroke="#6B7280" stroke-width="2.5" fill="none" marker-end="url(#cpG)"/>
  <text x="200" y="345" font-size="18" fill="#8B0029" font-weight="bold" font-style="italic">a</text>
  <text x="140" y="240" font-size="18" fill="#2563EB" font-weight="bold" font-style="italic">b</text>
  <text x="52" y="190" font-size="16" fill="#6B7280" font-weight="bold" font-style="italic">c</text>
  <text x="40" y="210" font-size="12" fill="#6B7280">= a × b</text>
  <path d="M 150,320 A 70,70 0 0,0 135.6,277.5" fill="none" stroke="#6B7280" stroke-width="1.5" data-angle-origin="80,320" data-angle-radius="70" data-angle-start="0" data-angle-end="37.4"/>
  <text x="161.5" y="297.4" font-size="16" fill="#6B7280" text-anchor="middle" font-weight="bold" font-style="italic">φ</text>
  <text x="260" y="270" font-size="13" fill="#8B0029">넓이 = ab sin φ</text>
  <text x="268" y="288" font-size="13" fill="#8B0029">= |a × b|</text>
  <line x1="400" y1="30" x2="400" y2="400" stroke="#F3F4F6" stroke-width="2" fill="none"/>
  <text x="570" y="30" font-size="15" fill="#6B7280" text-anchor="middle" font-weight="bold">오른손 법칙</text>
  <line x1="490" y1="300" x2="600" y2="300" stroke="#8B0029" stroke-width="2.5" fill="none" marker-end="url(#cpR)"/>
  <line x1="490" y1="300" x2="560" y2="210" stroke="#2563EB" stroke-width="2.5" fill="none" marker-end="url(#cpB)"/>
  <line x1="490" y1="300" x2="490" y2="100" stroke="#6B7280" stroke-width="2.5" fill="none" marker-end="url(#cpG)"/>
  <text x="545" y="330" font-size="16" fill="#8B0029" font-style="italic">a</text>
  <text x="510" y="245" font-size="16" fill="#2563EB" font-style="italic">b</text>
  <text x="498" y="180" font-size="14" fill="#6B7280">a × b</text>
  <path d="M 570 290 C 590 260, 580 240, 555 225" fill="none" stroke="#6B7280" stroke-width="1.2" marker-end="url(#cpG)"/>
  <text x="595" y="260" font-size="12" fill="#6B7280">손가락</text>
  <text x="595" y="276" font-size="12" fill="#6B7280">감는 방향</text>
  <text x="440" y="370" font-size="13" fill="#6B7280">1. 오른손 손가락을 a 방향으로</text>
  <text x="440" y="390" font-size="13" fill="#6B7280">2. b 방향으로 감아 쥔다</text>
  <text x="440" y="410" font-size="13" fill="#6B7280">3. 엄지 방향 = a × b 방향</text>
</svg>
