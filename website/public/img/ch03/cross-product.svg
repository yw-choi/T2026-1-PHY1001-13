<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 420" font-family="sans-serif">
  <defs>
    <marker id="ax-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
    <marker id="ax-b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="ax-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
  </defs>
  <!-- Left: cross product geometry -->
  <text x="200" y="30" text-anchor="middle" font-size="15" fill="#6B7280" font-weight="bold">외적의 기하학적 의미</text>
  <!-- Vector a along x-ish -->
  <line x1="80" y1="320" x2="320" y2="320" stroke="#8B0029" stroke-width="2.5" marker-end="url(#ax-r)"/>
  <text x="200" y="345" font-size="18" fill="#8B0029" font-weight="bold" font-style="italic">a</text>
  <!-- Vector b at angle -->
  <line x1="80" y1="320" x2="250" y2="190" stroke="#2563EB" stroke-width="2.5" marker-end="url(#ax-b)"/>
  <text x="140" y="240" font-size="18" fill="#2563EB" font-weight="bold" font-style="italic">b</text>
  <!-- Angle arc -->
  <path d="M 150 320 A 70 70 0 0 0 133 278" fill="none" stroke="#6B7280" stroke-width="1.5"/>
  <text x="155" y="295" font-size="16" fill="#6B7280" font-style="italic">&phi;</text>
  <!-- c = a x b pointing up (out of plane) -->
  <line x1="80" y1="320" x2="80" y2="80" stroke="#6B7280" stroke-width="2.5" marker-end="url(#ax-g)"/>
  <text x="52" y="190" font-size="16" fill="#6B7280" font-weight="bold" font-style="italic">c</text>
  <text x="40" y="210" font-size="12" fill="#6B7280">= a &times; b</text>
  <!-- Parallelogram area (shaded) -->
  <polygon points="80,320 320,320 490,190 250,190" fill="#8B0029" fill-opacity="0.08" stroke="#8B0029" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="260" y="270" font-size="13" fill="#8B0029">넓이 = ab sin &phi;</text>
  <text x="268" y="288" font-size="13" fill="#8B0029">= |a &times; b|</text>
  <!-- Divider -->
  <line x1="400" y1="30" x2="400" y2="400" stroke="#F3F4F6" stroke-width="2"/>
  <!-- Right: right-hand rule -->
  <text x="570" y="30" text-anchor="middle" font-size="15" fill="#6B7280" font-weight="bold">오른손 법칙</text>
  <!-- Curved arrow suggesting finger curl -->
  <path d="M 490 300 L 600 300" stroke="#8B0029" stroke-width="2.5" marker-end="url(#ax-r)"/>
  <text x="545" y="330" font-size="16" fill="#8B0029" font-style="italic">a</text>
  <path d="M 490 300 L 560 210" stroke="#2563EB" stroke-width="2.5" marker-end="url(#ax-b)"/>
  <text x="510" y="245" font-size="16" fill="#2563EB" font-style="italic">b</text>
  <!-- Thumb pointing up -->
  <line x1="490" y1="300" x2="490" y2="100" stroke="#6B7280" stroke-width="2.5" marker-end="url(#ax-g)"/>
  <text x="498" y="180" font-size="14" fill="#6B7280">a &times; b</text>
  <!-- Curl arrow -->
  <path d="M 570 290 C 590 260, 580 240, 555 225" fill="none" stroke="#6B7280" stroke-width="1.5" marker-end="url(#ax-g)"/>
  <text x="595" y="260" font-size="12" fill="#6B7280">손가락</text>
  <text x="595" y="276" font-size="12" fill="#6B7280">감는 방향</text>
  <!-- Instructions -->
  <text x="440" y="370" font-size="13" fill="#6B7280">1. 오른손 손가락을 a 방향으로</text>
  <text x="440" y="390" font-size="13" fill="#6B7280">2. b 방향으로 감아 쥔다</text>
  <text x="440" y="410" font-size="13" fill="#6B7280">3. 엄지 방향 = a &times; b 방향</text>
</svg>