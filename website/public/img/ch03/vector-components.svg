<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 420" font-family="sans-serif">
  <defs>
    <marker id="ac-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
    <marker id="ac-b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="ac-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B7280"/>
    </marker>
  </defs>
  <!-- Axes -->
  <line x1="80" y1="350" x2="600" y2="350" stroke="#6B7280" stroke-width="1.5" marker-end="url(#ac-g)"/>
  <line x1="80" y1="350" x2="80" y2="40" stroke="#6B7280" stroke-width="1.5" marker-end="url(#ac-g)"/>
  <text x="610" y="355" font-size="15" fill="#6B7280" font-style="italic">x</text>
  <text x="70" y="35" font-size="15" fill="#6B7280" font-style="italic">y</text>
  <!-- Origin -->
  <text x="65" y="370" font-size="14" fill="#6B7280">O</text>
  <!-- Vector a -->
  <line x1="80" y1="350" x2="460" y2="100" stroke="#8B0029" stroke-width="2.5" marker-end="url(#ac-r)"/>
  <text x="290" y="195" font-size="18" fill="#8B0029" font-weight="bold" font-style="italic">a</text>
  <!-- x-component -->
  <line x1="80" y1="350" x2="460" y2="350" stroke="#2563EB" stroke-width="2" marker-end="url(#ac-b)"/>
  <text x="270" y="385" font-size="15" fill="#2563EB" font-style="italic">a</text>
  <text x="280" y="390" font-size="11" fill="#2563EB">x</text>
  <text x="295" y="385" font-size="14" fill="#2563EB">= a cos </text>
  <text x="378" y="385" font-size="14" fill="#2563EB" font-style="italic">&theta;</text>
  <!-- y-component -->
  <line x1="460" y1="350" x2="460" y2="105" stroke="#2563EB" stroke-width="2" marker-end="url(#ac-b)"/>
  <text x="478" y="230" font-size="15" fill="#2563EB" font-style="italic">a</text>
  <text x="488" y="235" font-size="11" fill="#2563EB">y</text>
  <text x="500" y="230" font-size="14" fill="#2563EB">= a sin </text>
  <text x="568" y="230" font-size="14" fill="#2563EB" font-style="italic">&theta;</text>
  <!-- Dashed projection lines -->
  <line x1="460" y1="350" x2="460" y2="100" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" opacity="0.3"/>
  <!-- Angle arc -->
  <path d="M 140 350 A 60 60 0 0 0 118 314" fill="none" stroke="#8B0029" stroke-width="1.5"/>
  <text x="148" y="330" font-size="16" fill="#8B0029" font-style="italic">&theta;</text>
  <!-- Right angle mark -->
  <rect x="445" y="335" width="15" height="15" fill="none" stroke="#6B7280" stroke-width="1"/>
  <!-- Magnitude -->
  <text x="160" y="160" font-size="14" fill="#6B7280" font-style="italic">a</text>
  <text x="174" y="160" font-size="14" fill="#6B7280"> = </text>
  <text x="195" y="160" font-size="14" fill="#6B7280">&radic;(a</text>
  <text x="224" y="164" font-size="10" fill="#6B7280">x</text>
  <text x="231" y="160" font-size="14" fill="#6B7280">&sup2; + a</text>
  <text x="275" y="164" font-size="10" fill="#6B7280">y</text>
  <text x="282" y="160" font-size="14" fill="#6B7280">&sup2;)</text>
</svg>