<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 420" font-family="sans-serif">
  <defs>
    <marker id="vcR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/></marker>
    <marker id="vcB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/></marker>
    <marker id="vcG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/></marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <line x1="80" y1="350" x2="600" y2="350" stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#vcG)"/>
  <line x1="80" y1="350" x2="80" y2="40" stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#vcG)"/>
  <text x="610" y="355" font-size="15" fill="#6B7280" font-style="italic">x</text>
  <text x="70" y="35" font-size="15" fill="#6B7280" font-style="italic">y</text>
  <text x="65" y="370" font-size="14" fill="#6B7280">O</text>
  <line x1="80" y1="350" x2="460" y2="100" stroke="#8B0029" stroke-width="2.5" fill="none" marker-end="url(#vcR)"/>
  <text x="290" y="195" font-size="18" fill="#8B0029" font-weight="bold" font-style="italic">a</text>
  <line x1="80" y1="350" x2="460" y2="350" stroke="#2563EB" stroke-width="2" fill="none" marker-end="url(#vcB)"/>
  <line x1="460" y1="350" x2="460" y2="100" stroke="#2563EB" stroke-width="2" fill="none" marker-end="url(#vcB)"/>
  <line x1="460" y1="350" x2="460" y2="100" stroke="#6B7280" stroke-width="1" fill="none" stroke-dasharray="4 3"/>
  <text x="270" y="385" font-size="14" fill="#2563EB" font-style="italic">aₓ = a cos θ</text>
  <text x="478" y="230" font-size="14" fill="#2563EB" font-style="italic">aᵧ = a sin θ</text>
  <path d="M 140,350 A 60,60 0 0,0 130.1,317" fill="none" stroke="#8B0029" stroke-width="1.5" data-angle-origin="80,350" data-angle-radius="60" data-angle-start="0" data-angle-end="33.3"/>
  <text x="152.8" y="333.2" font-size="16" fill="#8B0029" text-anchor="middle" font-weight="bold" font-style="italic">θ</text>
  <rect x="445" y="335" width="15" height="15" fill="none" stroke="#6B7280" stroke-width="1"/>
  <text x="160" y="160" font-size="14" fill="#6B7280" font-style="italic">a = √(aₓ² + aᵧ²)</text>
</svg>
