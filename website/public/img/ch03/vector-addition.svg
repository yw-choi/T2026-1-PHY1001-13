<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 380" font-family="sans-serif">
  <defs>
    <marker id="arr-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
    <marker id="arr-b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
  </defs>
  <!-- Title: Head-to-tail -->
  <text x="175" y="30" text-anchor="middle" font-size="15" fill="#6B7280" font-weight="bold">머리-꼬리 방법</text>
  <!-- a vector -->
  <line x1="50" y1="280" x2="200" y2="160" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arr-r)"/>
  <text x="100" y="200" font-size="16" fill="#8B0029" font-weight="bold" font-style="italic">a</text>
  <!-- b vector from head of a -->
  <line x1="205" y1="157" x2="320" y2="240" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arr-b)"/>
  <text x="275" y="185" font-size="16" fill="#2563EB" font-weight="bold" font-style="italic">b</text>
  <!-- s = a+b -->
  <line x1="50" y1="280" x2="322" y2="243" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <text x="180" y="290" font-size="16" fill="#6B7280" font-weight="bold" font-style="italic">s</text>
  <text x="195" y="290" font-size="14" fill="#6B7280">= </text>
  <text x="207" y="290" font-size="14" fill="#8B0029" font-style="italic">a</text>
  <text x="218" y="290" font-size="14" fill="#6B7280"> + </text>
  <text x="230" y="290" font-size="14" fill="#2563EB" font-style="italic">b</text>
  <!-- Divider -->
  <line x1="380" y1="40" x2="380" y2="350" stroke="#F3F4F6" stroke-width="2"/>
  <!-- Title: Parallelogram -->
  <text x="565" y="30" text-anchor="middle" font-size="15" fill="#6B7280" font-weight="bold">평행사변형 방법</text>
  <!-- a vector -->
  <line x1="430" y1="280" x2="580" y2="160" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arr-r)"/>
  <text x="480" y="200" font-size="16" fill="#8B0029" font-weight="bold" font-style="italic">a</text>
  <!-- b vector from same origin -->
  <line x1="430" y1="280" x2="620" y2="260" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arr-b)"/>
  <text x="520" y="290" font-size="16" fill="#2563EB" font-weight="bold" font-style="italic">b</text>
  <!-- Parallelogram dashed lines -->
  <line x1="585" y1="157" x2="705" y2="140" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="625" y1="257" x2="705" y2="140" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- s = a+b diagonal -->
  <line x1="430" y1="280" x2="700" y2="143" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <text x="580" y="230" font-size="16" fill="#6B7280" font-weight="bold" font-style="italic">s</text>
  <text x="595" y="230" font-size="14" fill="#6B7280">= </text>
  <text x="607" y="230" font-size="14" fill="#8B0029" font-style="italic">a</text>
  <text x="618" y="230" font-size="14" fill="#6B7280"> + </text>
  <text x="630" y="230" font-size="14" fill="#2563EB" font-style="italic">b</text>
</svg>