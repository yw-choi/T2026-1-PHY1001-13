<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 450" font-family="sans-serif">
  <defs>
    <marker id="au-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
    <marker id="au-b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="au-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
  </defs>
  <!-- x-axis -->
  <line x1="200" y1="320" x2="560" y2="320" stroke="#6B7280" stroke-width="2" marker-end="url(#au-g)"/>
  <text x="575" y="325" font-size="15" fill="#6B7280" font-style="italic">x</text>
  <!-- y-axis -->
  <line x1="200" y1="320" x2="200" y2="50" stroke="#6B7280" stroke-width="2" marker-end="url(#au-g)"/>
  <text x="188" y="40" font-size="15" fill="#6B7280" font-style="italic">y</text>
  <!-- z-axis (coming out toward viewer, drawn as diagonal) -->
  <line x1="200" y1="320" x2="90" y2="400" stroke="#6B7280" stroke-width="2" marker-end="url(#au-g)"/>
  <text x="72" y="415" font-size="15" fill="#6B7280" font-style="italic">z</text>
  <!-- i-hat unit vector -->
  <line x1="200" y1="320" x2="310" y2="320" stroke="#8B0029" stroke-width="2.5" marker-end="url(#au-r)"/>
  <text x="250" y="310" font-size="18" fill="#8B0029" font-weight="bold" font-style="italic">i</text>
  <text x="243" y="297" font-size="13" fill="#8B0029">^</text>
  <!-- j-hat unit vector -->
  <line x1="200" y1="320" x2="200" y2="210" stroke="#2563EB" stroke-width="2.5" marker-end="url(#au-b)"/>
  <text x="208" y="265" font-size="18" fill="#2563EB" font-weight="bold" font-style="italic">j</text>
  <text x="205" y="252" font-size="13" fill="#2563EB">^</text>
  <!-- k-hat unit vector -->
  <line x1="200" y1="320" x2="145" y2="365" stroke="#6B7280" stroke-width="2.5" marker-end="url(#au-g)"/>
  <text x="158" y="355" font-size="18" fill="#6B7280" font-weight="bold" font-style="italic">k</text>
  <text x="153" y="342" font-size="13" fill="#6B7280">^</text>
  <!-- Right-hand rule illustration -->
  <text x="370" y="80" font-size="15" fill="#6B7280" font-weight="bold">오른손 좌표계</text>
  <text x="370" y="105" font-size="13" fill="#6B7280">오른손 엄지 = x</text>
  <text x="370" y="125" font-size="13" fill="#6B7280">오른손 검지 = y</text>
  <text x="370" y="145" font-size="13" fill="#6B7280">오른손 중지 = z</text>
  <!-- Labels with hat notation -->
  <text x="320" y="345" font-size="14" fill="#8B0029">|</text>
  <text x="322" y="345" font-size="14" fill="#8B0029" font-style="italic">i</text>
  <text x="318" y="332" font-size="10" fill="#8B0029">^</text>
  <text x="330" y="345" font-size="14" fill="#8B0029">| = 1 (양의 x 방향)</text>
  <text x="215" y="200" font-size="14" fill="#2563EB">|</text>
  <text x="217" y="200" font-size="14" fill="#2563EB" font-style="italic">j</text>
  <text x="213" y="187" font-size="10" fill="#2563EB">^</text>
  <text x="225" y="200" font-size="14" fill="#2563EB">| = 1 (양의 y 방향)</text>
  <text x="80" y="430" font-size="14" fill="#6B7280">|</text>
  <text x="82" y="430" font-size="14" fill="#6B7280" font-style="italic">k</text>
  <text x="78" y="417" font-size="10" fill="#6B7280">^</text>
  <text x="90" y="430" font-size="14" fill="#6B7280">| = 1 (양의 z 방향)</text>
</svg>