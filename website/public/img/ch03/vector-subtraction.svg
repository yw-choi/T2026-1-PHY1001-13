<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" font-family="sans-serif">
  <defs>
    <marker id="ar-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
    <marker id="ar-b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="ar-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
  </defs>
  <!-- Left: show -b -->
  <text x="170" y="30" text-anchor="middle" font-size="15" fill="#6B7280" font-weight="bold">-b 만들기</text>
  <!-- b vector -->
  <line x1="60" y1="200" x2="200" y2="140" stroke="#2563EB" stroke-width="2.5" marker-end="url(#ar-b)"/>
  <text x="140" y="155" font-size="16" fill="#2563EB" font-weight="bold" font-style="italic">b</text>
  <!-- -b vector (reversed) -->
  <line x1="200" y1="240" x2="60" y2="300" stroke="#2563EB" stroke-width="2.5" marker-end="url(#ar-b)" stroke-dasharray="6 3"/>
  <text x="110" y="290" font-size="16" fill="#2563EB" font-weight="bold">-</text>
  <text x="120" y="290" font-size="16" fill="#2563EB" font-weight="bold" font-style="italic">b</text>
  <!-- Divider -->
  <line x1="340" y1="30" x2="340" y2="330" stroke="#F3F4F6" stroke-width="2"/>
  <!-- Right: d = a - b = a + (-b) -->
  <text x="520" y="30" text-anchor="middle" font-size="15" fill="#6B7280" font-weight="bold">d = a - b = a + (-b)</text>
  <!-- a vector -->
  <line x1="380" y1="270" x2="530" y2="130" stroke="#8B0029" stroke-width="2.5" marker-end="url(#ar-r)"/>
  <text x="430" y="180" font-size="16" fill="#8B0029" font-weight="bold" font-style="italic">a</text>
  <!-- -b from head of a -->
  <line x1="535" y1="127" x2="610" y2="240" stroke="#2563EB" stroke-width="2.5" marker-end="url(#ar-b)" stroke-dasharray="6 3"/>
  <text x="585" y="170" font-size="16" fill="#2563EB" font-weight="bold">-</text>
  <text x="595" y="170" font-size="16" fill="#2563EB" font-weight="bold" font-style="italic">b</text>
  <!-- d = a - b -->
  <line x1="380" y1="270" x2="612" y2="243" stroke="#6B7280" stroke-width="2.5" marker-end="url(#ar-g)"/>
  <text x="490" y="280" font-size="16" fill="#6B7280" font-weight="bold" font-style="italic">d</text>
  <text x="505" y="280" font-size="14" fill="#6B7280">= </text>
  <text x="517" y="280" font-size="14" fill="#8B0029" font-style="italic">a</text>
  <text x="528" y="280" font-size="14" fill="#6B7280"> - </text>
  <text x="540" y="280" font-size="14" fill="#2563EB" font-style="italic">b</text>
</svg>