<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400" font-family="sans-serif">
  <defs>
    <marker id="esArr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" fill="#6B7280">
      <polygon points="0 0, 8 3, 0 6"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="375" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#8B0029">미시상태와 거시상태 — 4개 분자, 2칸 상자</text>

  <!-- Configuration I: (4,0) -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="60" height="60" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
    <rect x="60" y="0" width="60" height="60" fill="white" stroke="#6B7280" stroke-width="2"/>
    <line x1="60" y1="0" x2="60" y2="60" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <circle cx="20" cy="20" r="7" fill="#8B0029"/>
    <circle cx="42" cy="20" r="7" fill="#8B0029"/>
    <circle cx="20" cy="42" r="7" fill="#8B0029"/>
    <circle cx="42" cy="42" r="7" fill="#8B0029"/>
    <text x="60" y="85" text-anchor="middle" font-size="12" fill="#6B7280">(4, 0)</text>
    <text x="60" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#8B0029">W = 1</text>
  </g>

  <!-- Configuration II: (3,1) -->
  <g transform="translate(190, 60)">
    <rect x="0" y="0" width="60" height="60" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
    <rect x="60" y="0" width="60" height="60" fill="white" stroke="#6B7280" stroke-width="2"/>
    <line x1="60" y1="0" x2="60" y2="60" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <circle cx="18" cy="18" r="7" fill="#8B0029"/>
    <circle cx="42" cy="18" r="7" fill="#8B0029"/>
    <circle cx="30" cy="42" r="7" fill="#8B0029"/>
    <circle cx="82" cy="30" r="7" fill="#2563EB"/>
    <text x="60" y="85" text-anchor="middle" font-size="12" fill="#6B7280">(3, 1)</text>
    <text x="60" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#8B0029">W = 4</text>
  </g>

  <!-- Configuration III: (2,2) — most probable -->
  <g transform="translate(330, 60)">
    <rect x="0" y="0" width="60" height="60" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
    <rect x="60" y="0" width="60" height="60" fill="white" stroke="#6B7280" stroke-width="2"/>
    <line x1="60" y1="0" x2="60" y2="60" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <circle cx="20" cy="22" r="7" fill="#8B0029"/>
    <circle cx="42" cy="38" r="7" fill="#8B0029"/>
    <circle cx="80" cy="22" r="7" fill="#2563EB"/>
    <circle cx="100" cy="38" r="7" fill="#2563EB"/>
    <text x="60" y="85" text-anchor="middle" font-size="12" fill="#6B7280">(2, 2)</text>
    <text x="60" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#8B0029">W = 6</text>
    <!-- Highlight as most probable -->
    <rect x="-5" y="-5" width="130" height="70" rx="6" fill="none" stroke="#8B0029" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="60" y="115" text-anchor="middle" font-size="11" fill="#8B0029" font-weight="bold">← 가장 확률 높음</text>
  </g>

  <!-- Configuration IV: (1,3) -->
  <g transform="translate(470, 60)">
    <rect x="0" y="0" width="60" height="60" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
    <rect x="60" y="0" width="60" height="60" fill="white" stroke="#6B7280" stroke-width="2"/>
    <line x1="60" y1="0" x2="60" y2="60" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <circle cx="30" cy="30" r="7" fill="#8B0029"/>
    <circle cx="78" cy="18" r="7" fill="#2563EB"/>
    <circle cx="100" cy="18" r="7" fill="#2563EB"/>
    <circle cx="88" cy="42" r="7" fill="#2563EB"/>
    <text x="60" y="85" text-anchor="middle" font-size="12" fill="#6B7280">(1, 3)</text>
    <text x="60" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#8B0029">W = 4</text>
  </g>

  <!-- Configuration V: (0,4) -->
  <g transform="translate(610, 60)">
    <rect x="0" y="0" width="60" height="60" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
    <rect x="60" y="0" width="60" height="60" fill="white" stroke="#6B7280" stroke-width="2"/>
    <line x1="60" y1="0" x2="60" y2="60" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <circle cx="78" cy="20" r="7" fill="#2563EB"/>
    <circle cx="100" cy="20" r="7" fill="#2563EB"/>
    <circle cx="78" cy="42" r="7" fill="#2563EB"/>
    <circle cx="100" cy="42" r="7" fill="#2563EB"/>
    <text x="60" y="85" text-anchor="middle" font-size="12" fill="#6B7280">(0, 4)</text>
    <text x="60" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#8B0029">W = 1</text>
  </g>

  <!-- Formulas section -->
  <text x="375" y="220" text-anchor="middle" font-size="15" font-weight="bold" fill="#6B7280">다중도 (multiplicity)</text>

  <text x="375" y="248" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029" font-style="italic">W = N! / (n<tspan baseline-shift="sub" font-size="11">1</tspan>! · n<tspan baseline-shift="sub" font-size="11">2</tspan>!)</text>

  <text x="375" y="280" text-anchor="middle" font-size="13" fill="#6B7280">전체 미시상태 수: 1 + 4 + 6 + 4 + 1 = 2<tspan baseline-shift="super" font-size="10">4</tspan> = 16</text>

  <!-- Boltzmann equation -->
  <rect x="120" y="300" width="510" height="80" rx="10" fill="#F3F4F6" stroke="#8B0029" stroke-width="2"/>
  <text x="375" y="325" text-anchor="middle" font-size="15" fill="#6B7280">볼츠만의 엔트로피 공식</text>
  <text x="375" y="355" text-anchor="middle" font-size="20" font-weight="bold" fill="#8B0029" font-style="italic">S = k ln W</text>
  <text x="375" y="375" text-anchor="middle" font-size="12" fill="#6B7280">k = 1.38 × 10<tspan baseline-shift="super" font-size="9">−23</tspan> J/K (볼츠만 상수)</text>
</svg>
