<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" font-family="sans-serif">
  <defs>
    <marker id="arr-down" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8B0029"/>
    </marker>
    <marker id="arr-right" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563EB"/>
    </marker>
    <marker id="arr-down-b" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563EB"/>
    </marker>
  </defs>

  <!-- High-temperature reservoir -->
  <rect x="175" y="30" width="250" height="60" rx="8" fill="#8B0029" fill-opacity="0.15" stroke="#8B0029" stroke-width="2"/>
  <text x="300" y="55" text-anchor="middle" font-size="15" font-weight="bold" fill="#8B0029">고온 열원</text>
  <text x="300" y="78" text-anchor="middle" font-size="14" font-style="italic" fill="#8B0029">T<tspan baseline-shift="sub" font-size="10">H</tspan></text>

  <!-- Q_H arrow down -->
  <line x1="300" y1="95" x2="300" y2="175" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arr-down)"/>
  <text x="320" y="145" font-size="14" font-weight="bold" fill="#8B0029" font-style="italic">|Q<tspan baseline-shift="sub" font-size="10">H</tspan>|</text>

  <!-- Engine box -->
  <rect x="230" y="180" width="140" height="80" rx="10" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="300" y="215" text-anchor="middle" font-size="16" font-weight="bold" fill="#6B7280">엔진</text>
  <text x="300" y="240" text-anchor="middle" font-size="12" fill="#6B7280">(Engine)</text>

  <!-- W arrow right -->
  <line x1="375" y1="220" x2="500" y2="220" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arr-right)"/>
  <text x="450" y="210" font-size="14" font-weight="bold" fill="#2563EB">W</text>

  <!-- Q_L arrow down -->
  <line x1="300" y1="265" x2="300" y2="345" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arr-down-b)"/>
  <text x="320" y="315" font-size="14" font-weight="bold" fill="#2563EB" font-style="italic">|Q<tspan baseline-shift="sub" font-size="10">L</tspan>|</text>

  <!-- Low-temperature reservoir -->
  <rect x="175" y="350" width="250" height="60" rx="8" fill="#2563EB" fill-opacity="0.1" stroke="#2563EB" stroke-width="2"/>
  <text x="300" y="375" text-anchor="middle" font-size="15" font-weight="bold" fill="#2563EB">저온 열원</text>
  <text x="300" y="398" text-anchor="middle" font-size="14" font-style="italic" fill="#2563EB">T<tspan baseline-shift="sub" font-size="10">L</tspan></text>

  <!-- Energy conservation -->
  <text x="300" y="450" text-anchor="middle" font-size="13" fill="#6B7280">|Q<tspan baseline-shift="sub" font-size="10">H</tspan>| = W + |Q<tspan baseline-shift="sub" font-size="10">L</tspan>|</text>
  <text x="300" y="475" text-anchor="middle" font-size="13" fill="#8B0029" font-weight="bold">효율: ε = W / |Q<tspan baseline-shift="sub" font-size="10">H</tspan>| = 1 − T<tspan baseline-shift="sub" font-size="10">L</tspan>/T<tspan baseline-shift="sub" font-size="10">H</tspan></text>
</svg>
