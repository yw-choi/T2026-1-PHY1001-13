<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="sans-serif">
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B7280"/>
    </marker>
  </defs>
  <!-- Axes -->
  <line x1="60" y1="360" x2="660" y2="360" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <line x1="60" y1="360" x2="60" y2="40" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="650" y="390" font-size="16" fill="#6B7280" font-style="italic">x</text>
  <text x="35" y="50" font-size="16" fill="#6B7280" font-style="italic">y</text>
  <!-- Origin -->
  <text x="45" y="385" font-size="14" fill="#6B7280">O</text>
  <!-- Curved path -->
  <path d="M 200 280 C 280 140, 380 100, 500 200" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="370" y="105" font-size="13" fill="#6B7280">경로</text>
  <!-- Point 1 -->
  <circle cx="200" cy="280" r="6" fill="#2563EB"/>
  <text x="175" y="268" font-size="14" fill="#2563EB" font-weight="bold">P₁</text>
  <text x="155" y="250" font-size="13" fill="#6B7280">(t₁)</text>
  <!-- Point 2 -->
  <circle cx="500" cy="200" r="6" fill="#2563EB"/>
  <text x="510" y="195" font-size="14" fill="#2563EB" font-weight="bold">P₂</text>
  <text x="510" y="215" font-size="13" fill="#6B7280">(t₂)</text>
  <!-- Position vector r1 -->
  <line x1="60" y1="360" x2="194" y2="283" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="95" y="305" font-size="16" fill="#2563EB" font-style="italic" font-weight="bold">r</text>
  <text x="107" y="310" font-size="11" fill="#2563EB">₁</text>
  <!-- Position vector r2 -->
  <line x1="60" y1="360" x2="494" y2="203" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="260" y="260" font-size="16" fill="#2563EB" font-style="italic" font-weight="bold">r</text>
  <text x="272" y="265" font-size="11" fill="#2563EB">₂</text>
  <!-- Displacement vector -->
  <line x1="200" y1="280" x2="494" y2="203" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <text x="340" y="225" font-size="16" fill="#8B0029" font-weight="bold" font-style="italic">Δr</text>
  <text x="370" y="225" font-size="13" fill="#8B0029">= r₂ − r₁</text>
  <!-- Dashed projections -->
  <line x1="200" y1="280" x2="200" y2="360" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="500" y1="200" x2="500" y2="360" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="200" y1="280" x2="60" y2="280" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="500" y1="200" x2="60" y2="200" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Coordinate labels -->
  <text x="190" y="395" font-size="12" fill="#6B7280" font-style="italic">x₁</text>
  <text x="490" y="395" font-size="12" fill="#6B7280" font-style="italic">x₂</text>
  <text x="25" y="285" font-size="12" fill="#6B7280" font-style="italic">y₁</text>
  <text x="25" y="205" font-size="12" fill="#6B7280" font-style="italic">y₂</text>
</svg>