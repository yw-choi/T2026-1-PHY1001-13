<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="sans-serif">
  <defs>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B7280"/>
    </marker>
  </defs>
  <!-- Axes -->
  <line x1="50" y1="350" x2="650" y2="350" stroke="#6B7280" stroke-width="2" marker-end="url(#arr-gray)"/>
  <line x1="50" y1="350" x2="50" y2="40" stroke="#6B7280" stroke-width="2" marker-end="url(#arr-gray)"/>
  <text x="640" y="375" font-size="14" fill="#6B7280" font-style="italic">x</text>
  <text x="28" y="50" font-size="14" fill="#6B7280" font-style="italic">y</text>
  <!-- Curved path -->
  <path d="M 120 300 C 200 100, 350 60, 450 150 C 550 240, 580 280, 600 300" fill="none" stroke="#6B7280" stroke-width="2"/>
  <text x="180" y="80" font-size="14" fill="#6B7280">입자의 경로</text>
  <!-- Point A -->
  <circle cx="200" cy="185" r="5" fill="#8B0029"/>
  <!-- Tangent velocity at A -->
  <line x1="200" y1="185" x2="300" y2="120" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arr-red)"/>
  <text x="260" y="110" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">v</text>
  <text x="273" y="115" font-size="11" fill="#8B0029">A</text>
  <!-- Point B -->
  <circle cx="380" cy="110" r="5" fill="#8B0029"/>
  <!-- Tangent velocity at B -->
  <line x1="380" y1="110" x2="460" y2="120" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arr-red)"/>
  <text x="440" y="105" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">v</text>
  <text x="453" y="110" font-size="11" fill="#8B0029">B</text>
  <!-- Point C -->
  <circle cx="510" cy="205" r="5" fill="#8B0029"/>
  <!-- Tangent velocity at C -->
  <line x1="510" y1="205" x2="580" y2="255" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arr-red)"/>
  <text x="565" y="240" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">v</text>
  <text x="578" y="245" font-size="11" fill="#8B0029">C</text>
  <!-- Annotation -->
  <rect x="350" y="300" width="260" height="60" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
  <text x="365" y="322" font-size="14" fill="#1a1a1a">순간 속도의 방향 =</text>
  <text x="365" y="348" font-size="14" fill="#8B0029" font-weight="bold">경로의 접선 방향</text>
</svg>