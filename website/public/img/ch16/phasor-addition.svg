<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="sans-serif">
  <defs>
    <marker id="phArrR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="phArrB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="phArrG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6B7280">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <text x="350" y="25" text-anchor="middle" font-size="17" font-weight="bold" fill="#8B0029">위상자(Phasor) 덧셈</text>

  <!-- Coordinate axes -->
  <g transform="translate(200, 220)">
    <!-- Axes -->
    <line x1="-150" y1="0" x2="200" y2="0" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="0" y1="130" x2="0" y2="-150" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

    <!-- Rotation arrow (omega) -->
    <path d="M 30,-130 A 135,135 0 0,0 -50,-125" fill="none" stroke="#6B7280" stroke-width="1.5" marker-end="url(#phArrG)"/>
    <text x="-15" y="-140" text-anchor="middle" font-size="14" fill="#6B7280" font-style="italic">&#x3C9;</text>

    <!-- Phasor 1: y_m1 at angle from positive x-axis -->
    <line x1="0" y1="0" x2="120" y2="-40" stroke="#2563EB" stroke-width="2.5" marker-end="url(#phArrB)"/>
    <text x="65" y="-45" font-size="15" fill="#2563EB" font-weight="bold" font-style="italic">y</text>
    <text x="76" y="-40" font-size="11" fill="#2563EB" font-style="italic">m1</text>

    <!-- Phasor 2: y_m2 from tip of phasor 1, phase shifted by phi -->
    <line x1="120" y1="-40" x2="170" y2="-130" stroke="#8B0029" stroke-width="2.5" marker-end="url(#phArrR)"/>
    <text x="165" y="-80" font-size="15" fill="#8B0029" font-weight="bold" font-style="italic">y</text>
    <text x="176" y="-75" font-size="11" fill="#8B0029" font-style="italic">m2</text>

    <!-- Resultant phasor -->
    <line x1="0" y1="0" x2="170" y2="-130" stroke="#6B7280" stroke-width="2" stroke-dasharray="6 3"/>
    <text x="105" y="-105" font-size="15" fill="#6B7280" font-weight="bold" font-style="italic">y'</text>
    <text x="116" y="-100" font-size="11" fill="#6B7280" font-style="italic">m</text>

    <!-- Angle phi between phasors -->
    <path d="M 108,-36 A 20,20 0 0,0 112,-55" fill="none" stroke="#8B0029" stroke-width="1.5"/>
    <text x="130" y="-48" font-size="14" fill="#8B0029" font-style="italic">&#x3D5;</text>

    <!-- Angle beta for resultant -->
    <path d="M 50,0 A 50,50 0 0,0 44,-33" fill="none" stroke="#6B7280" stroke-width="1.5"/>
    <text x="55" y="-15" font-size="13" fill="#6B7280" font-style="italic">&#x3B2;</text>

    <!-- Projection lines to y-axis -->
    <line x1="0" y1="-130" x2="170" y2="-130" stroke="#6B7280" stroke-width="0.8" stroke-dasharray="3 2"/>
    <text x="-10" y="-127" text-anchor="end" font-size="12" fill="#6B7280" font-style="italic">y'</text>
  </g>

  <!-- Equations on the right -->
  <g transform="translate(460, 80)">
    <rect x="0" y="0" width="220" height="260" rx="10" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>

    <text x="110" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#8B0029">파동 합성</text>

    <text x="15" y="60" font-size="13" fill="#2563EB">y&#x2081; = y</text>
    <text x="85" y="64" font-size="10" fill="#2563EB">m1</text>
    <text x="98" y="60" font-size="13" fill="#2563EB"> sin(kx &#x2212; &#x3C9;t)</text>

    <text x="15" y="90" font-size="13" fill="#8B0029">y&#x2082; = y</text>
    <text x="85" y="94" font-size="10" fill="#8B0029">m2</text>
    <text x="98" y="90" font-size="13" fill="#8B0029"> sin(kx &#x2212; &#x3C9;t + &#x3D5;)</text>

    <line x1="15" y1="105" x2="205" y2="105" stroke="#6B7280" stroke-width="0.8"/>

    <text x="15" y="130" font-size="13" fill="#1a1a1a" font-weight="bold">합성파:</text>
    <text x="15" y="155" font-size="13" fill="#6B7280">y' = y'</text>
    <text x="53" y="159" font-size="10" fill="#6B7280">m</text>
    <text x="62" y="155" font-size="13" fill="#6B7280"> sin(kx &#x2212; &#x3C9;t + &#x3B2;)</text>

    <text x="15" y="185" font-size="12" fill="#1a1a1a">y'</text>
    <text x="27" y="189" font-size="9" fill="#1a1a1a">m</text>
    <text x="35" y="185" font-size="12" fill="#1a1a1a"> = 위상자 벡터합의 크기</text>

    <text x="15" y="210" font-size="12" fill="#1a1a1a">&#x3B2; = 합성 위상자의 각도</text>

    <line x1="15" y1="222" x2="205" y2="222" stroke="#6B7280" stroke-width="0.8"/>

    <text x="15" y="245" font-size="12" fill="#6B7280">같은 진폭(y</text>
    <text x="95" y="249" font-size="9" fill="#6B7280">m1</text>
    <text x="107" y="245" font-size="12" fill="#6B7280">=y</text>
    <text x="118" y="249" font-size="9" fill="#6B7280">m2</text>
    <text x="130" y="245" font-size="12" fill="#6B7280">=y</text>
    <text x="141" y="249" font-size="9" fill="#6B7280">m</text>
    <text x="148" y="245" font-size="12" fill="#6B7280">)일 때:</text>
    <text x="15" y="265" font-size="12" fill="#8B0029" font-weight="bold">y'</text>
    <text x="27" y="269" font-size="9" fill="#8B0029">m</text>
    <text x="35" y="265" font-size="12" fill="#8B0029" font-weight="bold"> = |2y</text>
    <text x="72" y="269" font-size="9" fill="#8B0029">m</text>
    <text x="80" y="265" font-size="12" fill="#8B0029" font-weight="bold"> cos(&#x3D5;/2)|</text>
  </g>
</svg>
