<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="sans-serif">
  <defs>
    <marker id="phR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/></marker>
    <marker id="phB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/></marker>
    <marker id="phG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/></marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <text x="350" y="25" font-size="17" fill="#8B0029" text-anchor="middle" font-weight="bold">위상자(Phasor) 덧셈</text>
  <line x1="50" y1="220" x2="400" y2="220" stroke="#6B7280" stroke-width="1" fill="none" stroke-dasharray="4 3"/>
  <line x1="200" y1="350" x2="200" y2="70" stroke="#6B7280" stroke-width="1" fill="none" stroke-dasharray="4 3"/>
  <path d="M 211.8,85.5 A 135,135 0 0,0 104.5,124.5" fill="none" stroke="#6B7280" stroke-width="1.5" data-angle-origin="200,220" data-angle-radius="135" data-angle-start="85" data-angle-end="135"/>
  <text x="185" y="80" font-size="14" fill="#6B7280" text-anchor="middle" font-style="italic">ω</text>
  <line x1="200" y1="220" x2="312.8" y2="179" stroke="#2563EB" stroke-width="2.5" fill="none" marker-end="url(#phB)"/>
  <text x="256.4" y="187.5" font-size="15" fill="#2563EB" font-weight="bold" font-style="italic">yₘ₁</text>
  <line x1="200" y1="220" x2="232.4" y2="120.1" stroke="#8B0029" stroke-width="2.5" fill="none" marker-end="url(#phR)"/>
  <text x="228.2" y="170.1" font-size="15" fill="#8B0029" font-weight="bold" font-style="italic">yₘ₂</text>
  <line x1="312.8" y1="179" x2="345.2" y2="79.1" stroke="#8B0029" stroke-width="1.3" fill="none" stroke-dasharray="5 3"/>
  <line x1="232.4" y1="120.1" x2="345.2" y2="79.1" stroke="#2563EB" stroke-width="1.3" fill="none" stroke-dasharray="5 3"/>
  <line x1="200" y1="220" x2="345.2" y2="79.1" stroke="#6B7280" stroke-width="2.4" fill="none" marker-end="url(#phG)"/>
  <text x="284.6" y="141.5" font-size="15" fill="#6B7280" font-weight="bold" font-style="italic">y′ₘ</text>
  <path d="M 235.7,207 A 38,38 0 0,0 211.7,183.9" fill="none" stroke="#8B0029" stroke-width="1.5" data-angle-origin="200,220" data-angle-radius="38" data-angle-start="20" data-angle-end="72"/>
  <text x="237.5" y="186.2" font-size="14" fill="#8B0029" text-anchor="middle" font-weight="bold" font-style="italic">φ</text>
  <path d="M 258,220 A 58,58 0 0,0 241.6,179.6" fill="none" stroke="#6B7280" stroke-width="1.5" data-angle-origin="200,220" data-angle-radius="58" data-angle-start="0" data-angle-end="44.1"/>
  <text x="268.6" y="197.2" font-size="13" fill="#6B7280" text-anchor="middle" font-weight="bold" font-style="italic">β</text>
  <rect x="460" y="80" width="220" height="275" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
  <text x="570" y="110" font-size="14" fill="#8B0029" text-anchor="middle" font-weight="bold">파동 합성</text>
  <text x="475" y="140" font-size="13" fill="#2563EB" font-style="italic">y₁ = yₘ₁ sin(kx − ωt)</text>
  <text x="475" y="170" font-size="13" fill="#8B0029" font-style="italic">y₂ = yₘ₂ sin(kx − ωt + φ)</text>
  <line x1="475" y1="185" x2="665" y2="185" stroke="#6B7280" stroke-width="0.8" fill="none"/>
  <text x="475" y="210" font-size="13" fill="#1a1a1a" font-weight="bold">합성파:</text>
  <text x="475" y="235" font-size="13" fill="#6B7280" font-style="italic">y′ = y′ₘ sin(kx − ωt + β)</text>
  <text x="475" y="265" font-size="12" fill="#1a1a1a">y′ₘ = 위상자 벡터합의 크기</text>
  <text x="475" y="290" font-size="12" fill="#1a1a1a">β = 합성 위상자의 각도</text>
  <line x1="475" y1="302" x2="665" y2="302" stroke="#6B7280" stroke-width="0.8" fill="none"/>
  <text x="475" y="325" font-size="12" fill="#6B7280">같은 진폭(yₘ₁=yₘ₂=yₘ)일 때:</text>
  <text x="475" y="345" font-size="12" fill="#8B0029" font-weight="bold" font-style="italic">y′ₘ = |2yₘ cos(φ/2)|</text>
</svg>
