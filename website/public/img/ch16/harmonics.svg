<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 465" font-family="sans-serif">
  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">양쪽 끝이 고정된 줄의 배음 (Harmonics)</text>

  <!-- Walls -->
  <rect x="55" y="50" width="8" height="390" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
  <rect x="537" y="50" width="8" height="390" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>

  <!-- L dimension at top -->
  <line x1="63" y1="55" x2="537" y2="55" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="63" y1="48" x2="63" y2="62" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="537" y1="48" x2="537" y2="62" stroke="#6B7280" stroke-width="1.5"/>
  <text x="300" y="48" text-anchor="middle" font-size="14" font-style="italic" fill="#1a1a1a" font-weight="bold">L</text>

  <!-- === n=1: Fundamental === -->
  <line x1="63" y1="120" x2="537" y2="120" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Envelope -->
  <path d="M63,120 Q300,40 537,120" fill="none" stroke="#8B0029" stroke-width="2" stroke-dasharray="5 3"/>
  <path d="M63,120 Q300,200 537,120" fill="none" stroke="#8B0029" stroke-width="2" stroke-dasharray="5 3"/>
  <!-- Instantaneous -->
  <path d="M63,120 Q300,60 537,120" fill="none" stroke="#8B0029" stroke-width="2.5"/>
  <!-- Nodes -->
  <circle cx="63" cy="120" r="4" fill="#2563EB"/>
  <circle cx="537" cy="120" r="4" fill="#2563EB"/>
  <!-- Label -->
  <text x="580" y="105" font-size="13" fill="#1a1a1a" font-weight="bold">n = 1</text>
  <text x="580" y="122" font-size="11" fill="#6B7280">기본 진동</text>
  <text x="580" y="139" font-size="12" fill="#8B0029" font-style="italic">&#955; = 2L</text>
  <text x="580" y="156" font-size="12" fill="#2563EB" font-style="italic">f&#8321; = v/2L</text>

  <!-- === n=2: Second harmonic === -->
  <line x1="63" y1="230" x2="537" y2="230" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <path d="M63,230 Q182,170 300,230 Q418,290 537,230" fill="none" stroke="#8B0029" stroke-width="2" stroke-dasharray="5 3"/>
  <path d="M63,230 Q182,290 300,230 Q418,170 537,230" fill="none" stroke="#8B0029" stroke-width="2" stroke-dasharray="5 3"/>
  <path d="M63,230 Q182,185 300,230 Q418,275 537,230" fill="none" stroke="#8B0029" stroke-width="2.5"/>
  <circle cx="63" cy="230" r="4" fill="#2563EB"/>
  <circle cx="300" cy="230" r="4" fill="#2563EB"/>
  <circle cx="537" cy="230" r="4" fill="#2563EB"/>
  <text x="580" y="218" font-size="13" fill="#1a1a1a" font-weight="bold">n = 2</text>
  <text x="580" y="235" font-size="11" fill="#6B7280">1차 배음</text>
  <text x="580" y="252" font-size="12" fill="#8B0029" font-style="italic">&#955; = L</text>
  <text x="580" y="269" font-size="12" fill="#2563EB" font-style="italic">f&#8322; = 2f&#8321;</text>

  <!-- === n=3: Third harmonic === -->
  <line x1="63" y1="340" x2="537" y2="340" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <path d="M63,340 Q142,290 221,340 Q300,390 379,340 Q458,290 537,340" fill="none" stroke="#8B0029" stroke-width="2" stroke-dasharray="5 3"/>
  <path d="M63,340 Q142,390 221,340 Q300,290 379,340 Q458,390 537,340" fill="none" stroke="#8B0029" stroke-width="2" stroke-dasharray="5 3"/>
  <path d="M63,340 Q142,305 221,340 Q300,375 379,340 Q458,305 537,340" fill="none" stroke="#8B0029" stroke-width="2.5"/>
  <circle cx="63" cy="340" r="4" fill="#2563EB"/>
  <circle cx="221" cy="340" r="4" fill="#2563EB"/>
  <circle cx="379" cy="340" r="4" fill="#2563EB"/>
  <circle cx="537" cy="340" r="4" fill="#2563EB"/>
  <text x="580" y="328" font-size="13" fill="#1a1a1a" font-weight="bold">n = 3</text>
  <text x="580" y="345" font-size="11" fill="#6B7280">2차 배음</text>
  <text x="580" y="362" font-size="12" fill="#8B0029" font-style="italic">&#955; = 2L/3</text>
  <text x="580" y="379" font-size="12" fill="#2563EB" font-style="italic">f&#8323; = 3f&#8321;</text>

  <!-- General formula at bottom -->
  <rect x="130" y="410" width="340" height="30" rx="6" fill="#f8f0f2" stroke="#e0c0c8" stroke-width="1"/>
  <text x="300" y="431" text-anchor="middle" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">
    f<tspan font-size="10" dy="3">n</tspan><tspan dy="-3"> = n v / (2L),  n = 1, 2, 3, ...</tspan>
  </text>
</svg>
