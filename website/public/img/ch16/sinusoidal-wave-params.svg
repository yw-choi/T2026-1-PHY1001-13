<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 395" font-family="sans-serif">
  <defs>
    <marker id="axArr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1a1a1a"/>
    </marker>
    <marker id="dimArr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#6B7280"/>
    </marker>
    <marker id="dimArrR" markerWidth="7" markerHeight="5" refX="0" refY="2.5" orient="auto">
      <path d="M7,0 L0,2.5 L7,5 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="60" y1="190" x2="670" y2="190" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#axArr)"/>
  <line x1="60" y1="340" x2="60" y2="40" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#axArr)"/>
  <text x="660" y="210" font-size="14" font-style="italic" fill="#1a1a1a">x</text>
  <text x="45" y="52" font-size="14" font-style="italic" fill="#1a1a1a">y</text>

  <!-- Wave curve -->
  <path d="M60,190 C100,90 140,90 180,190 C220,290 260,290 300,190 C340,90 380,90 420,190 C460,290 500,290 540,190 C580,90 620,90 650,165"
        fill="none" stroke="#8B0029" stroke-width="2.5"/>

  <!-- Amplitude dimension (y_m) -->
  <!-- Top -->
  <line x1="180" y1="190" x2="180" y2="95" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="145" y1="95" x2="180" y2="95" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Amplitude arrow (vertical) -->
  <line x1="155" y1="190" x2="155" y2="100" stroke="#6B7280" stroke-width="1" marker-end="url(#dimArr)" marker-start="url(#dimArrR)"/>
  <text x="130" y="148" font-size="14" font-style="italic" fill="#8B0029" font-weight="bold">y</text>
  <text x="140" y="153" font-size="10" font-style="italic" fill="#8B0029">m</text>

  <!-- Amplitude bottom -->
  <line x1="300" y1="190" x2="300" y2="285" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="265" y1="285" x2="300" y2="285" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="275" y1="190" x2="275" y2="280" stroke="#6B7280" stroke-width="1" marker-end="url(#dimArr)" marker-start="url(#dimArrR)"/>
  <text x="248" y="242" font-size="14" font-style="italic" fill="#8B0029" font-weight="bold">y</text>
  <text x="258" y="247" font-size="10" font-style="italic" fill="#8B0029">m</text>

  <!-- Wavelength dimension -->
  <line x1="180" y1="85" x2="180" y2="68" stroke="#6B7280" stroke-width="1"/>
  <line x1="420" y1="85" x2="420" y2="68" stroke="#6B7280" stroke-width="1"/>
  <line x1="185" y1="73" x2="415" y2="73" stroke="#2563EB" stroke-width="1.5" marker-end="url(#dimArr)" marker-start="url(#dimArrR)"/>
  <text x="300" y="65" text-anchor="middle" font-size="15" font-style="italic" fill="#2563EB" font-weight="bold">&#955;</text>

  <!-- Second wavelength -->
  <line x1="300" y1="295" x2="300" y2="318" stroke="#6B7280" stroke-width="1"/>
  <line x1="540" y1="295" x2="540" y2="318" stroke="#6B7280" stroke-width="1"/>
  <line x1="305" y1="312" x2="535" y2="312" stroke="#2563EB" stroke-width="1.5" marker-end="url(#dimArr)" marker-start="url(#dimArrR)"/>
  <text x="420" y="330" text-anchor="middle" font-size="15" font-style="italic" fill="#2563EB" font-weight="bold">&#955;</text>

  <!-- Crest / Trough labels -->
  <text x="180" y="82" text-anchor="middle" font-size="11" fill="#6B7280">마루(crest)</text>
  <text x="300" y="305" text-anchor="middle" font-size="11" fill="#6B7280">골(trough)</text>

  <!-- Equilibrium label -->
  <text x="640" y="182" font-size="11" fill="#6B7280">평형</text>

  <!-- Formula box -->
  <rect x="400" y="335" width="280" height="35" rx="5" fill="#f8f0f2" stroke="#e0c0c8" stroke-width="1"/>
  <text x="540" y="358" text-anchor="middle" font-size="13" fill="#8B0029" font-style="italic">
    y(x,t) = y<tspan font-size="9" dy="3">m</tspan><tspan dy="-3"> sin(kx - &#969;t)</tspan>
  </text>
</svg>
