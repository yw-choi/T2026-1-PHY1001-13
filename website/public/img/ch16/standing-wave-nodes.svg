<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 395" font-family="sans-serif">
  <defs>
    <marker id="dimA4" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#6B7280"/>
    </marker>
    <marker id="dimA4R" markerWidth="7" markerHeight="5" refX="0" refY="2.5" orient="auto">
      <path d="M7,0 L0,2.5 L7,5 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <text x="350" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">정상파: 마디와 배</text>
  <text x="350" y="48" text-anchor="middle" font-size="12" fill="#6B7280" font-style="italic">y'(x,t) = [2y<tspan font-size="9" dy="2">m</tspan><tspan dy="-2"> sin kx] cos &#969;t</tspan></text>

  <!-- Equilibrium line -->
  <line x1="50" y1="180" x2="650" y2="180" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Standing wave envelope (positive) -->
  <path d="M50,180 Q110,80 170,180 Q230,80 290,180 Q350,80 410,180 Q470,80 530,180 Q590,80 650,180"
        fill="none" stroke="#8B0029" stroke-width="2" stroke-dasharray="6 3"/>

  <!-- Standing wave envelope (negative) -->
  <path d="M50,180 Q110,280 170,180 Q230,280 290,180 Q350,280 410,180 Q470,280 530,180 Q590,280 650,180"
        fill="none" stroke="#8B0029" stroke-width="2" stroke-dasharray="6 3"/>

  <!-- Instantaneous wave (solid) -->
  <path d="M50,180 Q110,110 170,180 Q230,250 290,180 Q350,110 410,180 Q470,250 530,180 Q590,110 650,180"
        fill="none" stroke="#8B0029" stroke-width="2.5"/>

  <!-- Nodes (dots) -->
  <circle cx="50" cy="180" r="5" fill="#2563EB"/>
  <circle cx="170" cy="180" r="5" fill="#2563EB"/>
  <circle cx="290" cy="180" r="5" fill="#2563EB"/>
  <circle cx="410" cy="180" r="5" fill="#2563EB"/>
  <circle cx="530" cy="180" r="5" fill="#2563EB"/>
  <circle cx="650" cy="180" r="5" fill="#2563EB"/>

  <!-- Node labels -->
  <text x="50" y="210" text-anchor="middle" font-size="11" fill="#2563EB" font-weight="bold">N</text>
  <text x="170" y="210" text-anchor="middle" font-size="11" fill="#2563EB" font-weight="bold">N</text>
  <text x="290" y="210" text-anchor="middle" font-size="11" fill="#2563EB" font-weight="bold">N</text>
  <text x="410" y="210" text-anchor="middle" font-size="11" fill="#2563EB" font-weight="bold">N</text>
  <text x="530" y="210" text-anchor="middle" font-size="11" fill="#2563EB" font-weight="bold">N</text>
  <text x="650" y="210" text-anchor="middle" font-size="11" fill="#2563EB" font-weight="bold">N</text>

  <!-- Antinode labels -->
  <text x="110" y="75" text-anchor="middle" font-size="11" fill="#8B0029" font-weight="bold">A</text>
  <text x="230" y="75" text-anchor="middle" font-size="11" fill="#8B0029" font-weight="bold">A</text>
  <text x="350" y="75" text-anchor="middle" font-size="11" fill="#8B0029" font-weight="bold">A</text>
  <text x="470" y="75" text-anchor="middle" font-size="11" fill="#8B0029" font-weight="bold">A</text>
  <text x="590" y="75" text-anchor="middle" font-size="11" fill="#8B0029" font-weight="bold">A</text>

  <!-- Amplitude 2y_m -->
  <line x1="110" y1="85" x2="110" y2="100" stroke="#8B0029" stroke-width="1"/>
  <line x1="110" y1="260" x2="110" y2="275" stroke="#8B0029" stroke-width="1"/>
  <line x1="35" y1="85" x2="110" y2="85" stroke="#6B7280" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="35" y1="275" x2="110" y2="275" stroke="#6B7280" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="40" y1="90" x2="40" y2="270" stroke="#6B7280" stroke-width="1" marker-end="url(#dimA4)" marker-start="url(#dimA4R)"/>
  <text x="25" y="185" text-anchor="middle" font-size="12" fill="#8B0029" font-style="italic">2y<tspan font-size="9" dy="2">m</tspan></text>

  <!-- lambda/2 dimension -->
  <line x1="55" y1="300" x2="165" y2="300" stroke="#6B7280" stroke-width="1" marker-end="url(#dimA4)" marker-start="url(#dimA4R)"/>
  <text x="110" y="320" text-anchor="middle" font-size="13" fill="#2563EB" font-style="italic">&#955;/2</text>

  <line x1="175" y1="300" x2="285" y2="300" stroke="#6B7280" stroke-width="1" marker-end="url(#dimA4)" marker-start="url(#dimA4R)"/>
  <text x="230" y="320" text-anchor="middle" font-size="13" fill="#2563EB" font-style="italic">&#955;/2</text>

  <!-- Legend -->
  <text x="350" y="355" text-anchor="middle" font-size="12" fill="#2563EB" font-weight="bold">N = 마디(node)</text>
  <text x="350" y="373" text-anchor="middle" font-size="12" fill="#8B0029" font-weight="bold">A = 배(antinode)</text>
</svg>
