<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 410" font-family="sans-serif">
  <defs>
    <marker id="axA3" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="375" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">중첩 원리 (Principle of Superposition)</text>

  <!-- === Panel 1: In phase (phi=0) === -->
  <text x="125" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#8B0029">보강 간섭 (&#966; = 0)</text>

  <!-- Axes -->
  <line x1="30" y1="130" x2="230" y2="130" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Wave 1 (dashed) -->
  <path d="M30,130 Q70,70 110,130 Q150,190 190,130 Q210,100 225,130" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="5 3"/>
  <!-- Wave 2 (dashed, same) -->
  <path d="M30,130 Q70,70 110,130 Q150,190 190,130 Q210,100 225,130" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="3 5"/>

  <!-- y1 label -->
  <text x="75" y="72" font-size="11" fill="#2563EB" font-style="italic">y&#8321;</text>
  <text x="95" y="72" font-size="11" fill="#6B7280" font-style="italic">y&#8322;</text>

  <!-- Result -->
  <text x="125" y="172" text-anchor="middle" font-size="11" fill="#6B7280">&#8595; y' = y&#8321; + y&#8322;</text>

  <line x1="30" y1="260" x2="230" y2="260" stroke="#1a1a1a" stroke-width="1"/>
  <path d="M30,260 Q70,140 110,260 Q150,380 190,260 Q210,200 225,260" fill="none" stroke="#8B0029" stroke-width="2.5"/>
  <text x="70" y="150" font-size="12" fill="#8B0029" font-weight="bold" font-style="italic">y' = 2y<tspan font-size="9" dy="3">m</tspan></text>

  <!-- === Panel 2: Out of phase (phi=pi) === -->
  <text x="390" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#8B0029">상쇄 간섭 (&#966; = &#960;)</text>

  <line x1="290" y1="130" x2="490" y2="130" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Wave 1 -->
  <path d="M290,130 Q330,70 370,130 Q410,190 450,130 Q470,100 485,130" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="5 3"/>
  <!-- Wave 2 (inverted) -->
  <path d="M290,130 Q330,190 370,130 Q410,70 450,130 Q470,160 485,130" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="3 5"/>

  <text x="335" y="72" font-size="11" fill="#2563EB" font-style="italic">y&#8321;</text>
  <text x="335" y="195" font-size="11" fill="#6B7280" font-style="italic">y&#8322;</text>

  <text x="390" y="172" text-anchor="middle" font-size="11" fill="#6B7280">&#8595; y' = y&#8321; + y&#8322;</text>

  <line x1="290" y1="260" x2="490" y2="260" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Flat line (complete cancellation) -->
  <line x1="290" y1="260" x2="490" y2="260" stroke="#8B0029" stroke-width="2.5"/>
  <text x="390" y="285" text-anchor="middle" font-size="12" fill="#8B0029" font-weight="bold">y' = 0</text>

  <!-- === Panel 3: Intermediate (phi=2pi/3) === -->
  <text x="630" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#8B0029">중간 간섭 (&#966; = 2&#960;/3)</text>

  <line x1="545" y1="130" x2="720" y2="130" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Wave 1 -->
  <path d="M545,130 Q575,80 605,130 Q635,180 665,130 Q685,105 715,130" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="5 3"/>
  <!-- Wave 2 (phase shifted) -->
  <path d="M545,130 Q555,105 585,130 Q615,170 645,130 Q675,90 715,130" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="3 5"/>

  <text x="578" y="80" font-size="11" fill="#2563EB" font-style="italic">y&#8321;</text>
  <text x="610" y="175" font-size="11" fill="#6B7280" font-style="italic">y&#8322;</text>

  <text x="630" y="172" text-anchor="middle" font-size="11" fill="#6B7280">&#8595; y' = y&#8321; + y&#8322;</text>

  <line x1="545" y1="260" x2="720" y2="260" stroke="#1a1a1a" stroke-width="1"/>
  <path d="M545,260 Q565,215 590,260 Q615,295 640,260 Q665,228 690,260 Q705,272 715,260" fill="none" stroke="#8B0029" stroke-width="2.5"/>
  <text x="630" y="290" text-anchor="middle" font-size="12" fill="#8B0029" font-weight="bold" font-style="italic">y'<tspan font-size="9" dy="3">m</tspan><tspan dy="-3"> = y</tspan><tspan font-size="9" dy="3">m</tspan></text>

  <!-- Bottom formula -->
  <rect x="150" y="350" width="450" height="35" rx="6" fill="#f8f0f2" stroke="#e0c0c8" stroke-width="1"/>
  <text x="375" y="373" text-anchor="middle" font-size="13" fill="#8B0029" font-style="italic">
    y'<tspan font-size="9" dy="3">m</tspan><tspan dy="-3"> = |2y</tspan><tspan font-size="9" dy="3">m</tspan><tspan dy="-3"> cos(&#966;/2)|</tspan>
  </text>
</svg>
