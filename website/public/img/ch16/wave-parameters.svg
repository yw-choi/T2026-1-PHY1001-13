<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 390" font-family="sans-serif">
  <defs>
    <marker id="wpArrR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="wpArrG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6B7280">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="wpArrB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="wpArrBr" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="10 0, 0 3.5, 10 7"/>
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="60" y1="190" x2="720" y2="190" stroke="#6B7280" stroke-width="1.5" marker-end="url(#wpArrG)"/>
  <line x1="60" y1="340" x2="60" y2="30" stroke="#6B7280" stroke-width="1.5" marker-end="url(#wpArrG)"/>
  <text x="725" y="195" font-size="14" fill="#6B7280" font-style="italic">x</text>
  <text x="50" y="28" font-size="14" fill="#6B7280" font-style="italic">y</text>

  <!-- Sinusoidal wave -->
  <path d="M 60,190 C 90,190 105,80 135,80 C 165,80 180,190 210,190 C 240,190 255,300 285,300 C 315,300 330,190 360,190 C 390,190 405,80 435,80 C 465,80 480,190 510,190 C 540,190 555,300 585,300 C 615,300 630,190 660,190" fill="none" stroke="#8B0029" stroke-width="2.5"/>

  <!-- Equilibrium dashed line -->
  <line x1="60" y1="190" x2="660" y2="190" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Amplitude A (double-headed arrow) -->
  <line x1="135" y1="190" x2="135" y2="80" stroke="#2563EB" stroke-width="2" marker-end="url(#wpArrB)"/>
  <line x1="135" y1="190" x2="135" y2="82" stroke="#2563EB" stroke-width="2"/>
  <!-- Ticks -->
  <line x1="128" y1="190" x2="142" y2="190" stroke="#2563EB" stroke-width="1.5"/>
  <line x1="128" y1="80" x2="142" y2="80" stroke="#2563EB" stroke-width="1.5"/>
  <text x="118" y="138" text-anchor="end" font-size="15" fill="#2563EB" font-weight="bold" font-style="italic">y</text>
  <text x="118" y="148" text-anchor="end" font-size="10" fill="#2563EB" font-style="italic">m</text>

  <!-- Wavelength lambda -->
  <line x1="135" y1="55" x2="435" y2="55" stroke="#8B0029" stroke-width="2"/>
  <!-- Arrow heads (double-headed) -->
  <line x1="135" y1="55" x2="145" y2="50" stroke="#8B0029" stroke-width="2"/>
  <line x1="135" y1="55" x2="145" y2="60" stroke="#8B0029" stroke-width="2"/>
  <line x1="435" y1="55" x2="425" y2="50" stroke="#8B0029" stroke-width="2"/>
  <line x1="435" y1="55" x2="425" y2="60" stroke="#8B0029" stroke-width="2"/>
  <!-- Dashed vertical guides -->
  <line x1="135" y1="55" x2="135" y2="80" stroke="#6B7280" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="435" y1="55" x2="435" y2="80" stroke="#6B7280" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="285" y="48" text-anchor="middle" font-size="18" fill="#8B0029" font-weight="bold" font-style="italic">&#x3BB;</text>

  <!-- Negative amplitude label -->
  <line x1="285" y1="190" x2="285" y2="300" stroke="#2563EB" stroke-width="2" marker-end="url(#wpArrB)"/>
  <line x1="278" y1="300" x2="292" y2="300" stroke="#2563EB" stroke-width="1.5"/>
  <text x="270" y="248" text-anchor="end" font-size="15" fill="#2563EB" font-weight="bold" font-style="italic">y</text>
  <text x="270" y="258" text-anchor="end" font-size="10" fill="#2563EB" font-style="italic">m</text>

  <!-- Propagation direction arrow -->
  <line x1="490" y1="340" x2="610" y2="340" stroke="#8B0029" stroke-width="2.5" marker-end="url(#wpArrR)"/>
  <text x="550" y="365" text-anchor="middle" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">v</text>

  <!-- y = y_m sin(kx - wt) label -->
  <text x="500" y="130" font-size="15" fill="#1a1a1a" font-style="italic">y</text>
  <text x="510" y="130" font-size="15" fill="#1a1a1a"> = </text>
  <text x="530" y="130" font-size="15" fill="#2563EB" font-style="italic" font-weight="bold">y</text>
  <text x="540" y="134" font-size="11" fill="#2563EB" font-style="italic">m</text>
  <text x="550" y="130" font-size="15" fill="#1a1a1a"> sin(</text>
  <text x="585" y="130" font-size="15" fill="#1a1a1a" font-style="italic">kx</text>
  <text x="604" y="130" font-size="15" fill="#1a1a1a"> &#x2212; </text>
  <text x="622" y="130" font-size="15" fill="#1a1a1a" font-style="italic">&#x3C9;t</text>
  <text x="642" y="130" font-size="15" fill="#1a1a1a">)</text>

  <!-- Peak and trough labels -->
  <text x="135" y="72" text-anchor="middle" font-size="12" fill="#6B7280">마루</text>
  <text x="285" y="322" text-anchor="middle" font-size="12" fill="#6B7280">골</text>
</svg>
