<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="sans-serif">
  <defs>
    <marker id="ipR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/></marker>
    <marker id="ipB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/></marker>
    <marker id="ipG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/></marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <polygon points="40,380 350,380 350,130" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <text x="111.7" y="359.7" font-size="14" fill="#6B7280" text-anchor="middle" font-weight="bold" font-style="italic">θ</text>
  <g transform="translate(230,275) rotate(-38.9)">
  <rect x="-30" y="-30" width="60" height="60" rx="3" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2"/>
  <text x="0" y="5" font-size="14" fill="#1a1a1a" text-anchor="middle" font-weight="bold">m</text>
  </g>
  <line x1="410" y1="30" x2="410" y2="420" stroke="#6B7280" stroke-width="1" fill="none" stroke-dasharray="4 3"/>
  <text x="610" y="40" font-size="14" fill="#8B0029" text-anchor="middle" font-weight="bold">자유물체도 (FBD)</text>
  <circle cx="600" cy="230" r="5" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="0"/>
  <line x1="600" y1="230" x2="709" y2="142.1" stroke="#6B7280" stroke-width="1" fill="none" marker-end="url(#ipG)" stroke-dasharray="4 3"/>
  <text x="716.8" y="135.8" font-size="14" fill="#6B7280" font-style="italic">x</text>
  <line x1="600" y1="230" x2="512.1" y2="121" stroke="#6B7280" stroke-width="1" fill="none" marker-end="url(#ipG)" stroke-dasharray="4 3"/>
  <text x="505.8" y="113.2" font-size="14" fill="#6B7280" font-style="italic">y</text>
  <line x1="600" y1="230" x2="517.1" y2="127.2" stroke="#8B0029" stroke-width="2.5" fill="none" marker-end="url(#ipR)"/>
  <text x="530" y="130" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">Fₙ</text>
  <line x1="600" y1="230" x2="600" y2="360" stroke="#8B0029" stroke-width="2.5" fill="none" marker-end="url(#ipR)"/>
  <text x="620" y="358" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">mg</text>
  <line x1="600" y1="230" x2="662.3" y2="179.8" stroke="#8B0029" stroke-width="2.5" fill="none" marker-end="url(#ipR)"/>
  <text x="672" y="185" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">f</text>
  <line x1="600" y1="230" x2="519" y2="295.3" stroke="#2563EB" stroke-width="1" fill="none" marker-end="url(#ipB)" stroke-dasharray="4 3"/>
  <text x="480" y="300" font-size="14" fill="#2563EB" font-weight="bold">mg sin θ</text>
  <line x1="600" y1="230" x2="681.6" y2="331.2" stroke="#2563EB" stroke-width="1" fill="none" marker-end="url(#ipB)" stroke-dasharray="4 3"/>
  <text x="665" y="330" font-size="14" fill="#2563EB" font-weight="bold">mg cos θ</text>
  <path d="M 600,272 A 42,42 0 0,0 626.4,262.7" fill="none" stroke="#2563EB" stroke-width="1.3" data-angle-origin="600,230" data-angle-radius="42" data-angle-start="-90" data-angle-end="-51.1"/>
  <text x="619.3" y="289.7" font-size="14" fill="#2563EB" text-anchor="middle" font-weight="bold" font-style="italic">θ</text>
  <text x="600" y="405" font-size="14" fill="#6B7280" text-anchor="middle">좌표축: 빗면을 따라 x, 수직으로 y</text>
  <text x="600" y="425" font-size="14" fill="#6B7280" text-anchor="middle">Fₙ = mg cos θ</text>
</svg>
