<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="sans-serif">
  <defs>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Inclined plane -->
  <polygon points="40,380 350,380 350,130" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <!-- Angle arc -->
  <path d="M 100,380 A 60,60 0 0,0 72,348" fill="none" stroke="#6B7280" stroke-width="1.5"/>
  <text x="108" y="368" font-size="14" font-style="italic" fill="#6B7280">&theta;</text>

  <!-- Block on incline (rotated) -->
  <g transform="translate(230,275) rotate(-35.5)">
    <rect x="-30" y="-30" width="60" height="60" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2" rx="3"/>
    <text x="0" y="5" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">m</text>
  </g>

  <!-- Separator -->
  <line x1="410" y1="30" x2="410" y2="420" stroke="#6B7280" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- FBD label -->
  <text x="610" y="40" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">자유물체도 (FBD)</text>

  <!-- FBD: center dot -->
  <circle cx="600" cy="230" r="5" fill="#1a1a1a"/>

  <!-- Coordinate axes (tilted) -->
  <!-- x-axis along incline -->
  <line x1="600" y1="230" x2="720" y2="160" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowG)"/>
  <text x="730" y="158" font-size="13" fill="#6B7280" font-style="italic">x</text>
  <!-- y-axis perpendicular to incline -->
  <line x1="600" y1="230" x2="530" y2="110" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowG)"/>
  <text x="522" y="105" font-size="13" fill="#6B7280" font-style="italic">y</text>

  <!-- Normal force (perpendicular to incline, along y) -->
  <line x1="600" y1="230" x2="545" y2="112" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <text x="530" y="130" font-size="14" fill="#8B0029" font-weight="bold">
    <tspan font-style="italic">F</tspan><tspan font-size="11" dy="3">N</tspan>
  </text>

  <!-- Weight (straight down) -->
  <line x1="600" y1="230" x2="600" y2="360" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <text x="620" y="358" font-size="14" fill="#8B0029" font-weight="bold">m<tspan font-style="italic">g</tspan></text>

  <!-- Weight decomposition: mg sin theta (along -x, i.e. down the incline) -->
  <line x1="600" y1="230" x2="510" y2="283" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrowB)"/>
  <text x="480" y="300" font-size="13" fill="#2563EB" font-weight="bold">m<tspan font-style="italic">g</tspan> sin <tspan font-style="italic">&theta;</tspan></text>

  <!-- Weight decomposition: mg cos theta (along -y, into incline) -->
  <line x1="600" y1="230" x2="655" y2="348" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrowB)"/>
  <text x="665" y="330" font-size="13" fill="#2563EB" font-weight="bold">m<tspan font-style="italic">g</tspan> cos <tspan font-style="italic">&theta;</tspan></text>

  <!-- Angle at weight decomposition -->
  <path d="M 600,270 A 40,40 0 0,1 578,260" fill="none" stroke="#2563EB" stroke-width="1.2"/>
  <text x="572" y="278" font-size="12" font-style="italic" fill="#2563EB">&theta;</text>

  <!-- Right angle marker at decomposition -->
  <rect x="638" y="339" width="8" height="8" fill="none" stroke="#2563EB" stroke-width="1" transform="rotate(-35.5, 642, 343)"/>

  <!-- Notes -->
  <text x="600" y="405" text-anchor="middle" font-size="13" fill="#6B7280">좌표축: 빗면을 따라 x, 수직으로 y</text>
  <text x="600" y="425" text-anchor="middle" font-size="13" fill="#6B7280">
    <tspan font-style="italic">F</tspan><tspan font-size="10" dy="3">N</tspan><tspan dy="-3"> = m</tspan><tspan font-style="italic">g</tspan><tspan> cos </tspan><tspan font-style="italic">&theta;</tspan>
  </text>
</svg>