<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="sans-serif">
  <defs>
    <marker id="aR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
    <marker id="aB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
  </defs>

  <text x="350" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#8B0029">뉴턴의 제3법칙: 작용-반작용 쌍</text>

  <!-- Example 1: Two blocks pushing each other -->
  <text x="175" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">예시 1: 두 물체의 접촉</text>

  <!-- Block A -->
  <rect x="80" y="120" width="80" height="70" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2" rx="3"/>
  <text x="120" y="162" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">A</text>

  <!-- Block B -->
  <rect x="160" y="120" width="80" height="70" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2" rx="3"/>
  <text x="200" y="162" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">B</text>

  <!-- Force A on B (red, pointing right) -->
  <line x1="163" y1="138" x2="250" y2="138" stroke="#8B0029" stroke-width="2.5" marker-end="url(#aR)"/>
  <text x="260" y="135" font-size="13" fill="#8B0029" font-weight="bold">
    <tspan font-style="italic">F</tspan><tspan font-size="10" dy="3">AB</tspan>
  </text>

  <!-- Force B on A (blue, pointing left) -->
  <line x1="157" y1="170" x2="70" y2="170" stroke="#2563EB" stroke-width="2.5" marker-end="url(#aB)"/>
  <text x="38" y="167" font-size="13" fill="#2563EB" font-weight="bold">
    <tspan font-style="italic">F</tspan><tspan font-size="10" dy="3">BA</tspan>
  </text>

  <!-- Equation -->
  <text x="175" y="225" text-anchor="middle" font-size="14" fill="#6B7280" font-style="italic">
    F<tspan font-size="10" dy="3">AB</tspan><tspan dy="-3"> = &minus;F</tspan><tspan font-size="10" dy="3">BA</tspan>
  </text>

  <!-- Example 2: Block on Earth -->
  <text x="525" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">예시 2: 중력의 작용-반작용</text>

  <!-- Earth surface -->
  <rect x="430" y="230" width="190" height="15" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
  <text x="525" y="260" text-anchor="middle" font-size="13" fill="#6B7280">지구</text>

  <!-- Block -->
  <rect x="490" y="160" width="70" height="70" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2" rx="3"/>
  <text x="525" y="200" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">m</text>

  <!-- Weight (Earth pulls block down) - red -->
  <line x1="510" y1="230" x2="510" y2="310" stroke="#8B0029" stroke-width="2.5" marker-end="url(#aR)"/>
  <text x="478" y="310" font-size="13" fill="#8B0029" font-weight="bold">m<tspan font-style="italic">g</tspan></text>
  <text x="478" y="326" font-size="11" fill="#8B0029">(지구 &rarr; 물체)</text>

  <!-- Block pulls Earth up - blue -->
  <line x1="540" y1="230" x2="540" y2="310" stroke="#2563EB" stroke-width="2.5" marker-end="url(#aB)"/>
  <!-- Actually this should point up from Earth. Let me fix: the reaction is block pulling Earth UP -->
  <!-- Arrow from Earth pointing up -->
  <line x1="550" y1="310" x2="550" y2="235" stroke="#2563EB" stroke-width="2.5" marker-end="url(#aB)"/>
  <text x="575" y="280" font-size="13" fill="#2563EB" font-weight="bold">m<tspan font-style="italic">g</tspan></text>
  <text x="575" y="296" font-size="11" fill="#2563EB">(물체 &rarr; 지구)</text>

  <!-- Bottom note -->
  <rect x="80" y="340" width="540" height="40" rx="8" fill="#f8f0f2" stroke="#e0c0c8" stroke-width="1"/>
  <text x="350" y="365" text-anchor="middle" font-size="14" fill="#8B0029" font-weight="bold">
    작용-반작용 쌍은 항상 서로 다른 물체에 작용한다!
  </text>
</svg>