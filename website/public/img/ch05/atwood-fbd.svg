<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 450" font-family="sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
    <marker id="ab2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
  </defs>

  <text x="160" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">앳우드 기계</text>
  <text x="540" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">자유물체도</text>

  <!-- Pulley -->
  <circle cx="160" cy="80" r="25" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="160" cy="80" r="4" fill="#1a1a1a"/>
  <!-- Support -->
  <line x1="160" y1="55" x2="160" y2="35" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="130" y1="35" x2="190" y2="35" stroke="#1a1a1a" stroke-width="3"/>

  <!-- Left string -->
  <line x1="135" y1="80" x2="135" y2="230" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Right string -->
  <line x1="185" y1="80" x2="185" y2="180" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Mass 1 (heavier, left, lower) -->
  <rect x="105" y="230" width="60" height="60" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2" rx="3"/>
  <text x="135" y="265" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">m<tspan font-size="11" dy="3">1</tspan></text>

  <!-- Mass 2 (lighter, right, higher) -->
  <rect x="155" y="180" width="60" height="60" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2" rx="3"/>
  <text x="185" y="215" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">m<tspan font-size="11" dy="3">2</tspan></text>

  <!-- Acceleration arrows -->
  <line x1="95" y1="260" x2="95" y2="310" stroke="#2563EB" stroke-width="2" marker-end="url(#ab2)"/>
  <text x="75" y="295" font-size="13" fill="#2563EB" font-style="italic" font-weight="bold">a</text>
  <line x1="225" y1="210" x2="225" y2="165" stroke="#2563EB" stroke-width="2" marker-end="url(#ab2)"/>
  <text x="237" y="190" font-size="13" fill="#2563EB" font-style="italic" font-weight="bold">a</text>

  <text x="135" y="330" text-anchor="middle" font-size="13" fill="#6B7280">m<tspan font-size="10" dy="2">1</tspan><tspan dy="-2"> &gt; m</tspan><tspan font-size="10" dy="2">2</tspan></text>

  <!-- Separator -->
  <line x1="310" y1="40" x2="310" y2="430" stroke="#6B7280" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- FBD for m1 -->
  <text x="420" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">m<tspan font-size="11" dy="2">1</tspan><tspan dy="-2"> 의 FBD</tspan></text>
  <circle cx="420" cy="200" r="5" fill="#1a1a1a"/>

  <!-- T up -->
  <line x1="420" y1="200" x2="420" y2="110" stroke="#8B0029" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="438" y="118" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">T</text>

  <!-- m1*g down -->
  <line x1="420" y1="200" x2="420" y2="300" stroke="#8B0029" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="440" y="295" font-size="14" fill="#8B0029" font-weight="bold">m<tspan font-size="11" dy="2">1</tspan><tspan dy="-2" font-style="italic">g</tspan></text>

  <!-- Equation for m1 -->
  <text x="420" y="340" text-anchor="middle" font-size="13" fill="#6B7280">m<tspan font-size="10" dy="2">1</tspan><tspan dy="-2" font-style="italic">g</tspan><tspan> &minus; </tspan><tspan font-style="italic">T</tspan><tspan> = m</tspan><tspan font-size="10" dy="2">1</tspan><tspan dy="-2" font-style="italic">a</tspan></text>

  <!-- FBD for m2 -->
  <text x="620" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">m<tspan font-size="11" dy="2">2</tspan><tspan dy="-2"> 의 FBD</tspan></text>
  <circle cx="620" cy="200" r="5" fill="#1a1a1a"/>

  <!-- T up -->
  <line x1="620" y1="200" x2="620" y2="110" stroke="#8B0029" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="638" y="118" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">T</text>

  <!-- m2*g down -->
  <line x1="620" y1="200" x2="620" y2="300" stroke="#8B0029" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="640" y="295" font-size="14" fill="#8B0029" font-weight="bold">m<tspan font-size="11" dy="2">2</tspan><tspan dy="-2" font-style="italic">g</tspan></text>

  <!-- Equation for m2 -->
  <text x="620" y="340" text-anchor="middle" font-size="13" fill="#6B7280">
    <tspan font-style="italic">T</tspan><tspan> &minus; m</tspan><tspan font-size="10" dy="2">2</tspan><tspan dy="-2" font-style="italic">g</tspan><tspan> = m</tspan><tspan font-size="10" dy="2">2</tspan><tspan dy="-2" font-style="italic">a</tspan>
  </text>

  <!-- Result box -->
  <rect x="350" y="370" width="370" height="60" rx="8" fill="#f8f0f2" stroke="#e0c0c8" stroke-width="1"/>
  <text x="535" y="395" text-anchor="middle" font-size="14" fill="#8B0029" font-weight="bold">
    <tspan font-style="italic">a</tspan> = (m<tspan font-size="11" dy="2">1</tspan><tspan dy="-2"> &minus; m</tspan><tspan font-size="11" dy="2">2</tspan><tspan dy="-2">)</tspan><tspan font-style="italic">g</tspan> / (m<tspan font-size="11" dy="2">1</tspan><tspan dy="-2"> + m</tspan><tspan font-size="11" dy="2">2</tspan><tspan dy="-2">)</tspan>
  </text>
  <text x="535" y="418" text-anchor="middle" font-size="14" fill="#8B0029" font-weight="bold">
    <tspan font-style="italic">T</tspan> = 2m<tspan font-size="11" dy="2">1</tspan><tspan dy="-2">m</tspan><tspan font-size="11" dy="2">2</tspan><tspan dy="-2" font-style="italic">g</tspan> / (m<tspan font-size="11" dy="2">1</tspan><tspan dy="-2"> + m</tspan><tspan font-size="11" dy="2">2</tspan><tspan dy="-2">)</tspan>
  </text>
</svg>