<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="sans-serif">
  <defs>
    <marker id="arR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8B0029"/>
    </marker>
    <marker id="arB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563EB"/>
    </marker>
  </defs>

  <!-- === Monatomic === -->
  <text x="130" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#8B0029">단원자</text>
  <text x="130" y="48" text-anchor="middle" font-size="12" fill="#6B7280">(He, Ne, Ar)</text>

  <!-- Atom -->
  <circle cx="130" cy="150" r="28" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>

  <!-- Translation arrows (3 DOF) -->
  <line x1="130" y1="150" x2="130" y2="85" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arR)"/>
  <line x1="130" y1="150" x2="195" y2="150" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arR)"/>
  <line x1="130" y1="150" x2="100" y2="185" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arR)"/>

  <text x="133" y="78" font-size="12" font-style="italic" fill="#8B0029">y</text>
  <text x="200" y="147" font-size="12" font-style="italic" fill="#8B0029">x</text>
  <text x="86" y="196" font-size="12" font-style="italic" fill="#8B0029">z</text>

  <text x="130" y="240" text-anchor="middle" font-size="13" fill="#6B7280" font-weight="bold">f = 3</text>
  <text x="130" y="260" text-anchor="middle" font-size="12" fill="#6B7280">병진 3</text>
  <text x="130" y="285" text-anchor="middle" font-size="13" fill="#8B0029" font-style="italic">C<tspan font-size="10" baseline-shift="sub">V</tspan> = 3/2 R</text>

  <!-- === Diatomic === -->
  <text x="400" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#8B0029">이원자</text>
  <text x="400" y="48" text-anchor="middle" font-size="12" fill="#6B7280">(N&#8322;, O&#8322;, H&#8322;)</text>

  <!-- Two atoms connected -->
  <circle cx="375" cy="150" r="20" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <circle cx="425" cy="150" r="20" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <line x1="395" y1="150" x2="405" y2="150" stroke="#6B7280" stroke-width="2"/>

  <!-- Translation arrows -->
  <line x1="400" y1="150" x2="400" y2="90" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arR)"/>
  <line x1="400" y1="150" x2="465" y2="150" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arR)"/>
  <line x1="400" y1="150" x2="370" y2="185" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arR)"/>

  <!-- Rotation arrows (curved) -->
  <path d="M 385,105 A 15,15 0 0 1 415,105" fill="none" stroke="#2563EB" stroke-width="2" marker-end="url(#arB)"/>
  <path d="M 355,175 A 15,15 0 0 1 345,145" fill="none" stroke="#2563EB" stroke-width="2" marker-end="url(#arB)"/>

  <text x="400" y="240" text-anchor="middle" font-size="13" fill="#6B7280" font-weight="bold">f = 5</text>
  <text x="400" y="260" text-anchor="middle" font-size="12" fill="#6B7280">병진 3 + 회전 2</text>
  <text x="400" y="285" text-anchor="middle" font-size="13" fill="#8B0029" font-style="italic">C<tspan font-size="10" baseline-shift="sub">V</tspan> = 5/2 R</text>

  <!-- === Polyatomic === -->
  <text x="660" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#8B0029">다원자</text>
  <text x="660" y="48" text-anchor="middle" font-size="12" fill="#6B7280">(H&#8322;O, CO&#8322;, NH&#8323;)</text>

  <!-- Three atoms in triangle -->
  <circle cx="660" cy="135" r="18" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <circle cx="635" cy="170" r="15" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <circle cx="685" cy="170" r="15" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <line x1="648" y1="148" x2="640" y2="158" stroke="#6B7280" stroke-width="2"/>
  <line x1="672" y1="148" x2="680" y2="158" stroke="#6B7280" stroke-width="2"/>

  <!-- Translation arrows -->
  <line x1="660" y1="155" x2="660" y2="90" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arR)"/>
  <line x1="660" y1="155" x2="725" y2="155" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arR)"/>
  <line x1="660" y1="155" x2="630" y2="190" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arR)"/>

  <!-- Rotation arrows (3 rotation axes) -->
  <path d="M 645,100 A 12,12 0 0 1 675,100" fill="none" stroke="#2563EB" stroke-width="2" marker-end="url(#arB)"/>
  <path d="M 615,190 A 12,12 0 0 1 608,165" fill="none" stroke="#2563EB" stroke-width="2" marker-end="url(#arB)"/>
  <path d="M 700,175 A 12,12 0 0 1 710,155" fill="none" stroke="#2563EB" stroke-width="2" marker-end="url(#arB)"/>

  <text x="660" y="240" text-anchor="middle" font-size="13" fill="#6B7280" font-weight="bold">f = 6</text>
  <text x="660" y="260" text-anchor="middle" font-size="12" fill="#6B7280">병진 3 + 회전 3</text>
  <text x="660" y="285" text-anchor="middle" font-size="13" fill="#8B0029" font-style="italic">C<tspan font-size="10" baseline-shift="sub">V</tspan> = 3R</text>

  <!-- Legend -->
  <rect x="240" y="320" width="320" height="45" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
  <line x1="260" y1="340" x2="290" y2="340" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arR)"/>
  <text x="298" y="344" font-size="12" fill="#6B7280">병진 자유도</text>
  <path d="M 400,335 A 8,8 0 0 1 416,335" fill="none" stroke="#2563EB" stroke-width="2" marker-end="url(#arB)"/>
  <text x="425" y="344" font-size="12" fill="#6B7280">회전 자유도</text>
  <text x="400" y="360" text-anchor="middle" font-size="11" fill="#6B7280">에너지 등분배: 각 자유도마다 &#189;kT</text>
</svg>
