<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" font-family="sans-serif">
  <defs>
    <marker id="axA" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="380" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">단열 과정 vs 등온 과정 (p-V 다이어그램)</text>

  <!-- Axes -->
  <line x1="80" y1="380" x2="640" y2="380" stroke="#1a1a1a" stroke-width="2" marker-end="url(#axA)"/>
  <line x1="80" y1="380" x2="80" y2="50" stroke="#1a1a1a" stroke-width="2" marker-end="url(#axA)"/>

  <text x="650" y="385" font-size="14" font-style="italic" fill="#1a1a1a">V</text>
  <text x="72" y="48" font-size="14" font-style="italic" fill="#1a1a1a">p</text>

  <!-- Isothermal curve (T = const) - gentler slope, blue -->
  <path d="M140,100 Q180,115 220,140 Q280,180 340,220 Q400,255 460,280 Q520,300 580,315" fill="none" stroke="#2563EB" stroke-width="2.5"/>

  <!-- Adiabatic curve (steeper) - red -->
  <path d="M140,100 Q175,130 210,165 Q260,220 310,270 Q360,310 420,340 Q480,358 540,368" fill="none" stroke="#8B0029" stroke-width="2.5"/>

  <!-- Initial state point -->
  <circle cx="140" cy="100" r="5" fill="#1a1a1a"/>
  <text x="125" y="90" font-size="14" font-weight="bold" fill="#1a1a1a">i</text>
  <text x="115" y="75" font-size="12" fill="#6B7280">(p</text>
  <text x="127" y="79" font-size="9" fill="#6B7280">i</text>
  <text x="133" y="75" font-size="12" fill="#6B7280">, V</text>
  <text x="147" y="79" font-size="9" fill="#6B7280">i</text>
  <text x="153" y="75" font-size="12" fill="#6B7280">)</text>

  <!-- Isothermal endpoint -->
  <circle cx="580" cy="315" r="5" fill="#2563EB"/>
  <text x="590" y="310" font-size="13" font-weight="bold" fill="#2563EB">T = const</text>
  <text x="590" y="328" font-size="12" fill="#2563EB">pV = nRT</text>

  <!-- Adiabatic endpoint -->
  <circle cx="540" cy="368" r="5" fill="#8B0029"/>
  <text x="420" y="395" font-size="13" font-weight="bold" fill="#8B0029">Q = 0 (단열)</text>
  <text x="420" y="412" font-size="12" fill="#8B0029">pV&#947; = const</text>

  <!-- Annotation: adiabatic is steeper -->
  <text x="190" y="195" font-size="12" fill="#8B0029" transform="rotate(-50, 190, 195)">단열 (더 가파름)</text>
  <text x="260" y="165" font-size="12" fill="#2563EB" transform="rotate(-35, 260, 165)">등온</text>

  <!-- Explanation box -->
  <rect x="380" y="100" width="260" height="120" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
  <text x="510" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">단열 과정이 더 가파른 이유:</text>
  <text x="395" y="148" font-size="12" fill="#1a1a1a">등온: 팽창 시 열 흡수 &#8594; T 유지</text>
  <text x="395" y="170" font-size="12" fill="#1a1a1a">단열: 열 흡수 없음 &#8594; T 감소</text>
  <text x="395" y="192" font-size="12" fill="#1a1a1a">&#8594; 같은 V에서 p가 더 낮아짐</text>
  <text x="395" y="214" font-size="12" fill="#8B0029" font-weight="bold">&#947; = C</text>
  <text x="418" y="218" font-size="9" fill="#8B0029">p</text>
  <text x="425" y="214" font-size="12" fill="#8B0029">/C</text>
  <text x="438" y="218" font-size="9" fill="#8B0029">V</text>
  <text x="448" y="214" font-size="12" fill="#8B0029"> > 1 &#8594; 기울기 더 급함</text>

  <!-- V axis ticks -->
  <line x1="140" y1="378" x2="140" y2="383" stroke="#6B7280" stroke-width="1"/>
  <text x="140" y="398" text-anchor="middle" font-size="11" font-style="italic" fill="#6B7280">V<tspan font-size="8" dy="2">i</tspan></text>
</svg>
