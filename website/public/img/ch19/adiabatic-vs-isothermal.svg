  <rect x="380" y="100" width="260" height="120" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/><text x="510" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">단열 과정이 더 가파른 이유:</text><text x="395" y="148" font-size="12" fill="#1a1a1a">등온: 팽창 시 열 흡수 → T 유지</text><text x="395" y="170" font-size="12" fill="#1a1a1a">단열: 열 흡수 없음 → T 감소</text><text x="395" y="192" font-size="12" fill="#1a1a1a">→ 같은 V에서 p가 더 낮아짐</text><text x="395" y="214" font-size="12" fill="#8B0029" font-weight="bold">γ = C<tspan font-size="9" baseline-shift="sub">p</tspan>/C<tspan font-size="9" baseline-shift="sub">V</tspan> &gt; 1 → 기울기 더 급함</text>
