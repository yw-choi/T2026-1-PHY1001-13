<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400" font-family="sans-serif">
  <defs>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Block -->
  <rect x="100" y="185" width="70" height="70" fill="#F3F4F6" stroke="#000000" stroke-width="2" rx="3"/>
  <text x="135" y="227" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">m</text>

  <!-- Ground line -->
  <line x1="40" y1="255" x2="660" y2="255" stroke="#6B7280" stroke-width="1"/>
  <!-- Ground hatching -->
  <g stroke="#6B7280" stroke-width="1">
    <line x1="50" y1="255" x2="40" y2="265"/>
    <line x1="70" y1="255" x2="60" y2="265"/>
    <line x1="90" y1="255" x2="80" y2="265"/>
    <line x1="110" y1="255" x2="100" y2="265"/>
    <line x1="130" y1="255" x2="120" y2="265"/>
    <line x1="150" y1="255" x2="140" y2="265"/>
    <line x1="170" y1="255" x2="160" y2="265"/>
    <line x1="190" y1="255" x2="180" y2="265"/>
  </g>

  <!-- Displacement vector d (horizontal) -->
  <line x1="135" y1="290" x2="430" y2="290" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arrowG)"/>
  <text x="285" y="315" text-anchor="middle" font-size="14" font-weight="bold" fill="#6B7280" font-style="italic">d</text>

  <!-- Force vector F at angle phi -->
  <line x1="170" y1="220" x2="420" y2="100" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <text x="430" y="100" font-size="14" font-weight="bold" fill="#8B0029" font-style="italic">F</text>

  <!-- F cos phi component (horizontal, along d) -->
  <line x1="170" y1="220" x2="420" y2="220" stroke="#2563EB" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrowB)"/>
  <text x="310" y="210" text-anchor="middle" font-size="14" font-weight="bold" fill="#2563EB">
    <tspan font-style="italic">F</tspan> cos <tspan font-style="italic">φ</tspan>
  </text>

  <!-- F sin phi component (vertical) -->
  <line x1="420" y1="220" x2="420" y2="102" stroke="#2563EB" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrowB)"/>
  <text x="460" y="165" font-size="14" font-weight="bold" fill="#2563EB">
    <tspan font-style="italic">F</tspan> sin <tspan font-style="italic">φ</tspan>
  </text>

  <!-- Right angle marker -->
  <rect x="408" y="208" width="12" height="12" fill="none" stroke="#2563EB" stroke-width="1"/>

  <!-- Angle arc phi -->
  <path d="M 240,220 A 70,70 0 0,0 225,193" fill="none" stroke="#8B0029" stroke-width="1"/>
  <text x="252" y="200" font-size="14" font-style="italic" fill="#8B0029">φ</text>

  <!-- Annotations -->
  <text x="300" y="350" text-anchor="middle" font-size="14" fill="#8B0029" font-style="italic">
    W = Fd cos φ
  </text>

  <!-- Labels for components -->
  <text x="540" y="150" font-size="14" fill="#2563EB">
    <tspan font-style="italic">F</tspan> cos <tspan font-style="italic">φ</tspan> : &#xC77C;&#xC744; &#xD558;&#xB294; &#xC131;&#xBD84;
  </text>
  <text x="540" y="175" font-size="14" fill="#6B7280">
    <tspan font-style="italic">F</tspan> sin <tspan font-style="italic">φ</tspan> : &#xC77C;&#xC744; &#xD558;&#xC9C0; &#xC54A;&#xB294; &#xC131;&#xBD84;
  </text>
</svg>