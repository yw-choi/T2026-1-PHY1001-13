<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 455" font-family="sans-serif">
  <defs>
    <marker id="bArr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" fill="#6B7280">
      <polygon points="0 0, 8 3, 0 6"/>
    </marker>
    <marker id="arr1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" fill="#8B0029">
      <polygon points="0 0, 8 3, 0 6"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="375" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#8B0029">맥놀이(Beats)</text>

  <!-- ===== Wave 1 ===== -->
  <text x="40" y="75" font-size="13" fill="#2563EB" font-weight="bold">f<tspan font-size="10" baseline-shift="sub">1</tspan></text>
  <line x1="60" y1="95" x2="720" y2="95" stroke="#6B7280" stroke-width="0.5"/>
  <!-- High frequency sine -->
  <path d="M 60,95 Q 70,65 80,95 Q 90,125 100,95 Q 110,65 120,95 Q 130,125 140,95 Q 150,65 160,95 Q 170,125 180,95 Q 190,65 200,95 Q 210,125 220,95 Q 230,65 240,95 Q 250,125 260,95 Q 270,65 280,95 Q 290,125 300,95 Q 310,65 320,95 Q 330,125 340,95 Q 350,65 360,95 Q 370,125 380,95 Q 390,65 400,95 Q 410,125 420,95 Q 430,65 440,95 Q 450,125 460,95 Q 470,65 480,95 Q 490,125 500,95 Q 510,65 520,95 Q 530,125 540,95 Q 550,65 560,95 Q 570,125 580,95 Q 590,65 600,95 Q 610,125 620,95 Q 630,65 640,95 Q 650,125 660,95 Q 670,65 680,95 Q 690,125 700,95" fill="none" stroke="#2563EB" stroke-width="1.5"/>

  <!-- ===== Wave 2 ===== -->
  <text x="40" y="175" font-size="13" fill="#8B0029" font-weight="bold">f<tspan font-size="10" baseline-shift="sub">2</tspan></text>
  <line x1="60" y1="195" x2="720" y2="195" stroke="#6B7280" stroke-width="0.5"/>
  <!-- Slightly different frequency -->
  <path d="M 60,195 Q 72,165 84,195 Q 96,225 108,195 Q 120,165 132,195 Q 144,225 156,195 Q 168,165 180,195 Q 192,225 204,195 Q 216,165 228,195 Q 240,225 252,195 Q 264,165 276,195 Q 288,225 300,195 Q 312,165 324,195 Q 336,225 348,195 Q 360,165 372,195 Q 384,225 396,195 Q 408,165 420,195 Q 432,225 444,195 Q 456,165 468,195 Q 480,225 492,195 Q 504,165 516,195 Q 528,225 540,195 Q 552,165 564,195 Q 576,225 588,195 Q 600,165 612,195 Q 624,225 636,195 Q 648,165 660,195 Q 672,225 684,195" fill="none" stroke="#8B0029" stroke-width="1.5"/>

  <!-- Plus sign -->
  <text x="375" y="155" text-anchor="middle" font-size="24" font-weight="bold" fill="#6B7280">+</text>

  <!-- ===== Resultant (beats) ===== -->
  <text x="40" y="300" font-size="13" fill="#1a1a1a" font-weight="bold">합성파</text>
  <line x1="60" y1="340" x2="720" y2="340" stroke="#6B7280" stroke-width="0.5"/>

  <!-- Beat envelope (upper) -->
  <path d="M 60,340 Q 120,340 180,290 Q 240,340 300,340 Q 360,340 420,290 Q 480,340 540,340 Q 600,340 660,290 Q 690,340 720,340" fill="none" stroke="#6B7280" stroke-width="1" stroke-dasharray="5 3"/>
  <!-- Beat envelope (lower) -->
  <path d="M 60,340 Q 120,340 180,390 Q 240,340 300,340 Q 360,340 420,390 Q 480,340 540,340 Q 600,340 660,390 Q 690,340 720,340" fill="none" stroke="#6B7280" stroke-width="1" stroke-dasharray="5 3"/>

  <!-- Resultant wave inside envelope -->
  <path d="M 60,340 Q 65,340 70,339 Q 80,336 90,330 Q 100,322 110,310 Q 115,304 120,298 Q 130,294 140,298 Q 150,310 160,322 Q 165,330 170,336 Q 175,339 180,340 Q 185,339 190,336 Q 200,330 210,322 Q 220,310 230,298 Q 235,294 240,298 Q 250,310 260,322 Q 270,330 280,336 Q 285,339 290,340 Q 295,340 300,340 Q 305,340 310,341 Q 320,344 330,350 Q 340,360 350,372 Q 355,378 360,382 Q 370,386 380,382 Q 390,372 400,360 Q 405,350 410,344 Q 415,341 420,340 Q 425,341 430,344 Q 440,350 450,360 Q 460,372 470,382 Q 475,386 480,382 Q 490,372 500,360 Q 510,350 520,344 Q 525,341 530,340 Q 535,340 540,340 Q 545,340 550,339 Q 560,336 570,330 Q 580,322 590,310 Q 595,304 600,298 Q 610,294 620,298 Q 630,310 640,322 Q 650,330 660,336 Q 665,339 670,340 Q 675,340 680,340" fill="none" stroke="#8B0029" stroke-width="2"/>

  <!-- Beat period markers -->
  <line x1="60" y1="405" x2="300" y2="405" stroke="#8B0029" stroke-width="1.5"/>
  <line x1="300" y1="405" x2="60" y2="405" stroke="#8B0029" stroke-width="1.5"/>
  <line x1="60" y1="398" x2="60" y2="412" stroke="#8B0029" stroke-width="1"/>
  <line x1="300" y1="398" x2="300" y2="412" stroke="#8B0029" stroke-width="1"/>
  <text x="180" y="430" text-anchor="middle" font-size="14" fill="#8B0029" font-style="italic">T<tspan font-size="10" baseline-shift="sub">beat</tspan> = 1/|f<tspan font-size="10" baseline-shift="sub">1</tspan> − f<tspan font-size="10" baseline-shift="sub">2</tspan>|</text>

  <!-- "loud" / "quiet" labels -->
  <text x="180" y="280" text-anchor="middle" font-size="12" fill="#8B0029" font-weight="bold">큰 소리</text>
  <text x="300" y="328" text-anchor="middle" font-size="12" fill="#6B7280">작은 소리</text>
  <text x="420" y="280" text-anchor="middle" font-size="12" fill="#8B0029" font-weight="bold">큰 소리</text>
  <text x="540" y="328" text-anchor="middle" font-size="12" fill="#6B7280">작은 소리</text>
  <text x="660" y="280" text-anchor="middle" font-size="12" fill="#8B0029" font-weight="bold">큰 소리</text>
</svg>
