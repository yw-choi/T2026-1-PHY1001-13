<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 450" font-family="sans-serif">
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <rect width="750" height="450" fill="white"/>
  <text x="375" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B0029">음파의 변위와 압력 변화</text>

  <!-- (a) Displacement graph -->
  <text x="50" y="65" font-size="13" font-weight="bold" fill="#1a1a1a">(a) 변위 s(x, t) = s&#x2098; cos(kx &#x2212; &#x03C9;t)</text>

  <!-- Axes -->
  <line x1="80" y1="130" x2="700" y2="130" stroke="#6B7280" stroke-width="1" marker-end="url(#arrowR)"/>
  <line x1="80" y1="75" x2="80" y2="190" stroke="#6B7280" stroke-width="1"/>
  <text x="710" y="134" font-size="12" fill="#6B7280" font-style="italic">x</text>
  <text x="65" y="83" font-size="12" fill="#6B7280" font-style="italic">s</text>

  <!-- Amplitude labels -->
  <text x="55" y="102" font-size="11" fill="#8B0029" font-style="italic">s&#x2098;</text>
  <line x1="72" y1="98" x2="80" y2="98" stroke="#8B0029" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="48" y="170" font-size="11" fill="#8B0029" font-style="italic">&#x2212;s&#x2098;</text>
  <line x1="72" y1="162" x2="80" y2="162" stroke="#8B0029" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Cosine wave: λ=270px, amplitude from y=98 to y=162, center y=130 -->
  <path d="M80,98 C100,98 128,98 148,130 C168,162 196,162 215,130 C235,98 263,98 283,130 C303,162 331,162 350,130 C370,98 398,98 418,130 C438,162 466,162 485,130 C505,98 533,98 553,130 C573,162 601,162 620,130 C640,98 668,98 688,130 C698,146 700,130 700,130" stroke="#8B0029" stroke-width="2.5" fill="none"/>

  <!-- Lambda -->
  <line x1="80" y1="200" x2="350" y2="200" stroke="#6B7280" stroke-width="1"/>
  <line x1="80" y1="195" x2="80" y2="205" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="350" y1="195" x2="350" y2="205" stroke="#6B7280" stroke-width="1.5"/>
  <text x="215" y="218" text-anchor="middle" font-size="14" fill="#6B7280" font-style="italic">&#x03BB;</text>

  <!-- (b) Pressure graph -->
  <text x="50" y="255" font-size="13" font-weight="bold" fill="#1a1a1a">(b) &#x0394;p(x, t) = &#x0394;p&#x2098; sin(kx &#x2212; &#x03C9;t)</text>

  <!-- Axes -->
  <line x1="80" y1="320" x2="700" y2="320" stroke="#6B7280" stroke-width="1" marker-end="url(#arrowR)"/>
  <line x1="80" y1="265" x2="80" y2="380" stroke="#6B7280" stroke-width="1"/>
  <text x="710" y="324" font-size="12" fill="#6B7280" font-style="italic">x</text>
  <text x="55" y="273" font-size="12" fill="#6B7280" font-style="italic">&#x0394;p</text>

  <!-- Amplitude labels -->
  <text x="40" y="293" font-size="11" fill="#2563EB" font-style="italic">&#x0394;p&#x2098;</text>
  <line x1="72" y1="288" x2="80" y2="288" stroke="#2563EB" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="32" y="360" font-size="11" fill="#2563EB" font-style="italic">&#x2212;&#x0394;p&#x2098;</text>
  <line x1="72" y1="352" x2="80" y2="352" stroke="#2563EB" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Sine wave: same λ=270px, 90° phase offset from cosine -->
  <path d="M80,320 C100,320 128,288 148,288 C168,288 196,320 215,320 C235,320 263,352 283,352 C303,352 331,320 350,320 C370,320 398,288 418,288 C438,288 466,320 485,320 C505,320 533,352 553,352 C573,352 601,320 620,320 C640,320 668,288 688,288 C698,288 700,304 700,320" stroke="#2563EB" stroke-width="2.5" fill="none"/>

  <!-- Phase shift markers: x=80 (cos max), x=148 (cos zero = sin max) -->
  <line x1="80" y1="98" x2="80" y2="320" stroke="#6B7280" stroke-width="0.8" stroke-dasharray="3 3"/>
  <line x1="148" y1="98" x2="148" y2="288" stroke="#6B7280" stroke-width="0.8" stroke-dasharray="3 3"/>

  <!-- Phase shift annotation: π/2 between cos max and sin max -->
  <text x="114" y="240" text-anchor="middle" font-size="11" fill="#6B7280">&#x03C0;/2</text>
  <line x1="85" y1="236" x2="143" y2="236" stroke="#6B7280" stroke-width="1" marker-end="url(#arrowR)"/>

  <!-- Compression / Expansion labels -->
  <rect x="120" y="395" width="70" height="22" rx="4" fill="#8B002922"/>
  <text x="155" y="411" text-anchor="middle" font-size="11" fill="#8B0029" font-weight="bold">압축</text>
  <rect x="260" y="395" width="70" height="22" rx="4" fill="#2563EB22"/>
  <text x="295" y="411" text-anchor="middle" font-size="11" fill="#2563EB" font-weight="bold">팽창</text>

  <text x="550" y="410" text-anchor="middle" font-size="12" fill="#6B7280">변위와 압력은 &#x03C0;/2 (90&#xB0;) 위상차</text>
</svg>