<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 415" font-family="sans-serif">
  <defs>
    <marker id="arrD" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8B0029"/>
    </marker>
  </defs>

  <rect width="700" height="415" fill="white"/>

  <text x="350" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#8B0029">도플러 효과: 음원이 이동하는 경우</text>

  <!-- Wavefronts from past positions: subsonic (v_S/v = 60/80 = 0.75) -->
  <!-- Oldest wavefront: emitted 4 steps ago, r = 4 × 80 = 320 -->
  <circle cx="180" cy="200" r="320" fill="none" stroke="#2563EB33" stroke-width="1.5"/>
  <!-- Second oldest: emitted 3 steps ago, r = 3 × 80 = 240 -->
  <circle cx="240" cy="200" r="240" fill="none" stroke="#2563EB44" stroke-width="1.5"/>
  <!-- Third: emitted 2 steps ago, r = 2 × 80 = 160 -->
  <circle cx="300" cy="200" r="160" fill="none" stroke="#2563EB66" stroke-width="1.5"/>
  <!-- Fourth: emitted 1 step ago, r = 80 -->
  <circle cx="360" cy="200" r="80" fill="none" stroke="#2563EB88" stroke-width="1.5"/>
  <!-- Most recent: just emitted, r ≈ 0 (use small r for visibility) -->
  <circle cx="420" cy="200" r="10" fill="none" stroke="#2563EBCC" stroke-width="1.5"/>

  <!-- Past source positions -->
  <circle cx="180" cy="200" r="3" fill="#6B7280"/>
  <circle cx="240" cy="200" r="3" fill="#6B7280"/>
  <circle cx="300" cy="200" r="3" fill="#6B7280"/>
  <circle cx="360" cy="200" r="3" fill="#6B7280"/>

  <!-- Current source position -->
  <circle cx="420" cy="200" r="8" fill="#8B0029"/>
  <text x="420" y="188" text-anchor="middle" font-size="14" font-weight="bold" fill="#8B0029">S</text>

  <!-- Source velocity arrow -->
  <line x1="430" y1="200" x2="480" y2="200" stroke="#8B0029" stroke-width="2.5" marker-end="url(#arrD)"/>
  <text x="470" y="190" font-size="13" fill="#8B0029" font-style="italic" font-weight="bold">v<tspan baseline-shift="sub" font-size="10">S</tspan></text>

  <!-- Detector (right side - approaching) -->
  <rect x="580" y="190" width="20" height="20" rx="3" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2"/>
  <text x="590" y="185" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">D</text>

  <!-- Compressed wavelength annotation (right) -->
  <text x="530" y="318" text-anchor="middle" font-size="12" fill="#8B0029" font-style="italic">&#955;' &lt; &#955;</text>
  <text x="530" y="335" text-anchor="middle" font-size="11" fill="#8B0029">f' > f (높은 음)</text>

  <!-- Expanded wavelength annotation (left) -->
  <text x="100" y="318" text-anchor="middle" font-size="12" fill="#2563EB" font-style="italic">&#955;' > &#955;</text>
  <text x="100" y="335" text-anchor="middle" font-size="11" fill="#2563EB">f' &lt; f (낮은 음)</text>

  <!-- Formula box -->
  <rect x="200" y="355" width="300" height="35" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
  <text x="350" y="378" text-anchor="middle" font-size="14" font-weight="bold" fill="#8B0029">f' = f v/(v - v<tspan baseline-shift="sub" font-size="10">S</tspan>)  (접근 시)</text>

  <!-- Direction of motion label -->
  <line x1="180" y1="200" x2="420" y2="200" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
</svg>