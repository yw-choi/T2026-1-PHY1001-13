<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" font-family="sans-serif">
  <defs>
    <marker id="ar-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0029"/>
    </marker>
    <marker id="ar-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="ar-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Circular path -->
  <circle cx="330" cy="220" r="155" fill="none" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Center point -->
  <circle cx="330" cy="220" r="4" fill="#6B7280"/>
  <text x="340" y="233" font-size="14" fill="#6B7280" font-weight="bold">O</text>

  <!-- Radius line -->
  <line x1="330" y1="220" x2="485" y2="220" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="408" y="212" font-size="14" fill="#6B7280" font-style="italic">R</text>

  <!-- Particle at top -->
  <circle cx="330" cy="65" r="7" fill="#8B0029"/>
  <line x1="338" y1="65" x2="415" y2="65" stroke="#2563EB" stroke-width="2.5" marker-end="url(#ar-blue)"/>
  <text x="425" y="60" font-size="14" fill="#2563EB" font-weight="bold" font-style="italic">v</text>
  <line x1="330" y1="74" x2="330" y2="130" stroke="#8B0029" stroke-width="2.5" marker-end="url(#ar-red)"/>
  <text x="340" y="122" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">a</text>

  <!-- Particle at right -->
  <circle cx="485" cy="220" r="7" fill="#8B0029"/>
  <line x1="485" y1="228" x2="485" y2="305" stroke="#2563EB" stroke-width="2.5" marker-end="url(#ar-blue)"/>
  <text x="495" y="292" font-size="14" fill="#2563EB" font-weight="bold" font-style="italic">v</text>
  <line x1="477" y1="220" x2="420" y2="220" stroke="#8B0029" stroke-width="2.5" marker-end="url(#ar-red)"/>
  <text x="432" y="240" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">a</text>

  <!-- Particle at bottom -->
  <circle cx="330" cy="375" r="7" fill="#8B0029"/>
  <line x1="322" y1="375" x2="245" y2="375" stroke="#2563EB" stroke-width="2.5" marker-end="url(#ar-blue)"/>
  <text x="233" y="370" font-size="14" fill="#2563EB" font-weight="bold" font-style="italic">v</text>
  <line x1="330" y1="367" x2="330" y2="310" stroke="#8B0029" stroke-width="2.5" marker-end="url(#ar-red)"/>
  <text x="340" y="320" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">a</text>

  <!-- Particle at left -->
  <circle cx="175" cy="220" r="7" fill="#8B0029"/>
  <line x1="175" y1="212" x2="175" y2="135" stroke="#2563EB" stroke-width="2.5" marker-end="url(#ar-blue)"/>
  <text x="160" y="142" font-size="14" fill="#2563EB" font-weight="bold" font-style="italic">v</text>
  <line x1="183" y1="220" x2="240" y2="220" stroke="#8B0029" stroke-width="2.5" marker-end="url(#ar-red)"/>
  <text x="222" y="240" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">a</text>

  <!-- Legend -->
  <line x1="30" y1="405" x2="50" y2="405" stroke="#2563EB" stroke-width="2.5"/>
  <text x="55" y="410" font-size="14" fill="#2563EB" font-weight="bold">속도 (접선 방향)</text>
  <line x1="230" y1="405" x2="250" y2="405" stroke="#8B0029" stroke-width="2.5"/>
  <text x="255" y="410" font-size="14" fill="#8B0029" font-weight="bold">구심 가속도 (중심 방향)</text>

  <!-- Formula -->
  <text x="580" y="405" font-size="14" fill="#1a1a1a" text-anchor="middle" font-style="italic">a = v²/R</text>
  <text x="580" y="425" font-size="14" fill="#6B7280" text-anchor="middle">항상 중심을 향함</text>
</svg>