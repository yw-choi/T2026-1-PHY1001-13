<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="sans-serif">
  <defs>
    <marker id="ar-axis" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="80" y1="340" x2="650" y2="340" stroke="#1a1a1a" stroke-width="2" marker-end="url(#ar-axis)"/>
  <line x1="80" y1="340" x2="80" y2="40" stroke="#1a1a1a" stroke-width="2" marker-end="url(#ar-axis)"/>

  <!-- Axis labels -->
  <text x="640" y="375" font-size="14" fill="#1a1a1a" text-anchor="end">가해진 힘 F</text>
  <text x="25" y="45" font-size="14" fill="#1a1a1a" text-anchor="start">마찰력 f</text>

  <!-- Static friction region: increasing line f = F -->
  <line x1="80" y1="340" x2="300" y2="120" stroke="#8B0029" stroke-width="2.5"/>

  <!-- fs,max point -->
  <circle cx="300" cy="120" r="5" fill="#8B0029"/>

  <!-- fs,max horizontal dashed line -->
  <line x1="80" y1="120" x2="300" y2="120" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- fs,max label on y-axis -->
  <text x="72" y="125" font-size="13" fill="#8B0029" text-anchor="end" font-weight="bold" font-style="italic">f</text>
  <text x="45" y="140" font-size="10" fill="#8B0029" text-anchor="end">s,max</text>

  <!-- fs,max = μsN annotation -->
  <text x="315" y="105" font-size="14" fill="#8B0029" font-weight="bold" font-style="italic">f</text>
  <text x="325" y="110" font-size="10" fill="#8B0029">s,max</text>
  <text x="350" y="105" font-size="13" fill="#8B0029">= μ</text>
  <text x="380" y="110" font-size="10" fill="#8B0029">s</text>
  <text x="390" y="105" font-size="13" fill="#8B0029" font-style="italic">N</text>

  <!-- Drop from static max to kinetic -->
  <line x1="300" y1="120" x2="300" y2="185" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="3 3"/>

  <!-- Kinetic friction region: constant horizontal line -->
  <line x1="300" y1="185" x2="620" y2="185" stroke="#2563EB" stroke-width="2.5"/>

  <!-- fk horizontal dashed line -->
  <line x1="80" y1="185" x2="300" y2="185" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- fk label on y-axis -->
  <text x="72" y="190" font-size="13" fill="#2563EB" text-anchor="end" font-weight="bold" font-style="italic">f</text>
  <text x="55" y="203" font-size="10" fill="#2563EB" text-anchor="end">k</text>

  <!-- fk = μkN annotation -->
  <text x="470" y="175" font-size="14" fill="#2563EB" font-weight="bold" font-style="italic">f</text>
  <text x="480" y="180" font-size="10" fill="#2563EB">k</text>
  <text x="492" y="175" font-size="13" fill="#2563EB">= μ</text>
  <text x="522" y="180" font-size="10" fill="#2563EB">k</text>
  <text x="532" y="175" font-size="13" fill="#2563EB" font-style="italic">N</text>

  <!-- Region labels -->
  <rect x="130" y="260" width="90" height="50" fill="rgba(139,0,41,0.08)" rx="6"/>
  <text x="175" y="282" font-size="14" fill="#8B0029" text-anchor="middle" font-weight="bold">정지 마찰</text>
  <text x="175" y="300" font-size="12" fill="#8B0029" text-anchor="middle">(static)</text>

  <rect x="410" y="260" width="90" height="50" fill="rgba(37,99,235,0.08)" rx="6"/>
  <text x="455" y="282" font-size="14" fill="#2563EB" text-anchor="middle" font-weight="bold">운동 마찰</text>
  <text x="455" y="300" font-size="12" fill="#2563EB" text-anchor="middle">(kinetic)</text>

  <!-- "물체 움직이기 시작" annotation -->
  <line x1="300" y1="340" x2="300" y2="320" stroke="#6B7280" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="300" y="365" font-size="12" fill="#6B7280" text-anchor="middle">운동 시작</text>

  <!-- Note at bottom -->
  <text x="350" y="405" font-size="13" fill="#6B7280" text-anchor="middle">일반적으로 μ</text>
  <text x="399" y="408" font-size="10" fill="#6B7280">s</text>
  <text x="410" y="405" font-size="13" fill="#6B7280"> &gt; μ</text>
  <text x="441" y="408" font-size="10" fill="#6B7280">k</text>
  <text x="455" y="405" font-size="13" fill="#6B7280"> → 정지 마찰력이 운동 마찰력보다 크다</text>
</svg>