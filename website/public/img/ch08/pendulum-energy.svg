<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 420" font-family="sans-serif">
  <!-- Pivot -->
  <rect x="330" y="20" width="90" height="12" fill="#6B7280" rx="3"/>
  <circle cx="375" cy="32" r="5" fill="#1a1a1a"/>

  <!-- Left position (highest) -->
  <line x1="375" y1="32" x2="195" y2="192" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="195" cy="192" r="18" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2"/>
  <text x="195" y="197" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a1a">m</text>
  <text x="165" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#8B0029">A</text>

  <!-- Middle position (lowest) -->
  <line x1="375" y1="32" x2="375" y2="282" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="375" cy="282" r="18" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2"/>
  <text x="375" y="287" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a1a">m</text>
  <text x="400" y="278" text-anchor="start" font-size="13" font-weight="bold" fill="#8B0029">B</text>

  <!-- Right position (highest) -->
  <line x1="375" y1="32" x2="555" y2="192" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="555" cy="192" r="18" fill="#F3F4F6" stroke="#1a1a1a" stroke-width="2"/>
  <text x="555" y="197" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a1a">m</text>
  <text x="585" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#8B0029">C</text>

  <!-- Arc (swing path) -->
  <path d="M195,192 Q375,320 555,192" fill="none" stroke="#6B7280" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Height h -->
  <line x1="160" y1="192" x2="160" y2="282" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="155" y1="192" x2="165" y2="192" stroke="#6B7280" stroke-width="1"/>
  <line x1="155" y1="282" x2="165" y2="282" stroke="#6B7280" stroke-width="1"/>
  <text x="145" y="242" text-anchor="middle" font-size="14" font-style="italic" fill="#6B7280">h</text>

  <!-- Reference line -->
  <line x1="140" y1="282" x2="610" y2="282" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Velocity arrows -->
  <line x1="375" y1="263" x2="425" y2="263" stroke="#2563EB" stroke-width="2.5"/>
  <polygon points="425,263 417,258 417,268" fill="#2563EB"/>
  <text x="430" y="258" font-size="13" font-weight="bold" fill="#2563EB" font-style="italic">v_max</text>

  <!-- Energy bars A -->
  <rect x="60" y="345" width="28" height="55" fill="rgba(139,0,41,0.7)" stroke="#8B0029" stroke-width="1"/>
  <rect x="92" y="400" width="28" height="0" fill="rgba(37,99,235,0.7)" stroke="#2563EB" stroke-width="1"/>
  <text x="88" y="415" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="bold">A</text>
  <text x="74" y="340" text-anchor="middle" font-size="10" fill="#8B0029">U</text>
  <text x="106" y="398" text-anchor="middle" font-size="10" fill="#2563EB">K=0</text>

  <!-- Energy bars B -->
  <rect x="270" y="400" width="28" height="0" fill="rgba(139,0,41,0.7)" stroke="#8B0029" stroke-width="1"/>
  <rect x="302" y="345" width="28" height="55" fill="rgba(37,99,235,0.7)" stroke="#2563EB" stroke-width="1"/>
  <text x="300" y="415" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="bold">B</text>
  <text x="284" y="398" text-anchor="middle" font-size="10" fill="#8B0029">U=0</text>
  <text x="316" y="340" text-anchor="middle" font-size="10" fill="#2563EB">K</text>

  <!-- Energy bars C -->
  <rect x="480" y="345" width="28" height="55" fill="rgba(139,0,41,0.7)" stroke="#8B0029" stroke-width="1"/>
  <rect x="512" y="400" width="28" height="0" fill="rgba(37,99,235,0.7)" stroke="#2563EB" stroke-width="1"/>
  <text x="510" y="415" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="bold">C</text>
  <text x="494" y="340" text-anchor="middle" font-size="10" fill="#8B0029">U</text>
  <text x="526" y="398" text-anchor="middle" font-size="10" fill="#2563EB">K=0</text>

  <!-- Total energy line -->
  <line x1="55" y1="345" x2="545" y2="345" stroke="#8B0029" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="580" y="348" font-size="12" fill="#8B0029" font-weight="bold" font-style="italic">E_mec = K + U = const</text>
</svg>