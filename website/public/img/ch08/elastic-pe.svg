<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="sans-serif">
  <defs>
    <marker id="arrowRestoreR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrowRestoreL" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrowAxis" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000000"/>
    </marker>
  </defs>
  <!-- Axes -->
  <line x1="100" y1="340" x2="620" y2="340" stroke="#000000" stroke-width="2" marker-end="url(#arrowAxis)"/>
  <text x="630" y="345" font-size="14" font-style="italic" fill="#000000">x</text>

  <line x1="350" y1="360" x2="350" y2="40" stroke="#000000" stroke-width="2" marker-end="url(#arrowAxis)"/>
  <text x="340" y="35" font-size="14" font-style="italic" fill="#000000">U</text>

  <!-- Parabola U = ½kx² -->
  <path d="M130,90 Q350,380 570,90" fill="none" stroke="#8B0029" stroke-width="2.5"/>

  <!-- Shaded region -->
  <path d="M130,90 Q350,380 570,90 L570,340 L130,340 Z" fill="#F3F4F6" stroke="none"/>

  <!-- x = 0 label -->
  <text x="350" y="365" text-anchor="middle" font-size="14" fill="#000000">0</text>

  <!-- x markers -->
  <line x1="200" y1="340" x2="200" y2="335" stroke="#000000" stroke-width="1"/>
  <text x="200" y="365" text-anchor="middle" font-size="14" fill="#000000">−x</text>
  <line x1="500" y1="340" x2="500" y2="335" stroke="#000000" stroke-width="1"/>
  <text x="500" y="365" text-anchor="middle" font-size="14" fill="#000000">+x</text>

  <!-- Dashed lines from x to curve -->
  <line x1="200" y1="340" x2="200" y2="170" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="500" y1="340" x2="500" y2="170" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="200" y1="170" x2="500" y2="170" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- U value label -->
  <text x="340" y="162" text-anchor="end" font-size="14" fill="#6B7280" font-style="italic">½kx²</text>

  <!-- Curve label -->
  <text x="575" y="80" font-size="14" font-weight="bold" fill="#8B0029" font-style="italic">U(x) = ½kx²</text>

  <!-- Minimum point -->
  <circle cx="350" cy="340" r="5" fill="#8B0029"/>
  <text x="370" y="325" font-size="14" fill="#8B0029" font-weight="bold">최솟값: U = 0</text>
  <text x="370" y="310" font-size="14" fill="#6B7280">(평형 위치)</text>

  <!-- Arrows showing restoring -->
  <line x1="230" y1="290" x2="290" y2="290" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrowRestoreR)"/>
  <line x1="470" y1="290" x2="410" y2="290" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrowRestoreL)"/>
  <text x="260" y="280" text-anchor="middle" font-size="14" fill="#2563EB" font-weight="bold">F</text>
  <text x="440" y="280" text-anchor="middle" font-size="14" fill="#2563EB" font-weight="bold">F</text>

</svg>