<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 450" font-family="sans-serif">
  <!-- Axes -->
  <line x1="80" y1="400" x2="700" y2="400" stroke="#1a1a1a" stroke-width="1.5"/>
  <polygon points="700,400 688,396 688,404" fill="#1a1a1a"/>
  <text x="710" y="405" font-size="14" font-style="italic" fill="#1a1a1a">x</text>

  <line x1="80" y1="420" x2="80" y2="30" stroke="#1a1a1a" stroke-width="1.5"/>
  <polygon points="80,30 76,42 84,42" fill="#1a1a1a"/>
  <text x="65" y="28" font-size="14" font-style="italic" fill="#1a1a1a">U(x)</text>

  <!-- U(x) curve - double well potential -->
  <path d="M100,120 C150,80 180,180 250,280 C300,360 340,390 380,350 C400,320 420,180 460,140 C490,110 540,130 580,200 C610,250 640,320 680,350"
        fill="none" stroke="#8B0029" stroke-width="2.5"/>

  <!-- E_mec horizontal line -->
  <line x1="100" y1="200" x2="680" y2="200" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="690" y="205" font-size="14" font-weight="bold" fill="#2563EB" font-style="italic">E_mec</text>

  <!-- Turning points (where U = Emec) -->
  <!-- Left turning point ~x1 -->
  <circle cx="210" cy="200" r="6" fill="#8B0029"/>
  <text x="210" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#8B0029">x₁</text>
  <line x1="210" y1="206" x2="210" y2="400" stroke="#8B0029" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Right turning point ~x4 -->
  <circle cx="560" cy="200" r="6" fill="#8B0029"/>
  <text x="560" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#8B0029">x₄</text>
  <line x1="560" y1="206" x2="560" y2="400" stroke="#8B0029" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Inner turning points -->
  <circle cx="310" cy="200" r="6" fill="#8B0029"/>
  <text x="310" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#8B0029">x₂</text>
  <line x1="310" y1="206" x2="310" y2="400" stroke="#8B0029" stroke-width="1" stroke-dasharray="3 3"/>

  <circle cx="430" cy="200" r="6" fill="#8B0029"/>
  <text x="430" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#8B0029">x₃</text>
  <line x1="430" y1="206" x2="430" y2="400" stroke="#8B0029" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- K = Emec - U annotation -->
  <line x1="260" y1="200" x2="260" y2="255" stroke="#2563EB" stroke-width="2"/>
  <line x1="255" y1="200" x2="265" y2="200" stroke="#2563EB" stroke-width="1.5"/>
  <line x1="255" y1="255" x2="265" y2="255" stroke="#2563EB" stroke-width="1.5"/>
  <text x="275" y="230" font-size="13" font-weight="bold" fill="#2563EB" font-style="italic">K</text>

  <!-- Unstable equilibrium -->
  <circle cx="380" cy="350" r="5" fill="white" stroke="#6B7280" stroke-width="2"/>
  <text x="380" y="375" text-anchor="middle" font-size="12" fill="#6B7280">불안정 평형</text>

  <!-- Stable equilibrium (local min on left) -->
  <circle cx="250" cy="280" r="5" fill="#8B0029" stroke="#8B0029" stroke-width="1"/>
  <text x="250" y="300" text-anchor="middle" font-size="12" fill="#8B0029">안정 평형</text>

  <!-- Stable equilibrium (global min) -->
  <circle cx="460" cy="140" r="5" fill="#8B0029" stroke="#8B0029" stroke-width="1"/>
  <text x="460" y="128" text-anchor="middle" font-size="12" fill="#8B0029">안정 평형</text>

  <!-- Legend -->
  <rect x="460" y="50" width="230" height="95" rx="8" fill="white" stroke="#6B7280" stroke-width="1"/>
  <text x="575" y="73" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">퍼텐셜에너지 곡선 분석</text>
  <circle cx="480" cy="92" r="5" fill="#8B0029"/>
  <text x="495" y="97" font-size="12" fill="#1a1a1a">반환점 (K = 0)</text>
  <circle cx="480" cy="112" r="4" fill="#8B0029"/>
  <text x="495" y="117" font-size="12" fill="#1a1a1a">안정 평형 (U 극소)</text>
  <circle cx="480" cy="132" r="4" fill="white" stroke="#6B7280" stroke-width="1.5"/>
  <text x="495" y="137" font-size="12" fill="#1a1a1a">불안정 평형 (U 극대)</text>
</svg>