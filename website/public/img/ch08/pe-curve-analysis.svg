<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 450" font-family="sans-serif">
  <!-- Axes -->
  <line x1="80" y1="400" x2="700" y2="400" stroke="#000000" stroke-width="2"/>
  <polygon points="700,400 688,396 688,404" fill="#000000"/>
  <text x="710" y="405" font-size="14" font-style="italic" fill="#000000">x</text>

  <line x1="80" y1="420" x2="80" y2="30" stroke="#000000" stroke-width="2"/>
  <polygon points="80,30 76,42 84,42" fill="#000000"/>
  <text x="50" y="28" font-size="14" font-style="italic" fill="#000000">U(x)</text>

  <!-- U(x) curve - double well potential -->
  <path d="M100,100 C130,110 170,220 230,350 C275,440 340,200 400,175 C450,155 510,340 560,320 C610,300 660,180 690,120"
        fill="none" stroke="#8B0029" stroke-width="2.5"/>

  <!-- E_mec horizontal line -->
  <line x1="100" y1="220" x2="690" y2="220" stroke="#2563EB" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="695" y="218" font-size="14" font-weight="bold" fill="#2563EB">
    <tspan font-style="italic">E</tspan><tspan dy="4" font-size="10" font-style="normal">mec</tspan>
  </text>

  <!-- Turning points (where U = E_mec) -->
  <!-- x1 -->
  <circle cx="172" cy="220" r="5" fill="#8B0029"/>
  <text x="172" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#8B0029" font-style="italic">x₁</text>
  <line x1="172" y1="226" x2="172" y2="400" stroke="#8B0029" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- x2 -->
  <circle cx="358" cy="220" r="5" fill="#8B0029"/>
  <text x="358" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#8B0029" font-style="italic">x₂</text>
  <line x1="358" y1="226" x2="358" y2="400" stroke="#8B0029" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- x3 -->
  <circle cx="461" cy="220" r="5" fill="#8B0029"/>
  <text x="461" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#8B0029" font-style="italic">x₃</text>
  <line x1="461" y1="226" x2="461" y2="400" stroke="#8B0029" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- x4 -->
  <circle cx="641" cy="220" r="5" fill="#8B0029"/>
  <text x="641" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#8B0029" font-style="italic">x₄</text>
  <line x1="641" y1="226" x2="641" y2="400" stroke="#8B0029" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- K = E_mec - U annotation (in first well) -->
  <line x1="265" y1="220" x2="265" y2="366" stroke="#2563EB" stroke-width="2"/>
  <line x1="260" y1="220" x2="270" y2="220" stroke="#2563EB" stroke-width="1.5"/>
  <line x1="260" y1="366" x2="270" y2="366" stroke="#2563EB" stroke-width="1.5"/>
  <text x="280" y="298" font-size="14" font-weight="bold" fill="#2563EB" font-style="italic">K</text>

  <!-- Stable equilibrium 1 (first well, U local min) -->
  <circle cx="253" cy="370" r="5" fill="#8B0029" stroke="#8B0029" stroke-width="1"/>
  <text x="253" y="393" text-anchor="middle" font-size="13" fill="#8B0029">안정 평형</text>

  <!-- Unstable equilibrium (barrier, U local max) -->
  <circle cx="408" cy="174" r="5" fill="white" stroke="#6B7280" stroke-width="2"/>
  <text x="408" y="164" text-anchor="middle" font-size="13" fill="#6B7280">불안정 평형</text>

  <!-- Stable equilibrium 2 (second well, U local min) -->
  <circle cx="552" cy="322" r="5" fill="#8B0029" stroke="#8B0029" stroke-width="1"/>
  <text x="552" y="345" text-anchor="middle" font-size="13" fill="#8B0029">안정 평형</text>

  <!-- Legend (top-left, away from curve) -->
  <rect x="105" y="30" width="230" height="75" rx="8" fill="white" fill-opacity="0.95" stroke="#6B7280" stroke-width="1"/>
  <circle cx="120" cy="48" r="5" fill="#8B0029"/>
  <text x="133" y="53" font-size="13" fill="#000000">반환점 (K = 0)</text>
  <circle cx="120" cy="68" r="4" fill="#8B0029" stroke="#8B0029" stroke-width="1"/>
  <text x="133" y="73" font-size="13" fill="#000000">안정 평형 (U 극소)</text>
  <circle cx="120" cy="88" r="4" fill="white" stroke="#6B7280" stroke-width="1.5"/>
  <text x="133" y="93" font-size="13" fill="#000000">불안정 평형 (U 극대)</text>
</svg>
