<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일-운동에너지 정리 시뮬레이션</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; overflow: hidden; }
.container { display: flex; height: 100vh; }
.canvas-area { flex: 1; position: relative; background: #fafafa; }
canvas { display: block; width: 100%; height: 100%; }
.controls { width: 260px; padding: 16px; border-left: 2px solid #eee; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
.controls h2 { color: #8B0029; font-size: 15px; margin-bottom: 2px; }
.control-group { display: flex; flex-direction: column; gap: 4px; }
.control-group label { font-size: 13px; font-weight: 600; color: #444; }
.control-group input[type="range"] { width: 100%; accent-color: #8B0029; }
.info-box { background: #f8f0f2; border: 1px solid #e0c0c8; border-radius: 8px; padding: 10px; font-size: 12.5px; line-height: 1.8; }
.info-box .label { color: #8B0029; font-weight: 700; }
.info-box .val { font-family: 'Courier New', monospace; font-weight: 600; }
.info-box .eq { color: #555; font-size: 12px; }
.info-box .eq .katex { font-size: 13px; }
.theorem-box { background: #8B0029; color: #fff; border-radius: 8px; padding: 10px; font-size: 13px; text-align: center; font-weight: 700; line-height: 1.6; }
.theorem-box .theorem-eq { font-size: 16px; display: block; margin-top: 4px; }
.theorem-box .katex { color: #fff; }
button.reset-btn { background: #8B0029; color: #fff; border: none; border-radius: 6px; padding: 10px; font-size: 14px; cursor: pointer; }
button.reset-btn:hover { background: #a3003a; }
.play-btn { background: #2a7d2a; color: #fff; border: none; border-radius: 6px; padding: 10px; font-size: 14px; cursor: pointer; }
.play-btn:hover { background: #35a035; }
.play-btn.running { background: #b8860b; }
.btn-row { display: flex; gap: 8px; }
.btn-row button { flex: 1; }
.verify-line { text-align: center; font-weight: 700; color: #8B0029; }
.verify-line .katex { font-size: 13px; }

/* Formula overlay on canvas */
.formula-overlay { position: absolute; bottom: 0; left: 0; right: 0; pointer-events: none; padding: 10px 20px 12px; background: rgba(250,250,250,0.92); border-top: 1px solid #eee; }
.formula-overlay .formula-line { font-size: 15px; line-height: 1.7; color: #333; }
.formula-overlay .formula-line.highlight { color: #8B0029; font-weight: 700; }
.formula-overlay .formula-line .katex { font-size: 16px; }
.formula-overlay .formula-line.highlight .katex { font-size: 16px; }

/* Canvas title overlay */
.canvas-title { position: absolute; top: 8px; left: 20px; pointer-events: none; font-size: 20px; font-weight: 700; color: #8B0029; }
.canvas-title .katex { font-size: 20px; color: #8B0029; }

/* KaTeX overlay labels on canvas */
.canvas-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; overflow: hidden;
}
.canvas-overlay .katex-label {
  position: absolute;
  white-space: nowrap;
  font-size: 14px;
  line-height: 1;
  pointer-events: none;
  display: none;
}
.canvas-overlay .katex-label .katex { font-size: 0.95em; }
.canvas-overlay .katex-label.with-bg {
  background: rgba(255,255,255,0.85);
  padding: 1px 4px;
  border-radius: 2px;
}

@media (max-width: 700px) {
  .container { flex-direction: column; }
  .canvas-area { height: 50vh; }
  .controls { width: 100%; height: 50vh; border-left: none; border-top: 2px solid #eee; }
}
</style>
</head>
<body>
<div class="container">
  <div class="canvas-area">
    <canvas id="canvas"></canvas>
    <div class="canvas-overlay" id="overlay">
      <div class="katex-label with-bg" id="lbl-angle" style="color:#8B0029;"></div>
      <div class="katex-label" id="lbl-dk" style="color:#2563EB;font-weight:bold;"></div>
    </div>
    <div class="canvas-title" id="canvasTitle"></div>
    <div class="formula-overlay" id="formulaOverlay">
      <div class="formula-line" id="formulaW"></div>
      <div class="formula-line" id="formulaK"></div>
      <div class="formula-line highlight" id="formulaVerify"></div>
    </div>
  </div>
  <div class="controls">
    <div class="theorem-box">
      일-운동에너지 정리
      <span class="theorem-eq" id="theoremEq"></span>
    </div>

    <div class="control-group">
      <label>힘의 크기 F = <span id="forceVal">20.0</span> N</label>
      <input type="range" id="forceSlider" min="1" max="50" value="20" step="0.5">
    </div>

    <div class="control-group">
      <label>힘의 각도 <span id="angleLabelPhi"></span> = <span id="angleVal">30</span>&deg;</label>
      <input type="range" id="angleSlider" min="0" max="90" value="30" step="1">
    </div>

    <div class="control-group">
      <label>질량 m = <span id="massVal">5.0</span> kg</label>
      <input type="range" id="massSlider" min="1" max="20" value="5" step="0.5">
    </div>

    <div class="info-box" id="infoBox">
      <div><span class="label">변위 d:</span> <span class="val" id="dispInfo">0.00 m</span></div>
      <div><span class="label">속력 v:</span> <span class="val" id="speedInfo">0.00 m/s</span></div>
      <hr style="border:none;border-top:1px solid #e0c0c8;margin:4px 0">
      <div class="eq" id="eqWork"></div>
      <div><span class="label">일 W =</span> <span class="val" id="workInfo">0.00 J</span></div>
      <hr style="border:none;border-top:1px solid #e0c0c8;margin:4px 0">
      <div class="eq" id="eqKE"></div>
      <div><span class="label" id="kfLabel"></span> <span class="val" id="kfInfo">0.00 J</span></div>
      <div><span class="label" id="dkLabel"></span> <span class="val" id="dkInfo">0.00 J</span></div>
      <hr style="border:none;border-top:1px solid #e0c0c8;margin:4px 0">
      <div class="verify-line" id="verifyLine"></div>
    </div>

    <div class="btn-row">
      <button class="play-btn" id="playBtn">&#9654; 시작</button>
      <button class="reset-btn" id="resetBtn">&#8635; 초기화</button>
    </div>
  </div>
</div>

<script>
// KaTeX helper
function tex(expr) {
  return katex.renderToString(expr, { throwOnError: false });
}

// Overlay label refs
const lblAngle = document.getElementById('lbl-angle');
const lblDK = document.getElementById('lbl-dk');

// Position a KaTeX overlay label at (px, py) in CSS pixels relative to canvas
function posLabel(el, px, py, html) {
  el.innerHTML = html;
  el.style.left = px + 'px';
  el.style.top = py + 'px';
  el.style.display = 'block';
}

// Render static KaTeX elements
function renderStaticKaTeX() {
  document.getElementById('theoremEq').innerHTML = tex('\\Delta K = K_f - K_i = W');
  document.getElementById('canvasTitle').innerHTML = '일-운동에너지 정리: ' + tex('\\Delta K = W');
  document.getElementById('angleLabelPhi').innerHTML = tex('\\varphi');
  document.getElementById('eqWork').innerHTML = tex('W = Fd\\cos\\varphi');
  document.getElementById('eqKE').innerHTML = tex('K = \\tfrac{1}{2}mv^2');
  document.getElementById('kfLabel').innerHTML = tex('K_f') + ' =';
  document.getElementById('dkLabel').innerHTML = tex('\\Delta K') + ' =';
}

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const forceSlider = document.getElementById('forceSlider');
const angleSlider = document.getElementById('angleSlider');
const massSlider = document.getElementById('massSlider');
const forceVal = document.getElementById('forceVal');
const angleVal = document.getElementById('angleVal');
const massVal = document.getElementById('massVal');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');

let dpr = window.devicePixelRatio || 1;
let W, H;
let running = false;
let animId = null;

// Physics state — analytical solution, no integration error
const maxDisp = 8; // 0m to 8m
let t = 0;         // elapsed time
const dtAnim = 1 / 60;

// Derived from current params at each frame
function getParams() {
  const F = parseFloat(forceSlider.value);
  const phiDeg = parseFloat(angleSlider.value);
  const phi = phiDeg * Math.PI / 180;
  const m = parseFloat(massSlider.value);
  return { F, phi, phiDeg, m };
}

// Analytical: constant acceleration from rest
// a = F cos(phi) / m, v0 = 0, x0 = 0
// x(t) = ½ a t², v(t) = a t
function getState() {
  const { F, phi, m } = getParams();
  const a = F * Math.cos(phi) / m;
  let xNow = 0.5 * a * t * t;
  let vNow = a * t;
  // Clamp to maxDisp
  if (xNow >= maxDisp) {
    xNow = maxDisp;
    // time to reach maxDisp: t_end = sqrt(2*maxDisp/a)
    const tEnd = Math.sqrt(2 * maxDisp / a);
    vNow = a * tEnd;
  }
  const d = xNow;
  const work = F * d * Math.cos(phi);    // W = F d cos φ
  const Kf = 0.5 * m * vNow * vNow;     // K = ½mv²
  return { x: xNow, v: vNow, d, work, Kf, a };
}

function resize() {
  dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

function updateLabels() {
  forceVal.textContent = parseFloat(forceSlider.value).toFixed(1);
  angleVal.textContent = angleSlider.value;
  massVal.textContent = parseFloat(massSlider.value).toFixed(1);
}

function updateInfo() {
  const { F, phi, phiDeg, m } = getParams();
  const { d, v, work, Kf } = getState();
  document.getElementById('dispInfo').textContent = d.toFixed(2) + ' m';
  document.getElementById('speedInfo').textContent = v.toFixed(2) + ' m/s';
  document.getElementById('workInfo').textContent = work.toFixed(2) + ' J';
  document.getElementById('kfInfo').textContent = Kf.toFixed(2) + ' J';
  document.getElementById('dkInfo').textContent = Kf.toFixed(2) + ' J';

  // Verify line with KaTeX
  const verifyEl = document.getElementById('verifyLine');
  verifyEl.innerHTML = tex(
    'W = ' + work.toFixed(2) + '\\;\\text{J} = \\Delta K = ' + Kf.toFixed(2) + '\\;\\text{J}\\;\\checkmark'
  );

  // Formula overlay
  document.getElementById('formulaW').innerHTML = tex(
    'W = Fd\\cos\\varphi = ' + F.toFixed(0) + ' \\times ' + d.toFixed(2) +
    ' \\times \\cos ' + phiDeg + '^\\circ = ' + work.toFixed(2) + '\\;\\text{J}'
  );
  document.getElementById('formulaK').innerHTML = tex(
    'K = \\tfrac{1}{2}mv^2 = \\tfrac{1}{2} \\times ' + m.toFixed(0) +
    ' \\times ' + v.toFixed(2) + '^2 = ' + Kf.toFixed(2) + '\\;\\text{J}'
  );
  document.getElementById('formulaVerify').innerHTML = tex(
    'W = \\Delta K = ' + work.toFixed(2) + '\\;\\text{J}\\;\\checkmark'
  );
}

function drawArrow(x1, y1, x2, y2, color, lineWidth) {
  const headLen = 12;
  const angle = Math.atan2(y2 - y1, x2 - x1);
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - headLen * Math.cos(angle - 0.35), y2 - headLen * Math.sin(angle - 0.35));
  ctx.lineTo(x2 - headLen * Math.cos(angle + 0.35), y2 - headLen * Math.sin(angle + 0.35));
  ctx.closePath();
  ctx.fill();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  const { F, phi, phiDeg, m } = getParams();
  const { x, v, d, work, Kf } = getState();

  const groundY = H * 0.58;
  const trackLeft = 70;
  const trackRight = W - 30;
  const trackLen = trackRight - trackLeft;
  const pxPerMeter = trackLen / maxDisp;

  // Ground
  ctx.fillStyle = '#F3F4F6';
  ctx.fillRect(0, groundY, W, H - groundY);
  ctx.strokeStyle = '#bbb';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.stroke();

  // Hatching on ground
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 1;
  for (let hx = 0; hx < W; hx += 14) {
    ctx.beginPath();
    ctx.moveTo(hx, groundY);
    ctx.lineTo(hx - 10, groundY + 10);
    ctx.stroke();
  }

  // Ruler marks
  ctx.fillStyle = '#888';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 1;
  for (let i = 0; i <= maxDisp; i++) {
    const px = trackLeft + i * pxPerMeter;
    ctx.beginPath();
    ctx.moveTo(px, groundY);
    ctx.lineTo(px, groundY + 10);
    ctx.stroke();
    ctx.fillText(i + ' m', px, groundY + 24);
  }

  // Displacement arrow (blue, along ground)
  if (d > 0.05) {
    const dStartPx = trackLeft;
    const dEndPx = trackLeft + x * pxPerMeter;
    const arrowY = groundY + 42;
    drawArrow(dStartPx, arrowY, dEndPx, arrowY, '#2563EB', 2.5);
    ctx.fillStyle = '#2563EB';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('d = ' + d.toFixed(2) + ' m', (dStartPx + dEndPx) / 2, arrowY - 10);
  }

  // Block
  const blockW = 50;
  const blockH = 50;
  const blockCenterX = trackLeft + x * pxPerMeter;
  const blockLeft = blockCenterX - blockW / 2;
  const blockTop = groundY - blockH;

  // Block shadow
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fillRect(blockLeft + 3, blockTop + 3, blockW, blockH);

  ctx.fillStyle = '#F3F4F6';
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2;
  ctx.fillRect(blockLeft, blockTop, blockW, blockH);
  ctx.strokeRect(blockLeft, blockTop, blockW, blockH);
  ctx.fillStyle = '#1a1a1a';
  ctx.font = 'bold 15px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(m.toFixed(0) + ' kg', blockCenterX, blockTop + blockH / 2);
  ctx.textBaseline = 'alphabetic';

  // Force arrow (red, at angle phi from horizontal)
  const arrowLen = Math.max(F * 2, 40);
  const forceStartX = blockCenterX + blockW / 2;
  const forceStartY = blockTop + blockH / 2;
  const forceEndX = forceStartX + arrowLen * Math.cos(-phi);
  const forceEndY = forceStartY + arrowLen * Math.sin(-phi);
  drawArrow(forceStartX, forceStartY, forceEndX, forceEndY, '#8B0029', 3);

  // Force label
  ctx.fillStyle = '#8B0029';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('F = ' + F.toFixed(0) + ' N', forceEndX + 8, forceEndY - 4);

  // Angle arc
  if (phiDeg > 2) {
    const arcR = 32;
    ctx.strokeStyle = '#8B0029';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(forceStartX, forceStartY, arcR, 0, -phi, true);
    ctx.stroke();
    // Angle label — KaTeX overlay
    const labelAngle = -phi / 2;
    const angleLabelX = forceStartX + arcR * Math.cos(labelAngle) + 6;
    const angleLabelY = forceStartY + arcR * Math.sin(labelAngle) - 6;
    posLabel(lblAngle, angleLabelX, angleLabelY,
      tex('\\varphi = ' + phiDeg + '^\\circ'));
  } else {
    lblAngle.style.display = 'none';
  }

  // Velocity arrow (blue, horizontal, above block)
  if (Math.abs(v) > 0.05) {
    const vLen = Math.min(Math.abs(v) * 10, 100);
    const vSign = v > 0 ? 1 : -1;
    const vStartX = blockCenterX;
    const vStartY = blockTop - 20;
    const vEndX = vStartX + vLen * vSign;
    drawArrow(vStartX, vStartY, vEndX, vStartY, '#2563EB', 2.5);
    ctx.fillStyle = '#2563EB';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('v = ' + v.toFixed(1) + ' m/s', (vStartX + vEndX) / 2, vStartY - 10);
  }

  // Energy bar chart (top-right area)
  const barAreaRight = W - 20;
  const barTitleY = 42;
  const barAreaTop = barTitleY + 14; // bars start below title
  const barWidth = 44;
  const barGap = 20;
  const maxBarH = Math.min(H * 0.20, 110);
  const maxE = Math.max(work, Kf, 10);
  const eScale = maxBarH / maxE;

  const barBaseY = barAreaTop + maxBarH;

  // Bar chart title — always above bars
  ctx.fillStyle = '#444';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  const chartCenterX = barAreaRight - barWidth - barGap / 2;
  ctx.fillText('에너지 (J)', chartCenterX, barTitleY);

  // Baseline
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(barAreaRight - 2 * barWidth - barGap - 12, barBaseY);
  ctx.lineTo(barAreaRight + 12, barBaseY);
  ctx.stroke();

  // Helper: draw bar value label — inside bar if it would overlap title
  function drawBarValue(val, cx, barH, color) {
    ctx.fillStyle = color;
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    const topOfBar = barBaseY - barH;
    const labelAbove = topOfBar - 6;
    if (labelAbove < barAreaTop + 4) {
      // Would overlap title — draw inside bar
      ctx.fillStyle = '#fff';
      ctx.fillText(val.toFixed(1), cx, topOfBar + 16);
    } else {
      ctx.fillText(val.toFixed(1), cx, labelAbove);
    }
  }

  // W bar (left)
  const wBarX = barAreaRight - 2 * barWidth - barGap;
  const wBarH = Math.max(work * eScale, 0);
  ctx.fillStyle = 'rgba(139, 0, 41, 0.7)';
  ctx.fillRect(wBarX, barBaseY - wBarH, barWidth, wBarH);
  ctx.strokeStyle = '#8B0029';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(wBarX, barBaseY - wBarH, barWidth, Math.max(wBarH, 1));
  ctx.fillStyle = '#8B0029';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('W', wBarX + barWidth / 2, barBaseY + 18);
  drawBarValue(work, wBarX + barWidth / 2, wBarH, '#8B0029');

  // K bar (right)
  const kBarX = barAreaRight - barWidth;
  const kBarH = Math.max(Kf * eScale, 0);
  ctx.fillStyle = 'rgba(37, 99, 235, 0.7)';
  ctx.fillRect(kBarX, barBaseY - kBarH, barWidth, kBarH);
  ctx.strokeStyle = '#2563EB';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(kBarX, barBaseY - kBarH, barWidth, Math.max(kBarH, 1));
  // ΔK bar label — KaTeX overlay
  posLabel(lblDK, kBarX + barWidth / 2 - 10, barBaseY + 4,
    tex('\\Delta K'));
  drawBarValue(Kf, kBarX + barWidth / 2, kBarH, '#2563EB');
}

function step() {
  const { F, phi, m } = getParams();
  const a = F * Math.cos(phi) / m;

  t += dtAnim;

  // Check if reached maxDisp
  const xNow = 0.5 * a * t * t;
  if (xNow >= maxDisp) {
    // Clamp t to exact time at maxDisp
    t = Math.sqrt(2 * maxDisp / a);
    updateInfo();
    draw();
    stop();
    return;
  }

  updateInfo();
  draw();
  if (running) animId = requestAnimationFrame(step);
}

function start() {
  if (running) return;
  running = true;
  playBtn.textContent = '\u23F8 일시정지';
  playBtn.classList.add('running');
  animId = requestAnimationFrame(step);
}

function stop() {
  running = false;
  playBtn.textContent = '\u25B6 시작';
  playBtn.classList.remove('running');
  if (animId) cancelAnimationFrame(animId);
}

function reset() {
  stop();
  t = 0;
  updateInfo();
  draw();
}

playBtn.addEventListener('click', () => {
  if (running) stop(); else start();
});
resetBtn.addEventListener('click', reset);

[forceSlider, angleSlider, massSlider].forEach(s => {
  s.addEventListener('input', () => {
    updateLabels();
    reset();
  });
});

window.addEventListener('resize', resize);

// Initialize after KaTeX is loaded
renderStaticKaTeX();
updateLabels();
reset();
resize();
</script>
</body>
</html>
