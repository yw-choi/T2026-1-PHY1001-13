<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자유 낙하 시뮬레이션</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; overflow: hidden; }
.container { display: flex; height: 100vh; }
.canvas-area { flex: 1; position: relative; background: #fafafa; }
canvas { display: block; width: 100%; height: 100%; }
.controls { width: 260px; padding: 16px; border-left: 2px solid #eee; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
.control-group { display: flex; flex-direction: column; gap: 4px; }
.control-group label { font-size: 13px; font-weight: 600; color: #444; }
.control-group input[type="range"] { width: 100%; accent-color: #8B0029; }
.info-box { background: #f8f0f2; border: 1px solid #e0c0c8; border-radius: 8px; padding: 10px; font-size: 12.5px; line-height: 1.8; }
.info-box .label { color: #8B0029; font-weight: 700; }
.info-box .val { font-family: 'Courier New', monospace; font-weight: 600; }
.info-box .eq { color: #555; font-size: 12px; }
.info-box .eq .katex { font-size: 13px; }
.theorem-box { background: #8B0029; color: #fff; border-radius: 8px; padding: 10px; font-size: 13px; text-align: center; font-weight: 700; line-height: 1.6; }
.theorem-box .theorem-eq { font-size: 14px; display: block; margin-top: 4px; }
.theorem-box .katex { color: #fff; }
.event-box { background: #fff8e1; border: 1px solid #f0d060; border-radius: 8px; padding: 10px; font-size: 12.5px; line-height: 1.6; display: none; }
.event-box .event-label { color: #b8860b; font-weight: 700; }
.event-box .katex { font-size: 13px; }
button.reset-btn { background: #8B0029; color: #fff; border: none; border-radius: 6px; padding: 10px; font-size: 14px; cursor: pointer; }
button.reset-btn:hover { background: #a3003a; }
.play-btn { background: #2a7d2a; color: #fff; border: none; border-radius: 6px; padding: 10px; font-size: 14px; cursor: pointer; }
.play-btn:hover { background: #35a035; }
.play-btn.running { background: #b8860b; }
.btn-row { display: flex; gap: 8px; }
.btn-row button { flex: 1; }
.canvas-title { position: absolute; top: 8px; left: 20px; pointer-events: none; font-size: 18px; font-weight: 700; color: #8B0029; }
.canvas-title .katex { font-size: 18px; color: #8B0029; }

@media (max-width: 700px) {
  .container { flex-direction: column; }
  .canvas-area { height: 55vh; }
  .controls { width: 100%; height: 45vh; border-left: none; border-top: 2px solid #eee; }
}
</style>
</head>
<body>
<div class="container">
  <div class="canvas-area">
    <canvas id="canvas"></canvas>
    <div class="canvas-title" id="canvasTitle"></div>
  </div>
  <div class="controls">
    <div class="theorem-box">
      자유 낙하 (a = −g)
      <span class="theorem-eq" id="theoremEq"></span>
    </div>

    <div class="control-group">
      <label>초기 높이 <span id="y0Label"></span> = <span id="y0Val">20.0</span> m</label>
      <input type="range" id="y0Slider" min="5" max="50" value="20" step="1">
    </div>

    <div class="control-group">
      <label>초기 속도 <span id="v0Label"></span> = <span id="v0Val">10.0</span> m/s (위쪽 +)</label>
      <input type="range" id="v0Slider" min="-15" max="20" value="10" step="0.5">
    </div>

    <div class="info-box" id="infoBox">
      <div class="eq" id="eqY"></div>
      <div><span class="label">높이 y =</span> <span class="val" id="yInfo">20.00 m</span></div>
      <hr style="border:none;border-top:1px solid #e0c0c8;margin:4px 0">
      <div class="eq" id="eqVy"></div>
      <div><span class="label">속도 v =</span> <span class="val" id="vInfo">10.00 m/s</span></div>
      <hr style="border:none;border-top:1px solid #e0c0c8;margin:4px 0">
      <div><span class="label">시간 t =</span> <span class="val" id="tInfo">0.00 s</span></div>
    </div>

    <div class="event-box" id="eventBox">
      <div class="event-label" id="eventLabel"></div>
      <div id="eventDetail"></div>
    </div>

    <div class="btn-row">
      <button class="play-btn" id="playBtn">&#9654; 시작</button>
      <button class="reset-btn" id="resetBtn">&#8635; 초기화</button>
    </div>
  </div>
</div>

<script>
function tex(expr) {
  return katex.renderToString(expr, { throwOnError: false });
}

const g = 9.8;

function renderStaticKaTeX() {
  document.getElementById('theoremEq').innerHTML = tex('y = y_0 + v_0 t - \\tfrac{1}{2}gt^2');
  document.getElementById('canvasTitle').innerHTML = '자유 낙하: ' + tex('a = -g = -9.8\\;\\text{m/s}^2');
  document.getElementById('y0Label').innerHTML = tex('y_0');
  document.getElementById('v0Label').innerHTML = tex('v_0');
  document.getElementById('eqY').innerHTML = tex('y(t) = y_0 + v_0 t - \\tfrac{1}{2}gt^2');
  document.getElementById('eqVy').innerHTML = tex('v(t) = v_0 - gt');
}

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const y0Slider = document.getElementById('y0Slider');
const v0Slider = document.getElementById('v0Slider');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');

let dpr = window.devicePixelRatio || 1;
let CW, CH;
let running = false;
let animId = null;
let t = 0;
const dt = 1/60;
let landed = false;
let peakReached = false;

function getParams() {
  return {
    y0: parseFloat(y0Slider.value),
    v0: parseFloat(v0Slider.value)
  };
}

function getState(time) {
  const { y0, v0 } = getParams();
  const y = y0 + v0 * time - 0.5 * g * time * time;
  const v = v0 - g * time;
  return { y: Math.max(y, 0), v, yRaw: y };
}

function getTotalTime() {
  // Time when y = 0: y0 + v0*t - 0.5*g*t^2 = 0
  const { y0, v0 } = getParams();
  const disc = v0 * v0 + 2 * g * y0;
  if (disc < 0) return 2;
  return (v0 + Math.sqrt(disc)) / g;
}

function getPeakTime() {
  const { v0 } = getParams();
  if (v0 <= 0) return 0;
  return v0 / g;
}

function getPeakHeight() {
  const { y0, v0 } = getParams();
  const tP = getPeakTime();
  return y0 + v0 * tP - 0.5 * g * tP * tP;
}

function resize() {
  dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  CW = rect.width;
  CH = rect.height;
  canvas.width = CW * dpr;
  canvas.height = CH * dpr;
  canvas.style.width = CW + 'px';
  canvas.style.height = CH + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

function updateLabels() {
  document.getElementById('y0Val').textContent = parseFloat(y0Slider.value).toFixed(1);
  document.getElementById('v0Val').textContent = parseFloat(v0Slider.value).toFixed(1);
}

function updateInfo() {
  const { y, v } = getState(t);
  document.getElementById('yInfo').textContent = y.toFixed(2) + ' m';
  document.getElementById('vInfo').textContent = v.toFixed(2) + ' m/s';
  document.getElementById('tInfo').textContent = t.toFixed(2) + ' s';

  // Events
  const { v0 } = getParams();
  const eventBox = document.getElementById('eventBox');
  const tPeak = getPeakTime();

  if (v0 > 0 && t >= tPeak - 0.05 && t <= tPeak + 0.3 && !landed) {
    eventBox.style.display = 'block';
    peakReached = true;
    document.getElementById('eventLabel').innerHTML = tex('v = 0') + ' \u2014 최고점 도달!';
    document.getElementById('eventDetail').innerHTML =
      tex('y_{\\max} = ' + getPeakHeight().toFixed(2) + '\\;\\text{m}') +
      '<br>' + tex('t_{\\text{peak}} = ' + tPeak.toFixed(2) + '\\;\\text{s}');
  }

  if (landed) {
    const tLand = getTotalTime();
    const vImpact = v0 - g * tLand;
    eventBox.style.display = 'block';
    document.getElementById('eventLabel').textContent = '\uD83D\uDCA5 지면 충돌!';
    document.getElementById('eventDetail').innerHTML =
      tex('v_{\\text{impact}} = ' + vImpact.toFixed(2) + '\\;\\text{m/s}') +
      '<br>' + tex('t_{\\text{land}} = ' + tLand.toFixed(2) + '\\;\\text{s}');
  }
}

function drawArrow(x1, y1, x2, y2, color, lineWidth) {
  const headLen = 10;
  const angle = Math.atan2(y2 - y1, x2 - x1);
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - headLen * Math.cos(angle - 0.35), y2 - headLen * Math.sin(angle - 0.35));
  ctx.lineTo(x2 - headLen * Math.cos(angle + 0.35), y2 - headLen * Math.sin(angle + 0.35));
  ctx.closePath();
  ctx.fill();
}

function drawTextWithBg(text, x, y, color, fontSize, align) {
  ctx.font = (fontSize || 12) + 'px sans-serif';
  ctx.textAlign = align || 'center';
  const w = ctx.measureText(text).width;
  const h = fontSize || 12;
  const px = align === 'left' ? x : align === 'right' ? x - w : x - w/2;
  ctx.fillStyle = 'rgba(250,250,250,0.85)';
  ctx.fillRect(px - 3, y - h + 1, w + 6, h + 4);
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
}

function draw() {
  ctx.clearRect(0, 0, CW, CH);
  const { y0, v0 } = getParams();
  const tTotal = getTotalTime();
  const tDisplay = tTotal * 1.15;
  const { y: yNow, v: vNow } = getState(t);

  // Layout
  const animW = CW * 0.28;
  const graphLeft = animW + 40;
  const graphRight = CW - 20;
  const graphW = graphRight - graphLeft;
  const graphTopMargin = 40;
  const graphGap = 20;
  const graphH = (CH - graphTopMargin - graphGap - 30) / 2;

  // Compute y range for display
  const yPeak = getPeakHeight();
  const yMaxDisplay = Math.max(yPeak, y0) * 1.1 + 2;

  // ===== LEFT: PARTICLE ANIMATION =====
  const groundY = CH - 30;
  const ceilY = 50;
  const animLeft = 30;
  const animCenterX = animW / 2;
  const pxPerM = (groundY - ceilY) / yMaxDisplay;

  // Ground
  ctx.fillStyle = '#F3F4F6';
  ctx.fillRect(0, groundY, animW, CH - groundY);
  ctx.strokeStyle = '#bbb';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(animW, groundY);
  ctx.stroke();

  // Hatching
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 1;
  for (let hx = 0; hx < animW; hx += 12) {
    ctx.beginPath();
    ctx.moveTo(hx, groundY);
    ctx.lineTo(hx - 8, groundY + 8);
    ctx.stroke();
  }

  // Height ruler
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(animLeft - 10, groundY);
  ctx.lineTo(animLeft - 10, ceilY);
  ctx.stroke();

  ctx.fillStyle = '#888';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'right';
  const mStep = yMaxDisplay > 30 ? 10 : 5;
  for (let h = 0; h <= yMaxDisplay; h += mStep) {
    const py = groundY - h * pxPerM;
    ctx.beginPath();
    ctx.moveTo(animLeft - 14, py);
    ctx.lineTo(animLeft - 6, py);
    ctx.stroke();
    ctx.fillText(h + '', animLeft - 16, py + 4);
  }
  ctx.fillText('y(m)', animLeft - 4, ceilY - 8);

  // Trail (ghost positions)
  const trailSteps = Math.floor(t / dt);
  for (let i = 0; i < trailSteps; i += 4) {
    const tt = i * dt;
    const yy = y0 + v0 * tt - 0.5 * g * tt * tt;
    if (yy < 0) continue;
    const py = groundY - yy * pxPerM;
    ctx.fillStyle = 'rgba(139, 0, 41, 0.06)';
    ctx.beginPath();
    ctx.arc(animCenterX, py, 12, 0, Math.PI * 2);
    ctx.fill();
  }

  // Particle
  const particleY = groundY - yNow * pxPerM;
  ctx.fillStyle = '#8B0029';
  ctx.beginPath();
  ctx.arc(animCenterX, particleY, 14, 0, Math.PI * 2);
  ctx.fill();

  // g arrow (always downward)
  drawArrow(animCenterX + 25, particleY, animCenterX + 25, particleY + 40, '#6B7280', 2);
  drawTextWithBg('g', animCenterX + 38, particleY + 25, '#6B7280', 13, 'left');

  // Velocity arrow
  if (Math.abs(vNow) > 0.3) {
    const vScale = 3;
    const vLen = Math.min(Math.abs(vNow) * vScale, 80);
    const vDir = vNow > 0 ? -1 : 1; // up is negative in canvas
    drawArrow(animCenterX - 25, particleY, animCenterX - 25, particleY + vLen * vDir, '#2563EB', 2.5);
    const vLabelY = particleY + vLen * vDir * 0.5;
    drawTextWithBg('v=' + vNow.toFixed(1), animCenterX - 50, vLabelY, '#2563EB', 11, 'right');
  }

  // Peak marker
  if (v0 > 0) {
    const peakPy = groundY - yPeak * pxPerM;
    ctx.setLineDash([4, 3]);
    ctx.strokeStyle = '#8B0029';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(animCenterX - 20, peakPy);
    ctx.lineTo(animCenterX + 20, peakPy);
    ctx.stroke();
    ctx.setLineDash([]);
    if (peakReached || t >= getPeakTime()) {
      drawTextWithBg('v=0', animCenterX + 28, peakPy + 4, '#8B0029', 11, 'left');
    }
  }

  // Separator line
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(animW + 10, 0);
  ctx.lineTo(animW + 10, CH);
  ctx.stroke();

  // ===== RIGHT: TWO GRAPHS =====
  const graphConfigs = [
    {
      label: 'y(t)',
      yLabel: 'y (m)',
      color: '#8B0029',
      fn: (tt) => { const y = y0 + v0 * tt - 0.5 * g * tt * tt; return Math.max(y, 0); }
    },
    {
      label: 'v(t)',
      yLabel: 'v (m/s)',
      color: '#2563EB',
      fn: (tt) => {
        const y = y0 + v0 * tt - 0.5 * g * tt * tt;
        if (y <= 0 && tt > 0.1) return 0;
        return v0 - g * tt;
      }
    }
  ];

  graphConfigs.forEach((gc, idx) => {
    const gTop = graphTopMargin + idx * (graphH + graphGap);
    const gBot = gTop + graphH;

    // Compute y range
    let yMin = Infinity, yMax = -Infinity;
    for (let tt = 0; tt <= tTotal; tt += 0.02) {
      const yy = gc.fn(tt);
      if (yy < yMin) yMin = yy;
      if (yy > yMax) yMax = yy;
    }
    const yPadding = Math.max((yMax - yMin) * 0.12, 1);
    yMin -= yPadding;
    yMax += yPadding;
    const yRange = yMax - yMin;

    function tToPx(tt) { return graphLeft + (tt / tDisplay) * graphW; }
    function yToPx(yy) { return gBot - ((yy - yMin) / yRange) * graphH; }

    // Background
    ctx.fillStyle = '#fafafa';
    ctx.fillRect(graphLeft, gTop, graphW, graphH);
    ctx.strokeStyle = '#eee';
    ctx.lineWidth = 1;
    ctx.strokeRect(graphLeft, gTop, graphW, graphH);

    // Zero line
    if (yMin < 0 && yMax > 0) {
      const zy = yToPx(0);
      ctx.setLineDash([4, 3]);
      ctx.strokeStyle = '#ccc';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(graphLeft, zy);
      ctx.lineTo(graphRight, zy);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Full curve (light)
    ctx.strokeStyle = gc.color;
    ctx.globalAlpha = 0.2;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let tt = 0; tt <= tTotal; tt += 0.02) {
      const px = tToPx(tt);
      const py = yToPx(gc.fn(tt));
      if (tt === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Active curve
    ctx.strokeStyle = gc.color;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    const tEnd = Math.min(t, tTotal);
    for (let tt = 0; tt <= tEnd; tt += 0.02) {
      const px = tToPx(tt);
      const py = yToPx(gc.fn(tt));
      if (tt === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // Current point
    const curPx = tToPx(tEnd);
    const curVal = gc.fn(tEnd);
    const curPy = yToPx(curVal);
    ctx.fillStyle = gc.color;
    ctx.beginPath();
    ctx.arc(curPx, curPy, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
    drawTextWithBg(curVal.toFixed(1), curPx + 10, curPy - 8, gc.color, 12, 'left');

    // Peak marker on y-t graph
    if (idx === 0 && v0 > 0) {
      const tP = getPeakTime();
      const peakPx = tToPx(tP);
      const peakPy = yToPx(yPeak);
      ctx.setLineDash([3, 3]);
      ctx.strokeStyle = '#8B0029';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(peakPx, peakPy);
      ctx.lineTo(peakPx, gBot);
      ctx.stroke();
      ctx.setLineDash([]);
      if (peakReached || t >= tP) {
        drawTextWithBg('v=0, y_max=' + yPeak.toFixed(1), peakPx, peakPy - 10, '#8B0029', 11, 'center');
      }
    }

    // v=0 marker on v-t graph
    if (idx === 1 && v0 > 0) {
      const tP = getPeakTime();
      if (tP <= tTotal) {
        const peakPx = tToPx(tP);
        const zeroPy = yToPx(0);
        ctx.fillStyle = '#8B0029';
        ctx.beginPath();
        ctx.arc(peakPx, zeroPy, 4, 0, Math.PI * 2);
        ctx.fill();
        if (peakReached || t >= tP) {
          drawTextWithBg('v=0', peakPx + 10, zeroPy - 6, '#8B0029', 11, 'left');
        }
      }
    }

    // Labels
    ctx.fillStyle = gc.color;
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(gc.label, graphLeft + 5, gTop + 16);
    ctx.textAlign = 'right';
    ctx.fillText(gc.yLabel, graphLeft - 6, gTop + graphH / 2 + 5);

    // Y-ticks
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillStyle = '#888';
    const nTicks = 4;
    for (let i = 0; i <= nTicks; i++) {
      const yVal = yMin + (yRange * i / nTicks);
      const py = yToPx(yVal);
      ctx.fillText(yVal.toFixed(1), graphLeft - 4, py + 4);
      ctx.strokeStyle = '#eee';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(graphLeft, py);
      ctx.lineTo(graphRight, py);
      ctx.stroke();
    }
  });

  // T-axis ticks
  ctx.fillStyle = '#888';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  const tStep = tDisplay > 6 ? 1 : 0.5;
  for (let tt = 0; tt <= tDisplay; tt += tStep) {
    const px = graphLeft + (tt / tDisplay) * graphW;
    ctx.fillText(tt.toFixed(1), px, CH - 8);
  }
  ctx.fillText('t (s)', graphLeft + graphW / 2, CH - 8);
}

function step() {
  const tTotal = getTotalTime();
  t += dt;

  if (t >= tTotal && !landed) {
    t = tTotal;
    landed = true;
    updateInfo();
    draw();
    stop();
    return;
  }

  if (landed) {
    stop();
    return;
  }

  updateInfo();
  draw();
  if (running) animId = requestAnimationFrame(step);
}

function start() {
  if (running) return;
  if (landed) return;
  running = true;
  playBtn.textContent = '\u23F8 일시정지';
  playBtn.classList.add('running');
  animId = requestAnimationFrame(step);
}

function stop() {
  running = false;
  playBtn.textContent = '\u25B6 시작';
  playBtn.classList.remove('running');
  if (animId) cancelAnimationFrame(animId);
}

function reset() {
  stop();
  t = 0;
  landed = false;
  peakReached = false;
  document.getElementById('eventBox').style.display = 'none';
  updateInfo();
  draw();
}

playBtn.addEventListener('click', () => {
  if (running) stop(); else start();
});
resetBtn.addEventListener('click', reset);

[y0Slider, v0Slider].forEach(s => {
  s.addEventListener('input', () => {
    updateLabels();
    reset();
  });
});

window.addEventListener('resize', resize);

renderStaticKaTeX();
updateLabels();
reset();
resize();
</script>
</body>
</html>
