<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진자의 에너지 변환</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; overflow: hidden; }
.container { display: flex; height: 100vh; }
.canvas-area { flex: 1; position: relative; background: #fafafa; }
canvas { display: block; width: 100%; height: 100%; }
.controls { width: 260px; padding: 16px; border-left: 2px solid #eee; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
.controls h2 { color: #8B0029; font-size: 15px; margin-bottom: 0; }
.subtitle { color: #888; font-size: 11px; margin-bottom: 4px; }
.control-group { display: flex; flex-direction: column; gap: 3px; }
.control-group label { font-size: 12.5px; font-weight: 600; color: #444; }
.control-group input[type="range"] { width: 100%; accent-color: #8B0029; }
.info-box { background: #f8f0f2; border: 1px solid #e0c0c8; border-radius: 8px; padding: 10px; font-size: 12px; line-height: 1.9; }
.info-box .label { color: #8B0029; font-weight: 700; }
.info-box .val { font-family: 'Courier New', monospace; font-weight: 600; }
.info-box .katex { font-size: 12px; }
.theorem-box { background: #8B0029; color: #fff; border-radius: 8px; padding: 10px; font-size: 13px; text-align: center; font-weight: 700; line-height: 1.6; }
.theorem-box .katex { color: #fff; font-size: 14px; }
.formula-box { background: #f9f0f2; border: 1px solid rgba(139,0,41,0.12); border-radius: 8px; padding: 8px 10px; font-size: 12px; line-height: 2.0; color: #555; }
.formula-box b { color: #8B0029; }
.formula-box .katex { font-size: 12px; }
button.reset-btn { background: #8B0029; color: #fff; border: none; border-radius: 6px; padding: 9px; font-size: 13px; cursor: pointer; font-weight: 600; }
button.reset-btn:hover { background: #a3003a; }
.play-btn { background: #2a7d2a; color: #fff; border: none; border-radius: 6px; padding: 9px; font-size: 13px; cursor: pointer; font-weight: 600; }
.play-btn:hover { background: #35a035; }
.play-btn.running { background: #b8860b; }
.btn-row { display: flex; gap: 8px; }
.btn-row button { flex: 1; }
.canvas-title { position: absolute; top: 8px; left: 16px; pointer-events: none; font-size: 18px; font-weight: 700; color: #8B0029; }
.canvas-title .katex { font-size: 18px; color: #8B0029; }
.canvas-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; overflow: hidden;
}
.canvas-overlay .katex-label {
  position: absolute; white-space: nowrap; line-height: 1; font-size: 13px; pointer-events: none;
}
.canvas-overlay .katex-label .katex { font-size: 0.92em; }
.canvas-overlay .katex-label.with-bg {
  background: rgba(255,255,255,0.85); padding: 1px 3px; border-radius: 2px;
}

@media (max-width: 700px) {
  .container { flex-direction: column; }
  .canvas-area { height: 55vh; }
  .controls { width: 100%; height: 45vh; border-left: none; border-top: 2px solid #eee; }
}
</style>
</head>
<body>
<div class="container">
  <div class="canvas-area">
    <canvas id="canvas"></canvas>
    <div class="canvas-overlay" id="overlay">
      <div class="katex-label with-bg" id="lbl-h" style="color:#6B7280;"></div>
      <div class="katex-label with-bg" id="lbl-v" style="color:#2563EB;"></div>
      <div class="katex-label with-bg" id="lbl-emec" style="color:#8B0029;"></div>
    </div>
    <div class="canvas-title" id="canvasTitle"></div>
  </div>
  <div class="controls">
    <div>
      <h2>진자의 에너지 변환</h2>
      <div class="subtitle">Pendulum Energy Conversion (Ch.8)</div>
    </div>

    <div class="theorem-box" id="theoremBox"></div>

    <div class="control-group">
      <label>줄 길이 L = <span id="lengthVal">2.0</span> m</label>
      <input type="range" id="lengthSlider" min="0.5" max="4" value="2" step="0.1">
    </div>

    <div class="control-group">
      <label>초기 각도 θ₀ = <span id="angleVal">60</span>°</label>
      <input type="range" id="angleSlider" min="5" max="150" value="60" step="1">
    </div>

    <div class="control-group">
      <label>질량 m = <span id="massVal">1.0</span> kg</label>
      <input type="range" id="massSlider" min="0.5" max="5" value="1" step="0.1">
    </div>

    <div class="formula-box" id="formulaBox"></div>

    <div class="info-box" id="infoBox"></div>

    <div class="btn-row">
      <button class="play-btn" id="playBtn">&#9654; 시작</button>
      <button class="reset-btn" id="resetBtn">&#8635; 초기화</button>
    </div>
  </div>
</div>

<script>
function tex(expr) { return katex.renderToString(expr, { throwOnError: false }); }

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let dpr = window.devicePixelRatio || 1;
let CW, CH;

const lblH = document.getElementById('lbl-h');
const lblV = document.getElementById('lbl-v');
const lblEmec = document.getElementById('lbl-emec');

function posLabel(el, px, py, html) {
  el.innerHTML = html;
  el.style.left = px + 'px';
  el.style.top = py + 'px';
  el.style.display = 'block';
}

const lengthSlider = document.getElementById('lengthSlider');
const angleSlider = document.getElementById('angleSlider');
const massSlider = document.getElementById('massSlider');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');

const g = 9.8;
let theta = 60 * Math.PI / 180; // current angle (from vertical)
let omega = 0; // angular velocity
let running = false, animId = null, lastTs = null;

function getParams() {
  return {
    L: parseFloat(lengthSlider.value),
    theta0: parseFloat(angleSlider.value) * Math.PI / 180,
    m: parseFloat(massSlider.value)
  };
}

function resize() {
  dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  CW = rect.width; CH = rect.height;
  canvas.width = CW * dpr; canvas.height = CH * dpr;
  canvas.style.width = CW + 'px'; canvas.style.height = CH + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

function reset() {
  if (animId) cancelAnimationFrame(animId);
  running = false; animId = null; lastTs = null;
  const { theta0 } = getParams();
  theta = theta0;
  omega = 0;
  playBtn.textContent = '\u25B6 시작';
  playBtn.classList.remove('running');
  updateInfo(); draw();
}

function start() {
  if (running) return;
  running = true; lastTs = null;
  playBtn.textContent = '\u23F8 일시정지';
  playBtn.classList.add('running');
  animId = requestAnimationFrame(step);
}

function stop() {
  running = false;
  if (animId) cancelAnimationFrame(animId);
  animId = null;
  playBtn.textContent = '\u25B6 시작';
  playBtn.classList.remove('running');
}

function step(ts) {
  if (!running) return;
  if (!lastTs) { lastTs = ts; animId = requestAnimationFrame(step); return; }
  const dtReal = Math.min((ts - lastTs) / 1000, 0.04);
  lastTs = ts;

  const { L } = getParams();

  // Exact pendulum equation: d²θ/dt² = -(g/L)sin(θ)
  // Use Verlet integration for energy conservation
  const alpha = -(g / L) * Math.sin(theta);
  const halfOmega = omega + 0.5 * alpha * dtReal;
  theta += halfOmega * dtReal;
  const alphaNew = -(g / L) * Math.sin(theta);
  omega = halfOmega + 0.5 * alphaNew * dtReal;

  updateInfo(); draw();
  animId = requestAnimationFrame(step);
}

function updateInfo() {
  const { L, m, theta0 } = getParams();
  const h0 = L * (1 - Math.cos(theta0));
  const h = L * (1 - Math.cos(theta));
  const v = L * Math.abs(omega);
  const K = 0.5 * m * v * v;
  const U = m * g * h;
  const Emec = K + U;
  const Emec0 = m * g * h0;

  const box = document.getElementById('infoBox');
  let html = '';
  html += '<span class="label">각도:</span> <span class="val">' + tex('\\theta = ' + (theta * 180 / Math.PI).toFixed(1) + '^\\circ') + '</span><br>';
  html += '<span class="label">높이:</span> <span class="val">h = ' + h.toFixed(3) + ' m</span><br>';
  html += '<span class="label">속력:</span> <span class="val">v = ' + v.toFixed(2) + ' m/s</span><br>';
  html += '<hr style="border:none;border-top:1px solid #e0c0c8;margin:3px 0">';
  html += tex('K = \\tfrac{1}{2}mv^2') + ' = <span class="val">' + K.toFixed(2) + ' J</span><br>';
  html += tex('U = mgh') + ' = <span class="val">' + U.toFixed(2) + ' J</span><br>';
  html += tex('E_{\\text{mec}}') + ' = <span class="val">' + Emec.toFixed(2) + ' J</span>';
  html += '<br><span style="color:#2e7d32;font-weight:700">' + tex('K + U = ' + Emec.toFixed(2) + '\\text{ J} = \\text{const}\\;\\checkmark') + '</span>';
  box.innerHTML = html;
}

function drawArrow(x1, y1, x2, y2, color, lw) {
  const headLen = 10;
  const angle = Math.atan2(y2 - y1, x2 - x1);
  ctx.strokeStyle = color; ctx.lineWidth = lw; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - headLen * Math.cos(angle - 0.35), y2 - headLen * Math.sin(angle - 0.35));
  ctx.lineTo(x2 - headLen * Math.cos(angle + 0.35), y2 - headLen * Math.sin(angle + 0.35));
  ctx.closePath(); ctx.fill();
}

function draw() {
  ctx.clearRect(0, 0, CW, CH);
  lblH.style.display = 'none';
  lblV.style.display = 'none';
  lblEmec.style.display = 'none';

  const { L, m, theta0 } = getParams();
  const h0 = L * (1 - Math.cos(theta0));
  const h = L * (1 - Math.cos(theta));
  const v = L * Math.abs(omega);
  const K = 0.5 * m * v * v;
  const U = m * g * h;
  const Emec0 = m * g * h0;

  // Layout
  const pivotX = CW * 0.38;
  const pivotY = 70;
  const ppm = Math.min((CH - 200) / (L * 1.3), (CW * 0.35) / L); // pixels per meter
  const Lpx = L * ppm;

  // Bob position
  const bobX = pivotX + Lpx * Math.sin(theta);
  const bobY = pivotY + Lpx * Math.cos(theta);
  const bobR = Math.min(14 + m * 2, 24);

  // Reference line (lowest point)
  const refY = pivotY + Lpx;

  // Draw trajectory arc (ghosted)
  ctx.strokeStyle = 'rgba(139,0,41,0.12)'; ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.arc(pivotX, pivotY, Lpx, Math.PI / 2 - theta0, Math.PI / 2 + theta0);
  ctx.stroke();
  ctx.setLineDash([]);

  // Draw reference (bottom) dashed line
  ctx.strokeStyle = '#6B7280'; ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
  ctx.beginPath();
  ctx.moveTo(pivotX - Lpx * 0.8, refY);
  ctx.lineTo(pivotX + Lpx * 0.8, refY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#6B7280'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('U = 0 기준', pivotX + Lpx * 0.5, refY + 14);

  // Height dimension line
  if (h > 0.02) {
    const hPx = h * ppm;
    ctx.strokeStyle = '#6B7280'; ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.moveTo(bobX + bobR + 10, bobY);
    ctx.lineTo(bobX + bobR + 10, refY);
    ctx.stroke();
    ctx.setLineDash([]);
    // h label
    posLabel(lblH, bobX + bobR + 16, (bobY + refY) / 2 - 8, tex('h = ' + h.toFixed(2) + '\\text{ m}'));
  }

  // Pivot
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(pivotX, pivotY, 5, 0, Math.PI * 2); ctx.fill();

  // String
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(pivotX, pivotY); ctx.lineTo(bobX, bobY); ctx.stroke();

  // Bob shadow
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.beginPath(); ctx.arc(bobX + 2, bobY + 2, bobR, 0, Math.PI * 2); ctx.fill();

  // Bob
  ctx.fillStyle = '#F3F4F6'; ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(bobX, bobY, bobR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#1a1a1a'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('m', bobX, bobY);
  ctx.textBaseline = 'alphabetic';

  // Velocity arrow (tangent to arc)
  if (v > 0.1) {
    const vLen = Math.min(v * 18, 80);
    // Tangent direction: perpendicular to string, in direction of motion
    const tangentDir = omega > 0 ? 1 : -1;
    const vxDir = tangentDir * Math.cos(theta);
    const vyDir = -tangentDir * Math.sin(theta);
    const vEndX = bobX + vLen * vxDir;
    const vEndY = bobY + vLen * vyDir;
    drawArrow(bobX, bobY, vEndX, vEndY, '#2563EB', 2.5);
    posLabel(lblV, vEndX + 4, vEndY - 14, '<span style="color:#2563EB;font-weight:bold">' + tex('v = ' + v.toFixed(1)) + '</span>');
  }

  // Gravity arrow
  const gLen = 35;
  drawArrow(bobX, bobY, bobX, bobY + gLen, '#8B0029', 2);
  ctx.fillStyle = '#8B0029'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('mg', bobX + 6, bobY + gLen + 2);

  // Energy bar chart (right side of canvas)
  const barAreaX = CW * 0.68;
  const barBaseY = refY + 10;
  const maxBarH = Math.min(CH * 0.30, 180);
  const eScale = Emec0 > 0 ? maxBarH / Emec0 : 1;
  const barW = 40, barGap = 12;

  ctx.fillStyle = '#444'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('에너지 (J)', barAreaX + barW + barGap / 2, barBaseY - maxBarH - 18);

  // Baseline
  ctx.strokeStyle = '#999'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(barAreaX - 8, barBaseY);
  ctx.lineTo(barAreaX + 2 * barW + barGap + 8, barBaseY);
  ctx.stroke();

  function drawBar(idx, val, color, label) {
    const bx = barAreaX + idx * (barW + barGap);
    const bh = Math.max(val * eScale, 0);
    ctx.fillStyle = color + '99';
    ctx.fillRect(bx, barBaseY - bh, barW, bh);
    ctx.strokeStyle = color; ctx.lineWidth = 1.5;
    ctx.strokeRect(bx, barBaseY - bh, barW, Math.max(bh, 1));
    ctx.fillStyle = color; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(label, bx + barW / 2, barBaseY + 16);
    const topOfBar = barBaseY - bh;
    const titleTopY = barBaseY - maxBarH - 8;
    if (topOfBar - 6 < titleTopY) {
      ctx.fillStyle = '#fff'; ctx.font = '11px sans-serif';
      ctx.fillText(val.toFixed(1), bx + barW / 2, topOfBar + 14);
    } else {
      ctx.fillStyle = color; ctx.font = '11px sans-serif';
      ctx.fillText(val.toFixed(1), bx + barW / 2, topOfBar - 4);
    }
  }

  drawBar(0, K, '#2563EB', 'K');
  drawBar(1, U, '#8B0029', 'U');

  // E_mec dashed line
  ctx.strokeStyle = '#2e7d32'; ctx.lineWidth = 1.5; ctx.setLineDash([5, 3]);
  ctx.beginPath();
  ctx.moveTo(barAreaX - 8, barBaseY - Emec0 * eScale);
  ctx.lineTo(barAreaX + 2 * barW + barGap + 8, barBaseY - Emec0 * eScale);
  ctx.stroke();
  ctx.setLineDash([]);
  posLabel(lblEmec, barAreaX + 2 * barW + barGap + 12, barBaseY - Emec0 * eScale - 8,
    '<span style="color:#2e7d32;font-weight:bold">' + tex('E_0 = ' + Emec0.toFixed(1)) + '</span>');

  // Phase labels at trajectory endpoints
  ctx.fillStyle = '#8B0029'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  const leftX = pivotX - Lpx * Math.sin(theta0);
  const leftY = pivotY + Lpx * Math.cos(theta0);
  const rightX = pivotX + Lpx * Math.sin(theta0);
  const rightY = pivotY + Lpx * Math.cos(theta0);
  ctx.fillText('K=0', leftX - 16, leftY - 6);
  ctx.fillText('K=0', rightX + 16, rightY - 6);
  ctx.fillStyle = '#2563EB';
  ctx.fillText('v=max', pivotX, refY + 28);
}

function renderStatic() {
  document.getElementById('canvasTitle').innerHTML = '진자의 에너지 변환: ' + tex('K + U = E_{\\text{mec}}');
  document.getElementById('theoremBox').innerHTML =
    '역학적 에너지 보존<br>' +
    tex('mgh = \\tfrac{1}{2}mv_{\\max}^2') + '<br>' +
    tex('v_{\\max} = \\sqrt{2gh}');
  updateFormula();
}

function updateFormula() {
  const { L, m, theta0 } = getParams();
  const h0 = L * (1 - Math.cos(theta0));
  const vmax = Math.sqrt(2 * g * h0);
  const box = document.getElementById('formulaBox');
  box.innerHTML =
    '<b>최고점 (θ = θ₀):</b><br>' +
    tex('h = L(1 - \\cos\\theta_0) = ' + h0.toFixed(3) + '\\text{ m}') + '<br>' +
    tex('U = mgh = ' + (m * g * h0).toFixed(2) + '\\text{ J},\\; K = 0') + '<br>' +
    '<b>최저점 (θ = 0):</b><br>' +
    tex('v_{\\max} = \\sqrt{2gh} = ' + vmax.toFixed(2) + '\\text{ m/s}') + '<br>' +
    tex('K = \\tfrac{1}{2}mv^2_{\\max} = ' + (0.5 * m * vmax * vmax).toFixed(2) + '\\text{ J},\\; U = 0');
}

[lengthSlider, angleSlider, massSlider].forEach(sl => {
  sl.addEventListener('input', () => {
    document.getElementById('lengthVal').textContent = parseFloat(lengthSlider.value).toFixed(1);
    document.getElementById('angleVal').textContent = parseFloat(angleSlider.value).toFixed(0);
    document.getElementById('massVal').textContent = parseFloat(massSlider.value).toFixed(1);
    updateFormula(); reset();
  });
});

playBtn.addEventListener('click', () => { if (running) stop(); else start(); });
resetBtn.addEventListener('click', reset);
window.addEventListener('resize', resize);

renderStatic();
document.getElementById('lengthVal').textContent = parseFloat(lengthSlider.value).toFixed(1);
document.getElementById('angleVal').textContent = parseFloat(angleSlider.value).toFixed(0);
document.getElementById('massVal').textContent = parseFloat(massSlider.value).toFixed(1);
reset();
resize();
</script>
</body>
</html>
