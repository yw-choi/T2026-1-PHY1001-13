<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>궤도 역학</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<style>
:root {
  --sg-red: #8B0029;
  --sg-red-2: #a3003a;
  --blue: #2563EB;
  --gray: #6B7280;
  --panel: #f8f9fb;
  --line: #e5e7eb;
  --ink: #1a1a1a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  height: 100vh;
  overflow: hidden;
  background: #fff;
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.container { display: flex; height: 100vh; }
.canvas-area {
  flex: 1;
  min-width: 0;
  position: relative;
  background: #fbfbfc;
}
canvas { display: block; width: 100%; height: 100%; }
.canvas-title {
  position: absolute;
  top: 14px;
  left: 16px;
  pointer-events: none;
  color: var(--sg-red);
  font-size: 16px;
  font-weight: 800;
}
.canvas-title .katex { font-size: 0.96em; }
.canvas-readout {
  position: absolute;
  left: 16px;
  bottom: 16px;
  min-width: 230px;
  padding: 10px 12px;
  border: 1px solid rgba(139,0,41,0.14);
  border-radius: 8px;
  background: rgba(255,255,255,0.92);
  box-shadow: 0 8px 22px rgba(0,0,0,0.06);
  color: #374151;
  font-size: 12px;
  line-height: 1.75;
  pointer-events: none;
}
.canvas-readout .row { display: flex; justify-content: space-between; gap: 18px; }
.canvas-readout .lbl { color: var(--gray); }
.canvas-readout .vl { font-weight: 850; color: var(--ink); }
.controls {
  width: 310px;
  flex: 0 0 310px;
  padding: 15px;
  overflow-y: auto;
  border-left: 1px solid var(--line);
  background: var(--panel);
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.title h2 {
  color: var(--sg-red);
  font-size: 16px;
  line-height: 1.2;
}
.title .sub {
  margin-top: 3px;
  color: var(--gray);
  font-size: 11px;
}
.law-box {
  border-radius: 8px;
  padding: 10px;
  background: var(--sg-red);
  color: #fff;
  text-align: center;
  font-size: 12px;
  font-weight: 800;
  line-height: 1.65;
}
.law-box .katex { color: #fff; font-size: 0.98em; }
.section {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  padding: 10px;
}
.section-title {
  margin-bottom: 8px;
  color: #374151;
  font-size: 12px;
  font-weight: 850;
}
.control-group {
  display: grid;
  gap: 4px;
  margin-bottom: 9px;
}
.control-group:last-child { margin-bottom: 0; }
.control-group label {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  color: #4b5563;
  font-size: 12px;
  font-weight: 700;
}
.control-group .val {
  color: var(--ink);
  font-weight: 850;
  white-space: nowrap;
}
input[type=range] { width: 100%; accent-color: var(--sg-red); }
.preset-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 6px;
}
.preset {
  min-height: 32px;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  background: #fff;
  color: #374151;
  font-size: 11px;
  font-weight: 750;
  cursor: pointer;
}
.preset:hover { border-color: var(--sg-red); color: var(--sg-red); }
.preset.active { border-color: var(--sg-red); background: var(--sg-red); color: #fff; }
.metric-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 7px;
}
.metric {
  min-height: 49px;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: #fff;
  padding: 7px;
}
.metric .lbl {
  color: var(--gray);
  font-size: 10.5px;
  font-weight: 800;
}
.metric .vl {
  margin-top: 3px;
  color: var(--ink);
  font-size: 13px;
  font-weight: 900;
  white-space: nowrap;
}
.metric .vl.bound { color: var(--sg-red); }
.metric .vl.escape { color: var(--blue); }
.energy-row {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 7px;
}
.energy-card {
  min-height: 44px;
  border: 1px solid var(--line);
  border-radius: 7px;
  padding: 7px;
  background: #fff;
}
.energy-card .lbl { color: var(--gray); font-size: 10.5px; font-weight: 800; }
.energy-card .vl { margin-top: 2px; font-size: 12.5px; font-weight: 900; }
.k .vl { color: var(--blue); }
.u .vl { color: var(--sg-red); }
.eps .vl.bound { color: var(--sg-red); }
.eps .vl.escape { color: var(--blue); }
.formula-box {
  color: #374151;
  font-size: 12px;
  line-height: 1.85;
}
.formula-box .katex { font-size: 0.98em; }
.btn-row { display: flex; gap: 7px; }
.btn {
  flex: 1;
  border: 0;
  border-radius: 7px;
  padding: 9px 8px;
  color: #fff;
  font-size: 12px;
  font-weight: 850;
  cursor: pointer;
}
.play { background: var(--sg-red); }
.play.running { background: var(--blue); }
.reset { background: var(--gray); }
@media (max-width: 760px) {
  body { overflow: auto; }
  .container { min-height: 100vh; height: auto; flex-direction: column; }
  .canvas-area { height: 58vh; min-height: 360px; }
  .controls {
    width: 100%;
    flex-basis: auto;
    border-left: 0;
    border-top: 1px solid var(--line);
  }
}
</style>
</head>
<body>
<div class="container">
  <main class="canvas-area">
    <canvas id="canvas"></canvas>
    <div class="canvas-title" id="canvasTitle"></div>
    <div class="canvas-readout" id="canvasReadout"></div>
  </main>

  <aside class="controls">
    <div class="title">
      <h2>궤도 역학</h2>
      <div class="sub">원궤도 속력, 탈출 속력, 에너지 부호 비교</div>
    </div>

    <div class="law-box" id="lawBox"></div>

    <div class="section">
      <div class="section-title">초기 조건</div>
      <div class="control-group">
        <label>초기 속력 <span class="val" id="velVal">1.000 v<sub>c</sub></span></label>
        <input type="range" id="velSlider" min="0.20" max="1.80" value="1.00" step="0.001">
      </div>
      <div class="control-group">
        <label>초기 거리 <span class="val" id="distVal">1.0 r<sub>ref</sub></span></label>
        <input type="range" id="distSlider" min="1.0" max="4.0" value="1.0" step="0.1">
      </div>
      <div class="control-group">
        <label>중심 질량 <span class="val" id="massVal">1.0 M<sub>0</sub></span></label>
        <input type="range" id="massSlider" min="0.5" max="3.0" value="1.0" step="0.1">
      </div>
    </div>

    <div class="section">
      <div class="section-title">프리셋</div>
      <div class="preset-grid">
        <button class="preset active" data-v="1.000" data-r="1.0" data-m="1.0">원궤도</button>
        <button class="preset" data-v="0.800" data-r="1.0" data-m="1.0">낮은 타원</button>
        <button class="preset" data-v="1.200" data-r="1.0" data-m="1.0">높은 타원</button>
        <button class="preset" data-v="1.414" data-r="1.0" data-m="1.0">탈출 경계</button>
        <button class="preset" data-v="1.600" data-r="1.0" data-m="1.0">쌍곡선</button>
        <button class="preset" data-v="1.000" data-r="2.0" data-m="1.0">큰 원궤도</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">궤도 요소</div>
      <div class="metric-grid">
        <div class="metric"><div class="lbl">궤도 종류</div><div class="vl" id="orbitType">—</div></div>
        <div class="metric"><div class="lbl">이심률 e</div><div class="vl" id="eccVal">—</div></div>
        <div class="metric"><div class="lbl">긴반지름 a</div><div class="vl" id="semiMajorVal">—</div></div>
        <div class="metric"><div class="lbl">주기 T</div><div class="vl" id="periodVal">—</div></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">단위질량당 에너지</div>
      <div class="energy-row">
        <div class="energy-card k"><div class="lbl">K/m</div><div class="vl" id="kVal">—</div></div>
        <div class="energy-card u"><div class="lbl">U/m</div><div class="vl" id="uVal">—</div></div>
        <div class="energy-card eps"><div class="lbl">ε</div><div class="vl" id="epsVal">—</div></div>
      </div>
    </div>

    <div id="formulaBox" hidden></div>

    <div class="btn-row">
      <button class="btn play" id="playBtn">시작</button>
      <button class="btn reset" id="resetBtn">초기화</button>
    </div>
  </aside>
</div>

<script>
function tex(expr) {
  return katex.renderToString(expr, { throwOnError: false });
}

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const canvasTitle = document.getElementById('canvasTitle');
const canvasReadout = document.getElementById('canvasReadout');
const lawBox = document.getElementById('lawBox');
const velSlider = document.getElementById('velSlider');
const distSlider = document.getElementById('distSlider');
const massSlider = document.getElementById('massSlider');
const velVal = document.getElementById('velVal');
const distVal = document.getElementById('distVal');
const massVal = document.getElementById('massVal');
const orbitTypeEl = document.getElementById('orbitType');
const eccVal = document.getElementById('eccVal');
const semiMajorVal = document.getElementById('semiMajorVal');
const periodVal = document.getElementById('periodVal');
const kVal = document.getElementById('kVal');
const uVal = document.getElementById('uVal');
const epsVal = document.getElementById('epsVal');
const formulaBox = document.getElementById('formulaBox');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');

const MU0 = 1;
const ENERGY_EPS = 1e-3;
let dpr = window.devicePixelRatio || 1;
let W = 0, H = 0;
let state = null;
let trail = [];
let running = false;
let animId = null;
let lastTs = 0;
let elapsed = 0;

function getParams() {
  return {
    vFrac: parseFloat(velSlider.value),
    r0: parseFloat(distSlider.value),
    mass: parseFloat(massSlider.value)
  };
}

function mu() { return MU0 * getParams().mass; }
function circularSpeed(r, gm) { return Math.sqrt(gm / r); }
function escapeSpeed(r, gm) { return Math.sqrt(2 * gm / r); }
function fmt(v, digits = 3) {
  if (!Number.isFinite(v)) return '—';
  if (Math.abs(v) >= 1000) return v.toExponential(2);
  return v.toFixed(digits);
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function initialState() {
  const { vFrac, r0 } = getParams();
  const gm = mu();
  return { x: r0, y: 0, vx: 0, vy: vFrac * circularSpeed(r0, gm) };
}

function elements(s = state) {
  const gm = mu();
  const r = Math.hypot(s.x, s.y);
  const v2 = s.vx * s.vx + s.vy * s.vy;
  const v = Math.sqrt(v2);
  const eps = 0.5 * v2 - gm / r;
  const h = s.x * s.vy - s.y * s.vx;
  const rv = s.x * s.vx + s.y * s.vy;
  const factor = v2 - gm / r;
  const ex = (factor * s.x - rv * s.vx) / gm;
  const ey = (factor * s.y - rv * s.vy) / gm;
  const e = Math.hypot(ex, ey);
  const a = eps < -ENERGY_EPS ? -gm / (2 * eps) : Infinity;
  const b = Number.isFinite(a) ? a * Math.sqrt(Math.max(0, 1 - e * e)) : Infinity;
  const period = Number.isFinite(a) ? 2 * Math.PI * Math.sqrt(a * a * a / gm) : Infinity;
  let type = '쌍곡선 탈출';
  if (eps < -ENERGY_EPS) type = e < 0.015 ? '원궤도' : '타원 궤도';
  else if (Math.abs(eps) <= ENERGY_EPS) type = '포물선 탈출 경계';
  return { r, v, v2, eps, h, ex, ey, e, a, b, period, type, K: 0.5 * v2, U: -gm / r };
}

function reset() {
  stop();
  state = initialState();
  trail = [{ x: state.x, y: state.y }];
  elapsed = 0;
  updateAll();
}

function resize() {
  dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  W = Math.max(320, rect.width);
  H = Math.max(260, rect.height);
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

function viewFor(el) {
  const r0 = getParams().r0;
  let span = Math.max(1.6 * r0, el.r * 1.2);
  if (Number.isFinite(el.a)) span = Math.max(span, el.a * (1 + el.e) * 1.15);
  else span = Math.max(span, r0 * 4.2);
  const cx = W * 0.50;
  const cy = H * 0.53;
  const scale = Math.min(W * 0.43, H * 0.41) / span;
  return { cx, cy, scale };
}

function screen(view, x, y) {
  return [view.cx + x * view.scale, view.cy - y * view.scale];
}

function drawArrow(x1, y1, x2, y2, color, lw = 2.4) {
  const dx = x2 - x1;
  const dy = y2 - y1;
  const len = Math.hypot(dx, dy);
  if (len < 5) return;
  const ux = dx / len, uy = dy / len;
  const head = Math.min(11, len * 0.34);
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = lw;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - head * ux + head * 0.42 * uy, y2 - head * uy - head * 0.42 * ux);
  ctx.lineTo(x2 - head * ux - head * 0.42 * uy, y2 - head * uy + head * 0.42 * ux);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawLabel(text, x, y, color) {
  ctx.save();
  ctx.font = 'bold 12px sans-serif';
  const m = ctx.measureText(text);
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.fillRect(x - 4, y - 14, m.width + 8, 18);
  ctx.fillStyle = color;
  ctx.textAlign = 'left';
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawBoundOrbit(view, el) {
  const e = el.e;
  let ex = el.ex, ey = el.ey;
  if (e < 1e-5) { ex = 1; ey = 0; }
  const angle = Math.atan2(ey, ex);
  const cxOrbit = -el.a * e * Math.cos(angle);
  const cyOrbit = -el.a * e * Math.sin(angle);
  const [ox, oy] = screen(view, cxOrbit, cyOrbit);
  ctx.save();
  ctx.translate(ox, oy);
  ctx.rotate(-angle);
  ctx.strokeStyle = 'rgba(139,0,41,0.72)';
  ctx.lineWidth = 2.2;
  ctx.beginPath();
  ctx.ellipse(0, 0, el.a * view.scale, el.b * view.scale, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function drawOpenTrajectory(view) {
  const gm = mu();
  let s = initialState();
  const ptsForward = [];
  const ptsBackward = [];
  function accel(p) {
    const r2 = p.x * p.x + p.y * p.y;
    const r = Math.sqrt(r2);
    const r3 = r2 * r;
    return { ax: -gm * p.x / r3, ay: -gm * p.y / r3 };
  }
  function integrate(seed, dt, steps, out) {
    let p = { ...seed };
    for (let i = 0; i < steps; i++) {
      const a1 = accel(p);
      p.x += p.vx * dt + 0.5 * a1.ax * dt * dt;
      p.y += p.vy * dt + 0.5 * a1.ay * dt * dt;
      const a2 = accel(p);
      p.vx += 0.5 * (a1.ax + a2.ax) * dt;
      p.vy += 0.5 * (a1.ay + a2.ay) * dt;
      if (i % 2 === 0) out.push({ x: p.x, y: p.y });
      if (Math.hypot(p.x, p.y) > getParams().r0 * 8) break;
    }
  }
  integrate(s, 0.035, 520, ptsForward);
  integrate(s, -0.035, 520, ptsBackward);
  const pts = ptsBackward.reverse().concat([{ x: s.x, y: s.y }], ptsForward);
  ctx.save();
  ctx.strokeStyle = 'rgba(139,0,41,0.72)';
  ctx.lineWidth = 2.2;
  ctx.setLineDash([8, 5]);
  ctx.beginPath();
  pts.forEach((p, i) => {
    const [x, y] = screen(view, p.x, p.y);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();
  ctx.restore();
}

function draw() {
  if (!state) return;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#fbfbfc';
  ctx.fillRect(0, 0, W, H);

  const el = elements();
  const view = viewFor(el);

  ctx.save();
  ctx.strokeStyle = 'rgba(107,114,128,0.13)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 6]);
  const rings = [1, 2, 3, 4, 5, 6];
  for (const r of rings) {
    const rp = r * view.scale;
    if (rp > 12 && rp < Math.max(W, H)) {
      ctx.beginPath();
      ctx.arc(view.cx, view.cy, rp, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
  ctx.restore();

  if (Number.isFinite(el.a)) drawBoundOrbit(view, el);
  else drawOpenTrajectory(view);

  if (trail.length > 1) {
    ctx.save();
    ctx.strokeStyle = 'rgba(37,99,235,0.42)';
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    trail.forEach((p, i) => {
      const [x, y] = screen(view, p.x, p.y);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.restore();
  }

  const [mx, my] = screen(view, 0, 0);
  const centralR = clamp(12 + getParams().mass * 3, 13, 24);
  const [sx, sy] = screen(view, state.x, state.y);
  ctx.strokeStyle = '#6B7280';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 3]);
  ctx.beginPath();
  ctx.moveTo(mx, my);
  ctx.lineTo(sx, sy);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#F3F4F6';
  ctx.strokeStyle = '#8B0029';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(mx, my, centralR, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#8B0029';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('M', mx, my);
  ctx.textBaseline = 'alphabetic';

  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#2563EB';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(sx, sy, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  const vc = circularSpeed(el.r, mu());
  const vLen = clamp(el.v / vc * 46, 18, 82);
  drawArrow(sx, sy, sx + state.vx / el.v * vLen, sy - state.vy / el.v * vLen, '#2563EB', 2.5);
  drawLabel('v', sx + state.vx / el.v * vLen + 8, sy - state.vy / el.v * vLen - 4, '#2563EB');

  const rLblX = (mx + sx) / 2 + 8;
  const rLblY = (my + sy) / 2 - 8;
  drawLabel('r', rLblX, rLblY, '#6B7280');

  ctx.save();
  const barX = W - 190;
  const barY = 78;
  const barW = 132;
  const marker = clamp(getParams().vFrac / 1.8, 0, 1);
  const escMarker = clamp(Math.sqrt(2) / 1.8, 0, 1);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.strokeStyle = '#e5e7eb';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(barX - 14, barY - 28, barW + 28, 58, 8);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#374151';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('속력 기준', barX + barW / 2, barY - 10);
  ctx.strokeStyle = '#d1d5db';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(barX, barY + 8);
  ctx.lineTo(barX + barW, barY + 8);
  ctx.stroke();
  ctx.strokeStyle = '#8B0029';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(barX, barY + 8);
  ctx.lineTo(barX + barW * marker, barY + 8);
  ctx.stroke();
  ctx.fillStyle = '#2563EB';
  ctx.beginPath();
  ctx.arc(barX + barW * escMarker, barY + 8, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#6B7280';
  ctx.font = '10px sans-serif';
  ctx.fillText('v_esc', barX + barW * escMarker, barY + 27);
  ctx.restore();
}

function updateAll() {
  const p = getParams();
  const gm = mu();
  const el = elements();
  const vc0 = circularSpeed(p.r0, gm);
  const vesc0 = escapeSpeed(p.r0, gm);
  const v0 = p.vFrac * vc0;
  const epsClass = el.eps < -ENERGY_EPS ? 'bound' : 'escape';

  velVal.innerHTML = p.vFrac.toFixed(3) + ' v<sub>c</sub>';
  distVal.innerHTML = p.r0.toFixed(1) + ' r<sub>ref</sub>';
  massVal.innerHTML = p.mass.toFixed(1) + ' M<sub>0</sub>';
  orbitTypeEl.textContent = el.type;
  orbitTypeEl.className = 'vl ' + epsClass;
  eccVal.textContent = fmt(el.e, 3);
  semiMajorVal.innerHTML = Number.isFinite(el.a) ? fmt(el.a, 3) + ' r<sub>ref</sub>' : '∞';
  periodVal.textContent = Number.isFinite(el.period) ? fmt(el.period, 3) : '∞';
  kVal.textContent = fmt(el.K, 4);
  uVal.textContent = fmt(el.U, 4);
  epsVal.textContent = fmt(el.eps, 4);
  epsVal.className = 'vl ' + epsClass;

  canvasReadout.innerHTML =
    '<div class="row"><span class="lbl">v<sub>c</sub>(r<sub>0</sub>)</span><span class="vl">' + fmt(vc0, 3) + '</span></div>' +
    '<div class="row"><span class="lbl">v<sub>esc</sub>(r<sub>0</sub>)</span><span class="vl">' + fmt(vesc0, 3) + '</span></div>' +
    '<div class="row"><span class="lbl">v<sub>0</sub>/v<sub>esc</sub></span><span class="vl">' + fmt(v0 / vesc0, 3) + '</span></div>' +
    '<div class="row"><span class="lbl">경과 시간</span><span class="vl">' + fmt(elapsed, 2) + '</span></div>';

  formulaBox.innerHTML =
    '<b>초기 속력:</b><br>' +
    tex('v_c=\\sqrt{GM/r_0}=' + fmt(vc0, 3)) + '<br>' +
    tex('v_{esc}=\\sqrt{2GM/r_0}=' + fmt(vesc0, 3)) + '<br>' +
    '<b>에너지 판정:</b><br>' +
    tex('\\varepsilon=\\frac{v^2}{2}-\\frac{GM}{r}') + '<br>' +
    (Number.isFinite(el.a) ? tex('a=-\\frac{GM}{2\\varepsilon}') : tex('\\varepsilon\\ge 0\\Rightarrow \\text{escape}'));

  draw();
}

function advance(dt) {
  const gm = mu();
  const sub = 8;
  const h = dt / sub;
  for (let i = 0; i < sub; i++) {
    const r2 = state.x * state.x + state.y * state.y;
    const r = Math.sqrt(r2);
    const r3 = r2 * r;
    const ax = -gm * state.x / r3;
    const ay = -gm * state.y / r3;
    const vxh = state.vx + 0.5 * ax * h;
    const vyh = state.vy + 0.5 * ay * h;
    state.x += vxh * h;
    state.y += vyh * h;
    const r2n = state.x * state.x + state.y * state.y;
    const rn = Math.sqrt(r2n);
    const r3n = r2n * rn;
    const axn = -gm * state.x / r3n;
    const ayn = -gm * state.y / r3n;
    state.vx = vxh + 0.5 * axn * h;
    state.vy = vyh + 0.5 * ayn * h;
  }
}

function loop(ts) {
  if (!running) return;
  if (!lastTs) lastTs = ts;
  const realDt = Math.min((ts - lastTs) / 1000, 0.04);
  lastTs = ts;
  const dt = realDt * 0.85;
  advance(dt);
  elapsed += dt;
  const last = trail[trail.length - 1];
  if (!last || Math.hypot(state.x - last.x, state.y - last.y) > 0.01) {
    trail.push({ x: state.x, y: state.y });
    if (trail.length > 1800) trail.shift();
  }
  if (elements().r > getParams().r0 * 8) stop();
  updateAll();
  animId = requestAnimationFrame(loop);
}

function start() {
  if (running) return;
  running = true;
  lastTs = 0;
  playBtn.textContent = '일시정지';
  playBtn.classList.add('running');
  animId = requestAnimationFrame(loop);
}

function stop() {
  running = false;
  if (animId) cancelAnimationFrame(animId);
  animId = null;
  playBtn.textContent = '시작';
  playBtn.classList.remove('running');
}

[velSlider, distSlider, massSlider].forEach(sl => {
  sl.addEventListener('input', () => {
    document.querySelectorAll('.preset').forEach(btn => btn.classList.remove('active'));
    reset();
  });
});

document.querySelectorAll('.preset').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.preset').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    velSlider.value = btn.dataset.v;
    distSlider.value = btn.dataset.r;
    massSlider.value = btn.dataset.m;
    reset();
  });
});

playBtn.addEventListener('click', () => running ? stop() : start());
resetBtn.addEventListener('click', reset);
window.addEventListener('resize', resize);

canvasTitle.innerHTML = '궤도 역학: ' + tex('v_c,\\;v_{esc},\\;\\varepsilon');
lawBox.innerHTML =
  '속도와 에너지로 궤도 판정<br>' +
  tex('v_c=\\sqrt{GM/r_0},\\quad v_{esc}=\\sqrt{2GM/r_0}') + '<br>' +
  tex('\\varepsilon=\\frac{v^2}{2}-\\frac{GM}{r},\\quad a=-\\frac{GM}{2\\varepsilon}');

state = initialState();
resize();
reset();
</script>
</body>
</html>
