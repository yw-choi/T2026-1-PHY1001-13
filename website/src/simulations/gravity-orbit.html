<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중력 궤도 시뮬레이션</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff;
  color: #1a1a1a;
  overflow: hidden;
  height: 100vh;
}
.container {
  display: flex;
  height: 100vh;
  gap: 0;
}
.canvas-area {
  flex: 1;
  position: relative;
  background: #0a0a1a;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
}
.canvas-overlay {
  position: absolute;
  top: 12px;
  left: 12px;
  color: #fff;
  pointer-events: none;
  font-size: 14px;
}
.canvas-overlay .concept {
  background: rgba(139,0,41,0.85);
  padding: 6px 12px;
  border-radius: 6px;
  margin-bottom: 8px;
  font-weight: 600;
}
.canvas-overlay .values {
  background: rgba(0,0,0,0.7);
  padding: 8px 12px;
  border-radius: 6px;
  line-height: 1.8;
}
.canvas-overlay .values .label { color: #aaa; font-size: 12px; }
.canvas-overlay .values .val { color: #fff; font-weight: 600; }
.canvas-overlay .values .val.positive { color: #5ba3ff; }
.canvas-overlay .values .val.negative { color: #ff6b6b; }
.controls {
  width: 260px;
  background: #f8f9fa;
  border-left: 1px solid #e0e0e0;
  padding: 16px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.controls h2 {
  font-size: 15px;
  color: #8B0029;
  border-bottom: 2px solid #8B0029;
  padding-bottom: 6px;
  margin-bottom: 4px;
}
.ctrl-group { margin-bottom: 2px; }
.ctrl-group label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #555;
  margin-bottom: 2px;
}
.ctrl-group label .val-display { font-weight: 700; color: #1a1a1a; }
.ctrl-group input[type=range] { width: 100%; accent-color: #8B0029; }
.btn-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.btn {
  flex: 1;
  padding: 8px 6px;
  border: none;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-play { background: #8B0029; color: #fff; }
.btn-play:hover { background: #a3003a; }
.btn-pause { background: #2563EB; color: #fff; }
.btn-pause:hover { background: #1d4ed8; }
.btn-reset { background: #6B7280; color: #fff; }
.btn-reset:hover { background: #4B5563; }
.preset-row {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.btn-preset {
  padding: 5px 8px;
  border: 1px solid #d0d0d0;
  border-radius: 4px;
  background: #fff;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-preset:hover { border-color: #8B0029; color: #8B0029; }
.btn-preset.active { background: #8B0029; color: #fff; border-color: #8B0029; }
.info-section {
  font-size: 12px;
  line-height: 1.7;
}
.info-section .row {
  display: flex;
  justify-content: space-between;
}
.info-section .lbl { color: #777; }
.info-section .vl { font-weight: 600; }
.energy-bars {
  display: flex;
  gap: 4px;
}
.energy-bar {
  flex: 1;
  text-align: center;
  padding: 4px;
  border-radius: 4px;
  font-size: 11px;
}
.e-k { background: #dbeafe; color: #1d4ed8; }
.e-u { background: #fce4ec; color: #c62828; }
.e-t { background: #e8f5e9; color: #2e7d32; }
.energy-bar .e-label { font-weight: 400; }
.energy-bar .e-val { font-weight: 700; display: block; margin-top: 2px; }
.check-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  cursor: pointer;
}
.check-row input { accent-color: #8B0029; }
@media (max-width: 700px) {
  .container { flex-direction: column; }
  .canvas-area { height: 55vh; }
  .controls { width: 100%; height: 45vh; border-left: none; border-top: 1px solid #e0e0e0; }
}
</style>
</head>
<body>
<div class="container">
  <div class="canvas-area">
    <canvas id="cv"></canvas>
    <div class="canvas-overlay">
      <div class="concept" id="conceptLabel"></div>
      <div class="values" id="valuesPanel"></div>
    </div>
  </div>
  <div class="controls">
    <h2>중력 궤도 시뮬레이션</h2>
    <div>
      <div class="ctrl-group">
        <label>초기 속력 v<sub>0</sub> <span class="val-display" id="vlV">1.00 v<sub>c</sub></span></label>
        <input type="range" id="slV" min="0.3" max="1.8" step="0.01" value="1.00">
      </div>
      <div class="ctrl-group">
        <label>발사 각도 <span class="val-display" id="vlAngle">90°</span></label>
        <input type="range" id="slAngle" min="0" max="180" step="1" value="90">
      </div>
      <div class="ctrl-group">
        <label>중심 질량 M <span class="val-display" id="vlM">1.0 M<sub>0</sub></span></label>
        <input type="range" id="slM" min="0.3" max="3.0" step="0.1" value="1.0">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-play" id="btnPlay">시작</button>
      <button class="btn btn-pause" id="btnPause">일시정지</button>
      <button class="btn btn-reset" id="btnReset">초기화</button>
    </div>
    <div>
      <div style="font-size:12px; color:#555; margin-bottom:4px; font-weight:600;">프리셋</div>
      <div class="preset-row">
        <button class="btn-preset" data-v="1.00" data-a="90" data-m="1.0">원궤도</button>
        <button class="btn-preset" data-v="0.70" data-a="90" data-m="1.0">타원(작)</button>
        <button class="btn-preset" data-v="1.20" data-a="90" data-m="1.0">타원(큰)</button>
        <button class="btn-preset" data-v="1.414" data-a="90" data-m="1.0">탈출</button>
        <button class="btn-preset" data-v="0.80" data-a="45" data-m="1.0">비스듬히</button>
      </div>
    </div>
    <div>
      <div style="font-size:12px; color:#555; margin-bottom:4px; font-weight:600;">에너지</div>
      <div class="energy-bars">
        <div class="energy-bar e-k"><span class="e-label">K</span><span class="e-val" id="eK">0</span></div>
        <div class="energy-bar e-u"><span class="e-label">U</span><span class="e-val" id="eU">0</span></div>
        <div class="energy-bar e-t"><span class="e-label">E</span><span class="e-val" id="eT">0</span></div>
      </div>
    </div>
    <div class="info-section" id="infoPanel">
      <div class="row"><span class="lbl">궤도 종류</span><span class="vl" id="orbitType">—</span></div>
      <div class="row"><span class="lbl">이심률 e</span><span class="vl" id="eccVal">—</span></div>
      <div class="row"><span class="lbl">주기 T</span><span class="vl" id="periodVal">—</span></div>
      <div class="row"><span class="lbl">각운동량 L</span><span class="vl" id="angMomVal">—</span></div>
      <div class="row"><span class="lbl">경과 시간</span><span class="vl" id="timeVal">0.0</span></div>
    </div>
    <div>
      <label class="check-row"><input type="checkbox" id="chkTrail" checked> 궤도 궤적</label>
      <label class="check-row"><input type="checkbox" id="chkVectors" checked> 속도·가속도 벡터</label>
      <label class="check-row"><input type="checkbox" id="chkArea" checked> 면적 속도 (케플러 2법칙)</label>
    </div>
    <div id="formulaBox" style="font-size: 13px; line-height: 1.8; padding: 8px; background: #fff; border-radius: 6px; border: 1px solid #e0e0e0;"></div>
  </div>
</div>
<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const dpr = window.devicePixelRatio || 1;

// Controls
const slV = document.getElementById('slV');
const slAngle = document.getElementById('slAngle');
const slM = document.getElementById('slM');
const vlV = document.getElementById('vlV');
const vlAngle = document.getElementById('vlAngle');
const vlM = document.getElementById('vlM');

// Buttons
const btnPlay = document.getElementById('btnPlay');
const btnPause = document.getElementById('btnPause');
const btnReset = document.getElementById('btnReset');

// Display
const eK = document.getElementById('eK');
const eU = document.getElementById('eU');
const eT = document.getElementById('eT');
const orbitType = document.getElementById('orbitType');
const eccVal = document.getElementById('eccVal');
const periodVal = document.getElementById('periodVal');
const angMomVal = document.getElementById('angMomVal');
const timeVal = document.getElementById('timeVal');
const conceptLabel = document.getElementById('conceptLabel');
const valuesPanel = document.getElementById('valuesPanel');
const formulaBox = document.getElementById('formulaBox');

// Checkboxes
const chkTrail = document.getElementById('chkTrail');
const chkVectors = document.getElementById('chkVectors');
const chkArea = document.getElementById('chkArea');

// Physics constants (normalized units)
const G_CONST = 5000; // gravitational constant in sim units
const BASE_MASS = 1.0;
const INIT_R = 200; // initial distance from center
const PLANET_RADIUS = 25;

let W, H, cx, cy;
let running = false;
let animId = null;

// State
let px, py, vx, vy; // position and velocity
let trail = [];
let areaSweeps = []; // for Kepler 2nd law
let areaTimer = 0;
const AREA_INTERVAL = 0.8; // time between area markers
let simTime = 0;
const dt = 0.005;
const stepsPerFrame = 4;

function resize() {
  const rect = cv.parentElement.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  cv.width = W * dpr;
  cv.height = H * dpr;
  cv.style.width = W + 'px';
  cv.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cx = W / 2;
  cy = H / 2;
}
window.addEventListener('resize', () => { resize(); draw(); });
resize();

function getParams() {
  const vFrac = parseFloat(slV.value);
  const angle = parseFloat(slAngle.value);
  const mFrac = parseFloat(slM.value);
  return { vFrac, angle, mFrac };
}

function circularSpeed(M, r) {
  return Math.sqrt(G_CONST * M / r);
}

function resetSim() {
  const { vFrac, angle, mFrac } = getParams();
  const M = BASE_MASS * mFrac;
  const vc = circularSpeed(M, INIT_R);
  const v0 = vFrac * vc;
  const rad = angle * Math.PI / 180;

  // Start at right side of orbit
  px = INIT_R;
  py = 0;

  const tangAngle = (90 - angle) * Math.PI / 180;
  vx = v0 * Math.sin(tangAngle);
  vy = -v0 * Math.cos(tangAngle);

  trail = [];
  areaSweeps = [];
  areaTimer = 0;
  simTime = 0;

  updateDisplays();
  draw();
}

function updateSliderDisplays() {
  const vFrac = parseFloat(slV.value);
  vlV.innerHTML = vFrac.toFixed(2) + ' v<sub>c</sub>';
  vlAngle.textContent = slAngle.value + '°';
  vlM.innerHTML = parseFloat(slM.value).toFixed(1) + ' M<sub>0</sub>';
}

slV.addEventListener('input', updateSliderDisplays);
slAngle.addEventListener('input', updateSliderDisplays);
slM.addEventListener('input', updateSliderDisplays);

function computeEnergy(M) {
  const r = Math.sqrt(px * px + py * py);
  const v2 = vx * vx + vy * vy;
  const K = 0.5 * v2;
  const U = -G_CONST * M / r;
  return { K, U, E: K + U, r, v: Math.sqrt(v2) };
}

function computeAngularMomentum() {
  return px * vy - py * vx; // L = r x v (per unit mass)
}

function computeOrbitalElements(M) {
  const en = computeEnergy(M);
  const L = computeAngularMomentum();
  const E = en.E;

  let ecc, a, period, type;
  if (E < -1e-6) {
    a = -G_CONST * M / (2 * E);
    ecc = Math.sqrt(1 + 2 * E * L * L / (G_CONST * M * G_CONST * M));
    if (ecc < 0) ecc = 0;
    period = 2 * Math.PI * Math.sqrt(a * a * a / (G_CONST * M));
    type = ecc < 0.01 ? '원궤도' : '타원 궤도';
  } else if (E < 1e-6) {
    type = '포물선 궤도 (탈출)';
    ecc = 1;
    a = Infinity;
    period = Infinity;
  } else {
    type = '쌍곡선 궤도 (탈출)';
    ecc = Math.sqrt(1 + 2 * E * L * L / (G_CONST * M * G_CONST * M));
    a = Infinity;
    period = Infinity;
  }
  return { ecc, a, period, type, L };
}

function updateDisplays() {
  const { mFrac } = getParams();
  const M = BASE_MASS * mFrac;
  const en = computeEnergy(M);
  const orb = computeOrbitalElements(M);

  eK.textContent = en.K.toFixed(1);
  eU.textContent = en.U.toFixed(1);
  eT.textContent = en.E.toFixed(1);
  orbitType.textContent = orb.type;
  eccVal.textContent = isFinite(orb.ecc) ? orb.ecc.toFixed(3) : '—';
  periodVal.textContent = isFinite(orb.period) ? orb.period.toFixed(1) : '∞';
  angMomVal.textContent = orb.L.toFixed(0);
  timeVal.textContent = simTime.toFixed(1);

  // Overlay
  valuesPanel.innerHTML =
    `<div><span class="label">r = </span><span class="val">${en.r.toFixed(1)}</span></div>` +
    `<div><span class="label">v = </span><span class="val">${en.v.toFixed(2)}</span></div>` +
    `<div><span class="label">K = </span><span class="val positive">${en.K.toFixed(1)}</span></div>` +
    `<div><span class="label">U = </span><span class="val negative">${en.U.toFixed(1)}</span></div>` +
    `<div><span class="label">E = </span><span class="val" style="color:${en.E < 0 ? '#ff6b6b' : '#5ba3ff'}">${en.E.toFixed(1)}</span></div>`;
}

function step() {
  const { mFrac } = getParams();
  const M = BASE_MASS * mFrac;

  for (let i = 0; i < stepsPerFrame; i++) {
    // Velocity Verlet integration
    const r2 = px * px + py * py;
    const r = Math.sqrt(r2);

    if (r < PLANET_RADIUS) {
      running = false;
      return;
    }

    const r3 = r2 * r;
    const ax = -G_CONST * M * px / r3;
    const ay = -G_CONST * M * py / r3;

    // Half-step velocity
    const vx_half = vx + 0.5 * ax * dt;
    const vy_half = vy + 0.5 * ay * dt;

    // Full-step position
    px += vx_half * dt;
    py += vy_half * dt;

    // New acceleration
    const r2_new = px * px + py * py;
    const r_new = Math.sqrt(r2_new);
    const r3_new = r2_new * r_new;
    const ax_new = -G_CONST * M * px / r3_new;
    const ay_new = -G_CONST * M * py / r3_new;

    // Full-step velocity
    vx = vx_half + 0.5 * ax_new * dt;
    vy = vy_half + 0.5 * ay_new * dt;

    simTime += dt;

    // Trail
    if (trail.length === 0 || Math.abs(px - trail[trail.length - 1].x) > 1 || Math.abs(py - trail[trail.length - 1].y) > 1) {
      trail.push({ x: px, y: py });
      if (trail.length > 8000) trail.shift();
    }

    // Area sweep markers
    areaTimer += dt;
    if (areaTimer >= AREA_INTERVAL) {
      areaTimer -= AREA_INTERVAL;
      areaSweeps.push({ x: px, y: py, t: simTime });
      if (areaSweeps.length > 60) areaSweeps.shift();
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 80; i++) {
    const sx = (Math.sin(i * 127.1 + 311.7) * 0.5 + 0.5) * W;
    const sy = (Math.sin(i * 269.5 + 183.3) * 0.5 + 0.5) * H;
    ctx.beginPath();
    ctx.arc(sx, sy, 0.8, 0, 2 * Math.PI);
    ctx.fill();
  }

  // Center body (planet)
  const grad = ctx.createRadialGradient(cx, cy, 5, cx, cy, PLANET_RADIUS);
  grad.addColorStop(0, '#FFD700');
  grad.addColorStop(0.7, '#FF8C00');
  grad.addColorStop(1, '#8B0029');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, PLANET_RADIUS, 0, 2 * Math.PI);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('M', cx, cy + 4);

  // Trail
  if (chkTrail.checked && trail.length > 1) {
    ctx.strokeStyle = 'rgba(37,99,235,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx + trail[0].x, cy + trail[0].y);
    for (let i = 1; i < trail.length; i++) {
      ctx.lineTo(cx + trail[i].x, cy + trail[i].y);
    }
    ctx.stroke();
  }

  // Area sweeps (Kepler 2nd law)
  if (chkArea.checked && areaSweeps.length >= 2) {
    for (let i = 0; i < areaSweeps.length - 1; i += 2) {
      const s1 = areaSweeps[i];
      const s2 = areaSweeps[i + 1];
      if (!s2) break;
      ctx.fillStyle = `hsla(${(i * 30) % 360}, 60%, 50%, 0.15)`;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + s1.x, cy + s1.y);
      ctx.lineTo(cx + s2.x, cy + s2.y);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = `hsla(${(i * 30) % 360}, 60%, 50%, 0.4)`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  // Satellite
  const sx = cx + px;
  const sy = cy + py;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(sx, sy, 5, 0, 2 * Math.PI);
  ctx.fill();
  ctx.strokeStyle = '#2563EB';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Line from center to satellite
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(sx, sy);
  ctx.stroke();
  ctx.setLineDash([]);

  // Vectors
  if (chkVectors.checked) {
    const vScale = 15;
    const aScale = 1500;

    // Velocity vector
    ctx.strokeStyle = '#2563EB';
    ctx.lineWidth = 2;
    const vEndX = sx + vx * vScale;
    const vEndY = sy + vy * vScale;
    drawArrow(sx, sy, vEndX, vEndY, '#2563EB');
    let vLblX = vEndX + 8, vLblY = vEndY;

    // Acceleration vector
    const r = Math.sqrt(px * px + py * py);
    const r3 = r * r * r;
    const { mFrac } = getParams();
    const M = BASE_MASS * mFrac;
    const axv = -G_CONST * M * px / r3;
    const ayv = -G_CONST * M * py / r3;
    const aEndX = sx + axv * aScale;
    const aEndY = sy + ayv * aScale;
    drawArrow(sx, sy, aEndX, aEndY, '#8B0029');
    let aLblX = aEndX + 8, aLblY = aEndY;

    // Overlap prevention: shift labels if too close
    const lblDx = vLblX - aLblX;
    const lblDy = vLblY - aLblY;
    const lblDist = Math.sqrt(lblDx * lblDx + lblDy * lblDy);
    if (lblDist < 20) {
      vLblY -= 10;
      aLblY += 10;
    }

    drawTextWithBg('v', vLblX, vLblY, '#2563EB');
    drawTextWithBg('a', aLblX, aLblY, '#8B0029');
  }
}

function drawArrow(x1, y1, x2, y2, color) {
  const dx = x2 - x1;
  const dy = y2 - y1;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 2) return;
  const ux = dx / len;
  const uy = dy / len;
  const headLen = Math.min(10, len * 0.3);

  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();

  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - headLen * ux + headLen * 0.4 * uy, y2 - headLen * uy - headLen * 0.4 * ux);
  ctx.lineTo(x2 - headLen * ux - headLen * 0.4 * uy, y2 - headLen * uy + headLen * 0.4 * ux);
  ctx.closePath();
  ctx.fill();
}

function drawTextWithBg(text, x, y, color) {
  ctx.font = 'bold 13px sans-serif';
  const m = ctx.measureText(text);
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(x - 2, y - 12, m.width + 4, 16);
  ctx.fillStyle = color;
  ctx.textAlign = 'left';
  ctx.fillText(text, x, y);
}

function animate() {
  if (!running) return;
  step();
  updateDisplays();
  draw();
  animId = requestAnimationFrame(animate);
}

btnPlay.addEventListener('click', () => {
  if (!running) {
    running = true;
    animate();
  }
});

btnPause.addEventListener('click', () => {
  running = false;
  if (animId) cancelAnimationFrame(animId);
});

btnReset.addEventListener('click', () => {
  running = false;
  if (animId) cancelAnimationFrame(animId);
  resetSim();
});

// Presets
document.querySelectorAll('.btn-preset').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.btn-preset').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    slV.value = btn.dataset.v;
    slAngle.value = btn.dataset.a;
    slM.value = btn.dataset.m;
    updateSliderDisplays();
    running = false;
    if (animId) cancelAnimationFrame(animId);
    resetSim();
  });
});

// Checkbox redraws
[chkTrail, chkVectors, chkArea].forEach(c => c.addEventListener('change', () => draw()));

// Formula box
function renderFormulas() {
  const formulas = [
    'F = G\\frac{Mm}{r^2}',
    'E = K + U = \\frac{1}{2}mv^2 - \\frac{GMm}{r}',
    'L = m r v_\\perp = \\text{const}'
  ];
  formulaBox.innerHTML = formulas.map(f => {
    try { return '<div style="margin:4px 0">' + katex.renderToString(f, { displayMode: false, throwOnError: false }) + '</div>'; }
    catch(e) { return '<div>' + f + '</div>'; }
  }).join('');
}

// Concept label
conceptLabel.innerHTML = '만유인력 ' + katex.renderToString('F = GMm/r^2', { throwOnError: false }) + ' 에 의한 궤도 운동';

// Init
updateSliderDisplays();
renderFormulas();
resetSim();
</script>
</body>
</html>
