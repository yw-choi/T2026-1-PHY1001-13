<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>음파 시뮬레이션</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #fff; color: #1a1a1a; overflow: hidden; }
.container { display: flex; height: 100vh; }
.canvas-area { flex: 1; position: relative; }
canvas { width: 100%; height: 100%; display: block; }
.controls { width: 260px; padding: 14px; background: #faf5f6; border-left: 2px solid rgba(139,0,41,0.15); overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
h2 { color: #8B0029; font-size: 1.05rem; margin-bottom: 2px; }
.subtitle { color: #888; font-size: 0.72rem; margin-bottom: 4px; }
label { display: block; font-size: 0.78rem; color: #555; margin-bottom: 2px; }
.slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
.slider-row input[type="range"] { flex: 1; accent-color: #8B0029; }
.slider-val { font-size: 0.78rem; font-weight: 600; color: #8B0029; min-width: 55px; text-align: right; }
.formula-box { background: #f9f0f2; border: 1px solid rgba(139,0,41,0.12); border-radius: 8px; padding: 8px 10px; font-size: 0.75rem; line-height: 1.7; color: #555; }
.formula-box .katex { font-size: 0.9em; }
.formula-box b { color: #8B0029; }
.info-box { background: white; border: 1px solid rgba(139,0,41,0.15); border-radius: 8px; padding: 8px 10px; font-size: 0.75rem; line-height: 1.8; }
.info-box .lbl { color: #555; }
.info-box .val { color: #8B0029; font-weight: 700; font-family: ui-monospace, monospace; }
.btn-row { display: flex; gap: 6px; }
button { flex: 1; padding: 7px; border: none; border-radius: 8px; font-size: 0.78rem; font-weight: 600; cursor: pointer; }
.btn-primary { background: #8B0029; color: white; }
.btn-primary:hover { background: #a3003a; }
.btn-secondary { background: rgba(139,0,41,0.1); color: #8B0029; }
.btn-secondary:hover { background: rgba(139,0,41,0.2); }
.tab-row { display: flex; gap: 3px; }
.tab-btn { flex: 1; padding: 6px 4px; border: 1px solid rgba(139,0,41,0.2); border-radius: 6px; font-size: 0.7rem; font-weight: 600; cursor: pointer; background: white; color: #8B0029; text-align: center; }
.tab-btn.active { background: #8B0029; color: white; border-color: #8B0029; }
.canvas-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
.canvas-overlay .katex-label { position: absolute; white-space: nowrap; font-size: 11px; line-height: 1; pointer-events: none; }
.canvas-overlay .katex-label.with-bg { background: rgba(255,255,255,0.92); padding: 1px 5px; border-radius: 3px; }
.mode-controls { display: none; }
.mode-controls.active { display: block; }
@media (max-width: 700px) {
  .container { flex-direction: column; }
  .canvas-area { flex: none; height: 55vh; }
  .controls { width: 100%; border-left: none; border-top: 2px solid rgba(139,0,41,0.15); height: 45vh; }
}
</style>
</head>
<body>
<div class="container">
  <div class="canvas-area">
    <canvas id="canvas"></canvas>
    <div class="canvas-overlay" id="overlay"></div>
  </div>
  <div class="controls">
    <div>
      <h2>음파 시뮬레이션</h2>
      <div class="subtitle">Sound Waves &mdash; Ch.17</div>
    </div>

    <div class="tab-row">
      <div class="tab-btn active" data-mode="pipe" id="tabPipe">관 정상파</div>
      <div class="tab-btn" data-mode="beats" id="tabBeats">맥놀이</div>
      <div class="tab-btn" data-mode="doppler" id="tabDoppler">도플러</div>
    </div>

    <!-- Pipe mode -->
    <div class="mode-controls active" id="ctrlPipe">
      <div class="formula-box" id="pipeFormula"></div>
      <div>
        <label>관 종류</label>
        <div class="tab-row" style="margin-bottom:4px;">
          <div class="tab-btn active" data-pipe="open" id="btnOpen">양쪽 열림</div>
          <div class="tab-btn" data-pipe="closed" id="btnClosed">한쪽 닫힘</div>
        </div>
      </div>
      <div>
        <label>관 길이 L</label>
        <div class="slider-row">
          <input type="range" id="slPipeL" min="0.3" max="2.0" step="0.05" value="1.0">
          <span class="slider-val" id="valPipeL">1.00 m</span>
        </div>
      </div>
      <div>
        <label>배음 번호 n</label>
        <div class="slider-row">
          <input type="range" id="slHarmonic" min="1" max="7" step="1" value="1">
          <span class="slider-val" id="valHarmonic">1</span>
        </div>
      </div>
      <div class="info-box" id="pipeInfo"></div>
    </div>

    <!-- Beats mode -->
    <div class="mode-controls" id="ctrlBeats">
      <div class="formula-box" id="beatsFormula"></div>
      <div>
        <label>진동수 f₁</label>
        <div class="slider-row">
          <input type="range" id="slF1" min="400" max="500" step="1" value="440">
          <span class="slider-val" id="valF1">440 Hz</span>
        </div>
      </div>
      <div>
        <label>진동수 f₂</label>
        <div class="slider-row">
          <input type="range" id="slF2" min="400" max="500" step="1" value="444">
          <span class="slider-val" id="valF2">444 Hz</span>
        </div>
      </div>
      <div class="info-box" id="beatsInfo"></div>
    </div>

    <!-- Doppler mode -->
    <div class="mode-controls" id="ctrlDoppler">
      <div class="formula-box" id="dopplerFormula"></div>
      <div>
        <label>음원 속도 v_S</label>
        <div class="slider-row">
          <input type="range" id="slVs" min="0" max="400" step="5" value="100">
          <span class="slider-val" id="valVs">100 m/s</span>
        </div>
      </div>
      <div>
        <label>음원 진동수 f</label>
        <div class="slider-row">
          <input type="range" id="slFsrc" min="200" max="800" step="10" value="400">
          <span class="slider-val" id="valFsrc">400 Hz</span>
        </div>
      </div>
      <div class="info-box" id="dopplerInfo"></div>
    </div>

    <div class="btn-row">
      <button class="btn-primary" id="btnPlay">▶ 시작</button>
      <button class="btn-secondary" id="btnReset">↻ 초기화</button>
    </div>

    <div style="font-size:0.66rem; color:#999; margin-top:auto;">
      음속 v = 343 m/s (20°C 공기)
    </div>
  </div>
</div>

<script>
function kx(tex) { return katex.renderToString(tex, { throwOnError: false }); }

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const V_SOUND = 343;

let dpr = window.devicePixelRatio || 1;
let W, H;
let mode = 'pipe';
let running = false;
let animId = null;
let time = 0;
let lastTs = null;

// Pipe state
let pipeType = 'open';
let pipeL = 1.0;
let harmonic = 1;

// Beats state
let f1 = 440, f2 = 444;

// Doppler state
let vS = 100, fSrc = 400;
let sourceX = 0;
let wavefronts = [];

function resize() {
  dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

// ======= Tabs =======
document.querySelectorAll('.tab-row .tab-btn[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    document.querySelectorAll('.mode-controls').forEach(c => c.classList.remove('active'));
    document.getElementById('ctrl' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');
    resetSim();
    draw();
  });
});

document.querySelectorAll('.tab-btn[data-pipe]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn[data-pipe]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    pipeType = btn.dataset.pipe;
    updatePipeHarmonicRange();
    draw();
  });
});

function updatePipeHarmonicRange() {
  const sl = document.getElementById('slHarmonic');
  if (pipeType === 'closed') {
    // Only odd
    const val = parseInt(sl.value);
    sl.min = 1; sl.max = 7; sl.step = 2;
    if (val % 2 === 0) sl.value = Math.max(1, val - 1);
  } else {
    sl.min = 1; sl.max = 7; sl.step = 1;
  }
  harmonic = parseInt(sl.value);
  document.getElementById('valHarmonic').textContent = harmonic;
}

// ======= Sliders =======
document.getElementById('slPipeL').addEventListener('input', e => {
  pipeL = parseFloat(e.target.value);
  document.getElementById('valPipeL').textContent = pipeL.toFixed(2) + ' m';
  draw();
});
document.getElementById('slHarmonic').addEventListener('input', e => {
  harmonic = parseInt(e.target.value);
  document.getElementById('valHarmonic').textContent = harmonic;
  draw();
});
document.getElementById('slF1').addEventListener('input', e => {
  f1 = parseInt(e.target.value);
  document.getElementById('valF1').textContent = f1 + ' Hz';
  draw();
});
document.getElementById('slF2').addEventListener('input', e => {
  f2 = parseInt(e.target.value);
  document.getElementById('valF2').textContent = f2 + ' Hz';
  draw();
});
document.getElementById('slVs').addEventListener('input', e => {
  vS = parseInt(e.target.value);
  document.getElementById('valVs').textContent = vS + ' m/s';
  draw();
});
document.getElementById('slFsrc').addEventListener('input', e => {
  fSrc = parseInt(e.target.value);
  document.getElementById('valFsrc').textContent = fSrc + ' Hz';
  draw();
});

// ======= Buttons =======
document.getElementById('btnPlay').addEventListener('click', () => {
  running = !running;
  document.getElementById('btnPlay').textContent = running ? '⏸ 정지' : '▶ 시작';
  if (running) { lastTs = null; animate(); }
  else if (animId) { cancelAnimationFrame(animId); animId = null; }
});

document.getElementById('btnReset').addEventListener('click', resetSim);

function resetSim() {
  running = false;
  document.getElementById('btnPlay').textContent = '▶ 시작';
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  time = 0; lastTs = null;
  sourceX = 0;
  wavefronts = [];
  draw();
}

// ======= Animation =======
function animate(ts) {
  if (!running) return;
  if (lastTs === null) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  time += dt;

  if (mode === 'doppler') {
    sourceX += vS * dt;
    // Emit wavefront periodically
    const period = 1 / fSrc;
    if (wavefronts.length === 0 || time - wavefronts[wavefronts.length - 1].t0 >= period) {
      wavefronts.push({ x: sourceX, t0: time });
    }
    // Remove old
    wavefronts = wavefronts.filter(wf => (time - wf.t0) * V_SOUND < W * 2);
    // Wrap source
    if (sourceX > W * 0.9) {
      sourceX = -W * 0.3;
      wavefronts = [];
    }
  }

  draw();
  animId = requestAnimationFrame(animate);
}

// ======= Drawing =======
function draw() {
  ctx.clearRect(0, 0, W, H);
  overlay.innerHTML = '';

  if (mode === 'pipe') drawPipe();
  else if (mode === 'beats') drawBeats();
  else if (mode === 'doppler') drawDoppler();
}

function drawPipe() {
  const margin = 60;
  const pipeTop = H * 0.25;
  const pipeBot = H * 0.45;
  const pipeH = pipeBot - pipeTop;
  const leftX = margin;
  const rightX = W - margin;
  const pipeW = rightX - leftX;

  // Draw pipe body
  ctx.fillStyle = '#F3F4F6';
  ctx.fillRect(leftX, pipeTop, pipeW, pipeH);
  ctx.strokeStyle = '#6B7280';
  ctx.lineWidth = 2;
  ctx.strokeRect(leftX, pipeTop, pipeW, pipeH);

  // Closed end indicator
  if (pipeType === 'closed') {
    ctx.fillStyle = '#6B7280';
    ctx.fillRect(leftX - 4, pipeTop, 8, pipeH);
  }

  // Standing wave pattern
  const n = harmonic;
  const waveAmplitude = pipeH * 0.35;
  const midY = (pipeTop + pipeBot) / 2;

  // Calculate wavelength based on pipe type
  let lambda, freq;
  if (pipeType === 'open') {
    lambda = 2 * pipeL / n;
    freq = n * V_SOUND / (2 * pipeL);
  } else {
    lambda = 4 * pipeL / n;
    freq = n * V_SOUND / (4 * pipeL);
  }

  // Standing wave spatial functions:
  // Open pipe (both ends open): displacement antinodes at x=0 and x=L → cos(n*pi*x/L)
  // Closed pipe (left closed, right open): displacement node at x=0, antinode at x=L → sin(n*pi*x/(2L))
  function dispAmp(frac) {
    if (pipeType === 'open') {
      return Math.cos(n * Math.PI * frac);
    } else {
      return Math.sin(n * Math.PI * frac / 2);
    }
  }

  const numPoints = 300;
  const timePhase = time * 2 * Math.PI * 2; // visual oscillation

  // Draw actual displacement wave
  ctx.beginPath();
  ctx.strokeStyle = '#8B0029';
  ctx.lineWidth = 2.5;
  for (let i = 0; i <= numPoints; i++) {
    const frac = i / numPoints;
    const x = leftX + frac * pipeW;
    const y = midY + waveAmplitude * dispAmp(frac) * Math.cos(timePhase);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Draw envelope (dashed)
  for (let sign = -1; sign <= 1; sign += 2) {
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(139,0,41,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 3]);
    for (let i = 0; i <= numPoints; i++) {
      const frac = i / numPoints;
      const x = leftX + frac * pipeW;
      const y = midY + sign * waveAmplitude * Math.abs(dispAmp(frac));
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Draw nodes (N) and antinodes (A) markers
  const nodePositions = [];
  const antinodePositions = [];
  if (pipeType === 'open') {
    // cos(n*pi*frac): antinodes at frac = k/n (k=0,1,...,n), nodes at frac = (2k+1)/(2n)
    for (let k = 0; k <= n; k++) antinodePositions.push(k / n);
    for (let k = 0; k < n; k++) nodePositions.push((2 * k + 1) / (2 * n));
  } else {
    // sin(n*pi*frac/2): nodes at frac = 2k/n, antinodes at frac = (2k+1)/n
    for (let k = 0; k * 2 / n <= 1.001; k++) {
      nodePositions.push(2 * k / n);
    }
    for (let k = 0; (2 * k + 1) / n <= 1.001; k++) {
      antinodePositions.push((2 * k + 1) / n);
    }
  }

  // Draw N/A markers
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  nodePositions.forEach(frac => {
    if (frac < -0.01 || frac > 1.01) return;
    const x = leftX + frac * pipeW;
    ctx.fillStyle = '#2563EB';
    ctx.fillText('N', x, pipeBot + 18);
  });
  antinodePositions.forEach(frac => {
    if (frac < -0.01 || frac > 1.01) return;
    const x = leftX + frac * pipeW;
    ctx.fillStyle = '#8B0029';
    ctx.fillText('A', x, pipeBot + 18);
  });

  // Pressure graph below
  const pressTop = H * 0.58;
  const pressMid = H * 0.72;
  const pressAmp = H * 0.1;

  ctx.fillStyle = '#6B7280';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('압력 변화 Δp(x)', leftX, pressTop - 5);

  // Axis
  ctx.strokeStyle = '#6B7280';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(leftX, pressMid); ctx.lineTo(rightX, pressMid);
  ctx.stroke();

  // Pressure wave (90° spatially shifted from displacement)
  // Pressure is proportional to -d(displacement)/dx
  // Open pipe: disp = cos(n*pi*x/L) → pressure ~ sin(n*pi*x/L) (nodes at ends)
  // Closed pipe: disp = sin(n*pi*x/(2L)) → pressure ~ -cos(n*pi*x/(2L)) (antinode at closed end)
  function pressAmpFn(frac) {
    if (pipeType === 'open') {
      return Math.sin(n * Math.PI * frac);
    } else {
      return -Math.cos(n * Math.PI * frac / 2);
    }
  }

  ctx.beginPath();
  ctx.strokeStyle = '#2563EB';
  ctx.lineWidth = 2;
  for (let i = 0; i <= numPoints; i++) {
    const frac = i / numPoints;
    const x = leftX + frac * pipeW;
    const y = pressMid + pressAmp * pressAmpFn(frac) * Math.cos(timePhase);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Pressure envelope
  for (let sign = -1; sign <= 1; sign += 2) {
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(37,99,235,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 3]);
    for (let i = 0; i <= numPoints; i++) {
      const frac = i / numPoints;
      const x = leftX + frac * pipeW;
      const y = pressMid + sign * pressAmp * Math.abs(pressAmpFn(frac));
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Title
  ctx.fillStyle = '#8B0029';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  const titleStr = pipeType === 'open' ? '양쪽 열린 관' : '한쪽 닫힌 관';
  ctx.fillText(titleStr + ' — n = ' + n, W / 2, 25);

  // Update info
  document.getElementById('pipeFormula').innerHTML =
    (pipeType === 'open'
      ? '<b>양쪽 열린 관:</b><br>' + kx('f = \\frac{nv}{2L}') + ', &nbsp;' + kx('n = 1,2,3,\\ldots')
      : '<b>한쪽 닫힌 관:</b><br>' + kx('f = \\frac{nv}{4L}') + ', &nbsp;' + kx('n = 1,3,5,\\ldots'));

  document.getElementById('pipeInfo').innerHTML =
    '<div><span class="lbl">' + kx('L') + ' = </span><span class="val">' + pipeL.toFixed(2) + '</span> m</div>' +
    '<div><span class="lbl">' + kx('n') + ' = </span><span class="val">' + n + '</span></div>' +
    '<div><span class="lbl">' + kx('\\lambda') + ' = </span><span class="val">' + lambda.toFixed(3) + '</span> m</div>' +
    '<div><span class="lbl">' + kx('f') + ' = </span><span class="val">' + freq.toFixed(1) + '</span> Hz</div>';
}

function drawBeats() {
  const margin = 50;
  const w = W - 2 * margin;
  const omega1 = 2 * Math.PI * f1;
  const omega2 = 2 * Math.PI * f2;
  const fBeat = Math.abs(f1 - f2);
  const tMax = fBeat > 0 ? Math.max(3 / fBeat, 0.05) : 0.05;
  const numPts = 600;

  // Three rows: wave1, wave2, combined
  const rows = [
    { label: 'f₁ = ' + f1 + ' Hz', color: '#8B0029', midY: H * 0.18, amp: H * 0.1, fn: t => Math.cos(omega1 * t) },
    { label: 'f₂ = ' + f2 + ' Hz', color: '#2563EB', midY: H * 0.42, amp: H * 0.1, fn: t => Math.cos(omega2 * t) },
    { label: '합성파 (beats)', color: '#1a1a1a', midY: H * 0.72, amp: H * 0.13, fn: t => Math.cos(omega1 * t) + Math.cos(omega2 * t) }
  ];

  rows.forEach(row => {
    // Label
    ctx.fillStyle = row.color;
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(row.label, margin, row.midY - row.amp - 8);

    // Axis
    ctx.strokeStyle = '#eee';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(margin, row.midY); ctx.lineTo(margin + w, row.midY);
    ctx.stroke();

    // Wave
    ctx.beginPath();
    ctx.strokeStyle = row.color;
    ctx.lineWidth = 1.8;
    const ampScale = row === rows[2] ? 0.5 : 1;
    for (let i = 0; i <= numPts; i++) {
      const t = (i / numPts) * tMax + time;
      const x = margin + (i / numPts) * w;
      const y = row.midY - row.amp * ampScale * row.fn(t);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  });

  // Beat envelope on combined
  if (fBeat > 0) {
    const omegaBeat = Math.PI * fBeat;
    ctx.setLineDash([4, 3]);
    for (let sign = -1; sign <= 1; sign += 2) {
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(139,0,41,0.4)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= numPts; i++) {
        const t = (i / numPts) * tMax + time;
        const x = margin + (i / numPts) * w;
        const env = 2 * Math.cos(omegaBeat * t);
        const y = rows[2].midY - sign * rows[2].amp * 0.5 * Math.abs(env);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  // Title
  ctx.fillStyle = '#8B0029';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('맥놀이 (Beats)', W / 2, 20);

  document.getElementById('beatsFormula').innerHTML =
    '<b>맥놀이 진동수:</b><br>' +
    kx('f_{\\text{beat}} = |f_1 - f_2|') + '<br>' +
    kx('s(t) = [2s_m \\cos\\omega\' t]\\cos\\omega t');

  document.getElementById('beatsInfo').innerHTML =
    '<div><span class="lbl">' + kx('f_1') + ' = </span><span class="val">' + f1 + '</span> Hz</div>' +
    '<div><span class="lbl">' + kx('f_2') + ' = </span><span class="val">' + f2 + '</span> Hz</div>' +
    '<div><span class="lbl">' + kx('f_{\\text{beat}}') + ' = </span><span class="val">' + fBeat + '</span> Hz</div>' +
    '<div><span class="lbl">' + kx('f_{\\text{avg}}') + ' = </span><span class="val">' + ((f1 + f2) / 2).toFixed(1) + '</span> Hz</div>';
}

function drawDoppler() {
  const cy = H * 0.45;
  const scale = W / 800; // pixels per meter-ish (scaled for display)

  // Background
  ctx.fillStyle = '#fafbfc';
  ctx.fillRect(0, 0, W, H);

  // Draw wavefronts
  wavefronts.forEach(wf => {
    const r = (time - wf.t0) * V_SOUND * scale * 0.4;
    if (r < 1) return;
    const sx = W * 0.15 + wf.x * scale * 0.4;
    ctx.beginPath();
    ctx.arc(sx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(37,99,235,' + Math.max(0.05, 0.4 - r / W) + ')';
    ctx.lineWidth = 1.2;
    ctx.stroke();
  });

  // Draw source
  const sx = W * 0.15 + sourceX * scale * 0.4;
  ctx.beginPath();
  ctx.arc(sx, cy, 10, 0, Math.PI * 2);
  ctx.fillStyle = '#8B0029';
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.font = 'bold 10px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('S', sx, cy);

  // Velocity arrow
  if (vS > 0) {
    ctx.strokeStyle = '#8B0029';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx + 15, cy);
    ctx.lineTo(sx + 45, cy);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(sx + 45, cy);
    ctx.lineTo(sx + 38, cy - 5);
    ctx.moveTo(sx + 45, cy);
    ctx.lineTo(sx + 38, cy + 5);
    ctx.stroke();
  }

  // Mach cone if supersonic
  if (vS > V_SOUND) {
    const sinTheta = V_SOUND / vS;
    const theta = Math.asin(sinTheta);
    const len = 400;
    ctx.strokeStyle = '#8B0029';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(sx, cy);
    ctx.lineTo(sx - len * Math.cos(theta), cy - len * Math.sin(theta));
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(sx, cy);
    ctx.lineTo(sx - len * Math.cos(theta), cy + len * Math.sin(theta));
    ctx.stroke();

    // Mach cone label
    ctx.fillStyle = '#8B0029';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('충격파 (Mach cone)', W / 2, H * 0.12);
  }

  // Title
  ctx.fillStyle = '#8B0029';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('도플러 효과', W / 2, 20);

  // Observers
  // Right observer
  ctx.beginPath();
  ctx.arc(W * 0.88, cy, 10, 0, Math.PI * 2);
  ctx.fillStyle = '#F3F4F6';
  ctx.fill();
  ctx.strokeStyle = '#2563EB';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#2563EB';
  ctx.font = 'bold 9px sans-serif';
  ctx.fillText('O', W * 0.88, cy);

  // Left observer
  ctx.beginPath();
  ctx.arc(W * 0.05, cy, 10, 0, Math.PI * 2);
  ctx.fillStyle = '#F3F4F6';
  ctx.fill();
  ctx.strokeStyle = '#6B7280';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#6B7280';
  ctx.font = 'bold 9px sans-serif';
  ctx.fillText('O', W * 0.05, cy);

  // Frequency labels
  const fApproach = vS < V_SOUND ? (fSrc * V_SOUND / (V_SOUND - vS)).toFixed(0) : '∞';
  const fRecede = (fSrc * V_SOUND / (V_SOUND + vS)).toFixed(0);

  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#2563EB';
  ctx.fillText("f' = " + fApproach + ' Hz', W * 0.88, cy - 25);
  ctx.fillStyle = '#6B7280';
  ctx.fillText("f' = " + fRecede + ' Hz', W * 0.05, cy - 25);

  // Bottom info area
  const Ma = vS / V_SOUND;
  ctx.fillStyle = '#555';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Ma = ' + Ma.toFixed(2) + (Ma > 1 ? ' (초음속!)' : Ma === 1 ? ' (음속)' : ''), W / 2, H * 0.88);

  document.getElementById('dopplerFormula').innerHTML =
    '<b>도플러 효과:</b><br>' +
    kx("f' = f\\,\\frac{v \\pm v_O}{v \\mp v_S}") + '<br>' +
    (vS > V_SOUND ? '<b style="color:#8B0029;">초음속!</b> ' + kx('\\sin\\theta = v/v_S') : '');

  const fApp = vS < V_SOUND ? (fSrc * V_SOUND / (V_SOUND - vS)).toFixed(1) : '—';
  const fRec = (fSrc * V_SOUND / (V_SOUND + vS)).toFixed(1);
  document.getElementById('dopplerInfo').innerHTML =
    '<div><span class="lbl">' + kx('v_S') + ' = </span><span class="val">' + vS + '</span> m/s</div>' +
    '<div><span class="lbl">' + kx('f') + ' = </span><span class="val">' + fSrc + '</span> Hz</div>' +
    '<div><span class="lbl">Ma = </span><span class="val">' + Ma.toFixed(3) + '</span></div>' +
    '<div><span class="lbl">접근: ' + kx("f'") + ' = </span><span class="val">' + fApp + '</span> Hz</div>' +
    '<div><span class="lbl">후퇴: ' + kx("f'") + ' = </span><span class="val">' + fRec + '</span> Hz</div>' +
    (vS > V_SOUND ? '<div><span class="lbl">' + kx('\\theta') + ' = </span><span class="val">' + (Math.asin(V_SOUND / vS) * 180 / Math.PI).toFixed(1) + '°</span></div>' : '');
}

// Init
window.addEventListener('resize', resize);
resize();
</script>
