<title>전기장 시각화 시뮬레이터</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f0f2f5;
  color: #333;
  min-height: 100vh;
}
header {
  background: #1a1a2e;
  color: #fff;
  text-align: center;
  padding: 18px 20px;
  position: relative;
}
.back-btn { position: absolute; top: 14px; left: 16px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.85rem; padding: 4px 12px; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; transition: all 0.2s; }
.back-btn:hover { color: #fff; border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.1); }

  max-width: 900px;
  margin: 12px auto 0;
  padding: 10px 20px;
  background: #f8f9fa;
  border-left: 4px solid #3498db;
  border-radius: 4px;
  font-size: 0.9em;
  color: #555;

}
.container {
  max-width: 1200px;

}
.btn-bar {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 16px;

}

  padding: 8px 22px;
  border: 2px solid #1a1a2e;
  background: #1a1a2e;

  font-weight: 600;

}

.btn-bar button.active { background: #e94560; border-color: #e94560; }

  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}
.panel {
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);

}

}

}

}

}

  width: 120px;
  height: 12px;
  border-radius: 3px;

<body>
<header>
  <h1>전기장 시각화</h1>
  <p>Ch.22 전기장</p>
  <a href="index.html" class="back-btn">&larr; 시뮬레이션 목록</a>
</header>

<div class="sim-desc">
캔버스를 클릭하여 점전하(최대 5개)를 배치하고, 전기장 벡터(화살표 격자) 또는 전기력선 모드로 전기장을 시각화합니다.
각 전하가 만드는 전기장 E = kq/r²을 벡터 중첩하여 합산합니다. 탐침 모드에서는 임의 지점의 전기장 크기와 방향을 확인할 수 있습니다.
</div>

<div class="container">
  <div class="top-row">
    <div class="panel canvas-panel">
      <h2>전기장 캔버스</h2>
      <canvas id="mainCanvas" width="800" height="600"></canvas>
      <div class="legend">
        <span>약한 E</span>
        <div class="legend-bar"></div>
        <span>강한 E</span>
      </div>
    </div>

    <div class="panel controls-panel">
      <div class="ctrl-section">
        <h3>전하 선택</h3>
        <div class="charge-btns">
          <button class="pos selected" data-q="1" onclick="selectCharge(1,this)">+1q</button>
          <button class="pos" data-q="2" onclick="selectCharge(2,this)">+2q</button>
          <button class="neg" data-q="-1" onclick="selectCharge(-1,this)">−1q</button>
          <button class="neg" data-q="-2" onclick="selectCharge(-2,this)">−2q</button>
        </div>
      </div>

      <div class="ctrl-section">
        <h3>시각화 모드</h3>
        <div class="mode-btns">
          <button class="selected" id="btnVectors" onclick="setMode('vectors')">🔶 벡터 격자 (화살표)</button>
          <button id="btnLines" onclick="setMode('lines')">〰️ 전기력선</button>
          <button id="btnProbe" onclick="setMode('probe')">📍 탐침 모드</button>
        </div>
      </div>

      <div class="ctrl-section">
        <h3>동작</h3>
        <div class="action-btns">
          <button onclick="undoCharge()">↩ 마지막 전하 제거</button>
          <button onclick="clearAll()">🗑 모두 지우기</button>
        </div>
      </div>

      <div class="ctrl-section">
        <h3>배치된 전하</h3>
        <div class="charge-list" id="chargeList">
          <span style="color:#999;">전하가 없습니다. 캔버스를 클릭하세요.</span>
        </div>
      </div>

      <div class="probe-info" id="probeInfo">
        <div class="title">탐침 정보</div>
        <span style="color:#999;">탐침 모드에서 캔버스를 클릭하세요.</span>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');
  const K = 8.99e9; // Coulomb constant
  const Q_UNIT = 1e-6; // 1 microcoulomb base

  let charges = [];
  let selectedQ = 1;
  let mode = 'vectors'; // 'vectors', 'lines', 'probe'
  let probePos = null;
  let dpr = 1;

  // HiDPI setup
  function setupCanvas() {
    dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function getCanvasSize() {
    return { w: canvas.width / dpr, h: canvas.height / dpr };
  }

  // ===== Electric field calculation =====
  function electricField(x, y) {
    let Ex = 0, Ey = 0;
    for (const c of charges) {
      const dx = x - c.x;
      const dy = y - c.y;
      const r2 = dx * dx + dy * dy;
      const rMin2 = 100; // minimum distance squared to avoid singularity (10px)
      const r2c = Math.max(r2, rMin2);
      const r = Math.sqrt(r2c);
      const E = K * c.q * Q_UNIT / r2c;
      Ex += E * dx / r;
      Ey += E * dy / r;
    }
    return { x: Ex, y: Ey };
  }

  function eMagnitude(Ex, Ey) {
    return Math.sqrt(Ex * Ex + Ey * Ey);
  }

  // ===== Color mapping =====
  function magnitudeColor(mag) {
    // log scale mapping
    if (mag <= 0) return 'rgba(100,100,100,0.3)';
    const logMin = 2;
    const logMax = 8;
    let t = (Math.log10(mag + 1) - logMin) / (logMax - logMin);
    t = Math.max(0, Math.min(1, t));

    // Blue -> Cyan -> Yellow -> Red color ramp
    const colors = [
      [49, 54, 149],
      [69, 117, 180],
      [116, 173, 209],
      [171, 217, 233],
      [254, 224, 144],
      [253, 174, 97],
      [244, 109, 67],
      [215, 48, 39],
      [165, 0, 38]
    ];
    const idx = t * (colors.length - 1);
    const i = Math.floor(idx);
    const f = idx - i;
    const c0 = colors[Math.min(i, colors.length - 1)];
    const c1 = colors[Math.min(i + 1, colors.length - 1)];
    const r = Math.round(c0[0] + (c1[0] - c0[0]) * f);
    const g = Math.round(c0[1] + (c1[1] - c0[1]) * f);
    const b = Math.round(c0[2] + (c1[2] - c0[2]) * f);
    return `rgb(${r},${g},${b})`;
  }

  // ===== Drawing =====
  function drawCharges() {
    for (const c of charges) {
      const radius = 12 + Math.abs(c.q) * 3;
      ctx.beginPath();
      ctx.arc(c.x, c.y, radius, 0, Math.PI * 2);
      if (c.q > 0) {
        ctx.fillStyle = '#d32f2f';
      } else {
        ctx.fillStyle = '#1565c0';
      }
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Label
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const label = (c.q > 0 ? '+' : '') + c.q + 'q';
      ctx.fillText(label, c.x, c.y);
    }
  }

  function drawArrow(x, y, dx, dy, len, color) {
    const headLen = Math.min(len * 0.35, 5);
    const angle = Math.atan2(dy, dx);

    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + dx, y + dy);
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Arrowhead
    const tipX = x + dx;
    const tipY = y + dy;
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(tipX - headLen * Math.cos(angle - 0.4), tipY - headLen * Math.sin(angle - 0.4));
    ctx.lineTo(tipX - headLen * Math.cos(angle + 0.4), tipY - headLen * Math.sin(angle + 0.4));
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
  }

  function drawVectorField() {
    const { w, h } = getCanvasSize();
    const spacing = 30;
    const maxLen = spacing * 0.8;

    // Collect magnitudes to normalize
    const points = [];
    for (let gx = spacing; gx < w; gx += spacing) {
      for (let gy = spacing; gy < h; gy += spacing) {
        // Skip if too close to a charge
        let tooClose = false;
        for (const c of charges) {
          const dx = gx - c.x, dy = gy - c.y;
          if (dx * dx + dy * dy < 400) { tooClose = true; break; }
        }
        if (tooClose) continue;

        const E = electricField(gx, gy);
        const mag = eMagnitude(E.x, E.y);
        points.push({ x: gx, y: gy, Ex: E.x, Ey: E.y, mag });
      }
    }

    if (points.length === 0) return;

    // Use log scale for arrow lengths
    for (const p of points) {
      const logMag = Math.log10(p.mag + 1);
      const logMin = 2;
      const logMax = 8;
      let t = (logMag - logMin) / (logMax - logMin);
      t = Math.max(0.08, Math.min(1, t));
      const len = t * maxLen;
      const angle = Math.atan2(p.Ey, p.Ex);
      const dx = len * Math.cos(angle);
      const dy = len * Math.sin(angle);
      const color = magnitudeColor(p.mag);
      drawArrow(p.x - dx / 2, p.y - dy / 2, dx, dy, len, color);
    }
  }

  // ===== Field lines using RK4 =====
  function drawFieldLines() {
    const { w, h } = getCanvasSize();
    const linesPerQ = 12;

    // Trace from positive charges (or from negative if no positive exist)
    let sourceCharges = charges.filter(c => c.q > 0);
    let direction = 1;
    if (sourceCharges.length === 0) {
      sourceCharges = charges.filter(c => c.q < 0);
      direction = -1;
    }
    if (sourceCharges.length === 0) return;

    const hasNeg = charges.some(c => c.q < 0);
    const hasPos = charges.some(c => c.q > 0);

    for (const src of sourceCharges) {
      const nLines = linesPerQ * Math.abs(src.q);
      for (let i = 0; i < nLines; i++) {
        const angle = (2 * Math.PI * i) / nLines;
        const startR = 16 + Math.abs(src.q) * 3;
        const x0 = src.x + startR * Math.cos(angle);
        const y0 = src.y + startR * Math.sin(angle);
        traceFieldLine(x0, y0, direction, w, h);
      }
    }
  }

  function traceFieldLine(x0, y0, dir, w, h) {
    const maxSteps = 2000;
    const ds = 3; // base step size
    const margin = -5;

    const points = [{ x: x0, y: y0 }];
    let x = x0, y = y0;

    for (let step = 0; step < maxSteps; step++) {
      // RK4
      const E1 = electricField(x, y);
      const m1 = eMagnitude(E1.x, E1.y);
      if (m1 < 1e-2) break;
      const dx1 = dir * E1.x / m1, dy1 = dir * E1.y / m1;

      const E2 = electricField(x + ds * 0.5 * dx1, y + ds * 0.5 * dy1);
      const m2 = eMagnitude(E2.x, E2.y);
      if (m2 < 1e-2) break;
      const dx2 = dir * E2.x / m2, dy2 = dir * E2.y / m2;

      const E3 = electricField(x + ds * 0.5 * dx2, y + ds * 0.5 * dy2);
      const m3 = eMagnitude(E3.x, E3.y);
      if (m3 < 1e-2) break;
      const dx3 = dir * E3.x / m3, dy3 = dir * E3.y / m3;

      const E4 = electricField(x + ds * dx3, y + ds * dy3);
      const m4 = eMagnitude(E4.x, E4.y);
      if (m4 < 1e-2) break;
      const dx4 = dir * E4.x / m4, dy4 = dir * E4.y / m4;

      x += ds * (dx1 + 2 * dx2 + 2 * dx3 + dx4) / 6;
      y += ds * (dy1 + 2 * dy2 + 2 * dy3 + dy4) / 6;

      // Check bounds
      if (x < margin || x > w - margin || y < margin || y > h - margin) {
        points.push({ x, y });
        break;
      }

      // Check if we hit a charge (sink)
      let hitCharge = false;
      for (const c of charges) {
        const dx = x - c.x, dy = y - c.y;
        const hitR = 10 + Math.abs(c.q) * 3;
        if (dx * dx + dy * dy < hitR * hitR) {
          hitCharge = true;
          break;
        }
      }
      if (hitCharge) {
        points.push({ x, y });
        break;
      }

      points.push({ x, y });
    }

    // Draw the line
    if (points.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
      ctx.lineTo(points[i].x, points[i].y);
    }
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Draw arrowheads along the line
    const arrowInterval = 60;
    let dist = 0;
    for (let i = 1; i < points.length; i++) {
      const dx = points[i].x - points[i - 1].x;
      const dy = points[i].y - points[i - 1].y;
      const segLen = Math.sqrt(dx * dx + dy * dy);
      dist += segLen;
      if (dist > arrowInterval) {
        dist = 0;
        const angle = Math.atan2(dy, dx);
        const ax = points[i].x;
        const ay = points[i].y;
        const hl = 6;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(ax - hl * Math.cos(angle - 0.4), ay - hl * Math.sin(angle - 0.4));
        ctx.lineTo(ax - hl * Math.cos(angle + 0.4), ay - hl * Math.sin(angle + 0.4));
        ctx.closePath();
        ctx.fillStyle = '#1a1a2e';
        ctx.fill();
      }
    }
  }

  // ===== Probe =====
  function drawProbe() {
    if (!probePos) return;
    const E = electricField(probePos.x, probePos.y);
    const mag = eMagnitude(E.x, E.y);

    // Draw crosshair
    ctx.beginPath();
    ctx.arc(probePos.x, probePos.y, 6, 0, Math.PI * 2);
    ctx.strokeStyle = '#e94560';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Draw E vector
    if (mag > 1) {
      const logMag = Math.log10(mag + 1);
      const logMin = 2;
      const logMax = 8;
      let t = (logMag - logMin) / (logMax - logMin);
      t = Math.max(0.1, Math.min(1, t));
      const arrowLen = t * 80;
      const angle = Math.atan2(E.y, E.x);
      const dx = arrowLen * Math.cos(angle);
      const dy = arrowLen * Math.sin(angle);
      drawArrow(probePos.x, probePos.y, dx, dy, arrowLen, '#e94560');
    }

    // Update info panel
    const angle = Math.atan2(E.y, E.x) * 180 / Math.PI;
    const info = document.getElementById('probeInfo');
    info.innerHTML = `
      <div class="title">탐침 정보</div>
      <div>위치: (${probePos.x.toFixed(0)}, ${probePos.y.toFixed(0)}) px</div>
      <div>|E| = ${formatSci(mag)} N/C</div>
      <div>방향: ${angle.toFixed(1)}°</div>
      <div>Ex = ${formatSci(E.x)} N/C</div>
      <div>Ey = ${formatSci(E.y)} N/C</div>
    `;
  }

  function formatSci(val) {
    if (Math.abs(val) < 0.01) return '0';
    const exp = Math.floor(Math.log10(Math.abs(val)));
    const mantissa = val / Math.pow(10, exp);
    if (exp === 0) return val.toFixed(2);
    return mantissa.toFixed(2) + ' × 10<sup>' + exp + '</sup>';
  }

  // ===== Main render =====
  function render() {
    const { w, h } = getCanvasSize();
    ctx.clearRect(0, 0, w, h);

    if (charges.length === 0) {
      ctx.fillStyle = '#aaa';
      ctx.font = '16px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('캔버스를 클릭하여 전하를 배치하세요 (최대 5개)', w / 2, h / 2);
      return;
    }

    if (mode === 'vectors') {
      drawVectorField();
    } else if (mode === 'lines') {
      drawFieldLines();
    }
    // In probe mode, draw whichever viz was last, or vectors by default
    if (mode === 'probe') {
      drawVectorField();
      drawProbe();
    }

    drawCharges();
  }

  // ===== Charge list UI =====
  function updateChargeList() {
    const el = document.getElementById('chargeList');
    if (charges.length === 0) {
      el.innerHTML = '<span style="color:#999;">전하가 없습니다. 캔버스를 클릭하세요.</span>';
      return;
    }
    el.innerHTML = charges.map((c, i) => {
      const color = c.q > 0 ? '#d32f2f' : '#1565c0';
      const label = (c.q > 0 ? '+' : '') + c.q + 'q';
      return `<div class="item"><span class="dot" style="background:${color}"></span> #${i + 1}: ${label} (${c.x.toFixed(0)}, ${c.y.toFixed(0)})</div>`;
    }).join('');
  }

  // ===== Event handlers =====
  window.selectCharge = function(q, btn) {
    selectedQ = q;
    document.querySelectorAll('.charge-btns button').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  };

  window.setMode = function(m) {
    mode = m;
    document.getElementById('btnVectors').classList.toggle('selected', m === 'vectors');
    document.getElementById('btnLines').classList.toggle('selected', m === 'lines');
    document.getElementById('btnProbe').classList.toggle('selected', m === 'probe');
    render();
  };

  window.undoCharge = function() {
    if (charges.length > 0) {
      charges.pop();
      updateChargeList();
      probePos = null;
      render();
    }
  };

  window.clearAll = function() {
    charges = [];
    probePos = null;
    updateChargeList();
    document.getElementById('probeInfo').innerHTML = '<div class="title">탐침 정보</div><span style="color:#999;">탐침 모드에서 캔버스를 클릭하세요.</span>';
    render();
  };

  canvas.addEventListener('click', function(e) {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    if (mode === 'probe') {
      probePos = { x, y };
      render();
      return;
    }

    // Place charge mode
    if (charges.length >= 5) {
      alert('최대 5개의 전하만 배치할 수 있습니다.');
      return;
    }

    // Check not too close to existing charge
    for (const c of charges) {
      const dx = x - c.x, dy = y - c.y;
      if (dx * dx + dy * dy < 900) {
        alert('기존 전하와 너무 가까워 배치할 수 없습니다.');
        return;
      }
    }

    charges.push({ x, y, q: selectedQ });
    updateChargeList();
    render();
  });

  // Mouse move for probe hover
  canvas.addEventListener('mousemove', function(e) {
    if (mode !== 'probe' || charges.length === 0) return;
    const rect = canvas.getBoundingClientRect();
    probePos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    render();
  });

  // ===== Init =====
  function init() {
    setupCanvas();
    render();

    window.addEventListener('resize', function() {
      setupCanvas();
      render();
    });
  }

  init();
})();
</script>
</body>
</html>
