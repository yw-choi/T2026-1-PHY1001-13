<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>평행판 축전기 시뮬레이터</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f0f2f5;
  color: #333;
  min-height: 100vh;
}
header {
  background: #1a1a2e;
  color: #fff;
  text-align: center;
  padding: 18px 20px;
  position: relative;
}
.back-btn { position: absolute; top: 14px; left: 16px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.85rem; padding: 4px 12px; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; transition: all 0.2s; }
.back-btn:hover { color: #fff; border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.1); }
header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: 1px; }
header p { font-size: 0.85rem; color: #aab; margin-top: 4px; }
.container {
  max-width: 1100px;
  margin: 20px auto;
  padding: 0 16px;
}
.desc-box {
  background: #e8f0fe;
  border-left: 4px solid #4285f4;
  border-radius: 8px;
  padding: 14px 18px;
  margin-bottom: 20px;
  font-size: 0.92rem;
  line-height: 1.6;
  color: #1a3a5c;
}
.main-area {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}
canvas {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  display: block;
}
.side-panel {
  display: flex;
  flex-direction: column;
  gap: 16px;
  flex: 1;
  min-width: 280px;
  max-width: 360px;
}
.card {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  padding: 18px;
}
.card h3 {
  font-size: 1rem;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 2px solid #e0e0e0;
}
.info-row {
  display: flex;
  justify-content: space-between;
  padding: 5px 0;
  font-size: 0.9rem;
}
.info-row .label { color: #666; }
.info-row .value { font-weight: 600; font-family: 'Courier New', monospace; }
.controls {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  padding: 20px;
  margin-top: 20px;
}
.controls h3 {
  font-size: 1rem;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 2px solid #e0e0e0;
}
.slider-group {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.slider-item {
  flex: 1;
  min-width: 180px;
}
.slider-item label {
  display: block;
  font-weight: 600;
  margin-bottom: 4px;
  font-size: 0.9rem;
}
.slider-item input[type=range] {
  width: 100%;
  cursor: pointer;
}
.slider-value {
  text-align: center;
  font-weight: 700;
  font-size: 1rem;
  margin-top: 2px;
}
.toggle-group {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  margin-top: 12px;
  align-items: center;
}
.toggle-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.9rem;
  font-weight: 600;
}
.toggle-switch {
  position: relative;
  width: 48px;
  height: 26px;
  cursor: pointer;
}
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #ccc;
  border-radius: 26px;
  transition: 0.3s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  left: 3px; bottom: 3px;
  background: #fff;
  border-radius: 50%;
  transition: 0.3s;
}
.toggle-switch input:checked + .toggle-slider { background: #4285f4; }
.toggle-switch input:checked + .toggle-slider::before { transform: translateX(22px); }
.mode-indicator {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.8rem;
  font-weight: 700;
  margin-left: 6px;
}
.mode-connected { background: #d4edda; color: #155724; }
.mode-disconnected { background: #f8d7da; color: #721c24; }
.bar-chart {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  height: 100px;
  margin-top: 8px;
  padding: 0 4px;
}
.bar-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.bar {
  width: 100%;
  max-width: 40px;
  border-radius: 4px 4px 0 0;
  transition: height 0.3s;
  min-height: 2px;
}
.bar-label {
  font-size: 0.7rem;
  font-weight: 600;
  margin-top: 4px;
  color: #555;
}
.bar-value {
  font-size: 0.65rem;
  font-weight: 700;
  margin-bottom: 2px;
  color: #333;
  white-space: nowrap;
}
@media (max-width: 700px) {
  .main-area { flex-direction: column; align-items: center; }
  .side-panel { max-width: 100%; }
  canvas { width: 100% !important; height: auto !important; }
}
</style>

<body>
<header>
  <a href="index.html" class="back-btn">&larr; 시뮬레이션 목록</a>
  <h1>평행판 축전기</h1>
  <p>Ch.25 축전기</p>
</header>
<div class="container">
  <div class="desc-box">
    평행판 축전기의 전기용량 C = κε₀A/d 를 시뮬레이션합니다.
    판 면적 A, 판 간격 d, 전압 V를 조절하고, 전지 연결/분리 모드와 유전체 삽입 효과를 관찰해 보세요.
    전지 연결 시 V가 일정하고, 분리 시 q가 일정합니다.
  </div>
  <div class="main-area">
    <canvas id="simCanvas" width="560" height="480"></canvas>
    <div class="side-panel">
      <div class="card">
        <h3>물리량 대시보드</h3>
        <div class="info-row"><span class="label">전기용량 C</span><span class="value" id="valC">-</span></div>
        <div class="info-row"><span class="label">전하 q</span><span class="value" id="valQ">-</span></div>
        <div class="info-row"><span class="label">전압 V</span><span class="value" id="valV">-</span></div>
        <div class="info-row"><span class="label">전기장 E</span><span class="value" id="valE">-</span></div>
        <div class="info-row"><span class="label">에너지 U</span><span class="value" id="valU">-</span></div>
      </div>
      <div class="card">
        <h3>에너지 바 차트</h3>
        <div class="bar-chart" id="barChart">
          <div class="bar-col"><span class="bar-value" id="bvC"></span><div class="bar" id="barC" style="background:#4285f4;height:10px;"></div><span class="bar-label">C</span></div>
          <div class="bar-col"><span class="bar-value" id="bvQ"></span><div class="bar" id="barQ" style="background:#34a853;height:10px;"></div><span class="bar-label">q</span></div>
          <div class="bar-col"><span class="bar-value" id="bvV"></span><div class="bar" id="barV" style="background:#fbbc04;height:10px;"></div><span class="bar-label">V</span></div>
          <div class="bar-col"><span class="bar-value" id="bvE"></span><div class="bar" id="barE" style="background:#ea4335;height:10px;"></div><span class="bar-label">E</span></div>
          <div class="bar-col"><span class="bar-value" id="bvU"></span><div class="bar" id="barU" style="background:#9c27b0;height:10px;"></div><span class="bar-label">U</span></div>
        </div>
      </div>
    </div>
  </div>
  <div class="controls">
    <h3>제어 패널</h3>
    <div class="slider-group">
      <div class="slider-item">
        <label>판 면적 A (cm²)</label>
        <input type="range" id="sliderA" min="50" max="500" value="200" step="10">
        <div class="slider-value" id="dispA">200</div>
      </div>
      <div class="slider-item">
        <label>판 간격 d (mm)</label>
        <input type="range" id="sliderD" min="1" max="20" value="5" step="0.5">
        <div class="slider-value" id="dispD">5.0</div>
      </div>
      <div class="slider-item">
        <label>전압 V (V)</label>
        <input type="range" id="sliderV" min="1" max="100" value="50" step="1">
        <div class="slider-value" id="dispV">50</div>
      </div>
      <div class="slider-item">
        <label>유전상수 κ</label>
        <input type="range" id="sliderK" min="1" max="10" value="1" step="0.1" disabled>
        <div class="slider-value" id="dispK">1.0</div>
      </div>
    </div>
    <div class="toggle-group">
      <div class="toggle-item">
        <label class="toggle-switch">
          <input type="checkbox" id="toggleBattery" checked>
          <span class="toggle-slider"></span>
        </label>
        <span>전지 연결</span>
        <span class="mode-indicator mode-connected" id="modeLabel">V 일정</span>
      </div>
      <div class="toggle-item">
        <label class="toggle-switch">
          <input type="checkbox" id="toggleDielectric">
          <span class="toggle-slider"></span>
        </label>
        <span>유전체 삽입</span>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('simCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const sliderA = document.getElementById('sliderA');
  const sliderD = document.getElementById('sliderD');
  const sliderV = document.getElementById('sliderV');
  const sliderK = document.getElementById('sliderK');
  const toggleBattery = document.getElementById('toggleBattery');
  const toggleDielectric = document.getElementById('toggleDielectric');

  const eps0 = 8.854e-12;

  // State
  let A_cm2 = 200, d_mm = 5, V_set = 50, kappa = 1;
  let batteryConnected = true;
  let dielectricInserted = false;
  let q_fixed = null; // charge when battery disconnected
  let dielectricSlideT = 0; // animation 0→1

  // Reference values for bar chart normalization
  const refC = eps0 * 500e-4 / 1e-3 * 10; // max possible C
  const refQ = refC * 100;
  const refV = 100;
  const refE = 100 / 1e-3;
  const refU = 0.5 * refC * 100 * 100;

  function getPhysics() {
    const A = A_cm2 * 1e-4; // m²
    const d = d_mm * 1e-3;  // m
    const k = dielectricInserted ? kappa : 1;
    const C = k * eps0 * A / d;

    let V, q;
    if (batteryConnected) {
      V = V_set;
      q = C * V;
    } else {
      q = q_fixed !== null ? q_fixed : C * V_set;
      V = q / C;
    }

    const E = V / d;
    const U = 0.5 * C * V * V;
    return { C, q, V, E, U, A, d, k };
  }

  function formatSI(val, unit) {
    if (Math.abs(val) >= 1) return val.toFixed(2) + ' ' + unit;
    if (Math.abs(val) >= 1e-3) return (val * 1e3).toFixed(2) + ' m' + unit;
    if (Math.abs(val) >= 1e-6) return (val * 1e6).toFixed(2) + ' μ' + unit;
    if (Math.abs(val) >= 1e-9) return (val * 1e9).toFixed(2) + ' n' + unit;
    return (val * 1e12).toFixed(2) + ' p' + unit;
  }

  function updateDashboard(p) {
    document.getElementById('valC').textContent = formatSI(p.C, 'F');
    document.getElementById('valQ').textContent = formatSI(p.q, 'C');
    document.getElementById('valV').textContent = p.V.toFixed(2) + ' V';
    document.getElementById('valE').textContent = (p.E / 1e3).toFixed(2) + ' kV/m';
    document.getElementById('valU').textContent = formatSI(p.U, 'J');

    // Bar chart
    const bars = [
      { id: 'barC', vid: 'bvC', val: p.C, ref: refC, fmt: formatSI(p.C, 'F') },
      { id: 'barQ', vid: 'bvQ', val: p.q, ref: refQ, fmt: formatSI(p.q, 'C') },
      { id: 'barV', vid: 'bvV', val: p.V, ref: refV, fmt: p.V.toFixed(1) + 'V' },
      { id: 'barE', vid: 'bvE', val: p.E, ref: refE, fmt: (p.E/1e3).toFixed(1) + 'kV/m' },
      { id: 'barU', vid: 'bvU', val: p.U, ref: refU, fmt: formatSI(p.U, 'J') },
    ];
    bars.forEach(b => {
      const h = Math.max(2, Math.min(90, (b.val / b.ref) * 90));
      document.getElementById(b.id).style.height = h + 'px';
      document.getElementById(b.vid).textContent = b.fmt;
    });
  }

  function updateSliderDisplays() {
    document.getElementById('dispA').textContent = A_cm2;
    document.getElementById('dispD').textContent = parseFloat(d_mm).toFixed(1);
    document.getElementById('dispV').textContent = V_set;
    document.getElementById('dispK').textContent = kappa.toFixed(1);
  }

  function drawBattery(cx, cy, connected) {
    // Draw battery symbol
    const bw = 30, bh = 50;
    ctx.save();
    ctx.lineWidth = 2;
    ctx.strokeStyle = connected ? '#333' : '#aaa';
    ctx.fillStyle = connected ? '#333' : '#aaa';

    // Long line (positive)
    ctx.beginPath();
    ctx.moveTo(cx - 12, cy - 12);
    ctx.lineTo(cx + 12, cy - 12);
    ctx.stroke();
    // Short line (negative)
    ctx.beginPath();
    ctx.moveTo(cx - 7, cy - 4);
    ctx.lineTo(cx + 7, cy - 4);
    ctx.stroke();
    // Long line
    ctx.beginPath();
    ctx.moveTo(cx - 12, cy + 4);
    ctx.lineTo(cx + 12, cy + 4);
    ctx.stroke();
    // Short line
    ctx.beginPath();
    ctx.moveTo(cx - 7, cy + 12);
    ctx.lineTo(cx + 7, cy + 12);
    ctx.stroke();

    // + and - labels
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('+', cx + 20, cy - 8);
    ctx.fillText('−', cx + 20, cy + 14);

    ctx.restore();
  }

  function drawWires(p, battX, battY, topPlateY, botPlateY, plateLeft, plateRight) {
    ctx.save();
    const connected = batteryConnected;
    ctx.strokeStyle = connected ? '#333' : '#aaa';
    ctx.lineWidth = 2.5;

    // Wire from battery top to top plate
    ctx.beginPath();
    ctx.moveTo(battX, battY - 14);
    ctx.lineTo(battX, topPlateY);
    ctx.lineTo(plateLeft, topPlateY);
    ctx.stroke();

    // Wire from battery bottom to bottom plate
    ctx.beginPath();
    ctx.moveTo(battX, battY + 14);
    ctx.lineTo(battX, botPlateY);
    ctx.lineTo(plateLeft, botPlateY);
    ctx.stroke();

    // If disconnected, draw break
    if (!connected) {
      const breakY1 = battY - 14 - 15;
      const breakY2 = breakY1 - 12;
      ctx.save();
      ctx.strokeStyle = '#f0f2f5';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(battX, breakY2 - 2);
      ctx.lineTo(battX, breakY1 + 2);
      ctx.stroke();
      ctx.restore();

      // Draw switch open
      ctx.strokeStyle = '#ea4335';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(battX, breakY1 + 2);
      ctx.lineTo(battX + 10, breakY2 - 2);
      ctx.stroke();
      // dots at break
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(battX, breakY1 + 2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(battX, breakY2 - 2, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const p = getPhysics();

    // Layout
    const plateWidth = 60 + (A_cm2 - 50) / 450 * 200; // 60..260 px
    const plateThick = 12;
    const gap = 30 + (d_mm - 1) / 19 * 150; // 30..180 px
    const centerX = W / 2 + 40;
    const centerY = H / 2;
    const topPlateY = centerY - gap / 2;
    const botPlateY = centerY + gap / 2;
    const plateLeft = centerX - plateWidth / 2;
    const plateRight = centerX + plateWidth / 2;

    // Battery position
    const battX = plateLeft - 60;
    const battY = centerY;

    // Draw wires
    drawWires(p, battX, battY, topPlateY, botPlateY, plateLeft, plateRight);

    // Draw battery
    drawBattery(battX, battY, batteryConnected);

    // Draw plates
    // Top plate (positive)
    ctx.fillStyle = '#b0b0b0';
    ctx.fillRect(plateLeft, topPlateY - plateThick, plateWidth, plateThick);
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1;
    ctx.strokeRect(plateLeft, topPlateY - plateThick, plateWidth, plateThick);

    // Bottom plate (negative)
    ctx.fillRect(plateLeft, botPlateY, plateWidth, plateThick);
    ctx.strokeRect(plateLeft, botPlateY, plateWidth, plateThick);

    // Draw dielectric slab if inserted
    if (dielectricInserted || dielectricSlideT > 0) {
      const slabW = plateWidth - 8;
      const slabH = gap - 4;
      const slideOffset = dielectricSlideT * (plateWidth + 40);
      const slabX = plateRight + 40 - slideOffset;
      const slabY = topPlateY + 2;

      ctx.save();
      ctx.beginPath();
      ctx.rect(plateLeft + 2, topPlateY, plateWidth - 4, gap);
      ctx.clip();

      ctx.fillStyle = 'rgba(255, 165, 0, 0.35)';
      ctx.fillRect(slabX, slabY, slabW, slabH);
      ctx.strokeStyle = '#e67e22';
      ctx.lineWidth = 2;
      ctx.strokeRect(slabX, slabY, slabW, slabH);

      // κ label on dielectric
      ctx.fillStyle = '#c0392b';
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      if (slabX < plateRight && slabX + slabW > plateLeft) {
        const labelX = Math.max(plateLeft + 20, Math.min(plateRight - 20, slabX + slabW / 2));
        ctx.fillText('κ = ' + kappa.toFixed(1), labelX, centerY);
      }

      // Induced charges on dielectric surfaces (polarization)
      if (dielectricSlideT > 0.5 && kappa > 1) {
        const nInduced = Math.min(12, Math.floor((kappa - 1) * 2));
        const visSlabLeft = Math.max(slabX, plateLeft + 4);
        const visSlabRight = Math.min(slabX + slabW, plateRight - 4);
        if (visSlabRight > visSlabLeft) {
          ctx.font = 'bold 10px sans-serif';
          ctx.textBaseline = 'middle';
          for (let i = 0; i < nInduced; i++) {
            const fx = visSlabLeft + (i + 0.5) / nInduced * (visSlabRight - visSlabLeft);
            // Negative induced charges near top (near positive plate)
            ctx.fillStyle = '#2196f3';
            ctx.textAlign = 'center';
            ctx.fillText('−', fx, slabY + 8);
            // Positive induced charges near bottom (near negative plate)
            ctx.fillStyle = '#e53935';
            ctx.fillText('+', fx, slabY + slabH - 8);
          }
        }
      }

      ctx.restore();
    }

    // Draw charges on plates
    const maxCharges = 16;
    const chargeCount = Math.max(1, Math.min(maxCharges, Math.round(p.q / (refQ * 0.05))));
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    for (let i = 0; i < chargeCount; i++) {
      const fx = plateLeft + (i + 0.5) / chargeCount * plateWidth;
      // Positive charges on bottom of top plate
      ctx.fillStyle = '#e53935';
      ctx.fillText('+', fx, topPlateY - 3);
      // Negative charges on top of bottom plate
      ctx.fillStyle = '#2196f3';
      ctx.fillText('−', fx, botPlateY + 9);
    }

    // Draw E-field arrows between plates
    if (gap > 40) {
      const nArrowCols = Math.max(3, Math.min(10, Math.round(plateWidth / 35)));
      const arrowDensity = Math.max(1, Math.min(4, Math.round(p.E / (refE * 0.15))));
      const arrowLen = Math.min(gap * 0.7, 20 + p.E / refE * 40);

      ctx.strokeStyle = '#e53935';
      ctx.fillStyle = '#e53935';
      ctx.lineWidth = 1.5;

      for (let col = 0; col < nArrowCols; col++) {
        const ax = plateLeft + (col + 0.5) / nArrowCols * plateWidth;
        for (let row = 0; row < arrowDensity; row++) {
          const ay = topPlateY + (row + 0.5) / arrowDensity * gap;
          const halfLen = Math.min(arrowLen / 2, gap / arrowDensity * 0.4);

          // Arrow pointing down (E from + to -)
          ctx.beginPath();
          ctx.moveTo(ax, ay - halfLen);
          ctx.lineTo(ax, ay + halfLen);
          ctx.stroke();
          // Arrowhead
          ctx.beginPath();
          ctx.moveTo(ax, ay + halfLen);
          ctx.lineTo(ax - 3, ay + halfLen - 6);
          ctx.lineTo(ax + 3, ay + halfLen - 6);
          ctx.closePath();
          ctx.fill();
        }
      }
    }

    // Labels
    ctx.fillStyle = '#333';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';

    // d label with dimension line
    const dimX = plateRight + 15;
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(dimX, topPlateY);
    ctx.lineTo(dimX, botPlateY);
    ctx.stroke();
    // top tick
    ctx.beginPath();
    ctx.moveTo(dimX - 4, topPlateY);
    ctx.lineTo(dimX + 4, topPlateY);
    ctx.stroke();
    // bottom tick
    ctx.beginPath();
    ctx.moveTo(dimX - 4, botPlateY);
    ctx.lineTo(dimX + 4, botPlateY);
    ctx.stroke();
    ctx.fillText('d', dimX + 6, centerY - 7);

    // A label
    ctx.textAlign = 'center';
    ctx.fillText('← A →', centerX, topPlateY - plateThick - 18);

    // Plate labels
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillStyle = '#e53935';
    ctx.fillText('+Q', plateRight + 40, topPlateY - plateThick / 2 - 6);
    ctx.fillStyle = '#2196f3';
    ctx.fillText('−Q', plateRight + 40, botPlateY + plateThick / 2 - 6);

    // Mode label on canvas
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = batteryConnected ? '#155724' : '#721c24';
    const modeText = batteryConnected ? '전지 연결: V 일정' : '전지 분리: q 일정';
    ctx.fillText(modeText, 14, H - 20);

    // Formula
    ctx.fillStyle = '#555';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('C = κε₀A/d', W - 14, H - 20);

    updateDashboard(p);
  }

  function onSliderChange() {
    const oldP = getPhysics();
    A_cm2 = parseFloat(sliderA.value);
    d_mm = parseFloat(sliderD.value);
    kappa = parseFloat(sliderK.value);

    if (batteryConnected) {
      V_set = parseFloat(sliderV.value);
    } else {
      // q is fixed; V slider is disabled
    }

    updateSliderDisplays();
    draw();
  }

  function onBatteryToggle() {
    batteryConnected = toggleBattery.checked;
    const p = getPhysics();

    if (!batteryConnected) {
      // Disconnecting: fix charge
      q_fixed = p.q;
      sliderV.disabled = true;
      sliderV.style.opacity = '0.4';
      document.getElementById('modeLabel').className = 'mode-indicator mode-disconnected';
      document.getElementById('modeLabel').textContent = 'q 일정';
    } else {
      // Reconnecting: voltage returns to slider value
      q_fixed = null;
      V_set = parseFloat(sliderV.value);
      sliderV.disabled = false;
      sliderV.style.opacity = '1';
      document.getElementById('modeLabel').className = 'mode-indicator mode-connected';
      document.getElementById('modeLabel').textContent = 'V 일정';
    }
    draw();
  }

  function onDielectricToggle() {
    dielectricInserted = toggleDielectric.checked;
    sliderK.disabled = !dielectricInserted;
    sliderK.style.opacity = dielectricInserted ? '1' : '0.4';

    if (!dielectricInserted) {
      kappa = 1;
      sliderK.value = 1;
      document.getElementById('dispK').textContent = '1.0';
    }

    // Animate slide
    animateDielectric(dielectricInserted ? 1 : 0);
  }

  let animFrame = null;
  let lastAnimTime = null;
  const ANIM_SPEED = 1.0; // full slide in ~1 second
  function animateDielectric(target) {
    if (animFrame) cancelAnimationFrame(animFrame);
    lastAnimTime = null;
    const dir = target > dielectricSlideT ? 1 : -1;
    function tick(timestamp) {
      if (lastAnimTime === null) lastAnimTime = timestamp;
      const dt = (timestamp - lastAnimTime) / 1000;
      lastAnimTime = timestamp;
      dielectricSlideT += dir * ANIM_SPEED * dt;
      if ((dir > 0 && dielectricSlideT >= target) || (dir < 0 && dielectricSlideT <= target)) {
        dielectricSlideT = target;
        draw();
        return;
      }
      draw();
      animFrame = requestAnimationFrame(tick);
    }
    animFrame = requestAnimationFrame(tick);
  }

  // Event listeners
  sliderA.addEventListener('input', onSliderChange);
  sliderD.addEventListener('input', onSliderChange);
  sliderV.addEventListener('input', onSliderChange);
  sliderK.addEventListener('input', onSliderChange);
  toggleBattery.addEventListener('change', onBatteryToggle);
  toggleDielectric.addEventListener('change', onDielectricToggle);

  // Init
  sliderK.style.opacity = '0.4';
  updateSliderDisplays();
  draw();
})();
</script>
</body>
</html>
