<style>

<body>
<header>
  <h1>옴의 법칙과 비저항</h1>
  <p>Ch.26 전류와 저항</p>
  <a href="index.html" class="back-btn">&larr; 시뮬레이션 목록</a>
</header>
<div class="sim-desc">옴의 법칙 V = iR과 저항 공식 R = ρL/A를 시뮬레이션합니다. 배터리 기전력, 도선 길이, 단면적, 재질을 바꿔가며 전류·전류밀도·드리프트 속도의 변화를 관찰하세요. 양전하 캐리어의 이동 속도가 드리프트 속도에 비례하여 표시됩니다. V-I 그래프에서 옴의 법칙의 선형 관계를 확인할 수 있습니다.</div>

<div class="container">
  <!-- Info Bar -->
  <div class="info-bar" style="margin-top: 16px;">
    <div class="info-item">
      <div class="label">저항 R</div>
      <div class="value"><span id="val-R">0</span><span class="unit"> Ω</span></div>
    </div>
    <div class="info-item">
      <div class="label">전류 i</div>
      <div class="value"><span id="val-I">0</span><span class="unit"> A</span></div>
    </div>
    <div class="info-item">
      <div class="label">전류밀도 J</div>
      <div class="value"><span id="val-J">0</span><span class="unit"> A/m²</span></div>
    </div>
    <div class="info-item">
      <div class="label">드리프트 속도 v<sub>d</sub></div>
      <div class="value"><span id="val-vd">0</span><span class="unit"> m/s</span></div>
    </div>
  </div>

  <!-- Main Display -->
  <div class="main-display">
    <div class="canvas-panel">
      <canvas id="circuitCanvas" width="540" height="360"></canvas>
    </div>
    <div class="graph-panel">
      <div class="graph-label">V-I 그래프 (옴의 법칙)</div>
      <canvas id="graphCanvas" width="276" height="300"></canvas>
      <div class="graph-buttons">
        <button class="btn-clear-graph" id="btnClearGraph">그래프 초기화</button>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="control-row">
      <div class="control-group">
        <label>배터리 기전력 (EMF): <span id="lbl-V">10</span> V</label>
        <input type="range" id="slider-V" min="1" max="20" step="0.5" value="10">
      </div>
      <div class="control-group">
        <label>도선 길이 L: <span id="lbl-L">2.0</span> m</label>
        <input type="range" id="slider-L" min="0.5" max="5" step="0.1" value="2.0">
      </div>
    </div>
    <div class="control-row">
      <div class="control-group">
        <label>도선 반지름 r: <span id="lbl-r">1.0</span> mm</label>
        <input type="range" id="slider-r" min="0.2" max="3.0" step="0.1" value="1.0">
      </div>
      <div class="control-group">
        <label>재질 선택</label>
        <select id="select-material">
          <option value="cu" selected>구리 (Cu, ρ = 1.69×10⁻⁸ Ω·m)</option>
          <option value="al">알루미늄 (Al, ρ = 2.75×10⁻⁸ Ω·m)</option>
          <option value="fe">철 (Fe, ρ = 1.0×10⁻⁷ Ω·m)</option>
          <option value="ni">니크롬 (Nichrome, ρ = 1.1×10⁻⁶ Ω·m)</option>
        </select>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // --- Material data ---
  const materials = {
    cu: { name: '구리', rho: 1.69e-8, n: 8.49e28, color: '#b87333' },
    al: { name: '알루미늄', rho: 2.75e-8, n: 6.02e28, color: '#a8a9ad' },
    fe: { name: '철', rho: 1.0e-7, n: 8.49e28, color: '#6e6e6e' },
    ni: { name: '니크롬', rho: 1.1e-6, n: 7.94e28, color: '#7a6a5a' }
  };
  const e_charge = 1.602e-19;

  // --- DOM elements ---
  const sliderV = document.getElementById('slider-V');
  const sliderL = document.getElementById('slider-L');
  const sliderR = document.getElementById('slider-r');
  const selectMat = document.getElementById('select-material');
  const lblV = document.getElementById('lbl-V');
  const lblL = document.getElementById('lbl-L');
  const lblr = document.getElementById('lbl-r');
  const valR = document.getElementById('val-R');
  const valI = document.getElementById('val-I');
  const valJ = document.getElementById('val-J');
  const valVd = document.getElementById('val-vd');
  const btnClear = document.getElementById('btnClearGraph');

  const circuitCanvas = document.getElementById('circuitCanvas');
  const ctx = circuitCanvas.getContext('2d');
  const graphCanvas = document.getElementById('graphCanvas');
  const gctx = graphCanvas.getContext('2d');

  // --- State ---
  let charges = [];
  const NUM_CHARGES = 28;
  let dataPoints = [];
  let animId = null;
  let lastTime = 0;

  // Circuit layout constants (in canvas coords)
  const CW = 540, CH = 360;
  const margin = 50;
  // Circuit rectangle
  const cx1 = margin, cy1 = margin + 20;
  const cx2 = CW - margin, cy2 = CH - margin;
  // Path segments: top (right), right (down), bottom (left), left (up)
  // Charges move clockwise: conventional current from + terminal
  // Battery on the left side, wire/resistor on right and top/bottom

  // Path: array of segments [{x1,y1,x2,y2,len}]
  function buildPath() {
    const segs = [
      { x1: cx1, y1: cy1, x2: cx2, y2: cy1 },   // top: left to right
      { x1: cx2, y1: cy1, x2: cx2, y2: cy2 },    // right: top to bottom
      { x1: cx2, y1: cy2, x2: cx1, y2: cy2 },    // bottom: right to left
      { x1: cx1, y1: cy2, x2: cx1, y2: cy1 }     // left: bottom to top (battery)
    ];
    let totalLen = 0;
    segs.forEach(s => {
      s.len = Math.hypot(s.x2 - s.x1, s.y2 - s.y1);
      s.start = totalLen;
      totalLen += s.len;
    });
    return { segs, totalLen };
  }

  const path = buildPath();

  function posOnPath(dist) {
    let d = ((dist % path.totalLen) + path.totalLen) % path.totalLen;
    for (const s of path.segs) {
      if (d <= s.len) {
        const t = d / s.len;
        return { x: s.x1 + (s.x2 - s.x1) * t, y: s.y1 + (s.y2 - s.y1) * t };
      }
      d -= s.len;
    }
    return { x: path.segs[0].x1, y: path.segs[0].y1 };
  }

  function initCharges() {
    charges = [];
    for (let i = 0; i < NUM_CHARGES; i++) {
      charges.push({ dist: (i / NUM_CHARGES) * path.totalLen });
    }
  }

  function getParams() {
    const V = parseFloat(sliderV.value);
    const L = parseFloat(sliderL.value);
    const r_mm = parseFloat(sliderR.value);
    const r_m = r_mm * 1e-3;
    const A = Math.PI * r_m * r_m;
    const mat = materials[selectMat.value];
    const rho = mat.rho;
    const n = mat.n;
    const R = rho * L / A;
    const I = V / R;
    const J = I / A;
    const vd = J / (n * e_charge);
    return { V, L, r_mm, r_m, A, rho, n, R, I, J, vd, mat };
  }

  function formatSI(val) {
    const abs = Math.abs(val);
    if (abs === 0) return '0';
    if (abs >= 1e6) return (val / 1e6).toFixed(2) + '×10⁶';
    if (abs >= 1e3) return (val / 1e3).toFixed(2) + '×10³';
    if (abs >= 1) return val.toFixed(3);
    if (abs >= 1e-3) return (val * 1e3).toFixed(2) + '×10⁻³';
    if (abs >= 1e-6) return (val * 1e6).toFixed(2) + '×10⁻⁶';
    if (abs >= 1e-9) return (val * 1e9).toFixed(2) + '×10⁻⁹';
    return val.toExponential(2);
  }

  function updateDisplay() {
    const p = getParams();
    lblV.textContent = p.V.toFixed(1);
    lblL.textContent = p.L.toFixed(1);
    lblr.textContent = p.r_mm.toFixed(1);

    valR.textContent = formatSI(p.R);
    valI.textContent = formatSI(p.I);
    valJ.textContent = formatSI(p.J);
    valVd.textContent = formatSI(p.vd);
  }

  // --- Circuit Drawing ---
  function drawCircuit(p) {
    ctx.clearRect(0, 0, CW, CH);

    const wireWidth = Math.max(3, Math.min(14, p.r_mm * 5));
    const wireColor = p.mat.color;

    // Draw wire segments (top, right, bottom)
    ctx.strokeStyle = wireColor;
    ctx.lineWidth = wireWidth;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Top wire
    ctx.beginPath();
    ctx.moveTo(cx1, cy1);
    ctx.lineTo(cx2, cy1);
    ctx.stroke();

    // Right wire
    ctx.beginPath();
    ctx.moveTo(cx2, cy1);
    ctx.lineTo(cx2, cy2);
    ctx.stroke();

    // Bottom wire
    ctx.beginPath();
    ctx.moveTo(cx2, cy2);
    ctx.lineTo(cx1, cy2);
    ctx.stroke();

    // Left side - battery
    // Wire from top to battery top
    ctx.beginPath();
    ctx.moveTo(cx1, cy1);
    ctx.lineTo(cx1, cy1 + 60);
    ctx.stroke();
    // Wire from battery bottom to bottom
    ctx.beginPath();
    ctx.moveTo(cx1, cy2 - 60);
    ctx.lineTo(cx1, cy2);
    ctx.stroke();

    // Battery symbol
    const batX = cx1;
    const batTop = cy1 + 60;
    const batBot = cy2 - 60;
    const batMid = (batTop + batBot) / 2;

    // Long line (+ terminal, top)
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(batX - 18, batMid - 10);
    ctx.lineTo(batX + 18, batMid - 10);
    ctx.stroke();

    // Short line (- terminal, bottom)
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(batX - 10, batMid + 10);
    ctx.lineTo(batX + 10, batMid + 10);
    ctx.stroke();

    // + and - labels
    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('+', batX + 28, batMid - 5);
    ctx.fillStyle = '#3498db';
    ctx.fillText('−', batX + 28, batMid + 16);

    // EMF label
    ctx.fillStyle = '#333';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('ε = ' + p.V.toFixed(1) + ' V', batX, batBot + 18);

    // Resistor zigzag on top wire
    const resX1 = (cx1 + cx2) / 2 - 50;
    const resX2 = (cx1 + cx2) / 2 + 50;
    const resY = cy1;
    const nZig = 6;
    const zigW = (resX2 - resX1) / nZig;
    const zigH = 12;

    // Clear wire behind resistor
    ctx.strokeStyle = '#f8faff';
    ctx.lineWidth = wireWidth + 4;
    ctx.beginPath();
    ctx.moveTo(resX1 - 5, resY);
    ctx.lineTo(resX2 + 5, resY);
    ctx.stroke();

    // Draw zigzag
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(resX1, resY);
    for (let i = 0; i < nZig; i++) {
      const xStart = resX1 + i * zigW;
      ctx.lineTo(xStart + zigW * 0.25, resY - zigH);
      ctx.lineTo(xStart + zigW * 0.75, resY + zigH);
      ctx.lineTo(xStart + zigW, resY);
    }
    ctx.stroke();

    // Resistor label
    ctx.fillStyle = '#555';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('R = ' + formatSI(p.R) + ' Ω', (resX1 + resX2) / 2, resY - 22);

    // Material & dimensions label
    ctx.fillStyle = '#777';
    ctx.font = '11px sans-serif';
    ctx.fillText(p.mat.name + ', L=' + p.L.toFixed(1) + 'm, r=' + p.r_mm.toFixed(1) + 'mm', CW / 2, cy2 + 30);

    // Current direction arrow on bottom wire
    const arrowX = (cx1 + cx2) / 2;
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.moveTo(arrowX + 8, cy2 - 14);
    ctx.lineTo(arrowX - 4, cy2 - 20);
    ctx.lineTo(arrowX - 4, cy2 - 8);
    ctx.closePath();
    ctx.fill();
    ctx.font = '11px sans-serif';
    ctx.fillStyle = '#e74c3c';
    ctx.textAlign = 'center';
    ctx.fillText('i (전류 방향)', arrowX, cy2 - 24);

    // Draw charges
    const speedScale = Math.min(p.vd * 1e5, 80);
    for (const ch of charges) {
      const pos = posOnPath(ch.dist);
      // Skip charges that are on the battery segment
      // Battery segment is left side between batTop and batBot
      // We still draw them but smaller
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 4, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(231, 76, 60, 0.85)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(192, 57, 43, 0.6)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // + sign on charge
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 7px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('+', pos.x, pos.y);
    }
    ctx.textBaseline = 'alphabetic';
  }

  // --- V-I Graph ---
  function drawGraph() {
    const W = graphCanvas.width;
    const H = graphCanvas.height;
    gctx.clearRect(0, 0, W, H);

    const pad = { left: 45, right: 15, top: 15, bottom: 35 };
    const gw = W - pad.left - pad.right;
    const gh = H - pad.top - pad.bottom;

    // Background
    gctx.fillStyle = '#fafbfc';
    gctx.fillRect(pad.left, pad.top, gw, gh);

    // Axes ranges
    const maxV = 22;
    // Determine max I from data points
    let maxI = 1;
    if (dataPoints.length > 0) {
      maxI = Math.max(...dataPoints.map(d => d.I)) * 1.3;
    }
    if (maxI < 0.1) maxI = 0.1;

    // Grid lines
    gctx.strokeStyle = '#e0e0e0';
    gctx.lineWidth = 0.5;
    for (let v = 0; v <= maxV; v += 5) {
      const x = pad.left + (v / maxV) * gw;
      gctx.beginPath();
      gctx.moveTo(x, pad.top);
      gctx.lineTo(x, pad.top + gh);
      gctx.stroke();
    }
    const nTicksI = 5;
    for (let i = 0; i <= nTicksI; i++) {
      const y = pad.top + gh - (i / nTicksI) * gh;
      gctx.beginPath();
      gctx.moveTo(pad.left, y);
      gctx.lineTo(pad.left + gw, y);
      gctx.stroke();
    }

    // Axes
    gctx.strokeStyle = '#333';
    gctx.lineWidth = 1.5;
    gctx.beginPath();
    gctx.moveTo(pad.left, pad.top);
    gctx.lineTo(pad.left, pad.top + gh);
    gctx.lineTo(pad.left + gw, pad.top + gh);
    gctx.stroke();

    // Axis labels
    gctx.fillStyle = '#333';
    gctx.font = '12px sans-serif';
    gctx.textAlign = 'center';
    gctx.fillText('V (V)', pad.left + gw / 2, H - 5);

    gctx.save();
    gctx.translate(12, pad.top + gh / 2);
    gctx.rotate(-Math.PI / 2);
    gctx.fillText('i (A)', 0, 0);
    gctx.restore();

    // Tick labels
    gctx.font = '10px sans-serif';
    gctx.textAlign = 'center';
    for (let v = 0; v <= maxV; v += 5) {
      const x = pad.left + (v / maxV) * gw;
      gctx.fillText(v, x, pad.top + gh + 14);
    }
    gctx.textAlign = 'right';
    for (let i = 0; i <= nTicksI; i++) {
      const y = pad.top + gh - (i / nTicksI) * gh;
      const val = (i / nTicksI) * maxI;
      gctx.fillText(formatSI(val), pad.left - 4, y + 4);
    }

    // Draw ideal Ohm's law line for current R
    const p = getParams();
    gctx.strokeStyle = 'rgba(67, 97, 238, 0.3)';
    gctx.lineWidth = 1.5;
    gctx.setLineDash([5, 3]);
    gctx.beginPath();
    const idealI_at_maxV = maxV / p.R;
    const lineEndI = Math.min(idealI_at_maxV, maxI);
    const lineEndV = lineEndI * p.R;
    gctx.moveTo(pad.left, pad.top + gh);
    gctx.lineTo(
      pad.left + (lineEndV / maxV) * gw,
      pad.top + gh - (lineEndI / maxI) * gh
    );
    gctx.stroke();
    gctx.setLineDash([]);

    // Draw data points
    for (const dp of dataPoints) {
      const x = pad.left + (dp.V / maxV) * gw;
      const y = pad.top + gh - (dp.I / maxI) * gh;
      if (x >= pad.left && x <= pad.left + gw && y >= pad.top && y <= pad.top + gh) {
        gctx.beginPath();
        gctx.arc(x, y, 4, 0, Math.PI * 2);
        gctx.fillStyle = dp.matColor || '#e74c3c';
        gctx.fill();
        gctx.strokeStyle = 'rgba(0,0,0,0.3)';
        gctx.lineWidth = 1;
        gctx.stroke();
      }
    }
  }

  function addDataPoint() {
    const p = getParams();
    dataPoints.push({ V: p.V, I: p.I, R: p.R, matColor: p.mat.color });
    drawGraph();
  }

  // --- Animation ---
  function animate(time) {
    if (!lastTime) lastTime = time;
    const dt = (time - lastTime) / 1000;
    lastTime = time;

    const p = getParams();

    // Map drift velocity to canvas speed
    // vd can be very small (e.g. 1e-4 m/s), so we scale up significantly
    // We want visible but slow motion
    const canvasSpeed = Math.min(Math.max(p.vd * 1e5, 2), 200);

    // Move charges clockwise
    for (const ch of charges) {
      ch.dist += canvasSpeed * dt * 60;
      if (ch.dist > path.totalLen) ch.dist -= path.totalLen;
    }

    drawCircuit(p);
    updateDisplay();
    animId = requestAnimationFrame(animate);
  }

  // --- Event listeners ---
  sliderV.addEventListener('input', () => { updateDisplay(); addDataPoint(); });
  sliderL.addEventListener('input', () => { updateDisplay(); addDataPoint(); });
  sliderR.addEventListener('input', () => { updateDisplay(); addDataPoint(); });
  selectMat.addEventListener('change', () => { updateDisplay(); addDataPoint(); });

  btnClear.addEventListener('click', () => {
    dataPoints = [];
    drawGraph();
  });

  // --- Init ---
  initCharges();
  updateDisplay();
  addDataPoint();
  drawGraph();
  animId = requestAnimationFrame(animate);

})();
</script>
</body>
</html>
