<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사다리 평형 시뮬레이션</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #fff; color: #1a1a1a; overflow: hidden; }
.container { display: flex; height: 100vh; }
.canvas-area { flex: 1; position: relative; }
canvas { width: 100%; height: 100%; display: block; }
.controls { width: 260px; padding: 16px; background: #faf5f6; border-left: 2px solid rgba(139,0,41,0.15); overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
h2 { color: #8B0029; font-size: 1.05rem; margin-bottom: 2px; }
.subtitle { color: #888; font-size: 0.72rem; margin-bottom: 6px; }
label { display: block; font-size: 0.78rem; color: #555; margin-bottom: 2px; }
.slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.slider-row input[type="range"] { flex: 1; accent-color: #8B0029; }
.slider-val { font-size: 0.78rem; font-weight: 600; color: #8B0029; min-width: 60px; text-align: right; }
.formula-box { background: #f9f0f2; border: 1px solid rgba(139,0,41,0.12); border-radius: 8px; padding: 9px 10px; font-size: 0.74rem; line-height: 1.7; color: #555; }
.formula-box .katex { font-size: 0.92em; }
.formula-box b { color: #8B0029; }
.info-box { background: white; border: 1px solid rgba(139,0,41,0.15); border-radius: 8px; padding: 9px 10px; font-size: 0.74rem; line-height: 1.8; }
.info-box .lbl { color: #555; }
.info-box .val { color: #8B0029; font-weight: 700; font-family: ui-monospace, monospace; }
.status-box { border-radius: 8px; padding: 8px; font-size: 12px; text-align: center; font-weight: 700; }
.status-safe { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
.status-slip { background: #fbe9e7; color: #c62828; border: 1px solid #ef9a9a; }

.canvas-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
.canvas-overlay .katex-label { position: absolute; white-space: nowrap; font-size: 11px; line-height: 1; pointer-events: none; }
.canvas-overlay .katex-label.with-bg { background: rgba(255,255,255,0.92); padding: 1px 5px; border-radius: 3px; }

@media (max-width: 700px) {
  .container { flex-direction: column; }
  .canvas-area { flex: none; height: 55vh; }
  .controls { width: 100%; border-left: none; border-top: 2px solid rgba(139,0,41,0.15); height: 45vh; }
}
</style>
</head>
<body>
<div class="container">
  <div class="canvas-area">
    <canvas id="canvas"></canvas>
    <div class="canvas-overlay" id="overlay">
      <div class="katex-label with-bg" id="lblTheta" style="color:#6B7280;font-weight:bold;"></div>
      <div class="katex-label with-bg" id="lblMg"  style="color:#8B0029;font-weight:bold;"></div>
      <div class="katex-label with-bg" id="lblMgP" style="color:#8B0029;font-weight:bold;"></div>
      <div class="katex-label with-bg" id="lblFw"  style="color:#2563EB;font-weight:bold;"></div>
      <div class="katex-label with-bg" id="lblN"   style="color:#2563EB;font-weight:bold;"></div>
      <div class="katex-label with-bg" id="lblF"   style="color:#8B0029;font-weight:bold;"></div>
      <div class="katex-label" id="lblArmM"  style="color:#6B7280;"></div>
      <div class="katex-label" id="lblArmMP" style="color:#6B7280;"></div>
      <div class="katex-label" id="lblArmFw" style="color:#6B7280;"></div>
    </div>
  </div>
  <div class="controls">
    <div>
      <h2>사다리 평형</h2>
      <div class="subtitle">Ladder Equilibrium &mdash; Ch.12.6</div>
    </div>

    <div class="formula-box" id="formulaBox"></div>

    <div>
      <label>사다리 각도 <span id="thetaLabel"></span></label>
      <div class="slider-row">
        <input type="range" id="slTheta" min="15" max="85" step="1" value="60">
        <span class="slider-val" id="valTheta">60°</span>
      </div>
    </div>
    <div>
      <label>사람 위치 <span id="posSymLabel"></span> (아래→위)</label>
      <div class="slider-row">
        <input type="range" id="slPos" min="0" max="100" step="1" value="50">
        <span class="slider-val" id="valPos">50%</span>
      </div>
    </div>
    <div>
      <label>사다리 질량 <span id="mLabel"></span></label>
      <div class="slider-row">
        <input type="range" id="slMl" min="2" max="30" step="0.5" value="10">
        <span class="slider-val" id="valMl">10 kg</span>
      </div>
    </div>
    <div>
      <label>사람 질량 <span id="MLabel"></span></label>
      <div class="slider-row">
        <input type="range" id="slMp" min="30" max="120" step="1" value="70">
        <span class="slider-val" id="valMp">70 kg</span>
      </div>
    </div>
    <div>
      <label>정지 마찰 계수 <span id="muLabel"></span></label>
      <div class="slider-row">
        <input type="range" id="slMu" min="0.05" max="1.0" step="0.01" value="0.40">
        <span class="slider-val" id="valMu">0.40</span>
      </div>
    </div>

    <div class="info-box" id="infoBox"></div>
    <div class="status-box" id="statusBox">평형 상태</div>
  </div>
</div>

<script>
function kx(tex) { return katex.renderToString(tex, { throwOnError: false }); }
function posLabel(el, x, y, html) {
  if (html !== undefined) el.innerHTML = html;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.display = 'block';
}
function hideLabel(el) { el.style.display = 'none'; }

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const slTheta = document.getElementById('slTheta');
const slPos   = document.getElementById('slPos');
const slMl    = document.getElementById('slMl');
const slMp    = document.getElementById('slMp');
const slMu    = document.getElementById('slMu');
const valTheta= document.getElementById('valTheta');
const valPos  = document.getElementById('valPos');
const valMl   = document.getElementById('valMl');
const valMp   = document.getElementById('valMp');
const valMu   = document.getElementById('valMu');

const lblTheta = document.getElementById('lblTheta');
const lblMg = document.getElementById('lblMg');
const lblMgP = document.getElementById('lblMgP');
const lblFw = document.getElementById('lblFw');
const lblN  = document.getElementById('lblN');
const lblF  = document.getElementById('lblF');
const lblArmM = document.getElementById('lblArmM');
const lblArmMP = document.getElementById('lblArmMP');
const lblArmFw = document.getElementById('lblArmFw');

let dpr = window.devicePixelRatio || 1;
let W, H;
const g = 9.8;

function getParams() {
  return {
    thetaDeg: parseFloat(slTheta.value),
    theta: parseFloat(slTheta.value) * Math.PI / 180,
    frac: parseFloat(slPos.value) / 100,
    mL: parseFloat(slMl.value),
    mP: parseFloat(slMp.value),
    mu: parseFloat(slMu.value)
  };
}

function solve() {
  const p = getParams();
  // Sum of torques about base (taking CCW positive in screen, but let's just use magnitudes):
  // Wall force Fw (horizontal, pushing the ladder back from wall) creates a torque about base
  // = Fw * (h) where h = L sin θ.
  // Weight mg of ladder at midpoint creates torque = mg * (L/2) cos θ
  // Weight Mg of person at fraction frac creates torque = Mg * (frac*L) cos θ
  // Setting Σ τ = 0:
  // Fw * L sin θ = mg * (L/2) cos θ + Mg * frac*L cos θ
  // Fw = (mg/2 + Mg*frac) * cos θ / sin θ
  const Fw = (p.mL * g / 2 + p.mP * g * p.frac) * Math.cos(p.theta) / Math.sin(p.theta);
  const N = (p.mL + p.mP) * g;
  const f = Fw;
  const fMax = p.mu * N;
  const slipping = f > fMax;
  return { ...p, Fw, N, f, fMax, slipping };
}

function resize() {
  dpr = window.devicePixelRatio || 1;
  const r = canvas.parentElement.getBoundingClientRect();
  W = r.width; H = r.height;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

function initStaticContent() {
  document.getElementById('formulaBox').innerHTML =
    '<b>바닥 피벗 토크 합 = 0:</b><br>' +
    kx('F_w \\cdot L\\sin\\theta = mg\\,(L/2)\\cos\\theta + Mg\\,(d/L)\\cdot L\\cos\\theta') +
    '<br><b>미끄러짐 조건:</b> ' + kx('f > \\mu_s N');
  document.getElementById('thetaLabel').innerHTML = kx('\\theta');
  document.getElementById('mLabel').innerHTML = kx('m');
  document.getElementById('MLabel').innerHTML = kx('M');
  document.getElementById('muLabel').innerHTML = kx('\\mu_s');
  document.getElementById('posSymLabel').innerHTML = kx('d/L');
}

function updateValues() {
  valTheta.textContent = slTheta.value + '°';
  valPos.textContent = slPos.value + '%';
  valMl.textContent = parseFloat(slMl.value).toFixed(1) + ' kg';
  valMp.textContent = parseFloat(slMp.value).toFixed(0) + ' kg';
  valMu.textContent = parseFloat(slMu.value).toFixed(2);
}

function updateInfo() {
  const s = solve();
  document.getElementById('infoBox').innerHTML =
    '<div><span class="lbl">' + kx('F_w') + ' = </span><span class="val">' + s.Fw.toFixed(0) + '</span> N</div>' +
    '<div><span class="lbl">' + kx('N') + ' = </span><span class="val">' + s.N.toFixed(0) + '</span> N</div>' +
    '<div><span class="lbl">' + kx('f') + ' = </span><span class="val">' + s.f.toFixed(0) + '</span> N</div>' +
    '<div><span class="lbl">' + kx('f_{\\max} = \\mu_s N') + ' = </span><span class="val">' + s.fMax.toFixed(0) + '</span> N</div>';

  const sb = document.getElementById('statusBox');
  if (s.slipping) {
    sb.textContent = '미끄러짐!  f > μₛN';
    sb.className = 'status-box status-slip';
  } else {
    const ratio = (s.f / s.fMax * 100).toFixed(0);
    sb.textContent = '평형 유지 (마찰력 ' + ratio + '% 사용)';
    sb.className = 'status-box status-safe';
  }
}

function drawArrow(x1, y1, x2, y2, color, lw) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx*dx + dy*dy);
  if (len < 1) return;
  const headLen = Math.min(12, len * 0.35);
  const ang = Math.atan2(dy, dx);
  ctx.strokeStyle = color;
  ctx.lineWidth = lw;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - headLen * Math.cos(ang - 0.4), y2 - headLen * Math.sin(ang - 0.4));
  ctx.lineTo(x2 - headLen * Math.cos(ang + 0.4), y2 - headLen * Math.sin(ang + 0.4));
  ctx.closePath();
  ctx.fill();
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  const s = solve();

  const groundY = H * 0.85;
  const wallX = W * 0.72;

  // Ground
  ctx.fillStyle = '#F3F4F6';
  ctx.fillRect(0, groundY, W, H - groundY);
  ctx.strokeStyle = '#6B7280';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(W, groundY); ctx.stroke();
  ctx.strokeStyle = '#bbb';
  ctx.lineWidth = 1;
  for (let hx = 0; hx < W; hx += 16) {
    ctx.beginPath();
    ctx.moveTo(hx, groundY); ctx.lineTo(hx - 10, groundY + 12);
    ctx.stroke();
  }

  // Wall
  ctx.fillStyle = '#F3F4F6';
  ctx.fillRect(wallX, 30, 22, groundY - 30);
  ctx.strokeStyle = '#6B7280';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(wallX, 30); ctx.lineTo(wallX, groundY); ctx.stroke();
  ctx.strokeStyle = '#bbb';
  ctx.lineWidth = 1;
  for (let hy = 40; hy < groundY; hy += 16) {
    ctx.beginPath();
    ctx.moveTo(wallX, hy); ctx.lineTo(wallX + 12, hy - 10);
    ctx.stroke();
  }

  // Ladder geometry
  const ladderLen = Math.min(H * 0.7, W * 0.55);
  const baseX = wallX - ladderLen * Math.cos(s.theta);
  const baseY = groundY;
  const topX = wallX;
  const topY = groundY - ladderLen * Math.sin(s.theta);

  // Ladder rails (two parallel lines)
  const ladderColor = s.slipping ? '#c62828' : '#1a1a1a';
  const railOff = 6;
  const px = -Math.sin(s.theta) * railOff; // perpendicular offset
  const py = -Math.cos(s.theta) * railOff;
  ctx.strokeStyle = ladderColor;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(baseX + px, baseY + py); ctx.lineTo(topX + px, topY + py);
  ctx.moveTo(baseX - px, baseY - py); ctx.lineTo(topX - px, topY - py);
  ctx.stroke();
  // Rungs
  ctx.lineWidth = 2;
  for (let i = 1; i < 7; i++) {
    const t = i / 7;
    const rx = baseX + (topX - baseX) * t;
    const ry = baseY + (topY - baseY) * t;
    ctx.beginPath();
    ctx.moveTo(rx + px, ry + py); ctx.lineTo(rx - px, ry - py);
    ctx.stroke();
  }

  // Person on ladder — simple stick figure with head, body, arms, legs.
  // Anchor at the rung where person stands; figure is upright (vertical, NOT perpendicular to ladder).
  const personX = baseX + (topX - baseX) * s.frac;
  const personY = baseY + (topY - baseY) * s.frac;
  const personColor = '#444';
  ctx.strokeStyle = personColor;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.lineWidth = 2.5;

  // Place feet on the rung. Person stands UPRIGHT (vertical), feet at (personX, personY).
  // Body extends straight up from feet.
  const feetX = personX;
  const feetY = personY;
  const bodyH = 38;          // body length (upright)
  const headR = 7;
  const hipY = feetY - bodyH * 0.55;       // hip
  const shoulderY = feetY - bodyH;          // shoulder
  const headCY = shoulderY - headR - 2;     // head center
  const armLen = 16;
  // Arms reach toward the ladder (forward = toward wall along surface direction)
  // Forward direction (along ladder, toward top): (cosθ, -sinθ) since topY < baseY
  const fwdX = Math.cos(s.theta);
  const fwdY = -Math.sin(s.theta);

  // Body (vertical)
  ctx.beginPath();
  ctx.moveTo(feetX, feetY);
  ctx.lineTo(feetX, shoulderY);
  ctx.stroke();
  // Legs (small offsets at feet)
  ctx.beginPath();
  ctx.moveTo(feetX, hipY); ctx.lineTo(feetX - 5, feetY);
  ctx.moveTo(feetX, hipY); ctx.lineTo(feetX + 5, feetY);
  ctx.stroke();
  // Arms reaching forward to grip a higher rung along the ladder
  const handX = feetX + fwdX * armLen;
  const handY = shoulderY + fwdY * armLen;
  ctx.beginPath();
  ctx.moveTo(feetX, shoulderY); ctx.lineTo(handX, handY);
  ctx.moveTo(feetX, shoulderY); ctx.lineTo(handX - 4, handY + 2);
  ctx.stroke();
  // Head
  ctx.beginPath();
  ctx.arc(feetX, headCY, headR, 0, Math.PI * 2);
  ctx.fillStyle = '#F3F4F6';
  ctx.fill();
  ctx.strokeStyle = personColor;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Center of ladder (for mg)
  const midX = (baseX + topX) / 2;
  const midY = (baseY + topY) / 2;

  // ----- Force scale: pick scale so the largest force is ~120 px -----
  const mgL = s.mL * g;
  const MgP = s.mP * g;
  const allForces = [mgL, MgP, s.Fw, s.N, s.f].filter(v => v > 0);
  const maxF = Math.max(...allForces, 1);
  const forceScale = 120 / maxF; // px per N
  const arrLw = 2.5;

  // Pivot dot
  ctx.fillStyle = '#8B0029';
  ctx.beginPath();
  ctx.arc(baseX, baseY, 4, 0, Math.PI * 2);
  ctx.fill();

  // ----- Moment arms (dashed gray) for the three torque-producing forces about base pivot -----
  // mg moment arm: horizontal distance from baseX to midX (i.e., (L/2)cosθ)
  ctx.strokeStyle = 'rgba(107,114,128,0.5)';
  ctx.lineWidth = 1.2;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(baseX, baseY); ctx.lineTo(midX, baseY); // horizontal
  ctx.moveTo(midX, baseY); ctx.lineTo(midX, midY);   // vertical to mg point
  ctx.stroke();
  // Mg moment arm: horizontal from baseX to personX
  ctx.beginPath();
  ctx.moveTo(baseX, baseY + 8); ctx.lineTo(personX, baseY + 8);
  ctx.moveTo(personX, baseY + 8); ctx.lineTo(personX, personY);
  ctx.stroke();
  // Fw moment arm: vertical from baseY to topY (height L sinθ), drawn along the wall
  ctx.beginPath();
  ctx.moveTo(wallX + 14, baseY); ctx.lineTo(wallX + 14, topY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Moment arm labels (KaTeX)
  posLabel(lblArmM, (baseX + midX)/2 - 25, baseY - 14,
    kx('(L/2)\\cos\\theta'));
  posLabel(lblArmMP, (baseX + personX)/2 - 30, baseY + 14,
    kx('(d/L)\\cdot L\\cos\\theta'));
  posLabel(lblArmFw, wallX + 18, (baseY + topY)/2 - 6,
    kx('L\\sin\\theta'));

  // ----- Force arrows -----
  // mg ladder weight
  const mgLen = mgL * forceScale;
  drawArrow(midX, midY, midX, midY + mgLen, '#8B0029', arrLw);
  posLabel(lblMg, midX + 8, midY + mgLen + 2,
    kx('mg = ' + mgL.toFixed(0) + '\\text{ N}'));

  // Mg person weight
  const MgLen = MgP * forceScale;
  drawArrow(personX, personY, personX, personY + MgLen, '#8B0029', arrLw);
  posLabel(lblMgP, personX + 8, personY + MgLen + 2,
    kx('Mg = ' + MgP.toFixed(0) + '\\text{ N}'));

  // Fw at top (horizontal, from wall toward base direction = leftward)
  const FwLen = s.Fw * forceScale;
  drawArrow(topX, topY, topX - FwLen, topY, '#2563EB', arrLw);
  posLabel(lblFw, topX - FwLen - 60, topY - 16,
    kx('F_w = ' + s.Fw.toFixed(0) + '\\text{ N}'));

  // N at base (upward)
  const NLen = s.N * forceScale;
  drawArrow(baseX, baseY, baseX, baseY - NLen, '#2563EB', arrLw);
  posLabel(lblN, baseX - 65, baseY - NLen - 8,
    kx('N = ' + s.N.toFixed(0) + '\\text{ N}'));

  // f friction at base — drawn slightly above the ground line to avoid the hatching
  const fLen = s.f * forceScale;
  const fColor = s.slipping ? '#c62828' : '#8B0029';
  const fY = baseY - 6;
  drawArrow(baseX, fY, baseX + fLen, fY, fColor, arrLw);
  posLabel(lblF, baseX + fLen + 6, fY - 16,
    kx('f = ' + s.f.toFixed(0) + '\\text{ N}'));

  // Angle arc at base
  ctx.strokeStyle = '#6B7280';
  ctx.lineWidth = 1.2;
  const arcR = 36;
  ctx.beginPath();
  ctx.arc(baseX, baseY, arcR, -s.theta, 0);
  ctx.stroke();
  posLabel(lblTheta, baseX + arcR + 4, baseY - 18,
    kx('\\theta = ' + s.thetaDeg + '^\\circ'));
}

[slTheta, slPos, slMl, slMp, slMu].forEach(el => el.addEventListener('input', () => {
  updateValues();
  updateInfo();
  draw();
}));

window.addEventListener('resize', resize);

initStaticContent();
updateValues();
updateInfo();
resize();
</script>
</body>
</html>
