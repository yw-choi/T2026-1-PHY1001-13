<body>
<header>
  <a href="index.html" class="back-btn">&larr; 시뮬레이션 목록</a>
  <h1>RC 회로: 충전과 방전</h1>
  <p>Ch.27 회로</p>
</header>

<div class="container">
  <div class="desc-box">
    RC 회로에서 커패시터의 충전과 방전 과정을 시뮬레이션합니다. 충전 시 전압은 V<sub>C</sub> = EMF(1 - e<sup>-t/RC</sup>)로 증가하고,
    방전 시 V<sub>C</sub> = V<sub>0</sub>e<sup>-t/RC</sup>로 감소합니다. 시상수 &tau; = RC에서 충전 전압은 최종값의 63.2%에 도달합니다.
  </div>

  <div class="info-bar">
    <div class="info-item">
      <div class="label">&tau; = RC</div>
      <div class="value" id="readTau">0.00<span class="unit">ms</span></div>
    </div>
    <div class="info-item">
      <div class="label">V<sub>C</sub>(t)</div>
      <div class="value" id="readVc">0.00<span class="unit">V</span></div>
    </div>
    <div class="info-item">
      <div class="label">i(t)</div>
      <div class="value" id="readI">0.00<span class="unit">mA</span></div>
    </div>
    <div class="info-item">
      <div class="label">t / &tau;</div>
      <div class="value" id="readTratio">0.00</div>
    </div>
  </div>

  <div class="main-display">
    <div class="circuit-panel">
      <canvas id="circuitCanvas" width="792" height="680"></canvas>
    </div>
    <div class="graphs-panel">
      <div class="graph-card">
        <div class="graph-label">V<sub>C</sub>(t) 전압</div>
        <canvas id="graphVc" width="600" height="220"></canvas>
      </div>
      <div class="graph-card">
        <div class="graph-label">i(t) 전류</div>
        <canvas id="graphI" width="600" height="220"></canvas>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="control-row">
      <div class="control-group">
        <label>EMF: <span id="valEmf">10</span> V</label>
        <input type="range" id="sliderEmf" min="1" max="20" step="0.5" value="10">
        <div class="slider-info"><span>1 V</span><span>20 V</span></div>
      </div>
      <div class="control-group">
        <label>R: <span id="valR">1000</span> &Omega;</label>
        <input type="range" id="sliderR" min="100" max="10000" step="100" value="1000">
        <div class="slider-info"><span>100 &Omega;</span><span>10 k&Omega;</span></div>
      </div>
      <div class="control-group">
        <label>C: <span id="valC">100</span> &mu;F</label>
        <input type="range" id="sliderC" min="1" max="1000" step="1" value="100">
        <div class="slider-info"><span>1 &mu;F</span><span>1000 &mu;F</span></div>
      </div>
    </div>
    <div class="control-row">
      <div class="control-group">
        <label>모드</label>
        <div class="mode-buttons">
          <button id="btnCharge" class="active">충전</button>
          <button id="btnDischarge">방전</button>
        </div>
      </div>
      <div class="control-group">
        <label>속도</label>
        <div class="speed-buttons">
          <button class="speed-btn active" data-speed="1">1x</button>
          <button class="speed-btn" data-speed="2">2x</button>
          <button class="speed-btn" data-speed="5">5x</button>
        </div>
      </div>
    </div>
    <div class="control-row">
      <div class="action-buttons">
        <button class="btn-play" id="btnPlay">&#9654; 시작</button>
        <button class="btn-pause" id="btnPause">&#10074;&#10074; 일시정지</button>
        <button class="btn-reset" id="btnReset">&#8634; 초기화</button>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  "use strict";

  // --- DOM refs ---
  var circuitCanvas = document.getElementById('circuitCanvas');
  var graphVcCanvas = document.getElementById('graphVc');
  var graphICanvas = document.getElementById('graphI');
  var ctx = circuitCanvas.getContext('2d');
  var ctxVc = graphVcCanvas.getContext('2d');
  var ctxI = graphICanvas.getContext('2d');

  var sliderEmf = document.getElementById('sliderEmf');
  var sliderR = document.getElementById('sliderR');
  var sliderC = document.getElementById('sliderC');
  var valEmf = document.getElementById('valEmf');
  var valR = document.getElementById('valR');
  var valC = document.getElementById('valC');
  var readTau = document.getElementById('readTau');
  var readVc = document.getElementById('readVc');
  var readI = document.getElementById('readI');
  var readTratio = document.getElementById('readTratio');

  var btnCharge = document.getElementById('btnCharge');
  var btnDischarge = document.getElementById('btnDischarge');
  var btnPlay = document.getElementById('btnPlay');
  var btnPause = document.getElementById('btnPause');
  var btnReset = document.getElementById('btnReset');
  var speedBtns = document.querySelectorAll('.speed-btn');

  // --- State ---
  var emf = 10, R = 1000, C_uF = 100;
  var mode = 'charge'; // 'charge' or 'discharge'
  var speed = 1;
  var running = false;
  var simTime = 0; // seconds
  var dt = 1 / 60; // per frame base
  var graphData = []; // [{t, vc, i}]
  var animId = null;
  var lastFrameTime = 0;

  // Charge carriers
  var carriers = [];
  var NUM_CARRIERS = 16;

  function C_F() { return C_uF * 1e-6; }
  function tau() { return R * C_F(); }
  function tauMs() { return tau() * 1000; }

  function getVc(t) {
    if (mode === 'charge') {
      return emf * (1 - Math.exp(-t / tau()));
    } else {
      return emf * Math.exp(-t / tau());
    }
  }

  function getI(t) {
    if (mode === 'charge') {
      return (emf / R) * Math.exp(-t / tau());
    } else {
      return -(emf / R) * Math.exp(-t / tau());
    }
  }

  function formatTau(tauS) {
    if (tauS >= 1) return tauS.toFixed(2) + ' s';
    if (tauS >= 0.001) return (tauS * 1000).toFixed(1) + ' ms';
    return (tauS * 1e6).toFixed(0) + ' us';
  }

  function formatR(r) {
    if (r >= 1000) return (r / 1000).toFixed(r % 1000 === 0 ? 0 : 1) + ' k\u03A9';
    return r + ' \u03A9';
  }

  // --- Carriers setup ---
  function initCarriers() {
    carriers = [];
    for (var n = 0; n < NUM_CARRIERS; n++) {
      carriers.push({ pos: n / NUM_CARRIERS }); // 0..1 around loop
    }
  }
  initCarriers();

  // --- Circuit drawing ---
  // Circuit layout coordinates (on 792x680 canvas)
  // Rectangle loop: battery left, switch top-left, resistor top, capacitor right
  var CX = 396, CY = 340;
  var LX = 120, RX = 670, TY = 100, BY = 580;

  // Path segments for carrier flow (clockwise: battery+ -> top wire -> resistor -> right wire -> capacitor -> bottom wire -> battery-)
  var pathSegments = [
    // 0: battery top to switch
    {x0: LX, y0: TY, x1: LX + 80, y1: TY},
    // 1: switch to midpoint top
    {x0: LX + 130, y0: TY, x1: (LX + RX) / 2 - 60, y1: TY},
    // 2: resistor region (visual only, carriers go through)
    {x0: (LX + RX) / 2 - 60, y0: TY, x1: (LX + RX) / 2 + 60, y1: TY},
    // 3: midpoint top to capacitor top
    {x0: (LX + RX) / 2 + 60, y0: TY, x1: RX, y1: TY},
    // 4: right side down to capacitor
    {x0: RX, y0: TY, x1: RX, y1: CY - 50},
    // 5: capacitor gap (no carriers)
    // 6: capacitor bottom to bottom-right
    {x0: RX, y0: CY + 50, x1: RX, y1: BY},
    // 7: bottom wire right to left
    {x0: RX, y0: BY, x1: LX, y1: BY},
    // 8: left side up to battery bottom
    {x0: LX, y0: BY, x1: LX, y1: CY + 50},
    // 9: battery gap (no carriers)
    // 10: battery top to top-left
    {x0: LX, y0: CY - 50, x1: LX, y1: TY}
  ];

  // Total path length
  function segLen(s) {
    return Math.sqrt((s.x1 - s.x0) ** 2 + (s.y1 - s.y0) ** 2);
  }
  var totalLen = 0;
  var segLengths = [];
  for (var i = 0; i < pathSegments.length; i++) {
    var sl = segLen(pathSegments[i]);
    segLengths.push(sl);
    totalLen += sl;
  }
  var segCum = [0];
  for (var i = 0; i < segLengths.length; i++) {
    segCum.push(segCum[i] + segLengths[i]);
  }

  function posOnPath(frac) {
    // frac: 0..1 around the loop
    var d = (frac % 1) * totalLen;
    if (d < 0) d += totalLen;
    for (var i = 0; i < pathSegments.length; i++) {
      if (d <= segLengths[i]) {
        var t = d / segLengths[i];
        var s = pathSegments[i];
        return {x: s.x0 + (s.x1 - s.x0) * t, y: s.y0 + (s.y1 - s.y0) * t};
      }
      d -= segLengths[i];
    }
    var last = pathSegments[pathSegments.length - 1];
    return {x: last.x1, y: last.y1};
  }

  function drawCircuit() {
    ctx.clearRect(0, 0, 792, 680);

    var vc = getVc(simTime);
    var cur = getI(simTime);
    var chargeRatio = vc / emf; // 0..1

    ctx.lineWidth = 3;
    ctx.strokeStyle = '#333';
    ctx.lineCap = 'round';

    // --- Wires ---
    // Top wire: battery top -> switch gap -> resistor -> capacitor top
    ctx.beginPath();
    ctx.moveTo(LX, TY);
    ctx.lineTo(LX + 80, TY);
    ctx.stroke();

    // Switch
    var switchClosed = running || simTime > 0;
    ctx.beginPath();
    if (switchClosed) {
      ctx.moveTo(LX + 80, TY);
      ctx.lineTo(LX + 130, TY);
    } else {
      ctx.moveTo(LX + 80, TY);
      ctx.lineTo(LX + 125, TY - 30);
    }
    ctx.lineWidth = 3;
    ctx.stroke();
    // Switch contacts
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(LX + 80, TY, 5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(LX + 130, TY, 5, 0, Math.PI * 2); ctx.fill();

    // Label switch
    ctx.font = '18px sans-serif';
    ctx.fillStyle = '#555';
    ctx.textAlign = 'center';
    ctx.fillText('S', LX + 105, TY - 35);

    // Top wire: switch to resistor
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#333';
    ctx.beginPath();
    ctx.moveTo(LX + 130, TY);
    ctx.lineTo((LX + RX) / 2 - 60, TY);
    ctx.stroke();

    // --- Resistor (zigzag) ---
    var rx0 = (LX + RX) / 2 - 60, rx1 = (LX + RX) / 2 + 60;
    var rMid = TY;
    ctx.beginPath();
    ctx.moveTo(rx0, rMid);
    var numZ = 6, zA = 16;
    var zStep = (rx1 - rx0) / numZ;
    for (var z = 0; z < numZ; z++) {
      var xz = rx0 + zStep * (z + 0.5);
      ctx.lineTo(xz, rMid + (z % 2 === 0 ? -zA : zA));
    }
    ctx.lineTo(rx1, rMid);
    ctx.strokeStyle = '#e67e22';
    ctx.lineWidth = 3;
    ctx.stroke();

    // Resistor label
    ctx.font = 'bold 18px sans-serif';
    ctx.fillStyle = '#e67e22';
    ctx.textAlign = 'center';
    ctx.fillText('R = ' + formatR(R), (rx0 + rx1) / 2, rMid - 28);

    // Top wire: resistor to right
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(rx1, TY);
    ctx.lineTo(RX, TY);
    ctx.stroke();

    // Right wire down to capacitor
    ctx.beginPath();
    ctx.moveTo(RX, TY);
    ctx.lineTo(RX, CY - 50);
    ctx.stroke();

    // --- Capacitor ---
    var capW = 70, capGap = 20;
    var capTop = CY - 50, capBot = CY + 50;
    // Top plate
    ctx.lineWidth = 5;
    ctx.strokeStyle = '#2980b9';
    ctx.beginPath();
    ctx.moveTo(RX - capW / 2, capTop);
    ctx.lineTo(RX + capW / 2, capTop);
    ctx.stroke();
    // Bottom plate
    ctx.beginPath();
    ctx.moveTo(RX - capW / 2, capBot);
    ctx.lineTo(RX + capW / 2, capBot);
    ctx.stroke();

    // Charge fill on plates
    if (chargeRatio > 0.01) {
      var fillH = Math.min(chargeRatio, 1) * 14;
      // Top plate: positive charge (red gradient)
      var grdT = ctx.createLinearGradient(RX - capW / 2, capTop, RX - capW / 2, capTop + fillH);
      grdT.addColorStop(0, 'rgba(231, 76, 60, ' + (0.3 + 0.5 * chargeRatio) + ')');
      grdT.addColorStop(1, 'rgba(231, 76, 60, 0.05)');
      ctx.fillStyle = grdT;
      ctx.fillRect(RX - capW / 2, capTop, capW, fillH);

      // Bottom plate: negative charge (blue gradient)
      var grdB = ctx.createLinearGradient(RX - capW / 2, capBot - fillH, RX - capW / 2, capBot);
      grdB.addColorStop(0, 'rgba(41, 128, 185, 0.05)');
      grdB.addColorStop(1, 'rgba(41, 128, 185, ' + (0.3 + 0.5 * chargeRatio) + ')');
      ctx.fillStyle = grdB;
      ctx.fillRect(RX - capW / 2, capBot - fillH, capW, fillH);

      // + and - signs
      ctx.font = 'bold 20px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(231, 76, 60, ' + Math.min(1, chargeRatio * 2) + ')';
      ctx.fillText('+', RX + capW / 2 + 18, capTop + 8);
      ctx.fillStyle = 'rgba(41, 128, 185, ' + Math.min(1, chargeRatio * 2) + ')';
      ctx.fillText('\u2013', RX + capW / 2 + 18, capBot + 8);
    }

    // Capacitor label
    ctx.font = 'bold 18px sans-serif';
    ctx.fillStyle = '#2980b9';
    ctx.textAlign = 'left';
    ctx.fillText('C = ' + C_uF + ' \u00B5F', RX + capW / 2 + 10, CY + 4);

    // Right wire from capacitor bottom
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(RX, capBot);
    ctx.lineTo(RX, BY);
    ctx.stroke();

    // Bottom wire
    ctx.beginPath();
    ctx.moveTo(RX, BY);
    ctx.lineTo(LX, BY);
    ctx.stroke();

    // Left wire up to battery
    ctx.beginPath();
    ctx.moveTo(LX, BY);
    ctx.lineTo(LX, CY + 50);
    ctx.stroke();

    // --- Battery ---
    var batTop = CY - 50, batBot = CY + 50;
    // Long line (positive terminal, top)
    ctx.lineWidth = 5;
    ctx.strokeStyle = '#27ae60';
    ctx.beginPath();
    ctx.moveTo(LX - 25, batTop);
    ctx.lineTo(LX + 25, batTop);
    ctx.stroke();
    // Short line (negative terminal, bottom)
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(LX - 14, batBot);
    ctx.lineTo(LX + 14, batBot);
    ctx.stroke();

    // + / - labels
    ctx.font = 'bold 20px sans-serif';
    ctx.fillStyle = '#27ae60';
    ctx.textAlign = 'center';
    ctx.fillText('+', LX - 38, batTop + 7);
    ctx.fillText('\u2013', LX - 38, batBot + 7);

    // Battery label
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('EMF = ' + emf + ' V', LX - 45, CY + 5);

    // Left wire from battery top
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(LX, batTop);
    ctx.lineTo(LX, TY);
    ctx.stroke();

    // --- Charge carriers ---
    var absCur = Math.abs(cur);
    var maxCur = emf / R;
    var curRatio = Math.min(absCur / maxCur, 1);

    if ((running || simTime > 0) && switchClosed && curRatio > 0.005) {
      for (var n = 0; n < carriers.length; n++) {
        var p = posOnPath(carriers[n].pos);
        ctx.beginPath();
        ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(67, 97, 238, ' + (0.4 + 0.6 * curRatio) + ')';
        ctx.fill();
        ctx.strokeStyle = '#2a4dc7';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    }

    // --- Vc and i annotations on circuit ---
    ctx.font = '16px sans-serif';
    ctx.fillStyle = '#c0392b';
    ctx.textAlign = 'center';
    ctx.fillText('V_C = ' + vc.toFixed(2) + ' V', RX, capBot + 80);
    ctx.fillStyle = '#4361ee';
    var iMa = cur * 1000;
    ctx.fillText('i = ' + iMa.toFixed(3) + ' mA', (LX + RX) / 2, BY + 40);

    // Current direction arrow on top wire
    if (curRatio > 0.005) {
      var arrowX = (LX + RX) / 2;
      var arrowY = TY - 20;
      ctx.fillStyle = '#4361ee';
      ctx.beginPath();
      if (mode === 'charge') {
        // arrow pointing right
        ctx.moveTo(arrowX + 15, arrowY);
        ctx.lineTo(arrowX - 5, arrowY - 8);
        ctx.lineTo(arrowX - 5, arrowY + 8);
      } else {
        // arrow pointing left (discharge conventional)
        ctx.moveTo(arrowX - 15, arrowY);
        ctx.lineTo(arrowX + 5, arrowY - 8);
        ctx.lineTo(arrowX + 5, arrowY + 8);
      }
      ctx.fill();
      ctx.font = '14px sans-serif';
      ctx.fillText('i', arrowX, arrowY - 14);
    }

    // Mode label
    ctx.font = 'bold 22px sans-serif';
    ctx.fillStyle = mode === 'charge' ? '#27ae60' : '#e74c3c';
    ctx.textAlign = 'center';
    ctx.fillText(mode === 'charge' ? '\uCDA9\uC804 (Charging)' : '\uBC29\uC804 (Discharging)', CX, 50);
  }

  // --- Graph drawing ---
  function drawGraph(cvs, ctxG, dataKey, label, color, yMax, yMin, unit, isDashed) {
    var W = cvs.width, H = cvs.height;
    ctxG.clearRect(0, 0, W, H);

    var padL = 65, padR = 20, padT = 15, padB = 35;
    var gW = W - padL - padR, gH = H - padT - padB;

    // Background
    ctxG.fillStyle = '#fafbfc';
    ctxG.fillRect(padL, padT, gW, gH);

    // Time range: show 5 tau
    var tauVal = tau();
    var tMax = 5 * tauVal;

    // Grid
    ctxG.strokeStyle = '#e0e0e0';
    ctxG.lineWidth = 1;
    for (var gy = 0; gy <= 4; gy++) {
      var yy = padT + gH * gy / 4;
      ctxG.beginPath(); ctxG.moveTo(padL, yy); ctxG.lineTo(padL + gW, yy); ctxG.stroke();
    }
    for (var gx = 0; gx <= 5; gx++) {
      var xx = padL + gW * gx / 5;
      ctxG.beginPath(); ctxG.moveTo(xx, padT); ctxG.lineTo(xx, padT + gH); ctxG.stroke();
    }

    // Axes labels
    ctxG.font = '13px sans-serif';
    ctxG.fillStyle = '#888';
    ctxG.textAlign = 'center';
    for (var gx = 0; gx <= 5; gx++) {
      var xx = padL + gW * gx / 5;
      var tLabel = (tMax * gx / 5);
      var tStr;
      if (tMax >= 1) tStr = tLabel.toFixed(1) + 's';
      else if (tMax >= 0.001) tStr = (tLabel * 1000).toFixed(0) + 'ms';
      else tStr = (tLabel * 1e6).toFixed(0) + 'us';
      ctxG.fillText(tStr, xx, padT + gH + 18);
    }

    ctxG.textAlign = 'right';
    for (var gy = 0; gy <= 4; gy++) {
      var yy = padT + gH * gy / 4;
      var yVal = yMax - (yMax - yMin) * gy / 4;
      ctxG.fillText(yVal.toFixed(1), padL - 6, yy + 4);
    }

    // Y axis label
    ctxG.save();
    ctxG.translate(14, padT + gH / 2);
    ctxG.rotate(-Math.PI / 2);
    ctxG.textAlign = 'center';
    ctxG.font = 'bold 13px sans-serif';
    ctxG.fillStyle = color;
    ctxG.fillText(label + ' (' + unit + ')', 0, 0);
    ctxG.restore();

    // Tau dashed line
    if (tauVal <= tMax) {
      var tauX = padL + gW * (tauVal / tMax);
      ctxG.strokeStyle = '#e74c3c';
      ctxG.lineWidth = 1.5;
      ctxG.setLineDash([6, 4]);
      ctxG.beginPath();
      ctxG.moveTo(tauX, padT);
      ctxG.lineTo(tauX, padT + gH);
      ctxG.stroke();
      ctxG.setLineDash([]);

      ctxG.font = 'bold 12px sans-serif';
      ctxG.fillStyle = '#e74c3c';
      ctxG.textAlign = 'center';
      ctxG.fillText('\u03C4 = ' + formatTau(tauVal), tauX, padT - 2);
    }

    // 63.2% line for Vc charging or 36.8% for discharging
    if (dataKey === 'vc') {
      var targetV;
      if (mode === 'charge') {
        targetV = emf * 0.632;
      } else {
        targetV = emf * 0.368;
      }
      var yy63 = padT + gH * (1 - (targetV - yMin) / (yMax - yMin));
      if (yy63 >= padT && yy63 <= padT + gH) {
        ctxG.strokeStyle = 'rgba(231, 76, 60, 0.4)';
        ctxG.lineWidth = 1;
        ctxG.setLineDash([4, 4]);
        ctxG.beginPath();
        ctxG.moveTo(padL, yy63);
        ctxG.lineTo(padL + gW, yy63);
        ctxG.stroke();
        ctxG.setLineDash([]);
        ctxG.font = '11px sans-serif';
        ctxG.fillStyle = '#e74c3c';
        ctxG.textAlign = 'left';
        if (mode === 'charge') {
          ctxG.fillText('63.2% = ' + targetV.toFixed(1) + 'V', padL + gW - 100, yy63 - 4);
        } else {
          ctxG.fillText('36.8% = ' + targetV.toFixed(1) + 'V', padL + gW - 100, yy63 - 4);
        }
      }
    }

    // Data curve
    if (graphData.length > 1) {
      ctxG.strokeStyle = color;
      ctxG.lineWidth = 2.5;
      ctxG.beginPath();
      var started = false;
      for (var i = 0; i < graphData.length; i++) {
        var d = graphData[i];
        var px = padL + gW * (d.t / tMax);
        var val = d[dataKey];
        var py = padT + gH * (1 - (val - yMin) / (yMax - yMin));
        py = Math.max(padT, Math.min(padT + gH, py));
        if (px > padL + gW) break;
        if (!started) { ctxG.moveTo(px, py); started = true; }
        else ctxG.lineTo(px, py);
      }
      ctxG.stroke();
    }

    // Border
    ctxG.strokeStyle = '#ccc';
    ctxG.lineWidth = 1;
    ctxG.strokeRect(padL, padT, gW, gH);
  }

  function updateGraphs() {
    var iMax = emf / R;
    var iMaxMa = iMax * 1000;

    if (mode === 'charge') {
      drawGraph(graphVcCanvas, ctxVc, 'vc', 'V_C', '#2980b9', emf * 1.1, 0, 'V');
      drawGraph(graphICanvas, ctxI, 'i_ma', 'i', '#e67e22', iMaxMa * 1.1, -iMaxMa * 0.1, 'mA');
    } else {
      drawGraph(graphVcCanvas, ctxVc, 'vc', 'V_C', '#2980b9', emf * 1.1, 0, 'V');
      drawGraph(graphICanvas, ctxI, 'i_ma', 'i', '#e67e22', iMaxMa * 0.1, -iMaxMa * 1.1, 'mA');
    }
  }

  function updateReadouts() {
    var tauVal = tau();
    var vc = getVc(simTime);
    var cur = getI(simTime);
    var curMa = cur * 1000;
    var tRatio = tauVal > 0 ? simTime / tauVal : 0;

    readTau.innerHTML = formatTau(tauVal);
    readVc.innerHTML = vc.toFixed(2) + '<span class="unit">V</span>';
    readI.innerHTML = curMa.toFixed(3) + '<span class="unit">mA</span>';
    readTratio.textContent = tRatio.toFixed(2);
  }

  function recordData() {
    var vc = getVc(simTime);
    var cur = getI(simTime);
    graphData.push({ t: simTime, vc: vc, i_ma: cur * 1000 });
  }

  function updateCarriers(dtSec) {
    var cur = getI(simTime);
    var maxCur = emf / R;
    var curRatio = Math.abs(cur) / maxCur;
    var direction = mode === 'charge' ? 1 : -1;
    var moveSpeed = curRatio * 0.008 * speed; // fraction of loop per frame

    for (var n = 0; n < carriers.length; n++) {
      carriers[n].pos += direction * moveSpeed;
      if (carriers[n].pos > 1) carriers[n].pos -= 1;
      if (carriers[n].pos < 0) carriers[n].pos += 1;
    }
  }

  function reset() {
    running = false;
    simTime = 0;
    graphData = [];
    initCarriers();
    recordData();
    updateReadouts();
    drawCircuit();
    updateGraphs();
  }

  function step(timestamp) {
    if (!running) return;
    if (!lastFrameTime) lastFrameTime = timestamp;
    var elapsed = (timestamp - lastFrameTime) / 1000;
    lastFrameTime = timestamp;

    // Clamp elapsed to avoid jumps
    if (elapsed > 0.1) elapsed = 0.1;

    var dtStep = elapsed * speed;
    simTime += dtStep;

    // Stop if we've reached 5*tau
    if (simTime >= 5 * tau()) {
      simTime = 5 * tau();
      running = false;
    }

    updateCarriers(dtStep);
    recordData();
    updateReadouts();
    drawCircuit();
    updateGraphs();

    if (running) {
      animId = requestAnimationFrame(step);
    }
  }

  // --- Event listeners ---
  sliderEmf.addEventListener('input', function() {
    emf = parseFloat(this.value);
    valEmf.textContent = emf;
    if (!running) { reset(); }
  });
  sliderR.addEventListener('input', function() {
    R = parseFloat(this.value);
    valR.textContent = R;
    if (!running) { reset(); }
  });
  sliderC.addEventListener('input', function() {
    C_uF = parseFloat(this.value);
    valC.textContent = C_uF;
    if (!running) { reset(); }
  });

  btnCharge.addEventListener('click', function() {
    mode = 'charge';
    btnCharge.classList.add('active');
    btnDischarge.classList.remove('active');
    reset();
  });
  btnDischarge.addEventListener('click', function() {
    mode = 'discharge';
    btnDischarge.classList.add('active');
    btnCharge.classList.remove('active');
    reset();
  });

  btnPlay.addEventListener('click', function() {
    if (simTime >= 5 * tau()) {
      reset();
    }
    running = true;
    lastFrameTime = 0;
    animId = requestAnimationFrame(step);
  });
  btnPause.addEventListener('click', function() {
    running = false;
    if (animId) cancelAnimationFrame(animId);
  });
  btnReset.addEventListener('click', function() {
    if (animId) cancelAnimationFrame(animId);
    reset();
  });

  speedBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      speed = parseFloat(this.dataset.speed);
      speedBtns.forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
    });
  });

  // --- Init ---
  reset();

})();
</script>
