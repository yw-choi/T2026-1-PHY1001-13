<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;

}
header {
  background: #1a1a2e;

}
.back-btn { position: absolute; top: 14px; left: 16px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.85rem; padding: 4px 12px; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; transition: all 0.2s; }
.back-btn:hover { color: #fff; border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.1); }
header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: 1px; }

.container {
  max-width: 1100px;

}

/* Mode toggle */

  display: flex;

.bar-section { margin-top: 12px; }

<body>

<header>
  <h1>충돌 &amp; 운동량 보존 시뮬레이터</h1>
  <p>Ch.09 질량 중심과 선운동량 — 1D &amp; 2D 충돌</p>
<a href="index.html" class="back-btn">&larr; 시뮬레이션 목록</a>
</header>
<div class="sim-desc">1차원 및 2차원 충돌에서 운동량 보존 법칙을 시각화합니다. 탄성 충돌에서는 운동에너지도 보존되지만, 비탄성 충돌에서는 운동에너지가 감소합니다. 질량과 속도를 바꿔가며 충돌 전후의 물리량을 비교하세요.</div>

<div class="container">
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('1d')">1D 충돌</button>
    <button class="mode-btn" onclick="setMode('2d')">2D 충돌</button>
  </div>

  <div class="main-area">
    <div class="canvas-wrap">
      <canvas id="canvas" width="700" height="420"></canvas>
    </div>
    <div class="info-panel" id="infoPanel"></div>
  </div>

  <div class="controls">
    <div id="controlsContent"></div>
    <div class="btn-row">
      <button class="btn btn-play" id="btnPlay" onclick="play()">&#9654; 시작</button>
      <button class="btn btn-pause" id="btnPause" onclick="pause()" style="display:none">&#10074;&#10074; 일시정지</button>
      <button class="btn btn-reset" onclick="reset()">&#8635; 초기화</button>
    </div>
  </div>
  <div class="legend">공의 크기는 질량의 세제곱근에 비례합니다 (부피 스케일링). 궤적(trail)이 표시됩니다.</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let mode = '1d'; // '1d' or '2d'
let animating = false;
let animId = null;

// State
let state = {};
let trails1 = [], trails2 = [];

// Colors
const C1 = '#e53935'; // ball 1
const C2 = '#1e88e5'; // ball 2
const C1L = '#ffcdd2';
const C2L = '#bbdefb';
const CMerge = '#7b1fa2';

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && m === '1d') || (i === 1 && m === '2d'));
  });
  reset();
}

function buildControls1D() {
  return `
    <div class="controls-grid">
      <div class="control-group">
        <label>m₁ (질량 1)</label>
        <div class="slider-row">
          <input type="range" id="sl_m1" min="1" max="10" step="0.5" value="3">
          <span class="val" id="v_m1">3.0 kg</span>
        </div>
      </div>
      <div class="control-group">
        <label>m₂ (질량 2)</label>
        <div class="slider-row">
          <input type="range" id="sl_m2" min="1" max="10" step="0.5" value="5">
          <span class="val" id="v_m2">5.0 kg</span>
        </div>
      </div>
      <div class="control-group">
        <label>v₁ (속도 1, →+)</label>
        <div class="slider-row">
          <input type="range" id="sl_v1" min="-10" max="10" step="0.5" value="5">
          <span class="val" id="v_v1">5.0 m/s</span>
        </div>
      </div>
      <div class="control-group">
        <label>v₂ (속도 2, →+)</label>
        <div class="slider-row">
          <input type="range" id="sl_v2" min="-10" max="10" step="0.5" value="-3">
          <span class="val" id="v_v2">-3.0 m/s</span>
        </div>
      </div>
      <div class="control-group">
        <label>충돌 유형</label>
        <div class="collision-types">
          <label><input type="radio" name="ctype" value="elastic" checked><span>완전 탄성</span></label>
          <label><input type="radio" name="ctype" value="inelastic"><span>완전 비탄성</span></label>
          <label><input type="radio" name="ctype" value="partial"><span>부분 탄성</span></label>
        </div>
      </div>
      <div class="control-group" id="eGroup" style="display:none">
        <label>반발 계수 e</label>
        <div class="slider-row">
          <input type="range" id="sl_e" min="0" max="1" step="0.05" value="0.5">
          <span class="val" id="v_e">0.50</span>
        </div>
      </div>
    </div>`;
}

function buildControls2D() {
  return `
    <div class="controls-grid">
      <div class="control-group">
        <label>m₁ (질량 1)</label>
        <div class="slider-row">
          <input type="range" id="sl_m1" min="1" max="10" step="0.5" value="3">
          <span class="val" id="v_m1">3.0 kg</span>
        </div>
      </div>
      <div class="control-group">
        <label>m₂ (질량 2, 정지)</label>
        <div class="slider-row">
          <input type="range" id="sl_m2" min="1" max="10" step="0.5" value="5">
          <span class="val" id="v_m2">5.0 kg</span>
        </div>
      </div>
      <div class="control-group">
        <label>v₁ (초기 속력)</label>
        <div class="slider-row">
          <input type="range" id="sl_v1" min="1" max="10" step="0.5" value="6">
          <span class="val" id="v_v1">6.0 m/s</span>
        </div>
      </div>
      <div class="control-group">
        <label>충격 매개변수 b (오프셋)</label>
        <div class="slider-row">
          <input type="range" id="sl_b" min="-1" max="1" step="0.05" value="0.3">
          <span class="val" id="v_b">0.30</span>
        </div>
      </div>
    </div>`;
}

function bindSliders() {
  document.querySelectorAll('.controls input[type=range]').forEach(sl => {
    sl.addEventListener('input', () => {
      if (animating) return;
      reset();
    });
  });
  if (mode === '1d') {
    document.querySelectorAll('input[name=ctype]').forEach(r => {
      r.addEventListener('change', () => {
        const eg = document.getElementById('eGroup');
        eg.style.display = r.value === 'partial' && r.checked ? '' : 'none';
        // re-check
        const checked = document.querySelector('input[name=ctype]:checked').value;
        document.getElementById('eGroup').style.display = checked === 'partial' ? '' : 'none';
        if (!animating) reset();
      });
    });
  }
}

function getVal(id) { return parseFloat(document.getElementById(id).value); }
function showVal(id, v, unit) {
  const el = document.getElementById(id);
  if (el) el.textContent = v + (unit || '');
}

function radius(m) { return 12 + Math.pow(m, 1/3) * 8; }

function reset() {
  cancelAnimationFrame(animId);
  animating = false;
  document.getElementById('btnPlay').style.display = '';
  document.getElementById('btnPause').style.display = 'none';
  trails1 = []; trails2 = [];

  if (mode === '1d') {
    document.getElementById('controlsContent').innerHTML = buildControls1D();
  } else {
    document.getElementById('controlsContent').innerHTML = buildControls2D();
  }
  bindSliders();
  initState();
  draw();
  updateInfo();
}

function initState() {
  if (mode === '1d') {
    const m1 = getVal('sl_m1'), m2 = getVal('sl_m2');
    const v1 = getVal('sl_v1'), v2 = getVal('sl_v2');
    showVal('v_m1', m1.toFixed(1), ' kg');
    showVal('v_m2', m2.toFixed(1), ' kg');
    showVal('v_v1', v1.toFixed(1), ' m/s');
    showVal('v_v2', v2.toFixed(1), ' m/s');
    const ctype = document.querySelector('input[name=ctype]:checked')?.value || 'elastic';
    let e = 1;
    if (ctype === 'inelastic') e = 0;
    else if (ctype === 'partial') {
      e = getVal('sl_e');
      showVal('v_e', e.toFixed(2));
    }

    // Calculate final velocities
    let v1f, v2f;
    if (ctype === 'inelastic') {
      v1f = v2f = (m1 * v1 + m2 * v2) / (m1 + m2);
    } else {
      // general formula with restitution e
      // e = -(v1f - v2f) / (v1 - v2)
      // m1*v1 + m2*v2 = m1*v1f + m2*v2f
      v1f = (m1 * v1 + m2 * v2 + m2 * e * (v2 - v1)) / (m1 + m2);
      v2f = (m1 * v1 + m2 * v2 + m1 * e * (v1 - v2)) / (m1 + m2);
    }

    const r1 = radius(m1), r2 = radius(m2);
    const cy = H * 0.4;
    // Adaptive speed scaling: ensure collision happens in ~2-3 seconds
    const gap = (W - 300) - (r1 + r2); // approximate pixel gap between ball edges
    const approachSpeed = Math.abs(v1 - v2); // relative approach speed in m/s
    const targetTime = 2.5; // seconds until collision
    let pxPerMs;
    if (approachSpeed > 0.01) {
      pxPerMs = gap / (approachSpeed * targetTime);
    } else {
      pxPerMs = 18; // fallback
    }

    state = {
      m1, m2, v1i: v1, v2i: v2, v1f, v2f, e, ctype,
      r1, r2,
      pxPerMs,
      // positions in canvas coords
      x1: 150, x2: W - 150,
      y1: cy, y2: cy,
      vx1: v1 * pxPerMs, vx2: v2 * pxPerMs, // pixels/sec speed for animation
      collided: false,
      merged: false,
      phase: 'before', // before, collision, after
      t: 0
    };
    if (ctype === 'inelastic') state.merged = false; // will merge on collision
  } else {
    // 2D mode
    const m1 = getVal('sl_m1'), m2 = getVal('sl_m2');
    const v1 = getVal('sl_v1');
    const b = getVal('sl_b');
    showVal('v_m1', m1.toFixed(1), ' kg');
    showVal('v_m2', m2.toFixed(1), ' kg');
    showVal('v_v1', v1.toFixed(1), ' m/s');
    showVal('v_b', b.toFixed(2));

    const r1 = radius(m1), r2 = radius(m2);
    const cx2 = W * 0.55, cy2 = H * 0.45;
    const totalR = r1 + r2;
    const bPixels = b * totalR; // impact parameter in pixels

    // Adaptive speed for 2D: ball1 travels from x=100 to x~cx2 in ~2.5 seconds
    const gap2D = cx2 - 100 - totalR;
    const targetTime2D = 2.5;
    const pxPerMs2D = gap2D / (v1 * targetTime2D);

    state = {
      m1, m2, v1i: v1, b, r1, r2,
      pxPerMs: pxPerMs2D,
      x1: 100, y1: cy2 + bPixels,
      x2: cx2, y2: cy2,
      vx1: v1 * pxPerMs2D, vy1: 0,
      vx2: 0, vy2: 0,
      collided: false,
      phase: 'before',
      t: 0,
      // final velocities computed at collision time
      v1fx: 0, v1fy: 0, v2fx: 0, v2fy: 0
    };
  }
}

function compute2DCollision() {
  // 2D elastic collision between moving ball1 and stationary ball2
  const s = state;
  const dx = s.x2 - s.x1;
  const dy = s.y2 - s.y1;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist === 0) return;
  // normal and tangent unit vectors
  const nx = dx / dist, ny = dy / dist;
  const tx = -ny, ty = nx;

  // project velocities onto normal and tangent
  const v1n = s.vx1 * nx + s.vy1 * ny;
  const v1t = s.vx1 * tx + s.vy1 * ty;
  const v2n = s.vx2 * nx + s.vy2 * ny;
  const v2t = s.vx2 * tx + s.vy2 * ty;

  // 1D elastic collision along normal
  const m1 = s.m1, m2 = s.m2;
  const v1nf = (v1n * (m1 - m2) + 2 * m2 * v2n) / (m1 + m2);
  const v2nf = (v2n * (m2 - m1) + 2 * m1 * v1n) / (m1 + m2);
  // tangential components unchanged
  const v1tf = v1t;
  const v2tf = v2t;

  // convert back to x,y
  s.vx1 = v1nf * nx + v1tf * tx;
  s.vy1 = v1nf * ny + v1tf * ty;
  s.vx2 = v2nf * nx + v2tf * tx;
  s.vy2 = v2nf * ny + v2tf * ty;

  // store for info display
  s.v1fx = s.vx1 / s.pxPerMs;
  s.v1fy = s.vy1 / s.pxPerMs;
  s.v2fx = s.vx2 / s.pxPerMs;
  s.v2fy = s.vy2 / s.pxPerMs;
}

function play() {
  if (animating) return;
  animating = true;
  document.getElementById('btnPlay').style.display = 'none';
  document.getElementById('btnPause').style.display = '';
  state.lastTime = performance.now();
  animId = requestAnimationFrame(step);
}

function pause() {
  animating = false;
  cancelAnimationFrame(animId);
  document.getElementById('btnPlay').style.display = '';
  document.getElementById('btnPause').style.display = 'none';
}

function step(now) {
  if (!animating) return;
  const dt = Math.min((now - state.lastTime) / 1000, 0.05);
  state.lastTime = now;
  state.t += dt;

  if (mode === '1d') step1D(dt);
  else step2D(dt);

  draw();
  updateInfo();
  animId = requestAnimationFrame(step);
}

function step1D(dt) {
  const s = state;
  if (!s.collided) {
    s.x1 += s.vx1 * dt;
    s.x2 += s.vx2 * dt;
    trails1.push({ x: s.x1, y: s.y1 });
    trails2.push({ x: s.x2, y: s.y2 });

    // check collision
    const dist = Math.abs(s.x2 - s.x1);
    if (dist <= s.r1 + s.r2) {
      s.collided = true;
      s.phase = 'after';
      // set final velocities
      if (s.ctype === 'inelastic') {
        s.merged = true;
        const vf = s.v1f * s.pxPerMs;
        s.vx1 = vf;
        s.vx2 = vf;
        // place them together
        const cx = (s.x1 * s.m1 + s.x2 * s.m2) / (s.m1 + s.m2);
        s.x1 = cx;
        s.x2 = cx;
      } else {
        s.vx1 = s.v1f * s.pxPerMs;
        s.vx2 = s.v2f * s.pxPerMs;
        // separate them so they don't overlap
        const overlap = (s.r1 + s.r2) - Math.abs(s.x2 - s.x1);
        if (s.x1 < s.x2) {
          s.x1 -= overlap / 2;
          s.x2 += overlap / 2;
        } else {
          s.x1 += overlap / 2;
          s.x2 -= overlap / 2;
        }
      }
    }
  } else {
    if (s.merged) {
      s.x1 += s.vx1 * dt;
      s.x2 = s.x1;
      trails1.push({ x: s.x1, y: s.y1 });
    } else {
      s.x1 += s.vx1 * dt;
      s.x2 += s.vx2 * dt;
      trails1.push({ x: s.x1, y: s.y1 });
      trails2.push({ x: s.x2, y: s.y2 });
    }
  }
}

function step2D(dt) {
  const s = state;
  if (!s.collided) {
    s.x1 += s.vx1 * dt;
    s.y1 += s.vy1 * dt;
    s.x2 += s.vx2 * dt;
    s.y2 += s.vy2 * dt;
    trails1.push({ x: s.x1, y: s.y1 });
    trails2.push({ x: s.x2, y: s.y2 });

    const dx = s.x2 - s.x1, dy = s.y2 - s.y1;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist <= s.r1 + s.r2) {
      s.collided = true;
      s.phase = 'after';
      // separate
      const overlap = (s.r1 + s.r2) - dist;
      const nx = dx / dist, ny = dy / dist;
      s.x1 -= nx * overlap / 2;
      s.y1 -= ny * overlap / 2;
      s.x2 += nx * overlap / 2;
      s.y2 += ny * overlap / 2;
      compute2DCollision();
    }
  } else {
    s.x1 += s.vx1 * dt;
    s.y1 += s.vy1 * dt;
    s.x2 += s.vx2 * dt;
    s.y2 += s.vy2 * dt;
    trails1.push({ x: s.x1, y: s.y1 });
    trails2.push({ x: s.x2, y: s.y2 });
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  if (mode === '1d') draw1D();
  else draw2D();
}

function draw1D() {
  const s = state;
  // ground line
  const gy = s.y1 + 50;
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(20, gy);
  ctx.lineTo(W - 20, gy);
  ctx.stroke();

  // trails
  drawTrail(trails1, C1L, 3);
  drawTrail(trails2, C2L, 3);

  // velocity arrows (before collision shown on top area)
  if (!s.collided) {
    drawArrow1D(s.x1, s.y1 - s.r1 - 25, s.vx1 / s.pxPerMs, C1, 'v₁');
    drawArrow1D(s.x2, s.y2 - s.r2 - 25, s.vx2 / s.pxPerMs, C2, 'v₂');
  } else {
    if (s.merged) {
      drawArrow1D(s.x1, s.y1 - radius(s.m1 + s.m2) - 25, s.vx1 / s.pxPerMs, CMerge, "v'");
    } else {
      drawArrow1D(s.x1, s.y1 - s.r1 - 25, s.vx1 / s.pxPerMs, C1, "v₁'");
      drawArrow1D(s.x2, s.y2 - s.r2 - 25, s.vx2 / s.pxPerMs, C2, "v₂'");
    }
  }

  // balls
  if (s.merged && s.collided) {
    const rm = radius(s.m1 + s.m2);
    drawBall(s.x1, s.y1, rm, CMerge, 'm₁+m₂');
  } else {
    drawBall(s.x1, s.y1, s.r1, C1, 'm₁');
    drawBall(s.x2, s.y2, s.r2, C2, 'm₂');
  }

  // momentum/KE bars at bottom
  drawBars1D();
}

function draw2D() {
  const s = state;

  // grid
  ctx.strokeStyle = '#eee';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // trails
  drawTrail(trails1, C1L, 3);
  drawTrail(trails2, C2L, 3);

  // velocity vectors
  const arrowScale = 3.5;
  if (!s.collided) {
    drawArrow2D(s.x1, s.y1, s.vx1 * arrowScale / s.pxPerMs, s.vy1 * arrowScale / s.pxPerMs, C1, 'v₁');
  } else {
    drawArrow2D(s.x1, s.y1, s.vx1 * arrowScale / s.pxPerMs, s.vy1 * arrowScale / s.pxPerMs, C1, "v₁'");
    drawArrow2D(s.x2, s.y2, s.vx2 * arrowScale / s.pxPerMs, s.vy2 * arrowScale / s.pxPerMs, C2, "v₂'");
  }

  // momentum vectors
  const pScale = 1.5;
  const px1 = s.m1 * s.vx1 / s.pxPerMs, py1 = s.m1 * s.vy1 / s.pxPerMs;
  const px2 = s.m2 * s.vx2 / s.pxPerMs, py2 = s.m2 * s.vy2 / s.pxPerMs;
  // show total momentum arrow from bottom-left corner
  const ox = 80, oy = H - 40;
  drawArrow2D(ox, oy, (px1 + px2) * pScale, (py1 + py2) * pScale, '#4caf50', 'p_total');
  drawArrow2D(ox, oy, px1 * pScale, py1 * pScale, C1, 'p₁');
  if (s.collided || (s.vx2 !== 0 || s.vy2 !== 0)) {
    // draw p2 from tip of p1
    drawArrow2D(ox + px1 * pScale, oy + py1 * pScale, px2 * pScale, py2 * pScale, C2, 'p₂');
  }

  // balls
  drawBall(s.x1, s.y1, s.r1, C1, 'm₁');
  drawBall(s.x2, s.y2, s.r2, C2, 'm₂');
}

function drawBall(x, y, r, color, label) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  const g = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
  g.addColorStop(0, lighten(color, 40));
  g.addColorStop(1, color);
  ctx.fillStyle = g;
  ctx.fill();
  ctx.strokeStyle = darken(color, 20);
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.max(10, r * 0.6)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y);
}

function drawTrail(trail, color, w) {
  if (trail.length < 2) return;
  ctx.strokeStyle = color;
  ctx.lineWidth = w;
  ctx.setLineDash([4, 3]);
  ctx.beginPath();
  ctx.moveTo(trail[0].x, trail[0].y);
  const step = Math.max(1, Math.floor(trail.length / 300));
  for (let i = step; i < trail.length; i += step) {
    ctx.lineTo(trail[i].x, trail[i].y);
  }
  ctx.lineTo(trail[trail.length - 1].x, trail[trail.length - 1].y);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawArrow1D(x, y, v, color, label) {
  let len = v * 8;
  // If velocity is essentially zero, hide both arrow and label
  if (Math.abs(v) < 0.01) return;
  // Enforce minimum arrow length of 3px for visibility
  if (Math.abs(len) < 3) {
    len = Math.sign(len) * 3;
  }
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + len, y);
  ctx.stroke();
  // arrowhead
  const dir = Math.sign(len);
  ctx.beginPath();
  ctx.moveTo(x + len, y);
  ctx.lineTo(x + len - dir * 8, y - 5);
  ctx.lineTo(x + len - dir * 8, y + 5);
  ctx.fill();
  // label
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(label, x + len / 2, y - 10);
}

function drawArrow2D(x, y, dx, dy, color, label) {
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 0.5) return;
  // Enforce minimum arrow length for visibility
  if (len < 3 && len > 0) {
    const scale = 3 / len;
    dx *= scale;
    dy *= scale;
  }
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + dx, y + dy);
  ctx.stroke();
  // arrowhead
  const angle = Math.atan2(dy, dx);
  ctx.beginPath();
  ctx.moveTo(x + dx, y + dy);
  ctx.lineTo(x + dx - 8 * Math.cos(angle - 0.4), y + dy - 8 * Math.sin(angle - 0.4));
  ctx.lineTo(x + dx - 8 * Math.cos(angle + 0.4), y + dy - 8 * Math.sin(angle + 0.4));
  ctx.fill();
  // label
  ctx.font = 'bold 10px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(label, x + dx / 2 + 5, y + dy / 2 - 5);
}

function drawBars1D() {
  const s = state;
  const barY = H - 90;
  const barW = W - 100;
  const barH = 16;
  const x0 = 50;

  // Momentum bar
  const pBefore = s.m1 * s.v1i + s.m2 * s.v2i;
  let pAfter;
  if (s.collided) {
    if (s.merged) pAfter = (s.m1 + s.m2) * (s.vx1 / s.pxPerMs);
    else pAfter = s.m1 * (s.vx1 / s.pxPerMs) + s.m2 * (s.vx2 / s.pxPerMs);
  } else {
    pAfter = pBefore;
  }

  ctx.fillStyle = '#444';
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('운동량 p (kg·m/s)', x0, barY - 5);

  const maxP = Math.max(Math.abs(pBefore), 1) * 1.3;
  const mid = x0 + barW / 2;
  // before
  drawBarFill(x0, barY, barW, barH / 2, pBefore, maxP, '#4caf50', '전');
  // after
  drawBarFill(x0, barY + barH / 2 + 2, barW, barH / 2, pAfter, maxP, '#66bb6a', '후');

  // KE bar
  const keY = barY + 40;
  const ke1b = 0.5 * s.m1 * s.v1i * s.v1i + 0.5 * s.m2 * s.v2i * s.v2i;
  let ke1a;
  if (s.collided) {
    if (s.merged) ke1a = 0.5 * (s.m1 + s.m2) * (s.vx1 / s.pxPerMs) * (s.vx1 / s.pxPerMs);
    else ke1a = 0.5 * s.m1 * (s.vx1 / s.pxPerMs) * (s.vx1 / s.pxPerMs) + 0.5 * s.m2 * (s.vx2 / s.pxPerMs) * (s.vx2 / s.pxPerMs);
  } else {
    ke1a = ke1b;
  }

  ctx.fillStyle = '#444';
  ctx.fillText('운동에너지 KE (J)', x0, keY - 5);

  const maxKE = Math.max(ke1b, 1) * 1.2;
  drawBarFillPositive(x0, keY, barW, barH / 2, ke1b, maxKE, '#ff9800', '전');
  drawBarFillPositive(x0, keY + barH / 2 + 2, barW, barH / 2, ke1a, maxKE, '#ffb74d', '후');

  // values
  ctx.font = '10px monospace';
  ctx.fillStyle = '#666';
  ctx.textAlign = 'right';
  ctx.fillText(`p전=${pBefore.toFixed(1)}  p후=${pAfter.toFixed(1)}`, x0 + barW, barY - 5);
  ctx.fillText(`KE전=${ke1b.toFixed(1)}  KE후=${ke1a.toFixed(1)}`, x0 + barW, keY - 5);
}

function drawBarFill(x, y, w, h, val, maxVal, color, label) {
  ctx.fillStyle = '#eee';
  ctx.fillRect(x, y, w, h);
  const mid = x + w / 2;
  const barLen = (val / maxVal) * (w / 2);
  ctx.fillStyle = color;
  if (val >= 0) {
    ctx.fillRect(mid, y, barLen, h);
  } else {
    ctx.fillRect(mid + barLen, y, -barLen, h);
  }
  // center line
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(mid, y - 2);
  ctx.lineTo(mid, y + h + 2);
  ctx.stroke();
  // label
  ctx.fillStyle = '#888';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(label, x - 3, y + h - 1);
}

function drawBarFillPositive(x, y, w, h, val, maxVal, color, label) {
  ctx.fillStyle = '#eee';
  ctx.fillRect(x, y, w, h);
  const barLen = (val / maxVal) * w;
  ctx.fillStyle = color;
  ctx.fillRect(x, y, Math.max(0, barLen), h);
  ctx.fillStyle = '#888';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(label, x - 3, y + h - 1);
}

function updateInfo() {
  const panel = document.getElementById('infoPanel');
  if (mode === '1d') updateInfo1D(panel);
  else updateInfo2D(panel);
}

function updateInfo1D(panel) {
  const s = state;
  const pBefore = s.m1 * s.v1i + s.m2 * s.v2i;
  const keBefore = 0.5 * s.m1 * s.v1i ** 2 + 0.5 * s.m2 * s.v2i ** 2;
  const keAfter = 0.5 * s.m1 * s.v1f ** 2 + 0.5 * s.m2 * s.v2f ** 2;
  const pAfter = s.m1 * s.v1f + s.m2 * s.v2f;
  const typeName = s.ctype === 'elastic' ? '완전 탄성' : s.ctype === 'inelastic' ? '완전 비탄성' : `부분 탄성 (e=${s.e.toFixed(2)})`;

  panel.innerHTML = `
    <h3>1D 충돌 정보</h3>
    <div style="margin-bottom:6px;font-size:0.8rem;color:#888;">유형: <strong>${typeName}</strong></div>
    <div class="info-row"><span class="label">m₁</span><span class="value">${s.m1.toFixed(1)} kg</span></div>
    <div class="info-row"><span class="label">m₂</span><span class="value">${s.m2.toFixed(1)} kg</span></div>
    <h3 style="margin-top:10px">충돌 전</h3>
    <div class="info-row"><span class="label">v₁</span><span class="value">${s.v1i.toFixed(1)} m/s</span></div>
    <div class="info-row"><span class="label">v₂</span><span class="value">${s.v2i.toFixed(1)} m/s</span></div>
    <div class="info-row"><span class="label">p 전체</span><span class="value">${pBefore.toFixed(2)} kg·m/s</span></div>
    <div class="info-row"><span class="label">KE 전체</span><span class="value">${keBefore.toFixed(2)} J</span></div>
    <h3 style="margin-top:10px">충돌 후</h3>
    <div class="info-row"><span class="label">v₁'</span><span class="value">${s.v1f.toFixed(2)} m/s</span></div>
    <div class="info-row"><span class="label">v₂'</span><span class="value">${s.v2f.toFixed(2)} m/s</span></div>
    <div class="info-row"><span class="label">p 전체</span><span class="value">${pAfter.toFixed(2)} kg·m/s</span></div>
    <div class="info-row"><span class="label">KE 전체</span><span class="value">${keAfter.toFixed(2)} J</span></div>
    <div class="info-row" style="background:#f0fff0;margin:4px -8px;padding:5px 8px;border-radius:4px;">
      <span class="label">Δp</span><span class="value" style="color:${Math.abs(pAfter - pBefore) < 0.01 ? '#4caf50' : '#f44336'}">${(pAfter - pBefore).toFixed(4)}</span>
    </div>
    <div class="info-row" style="background:#fff8e1;margin:4px -8px;padding:5px 8px;border-radius:4px;">
      <span class="label">ΔKE</span><span class="value" style="color:${Math.abs(keAfter - keBefore) < 0.01 ? '#4caf50' : '#ff9800'}">${(keAfter - keBefore).toFixed(2)} J</span>
    </div>
    <div style="margin-top:10px;font-size:0.75rem;color:#888;line-height:1.5;">
      ${s.ctype === 'elastic' ? '탄성 충돌: 운동량과 운동에너지 모두 보존' :
        s.ctype === 'inelastic' ? '완전 비탄성: 운동량 보존, 운동에너지 최대 손실' :
        '부분 탄성: 운동량 보존, 운동에너지 일부 손실'}
    </div>`;
}

function updateInfo2D(panel) {
  const s = state;
  const v1mag = Math.sqrt(s.vx1 * s.vx1 + s.vy1 * s.vy1) / s.pxPerMs;
  const v2mag = Math.sqrt(s.vx2 * s.vx2 + s.vy2 * s.vy2) / s.pxPerMs;
  const px = s.m1 * s.vx1 / s.pxPerMs + s.m2 * s.vx2 / s.pxPerMs;
  const py = s.m1 * s.vy1 / s.pxPerMs + s.m2 * s.vy2 / s.pxPerMs;
  const pTotal = Math.sqrt(px * px + py * py);
  const pInit = s.m1 * s.v1i;
  const keBefore = 0.5 * s.m1 * s.v1i * s.v1i;
  const keAfter = 0.5 * s.m1 * v1mag * v1mag + 0.5 * s.m2 * v2mag * v2mag;

  let afterSection = '';
  if (s.collided) {
    const angle1 = Math.atan2(s.vy1, s.vx1) * 180 / Math.PI;
    const angle2 = Math.atan2(s.vy2, s.vx2) * 180 / Math.PI;
    afterSection = `
    <h3 style="margin-top:10px">충돌 후</h3>
    <div class="info-row"><span class="label">|v₁'|</span><span class="value">${v1mag.toFixed(2)} m/s</span></div>
    <div class="info-row"><span class="label">θ₁</span><span class="value">${angle1.toFixed(1)}°</span></div>
    <div class="info-row"><span class="label">|v₂'|</span><span class="value">${v2mag.toFixed(2)} m/s</span></div>
    <div class="info-row"><span class="label">θ₂</span><span class="value">${angle2.toFixed(1)}°</span></div>
    <div class="info-row"><span class="label">KE 전체</span><span class="value">${keAfter.toFixed(2)} J</span></div>
    <div class="info-row" style="background:#f0fff0;margin:4px -8px;padding:5px 8px;border-radius:4px;">
      <span class="label">|p| 전체</span><span class="value" style="color:#4caf50">${pTotal.toFixed(2)}</span>
    </div>
    <div class="info-row" style="background:#fff8e1;margin:4px -8px;padding:5px 8px;border-radius:4px;">
      <span class="label">ΔKE</span><span class="value" style="color:${Math.abs(keAfter - keBefore) < 0.05 ? '#4caf50' : '#ff9800'}">${(keAfter - keBefore).toFixed(2)} J</span>
    </div>`;
  }

  panel.innerHTML = `
    <h3>2D 탄성 충돌</h3>
    <div class="info-row"><span class="label">m₁</span><span class="value">${s.m1.toFixed(1)} kg</span></div>
    <div class="info-row"><span class="label">m₂ (정지)</span><span class="value">${s.m2.toFixed(1)} kg</span></div>
    <div class="info-row"><span class="label">b (충격 매개변수)</span><span class="value">${s.b.toFixed(2)}</span></div>
    <h3 style="margin-top:10px">충돌 전</h3>
    <div class="info-row"><span class="label">v₁</span><span class="value">${s.v1i.toFixed(1)} m/s →</span></div>
    <div class="info-row"><span class="label">v₂</span><span class="value">0 m/s</span></div>
    <div class="info-row"><span class="label">p 전체</span><span class="value">${pInit.toFixed(2)} kg·m/s</span></div>
    <div class="info-row"><span class="label">KE 전체</span><span class="value">${keBefore.toFixed(2)} J</span></div>
    ${afterSection}
    <div style="margin-top:10px;font-size:0.75rem;color:#888;line-height:1.5;">
      좌하단: 운동량 벡터 표시<br>
      <span style="color:${C1}">빨강=p₁</span>,
      <span style="color:${C2}">파랑=p₂</span>,
      <span style="color:#4caf50">초록=p전체</span>
    </div>`;
}

// Color helpers
function lighten(hex, pct) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const f = pct / 100;
  return `rgb(${Math.min(255, r + (255 - r) * f)},${Math.min(255, g + (255 - g) * f)},${Math.min(255, b + (255 - b) * f)})`;
}
function darken(hex, pct) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const f = 1 - pct / 100;
  return `rgb(${Math.floor(r * f)},${Math.floor(g * f)},${Math.floor(b * f)})`;
}

// Init
reset();
</script>
