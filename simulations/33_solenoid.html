<style>

<body>

<header>
  <a href="index.html" class="back-btn">&larr; 시뮬레이션 목록</a>
  <h1>솔레노이드와 인덕턴스</h1>
  <p>Ch.32 맥스웰 방정식</p>
</header>

<div class="container">
  <div class="desc-box">
    솔레노이드 내부에는 균일한 자기장 B&nbsp;=&nbsp;&mu;&#8320;ni가 형성되며, 외부에서는 자기장이 거의 0입니다.
    코일의 단위 길이당 감은 수(n), 전류(i), 반지름(a), 길이(l)를 조절하며 자기장, 인덕턴스(L&nbsp;=&nbsp;&mu;&#8320;n&sup2;Al), 저장 에너지(U&nbsp;=&nbsp;&frac12;Li&sup2;)의 변화를 관찰해 보세요.
  </div>

  <div class="main-layout">
    <div class="canvas-panel">
      <canvas id="solCanvas"></canvas>
    </div>
    <div class="right-panel">
      <div class="plot-card">
        <div class="plot-label">B(r) 프로파일 &mdash; 반지름 방향</div>
        <canvas id="plotCanvas"></canvas>
      </div>
      <div class="energy-card">
        <div class="energy-label">저장 에너지 U = &frac12;Li&sup2;</div>
        <div class="energy-bar-bg">
          <div class="energy-bar-fill" id="energyFill" style="width:0%"></div>
          <div class="energy-bar-text" id="energyText">0 J</div>
        </div>
      </div>
    </div>
  </div>

  <div class="info-bar">
    <div class="info-item">
      <div class="label">자기장 B</div>
      <div class="value" id="valB">0</div>
      <div class="unit">mT</div>
    </div>
    <div class="info-item">
      <div class="label">인덕턴스 L</div>
      <div class="value" id="valL">0</div>
      <div class="unit">mH</div>
    </div>
    <div class="info-item">
      <div class="label">저장 에너지 U</div>
      <div class="value" id="valU">0</div>
      <div class="unit">mJ</div>
    </div>
    <div class="info-item">
      <div class="label">자속 &Phi; = BA</div>
      <div class="value" id="valPhi">0</div>
      <div class="unit">&mu;Wb</div>
    </div>
  </div>

  <div class="controls">
    <div class="control-row">
      <div class="control-group">
        <label>감은 수 밀도 n <span id="dispN">500</span> turns/m</label>
        <input type="range" id="sliderN" min="100" max="2000" value="500" step="10">
      </div>
      <div class="control-group">
        <label>전류 i <span id="dispI">3.0</span> A</label>
        <input type="range" id="sliderI" min="0" max="100" value="30" step="1">
      </div>
    </div>
    <div class="control-row">
      <div class="control-group">
        <label>반지름 a <span id="dispA">4.0</span> cm</label>
        <input type="range" id="sliderA" min="10" max="100" value="40" step="1">
      </div>
      <div class="control-group">
        <label>길이 l <span id="dispL">20</span> cm</label>
        <input type="range" id="sliderLen" min="50" max="500" value="200" step="5">
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  "use strict";
  var MU0 = 4 * Math.PI * 1e-7;
  var PI2 = 2 * Math.PI;

  /* ---- DOM refs ---- */
  var slN  = document.getElementById('sliderN');
  var slI  = document.getElementById('sliderI');
  var slA  = document.getElementById('sliderA');
  var slL  = document.getElementById('sliderLen');
  var solC = document.getElementById('solCanvas');
  var pltC = document.getElementById('plotCanvas');
  var sCtx = solC.getContext('2d');
  var pCtx = pltC.getContext('2d');

  var animT = 0, lastTS = 0;

  /* ---- helpers ---- */
  function resizeCanvas(c) {
    var dpr = window.devicePixelRatio || 1;
    var r = c.getBoundingClientRect();
    c.width  = r.width  * dpr;
    c.height = r.height * dpr;
    c.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
    c._w = r.width;
    c._h = r.height;
  }

  function params() {
    return {
      n: +slN.value,
      i: +slI.value / 10,
      a: +slA.value / 1000,
      l: +slL.value / 1000
    };
  }

  function physics(p) {
    var B   = MU0 * p.n * p.i;
    var A   = Math.PI * p.a * p.a;
    var L   = MU0 * p.n * p.n * A * p.l;
    var U   = 0.5 * L * p.i * p.i;
    var phi = B * A;
    return { B:B, A:A, L:L, U:U, phi:phi };
  }

  /* ---- update info displays ---- */
  function updateInfo(p, ph) {
    document.getElementById('dispN').textContent = p.n;
    document.getElementById('dispI').textContent = p.i.toFixed(1);
    document.getElementById('dispA').textContent = (p.a * 100).toFixed(1);
    document.getElementById('dispL').textContent = (p.l * 100).toFixed(0);

    document.getElementById('valB').textContent   = (ph.B * 1e3).toFixed(3);
    document.getElementById('valL').textContent   = (ph.L * 1e3).toFixed(4);
    document.getElementById('valU').textContent   = (ph.U * 1e3).toFixed(4);
    document.getElementById('valPhi').textContent = (ph.phi * 1e6).toFixed(3);

    /* energy bar — logarithmic-ish scale for visibility */
    var maxU = 0.5 * MU0 * 2000*2000 * Math.PI*0.1*0.1 * 0.5 * 10*10;
    var pct  = Math.min(100, Math.sqrt(ph.U / maxU) * 100);
    document.getElementById('energyFill').style.width = pct + '%';
    var txt = ph.U < 1e-6 ? (ph.U*1e6).toFixed(2)+' \u03bcJ'
            : ph.U < 1e-3 ? (ph.U*1e3).toFixed(3)+' mJ'
            : ph.U.toFixed(4)+' J';
    document.getElementById('energyText').textContent = txt;
  }

  /* ---- arrow utility ---- */
  function arrow(ctx, x1,y1, x2,y2, col, lw) {
    var dx=x2-x1, dy=y2-y1, a=Math.atan2(dy,dx), hl=5+lw;
    ctx.save();
    ctx.strokeStyle = ctx.fillStyle = col;
    ctx.lineWidth = lw;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - hl*Math.cos(a-0.38), y2 - hl*Math.sin(a-0.38));
    ctx.lineTo(x2 - hl*Math.cos(a+0.38), y2 - hl*Math.sin(a+0.38));
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  /* ---- draw solenoid ---- */
  function drawSol(p, ph, t) {
    var W = solC._w, H = solC._h;
    sCtx.clearRect(0, 0, W, H);

    var cx = W / 2, cy = H / 2 + 5;

    /* map physical size to pixels */
    var solW = Math.max(60, p.l / 0.5 * (W * 0.65));
    var solH = Math.max(25, p.a / 0.1 * 140);
    var sL = cx - solW/2, sR = cx + solW/2;
    var sT = cy - solH,   sB = cy + solH;

    /* ---- 1. External field lines (bar-magnet style) ---- */
    if (p.i > 0.01) {
      sCtx.save();
      var nExt = 5;
      for (var k = 0; k < nExt; k++) {
        var frac = (k + 1) / (nExt + 1);
        var yOff = solH * frac * 0.85;
        var bulgeX = solW * (0.25 + 0.25 * frac);
        var bulgeY = solH + 25 + 55 * frac;
        for (var s = -1; s <= 1; s += 2) {
          sCtx.beginPath();
          sCtx.moveTo(sR, cy + s * yOff);
          sCtx.bezierCurveTo(
            sR + bulgeX, cy + s * bulgeY,
            sL - bulgeX, cy + s * bulgeY,
            sL, cy + s * yOff
          );
          sCtx.strokeStyle = 'rgba(50,130,200,0.16)';
          sCtx.lineWidth = 1.2;
          sCtx.stroke();
          /* small arrow at midpoint */
          var mx = cx, my = cy + s * bulgeY * 0.62;
          var aDir = (s < 0) ? Math.PI : 0; /* top: leftward, bottom: rightward */
          sCtx.save();
          sCtx.fillStyle = 'rgba(50,130,200,0.28)';
          var sz = 5;
          sCtx.beginPath();
          sCtx.moveTo(mx + sz*Math.cos(aDir), my + sz*Math.sin(aDir));
          sCtx.lineTo(mx + sz*Math.cos(aDir+2.5), my + sz*Math.sin(aDir+2.5));
          sCtx.lineTo(mx + sz*Math.cos(aDir-2.5), my + sz*Math.sin(aDir-2.5));
          sCtx.closePath(); sCtx.fill();
          sCtx.restore();
        }
      }
      sCtx.restore();
    }

    /* ---- 2. B field arrows inside ---- */
    if (p.i > 0.01) {
      var bNorm = Math.min(1, ph.B / (MU0 * 2000 * 10));
      var aLen  = 14 + 28 * bNorm;
      var nRows = Math.max(1, Math.round(2 + solH / 45));
      var nCols = Math.max(2, Math.round(solW / (aLen * 1.6)));
      var cSp = solW / (nCols + 1);
      var rSp = (solH * 2) / (nRows + 1);
      for (var r = 0; r < nRows; r++) {
        var ay = sT + rSp * (r + 1);
        for (var c = 0; c < nCols; c++) {
          var ax = sL + cSp * (c + 1);
          var al = (0.3 + 0.65 * bNorm).toFixed(2);
          arrow(sCtx, ax - aLen/2, ay, ax + aLen/2, ay,
                'rgba(0,100,220,' + al + ')', 1.2 + bNorm * 0.8);
        }
      }
    }

    /* ---- 3. "B ~ 0" labels outside ---- */
    sCtx.save();
    sCtx.font = '12px sans-serif';
    sCtx.fillStyle = '#aaa';
    sCtx.textAlign = 'center';
    if (sL > 55) sCtx.fillText('B \u2248 0', sL / 2, cy);
    if (W - sR > 55) sCtx.fillText('B \u2248 0', (sR + W) / 2, cy);
    sCtx.restore();

    /* ---- 4. Coil windings (back half, then front half for 3-D look) ---- */
    var totalTurns = Math.round(p.n * p.l);
    var vis = Math.min(totalTurns, Math.max(8, Math.round(solW / 7)));
    var tSp = solW / vis;
    var eRx = tSp * 0.38;  /* ellipse x-radius */
    var speed = p.i > 0.01 ? p.i * 0.18 : 0;

    /* back half of each ellipse (behind B arrows) */
    sCtx.save();
    sCtx.globalAlpha = 0.35;
    for (var k = 0; k < vis; k++) {
      var ex = sL + tSp * (k + 0.5);
      sCtx.beginPath();
      sCtx.ellipse(ex, cy, eRx, solH, 0, Math.PI, PI2); /* bottom half = back */
      sCtx.strokeStyle = '#b33';
      sCtx.lineWidth = 1.8;
      sCtx.stroke();
    }
    sCtx.restore();

    /* front half of each ellipse */
    sCtx.save();
    for (var k = 0; k < vis; k++) {
      var ex = sL + tSp * (k + 0.5);
      sCtx.beginPath();
      sCtx.ellipse(ex, cy, eRx, solH, 0, 0, Math.PI); /* top half = front */
      sCtx.strokeStyle = '#c44';
      sCtx.lineWidth = 2.2;
      sCtx.stroke();
    }
    sCtx.restore();

    /* ---- 5. Animated current dots ---- */
    if (speed > 0) {
      var dotsPerTurn = 3;
      sCtx.save();
      for (var k = 0; k < vis; k++) {
        var ex = sL + tSp * (k + 0.5);
        for (var d = 0; d < dotsPerTurn; d++) {
          var phase = t * speed + (k / vis) * PI2 + d * (PI2 / dotsPerTurn);
          var ang = phase % PI2;
          var dx = ex + eRx * Math.cos(ang);
          var dy = cy + solH * Math.sin(ang);
          sCtx.beginPath();
          sCtx.arc(dx, dy, 3, 0, PI2);
          sCtx.fillStyle = '#ffe033';
          sCtx.fill();
          sCtx.lineWidth = 0.8;
          sCtx.strokeStyle = '#c90';
          sCtx.stroke();
        }
      }
      sCtx.restore();
    }

    /* ---- 6. Connecting wires + current labels ---- */
    sCtx.save();
    sCtx.strokeStyle = '#c44'; sCtx.lineWidth = 2;
    sCtx.beginPath(); sCtx.moveTo(sL, sT); sCtx.lineTo(sL-28, sT); sCtx.lineTo(sL-28, sT-22); sCtx.stroke();
    sCtx.beginPath(); sCtx.moveTo(sR, sT); sCtx.lineTo(sR+28, sT); sCtx.lineTo(sR+28, sT-22); sCtx.stroke();
    if (p.i > 0.01) {
      sCtx.font = 'bold 11px sans-serif';
      sCtx.fillStyle = '#c44';
      sCtx.textAlign = 'center';
      sCtx.fillText('i \u2192', sL - 28, sT - 28);
      sCtx.fillText('\u2190 i', sR + 28, sT - 28);
    }
    sCtx.restore();

    /* ---- 7. Dimension annotations ---- */
    sCtx.save();
    sCtx.font = '12px sans-serif';
    sCtx.fillStyle = '#666';
    sCtx.strokeStyle = '#999';
    sCtx.lineWidth = 1;
    sCtx.textAlign = 'center';

    /* length below */
    var dY = sB + 28;
    sCtx.beginPath();
    sCtx.moveTo(sL, dY-4); sCtx.lineTo(sL, dY+4);
    sCtx.moveTo(sL, dY);   sCtx.lineTo(sR, dY);
    sCtx.moveTo(sR, dY-4); sCtx.lineTo(sR, dY+4);
    sCtx.stroke();
    sCtx.fillText('l = ' + (p.l*100).toFixed(0) + ' cm', cx, dY + 15);

    /* radius on right */
    var rX = sR + 45;
    sCtx.beginPath();
    sCtx.moveTo(rX-4, cy); sCtx.lineTo(rX+4, cy);
    sCtx.moveTo(rX, cy);   sCtx.lineTo(rX, sT);
    sCtx.moveTo(rX-4, sT); sCtx.lineTo(rX+4, sT);
    sCtx.stroke();
    sCtx.save();
    sCtx.translate(rX + 14, (cy + sT) / 2);
    sCtx.rotate(-Math.PI / 2);
    sCtx.fillText('a = ' + (p.a*100).toFixed(1) + ' cm', 0, 0);
    sCtx.restore();
    sCtx.restore();

    /* ---- 8. Formula overlay ---- */
    sCtx.save();
    sCtx.font = '13px monospace';
    sCtx.fillStyle = '#1a1a2e';
    sCtx.textAlign = 'left';
    var fx = 10, fy = H - 52;
    sCtx.fillText('B = \u03bc\u2080ni = ' + (ph.B*1e3).toFixed(3) + ' mT', fx, fy);
    sCtx.fillText('L = \u03bc\u2080n\u00b2Al = ' + (ph.L*1e3).toFixed(4) + ' mH', fx, fy + 17);
    sCtx.fillText('U = \u00bdLi\u00b2 = ' + (ph.U*1e3).toFixed(4) + ' mJ', fx, fy + 34);
    sCtx.restore();
  }

  /* ---- draw B(r) profile plot ---- */
  function drawPlot(p, ph) {
    var W = pltC._w, H = pltC._h;
    pCtx.clearRect(0, 0, W, H);

    var pad = { l:42, r:12, t:14, b:28 };
    var pw  = W - pad.l - pad.r;
    var pph = H - pad.t - pad.b;
    var maxR = 3;
    var maxB = Math.max(ph.B * 1.25, MU0 * 200 * 1 * 1.25); /* floor for empty scale */

    /* axes */
    pCtx.save();
    pCtx.strokeStyle = '#999'; pCtx.lineWidth = 1;
    pCtx.beginPath();
    pCtx.moveTo(pad.l, pad.t);
    pCtx.lineTo(pad.l, pad.t + pph);
    pCtx.lineTo(pad.l + pw, pad.t + pph);
    pCtx.stroke();

    /* grid */
    pCtx.strokeStyle = '#eee'; pCtx.lineWidth = 0.5;
    for (var g = 1; g <= 4; g++) {
      var gy = pad.t + pph - (g/4)*pph;
      pCtx.beginPath(); pCtx.moveTo(pad.l, gy); pCtx.lineTo(pad.l+pw, gy); pCtx.stroke();
    }

    /* y-axis labels */
    pCtx.font = '10px sans-serif';
    pCtx.fillStyle = '#888';
    pCtx.textAlign = 'right';
    for (var g = 0; g <= 4; g++) {
      var gy = pad.t + pph - (g/4)*pph;
      pCtx.fillText((maxB*1e3*g/4).toFixed(1), pad.l-4, gy+3);
    }

    /* y-axis title */
    pCtx.save();
    pCtx.translate(11, pad.t + pph/2);
    pCtx.rotate(-Math.PI/2);
    pCtx.textAlign = 'center';
    pCtx.font = '11px sans-serif';
    pCtx.fillStyle = '#666';
    pCtx.fillText('B (mT)', 0, 0);
    pCtx.restore();

    /* x-axis labels */
    pCtx.textAlign = 'center';
    pCtx.fillStyle = '#888';
    for (var g = 0; g <= 3; g++) {
      var gx = pad.l + (g/maxR)*pw;
      pCtx.fillText(g, gx, pad.t + pph + 14);
    }
    pCtx.textAlign = 'center';
    pCtx.fillStyle = '#666';
    pCtx.fillText('r / a', pad.l + pw/2, H - 3);

    /* boundary r = a dashed line */
    var bx = pad.l + (1/maxR)*pw;
    pCtx.beginPath();
    pCtx.setLineDash([4,3]);
    pCtx.strokeStyle = 'rgba(200,50,50,0.3)';
    pCtx.moveTo(bx, pad.t); pCtx.lineTo(bx, pad.t + pph);
    pCtx.stroke();
    pCtx.setLineDash([]);
    pCtx.fillStyle = '#c44';
    pCtx.font = '10px sans-serif';
    pCtx.textAlign = 'left';
    pCtx.fillText('r = a', bx + 3, pad.t + 10);

    /* B(r) curve */
    pCtx.beginPath();
    pCtx.strokeStyle = '#0066cc';
    pCtx.lineWidth = 2.5;
    var N = 200;
    for (var k = 0; k <= N; k++) {
      var r = (k/N) * maxR;
      var bv = r <= 1.0 ? ph.B : ph.B * Math.exp(-18*(r-1));
      var x = pad.l + (r/maxR)*pw;
      var y = pad.t + pph - (bv/maxB)*pph;
      if (k === 0) pCtx.moveTo(x,y); else pCtx.lineTo(x,y);
    }
    pCtx.stroke();

    /* fill under */
    pCtx.lineTo(pad.l + pw, pad.t + pph);
    pCtx.lineTo(pad.l, pad.t + pph);
    pCtx.closePath();
    pCtx.fillStyle = 'rgba(0,102,204,0.07)';
    pCtx.fill();

    pCtx.restore();
  }

  /* ---- animation loop ---- */
  function frame(ts) {
    var dt = Math.min((ts - lastTS) / 1000, 0.1);
    lastTS = ts;
    animT += dt;

    var p  = params();
    var ph = physics(p);
    updateInfo(p, ph);
    drawSol(p, ph, animT);
    drawPlot(p, ph);

    requestAnimationFrame(frame);
  }

  /* ---- init ---- */
  function init() {
    resizeCanvas(solC);
    resizeCanvas(pltC);
    window.addEventListener('resize', function() {
      resizeCanvas(solC);
      resizeCanvas(pltC);
    });
    requestAnimationFrame(frame);
  }

  init();
})();
</script>
</body>
